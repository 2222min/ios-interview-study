{day:8,title:"네트워킹: URLSession과 보안",
tags:["URLSession","HTTP/2","Certificate Pinning","Cache","Background Session"],
topics:[

{name:"URLSession 아키텍처",icon:"blue",
detail:`
<h5>URLSession의 계층 구조</h5>
<pre>URLSession (네트워크 작업의 진입점)
  └─ URLSessionConfiguration (설정: 타임아웃, 캐시 등)
      └─ URLSessionTask (실제 작업 단위)
          ├─ URLSessionDataTask (일반 데이터)
          ├─ URLSessionUploadTask (업로드)
          ├─ URLSessionDownloadTask (큰 파일 다운)
          └─ URLSessionWebSocketTask (WebSocket)
              └─ URLProtocol (실제 네트워크 처리)
                  └─ HTTP/2 Connection Pool
                      └─ TLS/TCP Socket</pre>

<h5>3가지 주요 Configuration</h5>
<pre>// .default - 일반 사용 (디스크 캐시, 쿠키 저장)
let config = URLSessionConfiguration.default

// .ephemeral - 메모리만 사용 (프라이빗 브라우징)
// 디스크에 아무것도 저장 안 됨
let private = URLSessionConfiguration.ephemeral

// .background - 앱 종료 후에도 전송 계속
// 시스템 데몬이 다운로드/업로드 처리
let bg = URLSessionConfiguration.background(
    withIdentifier: "com.app.upload"
)</pre>

<h5>주요 설정 옵션</h5>
<pre>let config = URLSessionConfiguration.default

// 타임아웃
config.timeoutIntervalForRequest = 30   // 응답 대기 시간
config.timeoutIntervalForResource = 300 // 전체 전송 완료 시간

// 동시 연결 제한
config.httpMaximumConnectionsPerHost = 4

// 캐시 정책
config.requestCachePolicy = .returnCacheDataElseLoad
config.urlCache = URLCache(
    memoryCapacity: 50 * 1024 * 1024,  // 50MB
    diskCapacity: 200 * 1024 * 1024     // 200MB
)

// 네트워크 대기 (iOS 11+)
config.waitsForConnectivity = true
// 네트워크 없으면 즉시 실패 대신 대기
// → urlSession(_:taskIsWaitingForConnectivity:) delegate 호출

// HTTP 헤더
config.httpAdditionalHeaders = [
    "Authorization": "Bearer \\(token)",
    "User-Agent": "MyApp/1.0"
]</pre>

<h5>HTTP/2 멀티플렉싱</h5>
<p>같은 호스트에 대한 여러 요청이 하나의 TCP 연결을 공유합니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">버전</th><th style="padding:10px;text-align:left">동작</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">HTTP/1.1</td><td style="padding:10px;border-top:1px solid var(--g2)">호스트당 최대 6개 TCP 연결, 각각 핸드셰이크 비용</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">HTTP/2</td><td style="padding:10px;border-top:1px solid var(--g2)">호스트당 1개 TCP, 여러 stream 멀티플렉싱</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">HTTP/3 (QUIC)</td><td style="padding:10px;border-top:1px solid var(--g2)">UDP 기반, head-of-line blocking 해결</td></tr>
</table>
<p>URLSession은 서버가 지원하면 자동으로 HTTP/2를 사용합니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "URLSession은 단순 HTTP 클라이언트가 아니라 connection pool, 캐시, 인증, 백그라운드 전송까지 포함한 통합 시스템입니다. background configuration의 흥미로운 점은 앱이 죽어도 시스템 데몬이 전송을 마치고 완료 시 앱을 깨워준다는 거예요. 큰 업로드/다운로드에 필수입니다."
</div>
`},

{name:"Certificate Pinning (인증서 피닝)",icon:"green",
detail:`
<h5>왜 필요한가요?</h5>
<p>일반 HTTPS는 시스템이 신뢰하는 모든 CA가 발급한 인증서를 받아들입니다. 하지만:</p>
<ul>
<li>회사 프록시(charles, mitmproxy)가 자체 CA를 설치하면 → MITM 공격 가능</li>
<li>악성 CA가 발급한 인증서로 가짜 서버 가능</li>
</ul>
<p>인증서 피닝은 "내가 미리 알고 있는 특정 인증서/키만 받아들인다"고 명시하는 추가 보안 계층입니다.</p>

<h5>피닝의 두 가지 방식</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">방식</th><th style="padding:10px;text-align:left">장점</th><th style="padding:10px;text-align:left">단점</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Certificate Pinning</td><td style="padding:10px;border-top:1px solid var(--g2)">구현 간단</td><td style="padding:10px;border-top:1px solid var(--g2)">인증서 갱신 시 앱 업데이트</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Public Key Pinning</td><td style="padding:10px;border-top:1px solid var(--g2)">키 유지 시 인증서 갱신 OK</td><td style="padding:10px;border-top:1px solid var(--g2)">구현 약간 복잡</td></tr>
</table>

<h5>Public Key Pinning 구현</h5>
<pre>class NetworkDelegate: NSObject, URLSessionDelegate {
    
    // 서버 공개키의 SHA-256 해시 (현재 + 백업)
    let pinnedHashes: Set&lt;String&gt; = [
        "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=",  // 현재
        "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="   // 백업 (롤오버 대비)
    ]
    
    func urlSession(_ session: URLSession,
                    didReceive challenge: URLAuthenticationChallenge,
                    completionHandler: @escaping (URLSession.AuthChallengeDisposition, URLCredential?) -> Void) {
        
        // 서버 인증서 검증 단계
        guard challenge.protectionSpace.authenticationMethod == NSURLAuthenticationMethodServerTrust,
              let serverTrust = challenge.protectionSpace.serverTrust else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // 서버 인증서에서 공개키 추출
        guard let serverCert = SecTrustGetCertificateAtIndex(serverTrust, 0),
              let publicKey = SecCertificateCopyKey(serverCert),
              let publicKeyData = SecKeyCopyExternalRepresentation(publicKey, nil) as Data? else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // SHA-256 해시 계산
        let hash = SHA256.hash(data: publicKeyData)
        let hashString = Data(hash).base64EncodedString()
        
        if pinnedHashes.contains(hashString) {
            // 매치! 정상 진행
            completionHandler(.useCredential, URLCredential(trust: serverTrust))
        } else {
            // 매치 안 됨 → 연결 거부
            completionHandler(.cancelAuthenticationChallenge, nil)
        }
    }
}

let session = URLSession(
    configuration: .default,
    delegate: NetworkDelegate(),
    delegateQueue: nil
)</pre>

<h5>중요: 백업 핀 필수</h5>
<p>인증서/키는 보안 사고 시나 정기적으로 교체해야 합니다. 핀이 하나뿐이면 교체 시점에 앱이 모두 동작을 멈춥니다. 항상 2개 이상의 핀(현재 + 다음 갱신용)을 유지해야 합니다.</p>

<h5>Trade-off</h5>
<ul>
<li>✅ MITM 공격 차단</li>
<li>✅ 회사 프록시 우회 차단</li>
<li>❌ 인증서 갱신 시 앱 업데이트 필요</li>
<li>❌ Charles/Proxyman 디버깅 불가 (개발 빌드는 비활성화)</li>
<li>❌ 잘못 구현하면 모든 사용자가 앱 사용 불가</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "인증서 피닝은 강력한 추가 보안 계층이지만 양날의 검입니다. 핀이 잘못되거나 인증서 교체 누락 시 모든 사용자가 차단됩니다. 그래서 항상 2개 이상의 백업 핀을 두고, 서버에서 강제 업데이트 메커니즘을 별도로 마련합니다. 금융앱이나 의료앱 같은 고보안 도메인에선 거의 필수입니다."
</div>
`},

{name:"HTTP 캐시와 효율적 네트워킹",icon:"purple",
detail:`
<h5>HTTP 캐시 정책</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">정책</th><th style="padding:10px;text-align:left">동작</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.useProtocolCachePolicy</code></td><td style="padding:10px;border-top:1px solid var(--g2)">기본값. 서버 Cache-Control 헤더 따름</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.reloadIgnoringLocalCacheData</code></td><td style="padding:10px;border-top:1px solid var(--g2)">항상 서버 요청</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.returnCacheDataElseLoad</code></td><td style="padding:10px;border-top:1px solid var(--g2)">캐시 우선, 없으면 네트워크</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.returnCacheDataDontLoad</code></td><td style="padding:10px;border-top:1px solid var(--g2)">캐시만, 없으면 실패 (오프라인 모드)</td></tr>
</table>

<h5>조건부 요청 (Conditional Request)</h5>
<p>URLSession은 자동으로 ETag/Last-Modified를 처리합니다. 서버가 변경 없으면 304 Not Modified 응답 → 캐시 사용.</p>
<pre>// 첫 요청
GET /api/data
Response 200 OK
ETag: "abc123"
[데이터]

// 두 번째 요청 (URLSession이 자동 처리)
GET /api/data
If-None-Match: "abc123"
Response 304 Not Modified  ← 본문 없음, 캐시 사용</pre>

<h5>Reachability와 waitsForConnectivity</h5>
<pre>// 옛날 방식: Reachability
// 매번 네트워크 상태 체크 → 안 되면 에러

// 현재: NWPathMonitor (Network framework)
import Network
let monitor = NWPathMonitor()
monitor.pathUpdateHandler = { path in
    if path.status == .satisfied {
        print("네트워크 연결됨")
        if path.usesInterfaceType(.cellular) {
            print("셀룰러 연결")
        }
    } else {
        print("네트워크 끊김")
    }
}
monitor.start(queue: DispatchQueue.global())

// URLSession: waitsForConnectivity로 자동 대기
let config = URLSessionConfiguration.default
config.waitsForConnectivity = true
// 네트워크 없으면 즉시 실패 안 하고 대기 → 연결되면 자동 진행</pre>

<h5>실무 네트워크 레이어 구조</h5>
<pre>// 1. Endpoint enum
enum Endpoint {
    case getUser(id: String)
    case updateProfile(data: ProfileData)
    
    var path: String { ... }
    var method: HTTPMethod { ... }
    var body: Data? { ... }
}

// 2. NetworkService protocol (테스트 용이)
protocol NetworkServiceProtocol {
    func request&lt;T: Decodable&gt;(_ endpoint: Endpoint) async throws -> T
}

// 3. 구현
class NetworkService: NetworkServiceProtocol {
    private let session: URLSession
    
    func request&lt;T: Decodable&gt;(_ endpoint: Endpoint) async throws -> T {
        let request = endpoint.urlRequest
        let (data, response) = try await session.data(for: request)
        
        guard let httpResponse = response as? HTTPURLResponse,
              200..&lt;300 ~= httpResponse.statusCode else {
            throw NetworkError.serverError
        }
        
        return try JSONDecoder().decode(T.self, from: data)
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "네트워크 레이어는 Endpoint enum + Protocol 추상화로 만들면 테스트와 변경에 유연합니다. URLSession의 캐시 정책을 적절히 활용하면 서버 부하와 사용자 대기 시간을 줄일 수 있고, waitsForConnectivity는 네트워크가 끊겼다가 다시 연결될 때 자동 재시도해줘서 UX 향상에 유용합니다."
</div>
`}

],
questions:[
{q:"URLSession의 delegate queue가 nil이면 어떻게 되나요?",level:"advanced",freq:false,
answer:"시스템이 serial OperationQueue를 자동으로 생성하여 delegate 콜백을 전달합니다. <b>이 큐는 메인 스레드가 아닙니다.</b><br><br>그래서 delegate 콜백에서 UI 업데이트를 하려면 <code>DispatchQueue.main.async</code>로 디스패치해야 합니다.<br><br>완전히 메인 스레드에서 받고 싶다면 <code>OperationQueue.main</code>을 명시적으로 전달하세요. 단, completion handler 기반 API(data(for:))는 await 후 호출자의 actor에서 재개되므로 별개 동작합니다."},

{q:"Background URLSession의 동작 원리는?",level:"advanced",freq:true,
answer:"Background Configuration으로 만든 URLSession은 <code>nsurlsessiond</code>라는 시스템 데몬이 실제 네트워크 작업을 처리합니다.<br><br>특징:<br>- 앱이 백그라운드/종료되어도 전송 계속됨<br>- 시스템이 네트워크/배터리 상태에 따라 최적 시점 선택<br>- 완료/실패 시 <code>application(_:handleEventsForBackgroundURLSession:)</code>로 앱을 깨움<br>- 같은 identifier로 다시 만들면 진행 중인 작업과 연결됨<br><br>주의: completion handler 기반은 사용 불가, delegate 패턴만 가능. <code>isDiscretionary = true</code>로 설정하면 시스템이 더 적극적으로 최적화."},

{q:"인증서 피닝은 왜 백업 핀이 필요한가요?",level:"advanced",freq:true,
answer:"인증서/공개키는 다음 이유로 교체될 수 있습니다:<br>- 정기 갱신 (보통 1~2년 주기)<br>- 보안 사고로 인한 긴급 교체<br>- 서버 마이그레이션<br><br>핀이 하나뿐이면 교체 순간 모든 클라이언트가 연결 실패합니다.<br><br>해결: 항상 \"현재 핀\"과 \"다음 갱신용 핀\" 2개 이상을 앱에 포함. 서버 측 강제 업데이트 메커니즘도 별도로 마련해 비상 대응 가능하게 합니다."},

{q:"HTTP/2의 멀티플렉싱이란?",level:"basic",freq:false,
answer:"하나의 TCP 연결 위에 여러 개의 독립적인 stream을 동시에 흐르게 하는 기술입니다.<br><br>HTTP/1.1: 한 요청 끝나야 다음 요청 시작 (또는 호스트당 최대 6 연결로 회피)<br>HTTP/2: 한 연결로 여러 요청을 동시에 (응답 순서 무관)<br><br>장점:<br>- TCP 핸드셰이크 비용 절감<br>- TLS 핸드셰이크 한 번만<br>- Head-of-line blocking 부분 해결<br><br>여전히 TCP 레벨에서 패킷 손실 시 모든 stream이 영향. 이걸 완전히 해결한 게 HTTP/3 (QUIC, UDP 기반)."}

topics:[

{name:"MVC와 그 한계 (Massive View Controller)",icon:"blue",
detail:`
<h5>전통적인 MVC</h5>
<pre>// 이론적 MVC:
//
// Model ←──→ Controller ←──→ View
//
// Model: 비즈니스 데이터
// View: 화면 표시
// Controller: 둘 사이 중재</pre>

<h5>Apple의 MVC = Massive View Controller</h5>
<p>iOS에서는 ViewController가 거의 모든 일을 떠안게 됩니다. 결과는 1000줄+의 거대한 파일.</p>

<pre>// 흔한 ViewController의 책임 (모두 한 클래스에...):
class FeedViewController: UIViewController {
    // 1. View lifecycle
    override func viewDidLoad() { ... }
    
    // 2. UI 구성
    private let tableView = UITableView()
    private func setupUI() { ... }
    
    // 3. 데이터 모델
    private var items: [FeedItem] = []
    
    // 4. 네트워크 요청
    func fetchData() {
        URLSession.shared.dataTask(with: url) { ... }
    }
    
    // 5. 데이터 변환 (DTO → 표시 모델)
    func transform(_ dto: FeedDTO) -> FeedItem { ... }
    
    // 6. 비즈니스 로직
    func validateAndSave(_ item: FeedItem) { ... }
    
    // 7. UITableViewDataSource
    func numberOfSections... { ... }
    
    // 8. UITableViewDelegate
    func tableView(_:didSelectRowAt:) { ... }
    
    // 9. 네비게이션
    func showDetail(_ item: FeedItem) {
        navigationController?.pushViewController(...)
    }
    
    // ... 1500줄짜리 파일 완성
}</pre>

<h5>왜 문제인가요?</h5>
<ul>
<li>테스트 불가능 (UIKit 의존, 모든 게 하나에 묶임)</li>
<li>재사용 불가</li>
<li>여러 명이 같은 파일 수정 → 머지 충돌</li>
<li>변경 영향 범위 파악 어려움</li>
</ul>

<h5>MVC가 적합한 경우</h5>
<ul>
<li>단순한 화면 (설정, 정적 목록)</li>
<li>프로토타이핑</li>
<li>1~2명 작은 팀, 단기 프로젝트</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "Apple의 MVC가 나쁜 건 아닙니다. 단지 iOS의 UIViewController가 View와 Controller의 역할을 동시에 가지면서 책임이 너무 많아진 것뿐이죠. 이를 분리하기 위해 MVVM, VIPER, Clean Architecture 같은 패턴이 등장했습니다."
</div>
`},

{name:"MVVM + Coordinator",icon:"green",
detail:`
<h5>MVVM 구조</h5>
<pre>// View (ViewController) ←─바인딩─→ ViewModel ←─→ Model/Repository
//
// View: UI 렌더링, 사용자 입력 ViewModel에 전달
// ViewModel: 비즈니스 로직, 상태 관리. UIKit import 금지!
// Model: 데이터, 도메인 객체</pre>

<h5>ViewModel 핵심 규칙</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>UIKit/SwiftUI import 금지</b>: 테스트 가능성 보장</li>
<li><b>View와 단방향 통신</b>: ViewModel → View는 binding, View → ViewModel은 메서드 호출</li>
<li><b>Input/Output 명확화</b>: 인터페이스를 protocol로 정의</li>
</ol>

<h5>Input/Output 패턴 (RxSwift/Combine)</h5>
<pre>protocol ViewModelType {
    associatedtype Input
    associatedtype Output
    func transform(input: Input) -> Output
}

class FeedViewModel: ViewModelType {
    // 사용자 액션 (View → ViewModel)
    struct Input {
        let viewDidLoad: AnyPublisher&lt;Void, Never&gt;
        let pullToRefresh: AnyPublisher&lt;Void, Never&gt;
        let itemSelected: AnyPublisher&lt;IndexPath, Never&gt;
    }
    
    // ViewModel 출력 (ViewModel → View)
    struct Output {
        let items: AnyPublisher&lt;[FeedItem], Never&gt;
        let isLoading: AnyPublisher&lt;Bool, Never&gt;
        let error: AnyPublisher&lt;String, Never&gt;
    }
    
    private let repository: FeedRepositoryProtocol
    
    init(repository: FeedRepositoryProtocol) {
        self.repository = repository
    }
    
    func transform(input: Input) -> Output {
        // Input → Output 변환 로직
        let isLoading = CurrentValueSubject&lt;Bool, Never&gt;(false)
        
        let items = Publishers.Merge(input.viewDidLoad, input.pullToRefresh)
            .handleEvents(receiveOutput: { _ in isLoading.send(true) })
            .flatMap { [weak self] _ -> AnyPublisher&lt;[FeedItem], Never&gt; in
                self?.repository.fetchFeed() ?? Empty().eraseToAnyPublisher()
            }
            .handleEvents(receiveOutput: { _ in isLoading.send(false) })
            .eraseToAnyPublisher()
        
        return Output(
            items: items,
            isLoading: isLoading.eraseToAnyPublisher(),
            error: Empty().eraseToAnyPublisher()
        )
    }
}</pre>

<h5>Coordinator 패턴 (네비게이션 분리)</h5>
<p>ViewController가 다른 ViewController를 push/present하면 결합도가 높아집니다. Coordinator가 네비게이션을 전담합니다.</p>

<pre>protocol Coordinator: AnyObject {
    var childCoordinators: [Coordinator] { get set }
    var navigationController: UINavigationController { get }
    func start()
}

class FeedCoordinator: Coordinator {
    var childCoordinators: [Coordinator] = []
    let navigationController: UINavigationController
    
    init(navigationController: UINavigationController) {
        self.navigationController = navigationController
    }
    
    func start() {
        let vm = FeedViewModel(repository: FeedRepository())
        let vc = FeedViewController(viewModel: vm)
        vc.delegate = self  // 화면 전환 요청 받기
        navigationController.pushViewController(vc, animated: true)
    }
}

extension FeedCoordinator: FeedViewControllerDelegate {
    func didSelectItem(_ item: FeedItem) {
        // 자식 Coordinator 만들어 위임
        let detail = DetailCoordinator(
            navigationController: navigationController,
            item: item
        )
        childCoordinators.append(detail)
        detail.start()
    }
}</pre>

<h5>장점</h5>
<ul>
<li>ViewController가 화면 전환을 모름 → 재사용 가능</li>
<li>화면 흐름 변경이 Coordinator에서만 일어남</li>
<li>Deep link 처리 용이</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "MVVM은 View의 책임을 분리하지만 화면 전환 로직은 여전히 애매합니다. Coordinator로 네비게이션을 추출하면 ViewController가 정말 화면 표시만 담당하게 되어 재사용성이 크게 올라갑니다. 단, 작은 앱에선 Coordinator가 오버엔지니어링일 수 있어요."
</div>
`},

{name:"Clean Architecture",icon:"purple",
detail:`
<h5>Clean Architecture 원칙</h5>
<p>Robert C. Martin(Uncle Bob)이 제안한 아키텍처. <b>핵심: 의존성은 항상 바깥에서 안쪽으로만 향한다.</b></p>

<pre>// 레이어 구조 (안쪽 → 바깥쪽):
//
// ┌─────────────────────────────────────────┐
// │  Frameworks (UIKit, URLSession...)       │  ← 가장 바깥
// │  ┌───────────────────────────────────┐   │
// │  │  Interface Adapters               │   │
// │  │  (Presenter, Gateway, Controller) │   │
// │  │  ┌─────────────────────────────┐  │   │
// │  │  │  Application Business Rules  │  │   │
// │  │  │  (Use Cases)                 │  │   │
// │  │  │  ┌──────────────────────┐    │  │   │
// │  │  │  │  Enterprise Rules    │    │  │   │
// │  │  │  │  (Entities)          │    │  │   │
// │  │  │  └──────────────────────┘    │  │   │
// │  │  └─────────────────────────────┘  │   │
// │  └───────────────────────────────────┘   │
// └─────────────────────────────────────────┘
//
// Entity는 누구도 의존 안 함 (가장 안쪽)
// Use Case는 Entity만 의존
// Adapter는 Use Case와 Entity 의존
// Framework는 모두 의존 (UI 같은 디테일)</pre>

<h5>iOS 적용 예시</h5>
<pre>// Domain Layer (가장 안쪽, 프레임워크 의존성 없음)
struct User {  // Entity (순수 비즈니스 모델)
    let id: String
    let name: String
    let email: String
}

protocol UserRepository {  // Repository Protocol (인터페이스)
    func fetchUser(id: String) async throws -> User
    func saveUser(_ user: User) async throws
}

class FetchUserUseCase {  // Use Case (비즈니스 로직)
    private let repository: UserRepository
    
    init(repository: UserRepository) {
        self.repository = repository
    }
    
    func execute(id: String) async throws -> User {
        let user = try await repository.fetchUser(id: id)
        // 비즈니스 규칙 적용
        guard !user.name.isEmpty else { throw DomainError.invalidUser }
        return user
    }
}

// Data Layer (Repository 구현)
struct UserDTO: Decodable {  // 네트워크 응답 모델
    let id: String
    let full_name: String
    let email_address: String
    
    func toDomain() -> User {  // DTO → Entity 변환
        User(id: id, name: full_name, email: email_address)
    }
}

class UserRepositoryImpl: UserRepository {
    private let networkService: NetworkServiceProtocol
    private let cacheService: CacheServiceProtocol
    
    init(networkService: NetworkServiceProtocol,
         cacheService: CacheServiceProtocol) {
        self.networkService = networkService
        self.cacheService = cacheService
    }
    
    func fetchUser(id: String) async throws -> User {
        // 1. 캐시 확인
        if let cached: User = cacheService.get(key: "user_\\(id)") {
            return cached
        }
        // 2. 네트워크 요청
        let dto: UserDTO = try await networkService.request(.getUser(id: id))
        // 3. DTO → Entity 변환
        let user = dto.toDomain()
        // 4. 캐싱
        cacheService.set(key: "user_\\(id)", value: user)
        return user
    }
}

// Presentation Layer
class UserDetailViewModel {
    private let fetchUserUseCase: FetchUserUseCase
    
    @Published var user: User?
    
    init(fetchUserUseCase: FetchUserUseCase) {
        self.fetchUserUseCase = fetchUserUseCase
    }
    
    func load(userId: String) async {
        do {
            user = try await fetchUserUseCase.execute(id: userId)
        } catch {
            // 에러 처리
        }
    }
}</pre>

<h5>장점</h5>
<ul>
<li>UI 변경 → Domain 영향 없음</li>
<li>네트워크 라이브러리 교체 (URLSession → Alamofire) → Domain 영향 없음</li>
<li>Domain 로직 100% 유닛 테스트 가능</li>
<li>대규모 팀에서 책임 분리 명확</li>
</ul>

<h5>단점</h5>
<ul>
<li>코드 양 증가 (DTO ↔ Entity 변환 등 보일러플레이트)</li>
<li>작은 앱에서는 오버엔지니어링</li>
<li>학습 곡선</li>
</ul>

<div class="highlight">
<b>💡 면접 답변 예시:</b> "저는 MVVM + Coordinator + Clean Architecture를 조합합니다. Domain 레이어는 순수 Swift로 유지해 테스트 커버리지 90% 이상 달성했고, Repository를 Protocol로 추상화하여 Mock 주입이 용이합니다. 모듈화는 Tuist로 관리하며, Feature 모듈 간 의존성은 Interface 모듈을 통해 간접 참조해서 빌드 시간을 12분에서 4분으로 단축했습니다."
</div>
`}

answer:"세 가지 이유가 있습니다:<br><br>1. <b>테스트 가능성</b>: UIKit은 main thread, view hierarchy 등 환경에 의존. 유닛 테스트 환경에서 실행 어려움.<br>2. <b>플랫폼 독립성</b>: 같은 ViewModel을 macOS, watchOS, SwiftUI에서 재사용 가능.<br>3. <b>책임 분리</b>: ViewModel은 비즈니스 로직, View는 UI. 섞이면 MVC와 다를 바 없음.<br><br>대신 <code>UIImage</code>가 필요하면 <code>Data</code>나 URL로 추상화하고, 색상은 hex string이나 enum으로 표현합니다."},

{day:10,title:"Dependency Injection과 모듈화",
tags:["DI","Constructor Injection","Tuist","Interface Module","Build Time"],
topics:[

{name:"DI (Dependency Injection) 기초",icon:"blue",
detail:`
<h5>Dependency Injection이 뭔가요?</h5>
<p>"객체가 필요한 의존성을 직접 만들지 않고, 외부에서 주입받는다"는 디자인 원칙입니다.</p>

<h5>왜 필요한가요?</h5>
<pre>// ❌ 직접 의존: 테스트 불가
class UserViewModel {
    let networkService = NetworkService()  // 직접 인스턴스화
    
    func fetch() {
        networkService.request(...)
    }
}
// 문제:
// - 테스트할 때 가짜 NetworkService로 교체 불가
// - 다른 NetworkService 사용 불가 (캐싱, mocking)
// - UserViewModel이 NetworkService의 구체 구현에 강결합

// ✅ 의존성 주입: 테스트 가능, 유연
protocol NetworkServiceProtocol {
    func request(...) async throws -> Data
}

class UserViewModel {
    let networkService: NetworkServiceProtocol
    
    init(networkService: NetworkServiceProtocol) {
        self.networkService = networkService
    }
}

// 실제 사용
let vm = UserViewModel(networkService: NetworkService())

// 테스트
let mock = MockNetworkService()
let testVM = UserViewModel(networkService: mock)</pre>

<h5>3가지 주입 방식</h5>

<h5>1. Constructor Injection (가장 권장)</h5>
<pre>class FeedViewModel {
    private let repository: FeedRepositoryProtocol
    private let analytics: AnalyticsProtocol
    
    init(repository: FeedRepositoryProtocol, 
         analytics: AnalyticsProtocol) {
        self.repository = repository
        self.analytics = analytics
    }
}
// 장점: 의존성이 명확, 불변성 보장, 테스트 용이
// 단점: 의존성 많으면 init 파라미터 폭발</pre>

<h5>2. Property Injection</h5>
<pre>class FeedViewController: UIViewController {
    var viewModel: FeedViewModelProtocol!  // 외부에서 주입
}

// 사용
let vc = FeedViewController()
vc.viewModel = FeedViewModel(...)
// 장점: storyboard로 만든 ViewController에 적합 (init 못 건드림)
// 단점: nil 가능성, 주입 시점 불명확</pre>

<h5>3. Method Injection</h5>
<pre>class DataProcessor {
    func process(data: Data, using parser: ParserProtocol) -> Result {
        return parser.parse(data)
    }
}
// 장점: 호출마다 다른 의존성 사용 가능
// 단점: 매번 전달해야 함</pre>

<h5>SOLID의 D: Dependency Inversion</h5>
<p>"고수준 모듈은 저수준 모듈에 의존하면 안 되고, 둘 다 추상(인터페이스)에 의존해야 한다"는 원칙. DI가 이를 실현하는 메커니즘입니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "DI는 단순히 'init 파라미터로 받는다'가 아니라, 결합도를 낮추고 테스트 가능성을 높이는 설계 철학입니다. Constructor Injection이 가장 안전하고 명확하지만, 의존성이 많아지면 Property Injection이나 DI Container를 고려할 수 있죠."
</div>
`},

{name:"DI Container와 @propertyWrapper",icon:"green",
detail:`
<h5>DI Container가 뭔가요?</h5>
<p>의존성을 한 곳에서 등록하고, 필요할 때 꺼내 쓰는 중앙 저장소입니다. Swinject 같은 라이브러리를 쓰거나 직접 구현할 수 있습니다.</p>

<h5>간단한 DI Container 구현</h5>
<pre>final class DIContainer {
    static let shared = DIContainer()
    
    private var factories: [String: () -> Any] = [:]
    private var singletons: [String: Any] = [:]
    
    // 매번 새 인스턴스 (factory)
    func register&lt;T&gt;(_ type: T.Type, factory: @escaping () -> T) {
        let key = String(describing: type)
        factories[key] = factory
    }
    
    // 단일 인스턴스 공유 (singleton)
    func registerSingleton&lt;T&gt;(_ type: T.Type, factory: @escaping () -> T) {
        let key = String(describing: type)
        singletons[key] = factory()
    }
    
    func resolve&lt;T&gt;(_ type: T.Type) -> T {
        let key = String(describing: type)
        if let singleton = singletons[key] as? T {
            return singleton
        }
        guard let factory = factories[key],
              let instance = factory() as? T else {
            fatalError("No registration for \\(key)")
        }
        return instance
    }
}

// 등록 (앱 시작 시)
DIContainer.shared.registerSingleton(NetworkServiceProtocol.self) {
    NetworkService()
}
DIContainer.shared.register(FeedRepositoryProtocol.self) {
    FeedRepository(
        network: DIContainer.shared.resolve(NetworkServiceProtocol.self)
    )
}

// 사용
let repo = DIContainer.shared.resolve(FeedRepositoryProtocol.self)</pre>

<h5>@propertyWrapper 기반 DI</h5>
<pre>@propertyWrapper
struct Injected&lt;T&gt; {
    private var value: T?
    
    init() {}
    
    var wrappedValue: T {
        mutating get {
            if let v = value { return v }
            let resolved = DIContainer.shared.resolve(T.self)
            value = resolved
            return resolved
        }
        set { value = newValue }
    }
}

// 사용 — 깔끔하다!
class FeedViewModel {
    @Injected var repository: FeedRepositoryProtocol
    @Injected var analytics: AnalyticsProtocol
}</pre>

<h5>Service Locator 안티패턴 주의</h5>
<p>DIContainer를 직접 호출하면 의존성이 숨겨집니다. 가능하면 Constructor Injection으로 명시적으로 받는 게 좋습니다.</p>

<pre>// ❌ Service Locator (의존성이 숨겨짐)
class BadViewModel {
    func fetch() {
        let service = DIContainer.shared.resolve(NetworkServiceProtocol.self)
        // 이 클래스가 NetworkService에 의존하는지 외부에서 알기 어려움
    }
}

// ✅ Constructor Injection (의존성 명시적)
class GoodViewModel {
    let service: NetworkServiceProtocol
    init(service: NetworkServiceProtocol) {
        self.service = service
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "DI Container는 편하지만 남용하면 Service Locator 안티패턴이 됩니다. Container는 앱 진입점(Composition Root)에서만 사용하고, 비즈니스 로직 안에서는 Constructor Injection으로 명시적으로 의존성을 받는 게 좋습니다."
</div>
`},

{name:"Tuist 모듈화 전략",icon:"purple",
detail:`
<h5>왜 모듈화가 필요한가요?</h5>
<p>큰 앱(예: 100+ 화면)이 단일 타깃이면:</p>
<ul>
<li>빌드 시간 매우 김 (작은 변경에도 전체 재컴파일)</li>
<li>여러 명이 같은 파일 수정 → 머지 충돌</li>
<li>의존 관계 파악 어려움 (모든 게 모든 걸 import 가능)</li>
</ul>

<h5>모듈 계층 구조</h5>
<pre>App
 ├─ Feature Modules (화면 단위)
 │   ├─ FeatureFeed
 │   ├─ FeatureProfile
 │   └─ FeatureSettings
 ├─ Domain Modules (비즈니스 로직)
 │   ├─ DomainFeed
 │   └─ DomainUser
 ├─ Core Modules (공통 유틸)
 │   ├─ CoreNetwork
 │   ├─ CoreUI
 │   └─ CoreStorage
 └─ Shared (확장, 상수)</pre>

<h5>Tuist란?</h5>
<p>Xcode 프로젝트 파일(<code>.xcodeproj</code>)을 코드(Swift)로 정의하고 자동 생성하는 도구입니다. 머지 충돌이 잦은 프로젝트 파일 문제를 해결합니다.</p>
<pre>// Project.swift (Tuist manifest)
import ProjectDescription

let project = Project(
    name: "FeatureFeed",
    targets: [
        .target(
            name: "FeatureFeed",
            destinations: .iOS,
            product: .framework,
            bundleId: "com.app.featureFeed",
            sources: ["Sources/**"],
            dependencies: [
                .project(target: "DomainFeed", path: "../DomainFeed"),
                .project(target: "CoreUI", path: "../CoreUI")
            ]
        )
    ]
)</pre>

<h5>Interface 모듈 패턴 (핵심!)</h5>
<p>모듈 간 의존성을 최소화하기 위한 강력한 패턴입니다.</p>

<pre>// ❌ 직접 의존: FeatureFeed → DomainUser
// FeatureFeed가 DomainUser의 모든 코드 변경에 영향받음

// ✅ Interface 분리:
//
// DomainUserInterface (Protocol만)
//   ↑
//   │ implements
//   │
// DomainUser (구현)
//
// FeatureFeed → DomainUserInterface (Protocol만 의존)

// DomainUserInterface 모듈 (가벼움)
public protocol UserServiceProtocol {
    func fetchUser(id: String) async throws -> UserEntity
}

public struct UserEntity {
    public let id: String
    public let name: String
}

// DomainUser 모듈 (실제 구현)
import DomainUserInterface

class UserService: UserServiceProtocol {  // internal 권장
    func fetchUser(id: String) async throws -> UserEntity { ... }
}</pre>

<h5>Interface 분리의 효과</h5>
<ul>
<li><b>빌드 시간 단축</b>: FeatureFeed 빌드에 DomainUser 전체 빌드 불필요 (Interface만)</li>
<li><b>변경 영향 축소</b>: DomainUser 내부 변경 → FeatureFeed 재빌드 안 됨</li>
<li><b>Mock 생성 용이</b>: Interface만 있으면 됨</li>
<li><b>병렬 개발</b>: 팀 A가 Interface 정의, 팀 B는 구현, 팀 C는 사용 동시 진행</li>
</ul>

<h5>Static vs Dynamic Framework</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">Static</th><th style="padding:10px;text-align:left">Dynamic</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">앱 시작 시간</td><td style="padding:10px;border-top:1px solid var(--g2)">빠름 (이미 링크됨)</td><td style="padding:10px;border-top:1px solid var(--g2)">느림 (런타임 로딩)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">빌드 시간</td><td style="padding:10px;border-top:1px solid var(--g2)">느림</td><td style="padding:10px;border-top:1px solid var(--g2)">빠름 (분리됨)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">바이너리 크기</td><td style="padding:10px;border-top:1px solid var(--g2)">크게 됨 (중복 가능)</td><td style="padding:10px;border-top:1px solid var(--g2)">작음 (공유)</td></tr>
</table>

<p>실무 가이드: 개발 빌드는 Dynamic (빠른 빌드), 배포 빌드는 Static (빠른 시작) — Tuist의 dev/release 분리 활용.</p>

<div class="highlight">
<b>💡 면접 답변 예시:</b> "50개 이상의 모듈을 Tuist로 관리하며, Interface/Implementation 분리 패턴을 적용했습니다. 클린 빌드 12분 → 4분으로 단축했고, 증분 빌드는 30초 이내입니다. DI는 Swinject Assembly로 모듈별 의존성을 등록하고 앱 시작 시 조립하는 방식을 사용합니다. 핵심은 Interface 모듈이 매우 가볍게 유지되어야 빌드 캐싱 효과가 극대화된다는 점이죠."
</div>
`}

questions:[
{q:"DI를 적용할 때 Constructor Injection을 권장하는 이유는?",level:"basic",freq:true,
answer:"네 가지 이유가 있습니다:<br><br>1. <b>의존성 명시</b>: init 파라미터로 모든 의존성이 드러남 → 외부에서 한눈에 파악<br>2. <b>불변성 보장</b>: <code>let</code>으로 선언 가능, 인스턴스 lifetime 동안 변경 안 됨<br>3. <b>테스트 용이</b>: Mock을 init에 전달만 하면 됨, 추가 설정 불필요<br>4. <b>nil 위험 없음</b>: Optional 없이 non-null 보장<br><br>단점은 의존성이 많을 때 init 파라미터가 길어지는 것. 이때는 Builder 패턴이나 DI Container를 고려할 수 있습니다."},

{q:"Service Locator 패턴이 안티패턴이라고 불리는 이유는?",level:"advanced",freq:false,
answer:"<b>의존성이 숨겨지기 때문입니다.</b><br><br>Service Locator를 사용하는 클래스는 init이나 메서드 시그니처에 의존성이 드러나지 않습니다. 코드 안에서 <code>Locator.resolve(...)</code>를 호출하므로 외부에서는 이 클래스가 무엇에 의존하는지 알기 어렵죠.<br><br>결과:<br>- 테스트 시 어떤 의존성을 mock해야 할지 불명확<br>- 의존성 분석 도구가 추적 못함<br>- 컴파일 타임에 누락 발견 못함<br><br>해결: DI Container는 Composition Root(앱 진입점)에서만 사용하고, 비즈니스 로직은 Constructor Injection으로 받기."},

{q:"Interface 모듈 분리의 핵심 효과는?",level:"advanced",freq:true,
answer:"<b>빌드 캐싱 효과</b>입니다.<br><br>FeatureFeed가 DomainUser를 직접 의존하면, DomainUser의 어떤 작은 변경도 FeatureFeed의 재빌드를 유발합니다.<br><br>Interface 분리 후엔: FeatureFeed는 DomainUserInterface(Protocol만 있음)에만 의존. DomainUser의 구현 변경은 DomainUserInterface와 무관하므로 FeatureFeed 빌드 캐시 그대로 사용.<br><br>결과: 50개+ 모듈 환경에서 클린 빌드 12분 → 4분, 증분 빌드 30초 이내까지 단축 가능. 또한 Mock 생성도 Interface만 있으면 되어 테스트 용이성 증가."},

{q:"Static과 Dynamic Framework는 언제 어느 걸 쓰나요?",level:"advanced",freq:false,
answer:"<b>일반적 가이드:</b><br>- Feature 모듈 (자주 변경): Dynamic (빌드 캐시 효과)<br>- Core 모듈 (안정적, 광범위 사용): Static (앱 시작 빠름)<br><br><b>제약:</b><br>- iOS 앱은 Dynamic Framework 6개 이하 권장 (Apple)<br>- 그 이상이면 dyld 로딩 시간 영향 큼 → Static 전환<br><br><b>실무 패턴:</b><br>- 개발 빌드: 모두 Dynamic (빠른 빌드)<br>- 배포 빌드: Feature는 Dynamic, Core는 Static<br><br>Tuist에서는 <code>.framework(.static)</code>으로 명시 가능."}
],

{day:11,title:"SwiftUI 렌더링 엔진과 상태 관리",
tags:["SwiftUI","Attribute Graph","@State","@StateObject","Body 재호출"],
topics:[

{name:"SwiftUI View는 struct다 (가장 중요한 개념)",icon:"blue",
detail:`
<h5>UIKit과 SwiftUI의 근본적 차이</h5>
<p>UIKit의 UIView는 class입니다. 한 번 만들면 계속 살아있고, frame이나 alpha를 직접 변경합니다.</p>
<p>SwiftUI의 View는 <b>struct</b>입니다. 그리고 매번 새로 생성됩니다.</p>

<pre>// UIKit 사고방식:
let view = UIView()
view.backgroundColor = .red    // 직접 변경
view.alpha = 0.5               // 직접 변경
// view 인스턴스는 계속 같은 객체

// SwiftUI 사고방식:
struct MyView: View {
    @State var color = Color.red
    var body: some View {
        Rectangle()
            .fill(color)
            .opacity(0.5)
    }
}
// MyView는 "어떻게 그릴지에 대한 설명서"
// body가 호출될 때마다 새 struct가 만들어짐!</pre>

<h5>그럼 매번 다 새로 그리는 건가요? 비효율적이지 않나요?</h5>
<p>아닙니다. SwiftUI는 새 View struct를 만들고, <b>이전 트리와 비교(diff)하여 변경된 부분만</b> 실제 UI에 반영합니다. React와 비슷한 컨셉이에요.</p>

<pre>struct CounterView: View {
    @State private var count = 0
    
    var body: some View {
        // count 변경 시 body 다시 호출됨
        VStack {
            Text("카운트: \\(count)")  // count 의존
            Button("증가") {
                count += 1
            }
        }
    }
}

// count가 0 → 1 변경 시:
// 1. body 다시 호출
// 2. 새 VStack { Text("카운트: 1"), Button("증가") } 생성
// 3. SwiftUI가 이전 트리와 비교
// 4. Text의 내용만 바뀐 걸 발견
// 5. Text의 텍스트만 업데이트 (Button은 그대로 둠)</pre>

<h5>View Identity</h5>
<p>SwiftUI가 "이 View가 같은 View인가, 새로운 View인가"를 판단하는 기준입니다.</p>
<ul>
<li><b>Structural Identity</b>: 위치(코드 트리에서의 자리) 기반</li>
<li><b>Explicit Identity</b>: <code>.id()</code>로 명시</li>
</ul>

<pre>// id가 같으면 → 같은 View로 간주, 상태 유지, 부드러운 전환
// id가 다르면 → 다른 View, 상태 리셋, 새로 생성

ForEach(items, id: \\.self) { item in
    Text(item.title)
}
// id 변경되면 Text가 새로 생성됨 (애니메이션 시작 가능)</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "SwiftUI는 'View = 함수 (State → UI)'라는 함수형 사고방식입니다. body는 자주 호출되지만 실제 UI 변경은 diff 결과에 따라 최소한만 일어납니다. 이 모델 덕분에 상태 관리가 단순해지죠. 단, 대량 List에서 불필요한 body 재호출이 일어나면 성능이 떨어지므로 View를 작은 단위로 분리해야 합니다."
</div>
`},

{name:"Attribute Graph (SwiftUI의 비밀)",icon:"green",
detail:`
<h5>Attribute Graph가 뭔가요?</h5>
<p>SwiftUI 내부의 의존성 그래프입니다. 각 View의 프로퍼티(특히 @State, @ObservedObject)가 노드, "이 값이 바뀌면 어떤 View의 body를 다시 호출해야 하는가"가 엣지로 표현됩니다.</p>

<pre>// 의사 그래프:
//
// @State count ──→ Text("카운트: \(count)")
//              └──→ if count > 10 { ... }
//
// count 변경 시:
// 1. count에 의존하는 노드들을 찾아 invalidate
// 2. 다음 렌더 사이클에 invalidated 노드만 다시 평가
// 3. 결과가 이전과 같으면 하위 트리 업데이트 스킵</pre>

<h5>왜 알면 좋나요?</h5>
<p>"내 SwiftUI가 왜 느린가?"를 디버깅하려면 Attribute Graph 동작을 이해해야 합니다. 특히 <b>불필요한 body 재호출</b>이 성능 문제의 주범입니다.</p>

<h5>흔한 성능 함정</h5>
<pre>// ❌ ExpensiveView가 매번 다시 그려짐!
struct ParentView: View {
    @State private var count = 0
    var body: some View {
        VStack {
            ExpensiveView()       // count 변경에도 영향받음
            Text("\\(count)")
            Button("+") { count += 1 }
        }
    }
}
// count 변경 → ParentView.body 재호출
// → 그 안의 ExpensiveView도 새로 생성됨
// → 비록 ExpensiveView 자체는 변경 없지만, init이 매번 호출됨</pre>

<pre>// ✅ 작은 View로 분리
struct ParentView: View {
    @State private var count = 0
    var body: some View {
        VStack {
            ExpensiveView()           // 입력 안 변하면 SwiftUI가 스킵
            CountDisplay(count: count) // count만 받음
            IncrementButton {
                count += 1
            }
        }
    }
}
// 각 View가 별개 struct → 입력이 같으면 body 호출 안 함
// (정확히는 호출은 되지만 결과 비교 후 UI 변경 안 함)</pre>

<h5>EquatableView로 비교 최적화</h5>
<pre>struct ExpensiveView: View, Equatable {
    let data: SomeData
    
    var body: some View {
        // 복잡한 뷰
    }
    
    // 직접 동등성 정의
    static func == (lhs: Self, rhs: Self) -> Bool {
        lhs.data.id == rhs.data.id
        // id만 같으면 동일 View로 간주 → 재계산 스킵
    }
}

// 사용
ExpensiveView(data: someData)
    .equatable()  // ← 이 modifier 추가</pre>

<h5>디버깅: body 호출 추적</h5>
<pre>// init에 print 추가하면 body 재호출 빈도 확인 가능
struct MyView: View {
    init() {
        print("MyView init")
    }
    
    let _ = Self._printChanges()  // iOS 15+: 무엇이 변경되어 재호출됐는지
    
    var body: some View {
        ...
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "SwiftUI 성능 최적화의 핵심은 body 재호출 범위를 줄이는 것입니다. View를 작게 분리하고, 입력이 같은 경우 EquatableView로 명시하며, Self._printChanges()로 어떤 의존성이 변경되었는지 추적합니다. List의 셀에 무거운 ViewModel을 직접 넣지 말고 작은 표시 모델로 변환하는 것도 중요해요."
</div>
`},

{name:"@State / @StateObject / @ObservedObject",icon:"purple",
detail:`
<h5>3가지 상태 wrapper의 차이</h5>

<h5>@State: View가 소유하는 값 타입 상태</h5>
<pre>struct CounterView: View {
    @State private var count = 0  // 항상 private!
    
    var body: some View {
        Text("\\(count)")
    }
}

// 특징:
// - 값 타입 (Int, String, Bool 등) 보관
// - View struct가 새로 생성되어도 값은 SwiftUI 내부 저장소에 유지됨
// - Attribute Graph에 등록되어 자동 재호출 트리거
// - private 권장 (외부 노출 X)</pre>

<h5>@StateObject: View가 소유하는 참조 타입</h5>
<pre>class FeedViewModel: ObservableObject {
    @Published var items: [Item] = []
    
    func load() async { ... }
}

struct FeedView: View {
    @StateObject private var viewModel = FeedViewModel()
    
    var body: some View { ... }
}

// 특징:
// - View의 lifetime 동안 한 번만 생성!
// - View struct가 재생성되어도 같은 인스턴스 유지
// - ObservableObject 채택한 class만 가능</pre>

<h5>@ObservedObject: 외부에서 주입받는 참조 타입</h5>
<pre>struct ChildView: View {
    @ObservedObject var viewModel: FeedViewModel  // 외부에서 받음
    
    var body: some View { ... }
}

// 특징:
// - View가 소유하지 않음 → View struct 재생성 시 새 인스턴스 가능!
// - ⚠️ 이게 가장 흔한 버그의 원인</pre>

<h5>가장 흔한 버그</h5>
<pre>// ❌ 잘못된 사용
struct ParentView: View {
    var body: some View {
        // 부모 body 재호출마다 새 ViewModel 생성!
        ChildView(viewModel: FeedViewModel())
        // → ChildView의 @ObservedObject가 매번 다른 인스턴스
        // → 상태가 계속 리셋됨!
    }
}

// ✅ 올바른 사용
struct ParentView: View {
    @StateObject private var viewModel = FeedViewModel()
    // 부모가 @StateObject로 소유 → 같은 인스턴스 유지
    
    var body: some View {
        ChildView(viewModel: viewModel)  // 같은 인스턴스 전달
    }
}</pre>

<h5>선택 가이드</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">간단한 값 타입 상태 (Int, String)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>@State</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">ViewModel을 이 View가 처음 생성</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>@StateObject</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">상위 View에서 ViewModel 받기</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>@ObservedObject</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">앱 전역 상태 (테마, 사용자 정보)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>@EnvironmentObject</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">하위 View에 양방향 바인딩</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>@Binding</b></td></tr>
</table>

<h5>@Published와 objectWillChange</h5>
<pre>class ViewModel: ObservableObject {
    @Published var name = ""
    // @Published가 자동으로 willSet 시점에 objectWillChange.send() 호출
    // (값 변경 직전!)
    
    var fullName: String { name }  // @Published 아님 → 변경 알림 안 감
}

// 수동 호출도 가능
class CustomViewModel: ObservableObject {
    var name = "" {
        willSet {
            objectWillChange.send()  // 직접 호출
        }
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "@StateObject vs @ObservedObject 선택은 'View가 이 객체를 처음 생성하는가'로 결정합니다. 처음 생성하면 @StateObject(소유), 받기만 하면 @ObservedObject(참조). 부모에서 @ObservedObject로 ViewModel을 직접 만들어 자식에 넘기는 것은 매우 흔한 버그 패턴이니 주의해야 합니다."
</div>
`},

{name:"List vs LazyVStack vs ForEach",icon:"orange",
detail:`
<h5>대량 데이터 표시 시 선택지</h5>

<h5>List: UITableView 기반, 가장 효율적</h5>
<pre>List(items) { item in
    ItemRow(item: item)
}

// 내부: UITableView + UIHostingCell
// 장점: 화면 밖 셀 자동 해제 (메모리 효율)
// 단점: 일부 커스터마이징 제한 (구분선, 셀 배경 등)
// 적합: 대량 데이터(100개+), 표 형태</pre>

<h5>LazyVStack: 필요할 때만 생성, 해제 안 함</h5>
<pre>ScrollView {
    LazyVStack {
        ForEach(items) { item in
            ItemRow(item: item)
        }
    }
}

// 동작:
// - 화면 밖 항목은 처음엔 생성 안 함 (lazy)
// - 한 번 생성된 항목은 화면을 벗어나도 메모리에 남음
// 장점: 초기 로딩 빠름, 커스터마이징 자유
// 단점: 스크롤할수록 메모리 증가
// 적합: 중간 규모(50-200개), 자유로운 디자인</pre>

<h5>VStack: 모두 즉시 생성</h5>
<pre>VStack {
    ForEach(items) { item in
        ItemRow(item: item)
    }
}

// 동작: 모든 항목을 한 번에 생성
// 적합: 소량 데이터(~20개), 항상 다 보이는 경우</pre>

<h5>ForEach의 id 중요성</h5>
<pre>// 1. Hashable 기반
ForEach(items, id: \\.self) { item in
    Text(item)
}

// 2. Identifiable 기반 (권장)
struct Item: Identifiable {
    let id: String
    let name: String
}
ForEach(items) { item in  // id 자동 사용
    Text(item.name)
}

// 3. KeyPath 명시
ForEach(items, id: \\.id) { item in
    Text(item.name)
}

// id가 변경되면 → SwiftUI가 새 View로 간주 → 상태 리셋
// id가 유지되면 → 기존 View 업데이트 → 상태 유지
// 이 차이가 애니메이션 트리거 여부를 결정</pre>

<h5>ScrollViewReader로 스크롤 제어</h5>
<pre>ScrollViewReader { proxy in
    ScrollView {
        LazyVStack {
            ForEach(messages) { message in
                MessageRow(message: message)
                    .id(message.id)
            }
        }
    }
    .onChange(of: messages.count) { _ in
        // 새 메시지 도착 시 자동 스크롤
        if let last = messages.last {
            withAnimation {
                proxy.scrollTo(last.id, anchor: .bottom)
            }
        }
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "리스트 선택 기준은 데이터 규모와 메모리 동작입니다. 100개 이상이면 List(셀 재사용), 50개 정도이고 자유로운 디자인이 필요하면 LazyVStack, 20개 미만이면 일반 VStack이 적합합니다. ForEach의 id가 변경되면 View 재생성 + 애니메이션이 트리거된다는 점도 자주 활용하는 패턴이죠."
</div>
`}

],
questions:[
{q:"@StateObject와 @ObservedObject의 차이는?",level:"basic",freq:true,
answer:"<b>@StateObject</b>: View가 소유. View의 lifetime 동안 한 번만 생성. View struct가 재생성되어도 같은 인스턴스 유지.<br><br><b>@ObservedObject</b>: View가 소유 안 함. 외부에서 주입받음. View struct가 재생성될 때마다 다른 인스턴스를 받을 수 있음.<br><br>가장 흔한 버그: 부모에서 <code>ChildView(viewModel: ViewModel())</code>로 새 인스턴스를 생성해 자식에게 넘기면, 부모 body 재호출마다 자식 ViewModel이 리셋됩니다. 부모가 @StateObject로 소유한 후 전달해야 합니다."},

{q:"SwiftUI에서 body가 자주 호출되는 게 문제인가요?",level:"advanced",freq:true,
answer:"body 호출 자체는 문제가 아닙니다. <b>body 안에서 무거운 작업을 하면 문제</b>입니다.<br><br>body는 \"새 View 트리를 만들어달라\"는 요청이고, 단순 struct 생성은 매우 빠릅니다. 문제는:<br>- body 안에서 네트워크 요청<br>- 복잡한 계산<br>- 큰 객체 매번 생성<br><br>해결:<br>1. View를 작은 단위로 분리 (변경 영향 범위 축소)<br>2. 무거운 작업은 onAppear, onChange로 이동<br>3. EquatableView로 불필요한 재계산 방지<br>4. Self._printChanges()로 호출 원인 추적"},

{q:"@State와 @Binding의 관계는?",level:"basic",freq:true,
answer:"<b>@State</b>: 값을 소유. 한 View 안에서만 사용.<br><b>@Binding</b>: 다른 View의 @State를 참조하여 양방향 동기화.<br><br><pre>struct Parent: View {\n    @State private var text = \"\"\n    var body: some View {\n        Child(text: $text)  // $로 Binding 전달\n    }\n}\nstruct Child: View {\n    @Binding var text: String  // 부모의 text와 양방향 연결\n    var body: some View {\n        TextField(\"\", text: $text)\n        // 입력 시 부모의 text도 변경됨\n    }\n}</pre>$ prefix는 'wrappedValue가 아닌 projectedValue를 가져온다'는 의미입니다."},

{q:"List와 LazyVStack은 메모리 동작이 어떻게 다른가요?",level:"advanced",freq:true,
answer:"<b>List</b>: UITableView 기반. 화면 밖으로 나간 셀은 자동으로 메모리에서 해제되고, 화면에 들어올 때 다시 생성. 셀 재사용 메커니즘 활용.<br><br><b>LazyVStack</b>: 처음엔 화면에 보이는 것만 생성(lazy). 하지만 한 번 생성되면 ScrollView가 살아있는 동안 계속 메모리에 남음. 스크롤할수록 메모리 사용량 증가.<br><br>그래서 100개 이상의 대량 데이터엔 List가 안전합니다. 단, List는 styling 자유도가 낮으므로 디자인 요구가 많으면 LazyVStack + 페이지네이션 조합이 대안입니다."}

{day:12,title:"Combine 프레임워크",
tags:["Publisher","Subscriber","Backpressure","flatMap","combineLatest","AnyCancellable"],
topics:[
{name:"Publisher / Subscriber 프로토콜",icon:"blue",
detail:`
<h5>Combine이란?</h5>
<p>Apple이 iOS 13에서 도입한 <b>선언적 반응형 프로그래밍 프레임워크</b>입니다. 비동기 이벤트를 시간 순서대로 처리하는 파이프라인을 구성합니다.</p>

<h5>Publisher 프로토콜</h5>
<p>값을 방출하는 주체입니다. 두 가지 Associated Type을 가집니다:</p>
<pre>protocol Publisher {
    associatedtype Output    // 방출하는 값의 타입
    associatedtype Failure: Error  // 에러 타입 (Never면 에러 없음)
    
    func receive&lt;S: Subscriber&gt;(subscriber: S)
        where S.Input == Output, S.Failure == Failure
}</pre>

<h5>Subscriber 프로토콜</h5>
<p>Publisher가 방출한 값을 받는 주체입니다:</p>
<pre>protocol Subscriber {
    associatedtype Input
    associatedtype Failure: Error
    
    func receive(subscription: Subscription)
    func receive(_ input: Input) -&gt; Subscribers.Demand
    func receive(completion: Subscribers.Completion&lt;Failure&gt;)
}</pre>

<h5>구독 흐름 (Subscription Lifecycle)</h5>
<pre>// 1. Subscriber가 Publisher에 구독 요청
// 2. Publisher가 Subscription 객체를 Subscriber에게 전달
// 3. Subscriber가 Demand(요청량)를 Subscription에 전달
// 4. Publisher가 값을 방출 (Demand 범위 내에서)
// 5. 완료 또는 에러로 종료

let publisher = [1, 2, 3, 4, 5].publisher

let cancellable = publisher
    .map { $0 * 2 }
    .filter { $0 > 4 }
    .sink(
        receiveCompletion: { completion in
            print("완료: \\(completion)")
        },
        receiveValue: { value in
            print("값: \\(value)")  // 6, 8, 10
        }
    )</pre>

<h5>주요 내장 Publisher</h5>
<pre>// Just: 단일 값 방출 후 완료
let just = Just(42)

// Future: 비동기 작업 결과를 한 번 방출
let future = Future&lt;String, Error&gt; { promise in
    DispatchQueue.global().async {
        promise(.success("결과"))
    }
}

// @Published: 프로퍼티 래퍼로 값 변경 시 자동 방출
class ViewModel: ObservableObject {
    @Published var searchText = ""
    @Published var results: [Item] = []
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Publisher는 값을 방출하는 프로토콜이고, Subscriber는 그 값을 받는 프로토콜입니다. 둘 사이에 Subscription이 중개 역할을 하며, Subscriber가 Demand를 통해 받을 수 있는 양을 제어합니다. 이것이 Backpressure의 기반입니다."
</div>
`},

{name:"Backpressure와 Demand",icon:"green",
detail:`
<h5>Backpressure란?</h5>
<p>Publisher가 Subscriber보다 빠르게 값을 방출할 때, <b>Subscriber가 처리할 수 있는 만큼만 요청</b>하는 메커니즘입니다. 메모리 폭발이나 데이터 유실을 방지합니다.</p>

<h5>Demand의 종류</h5>
<pre>// Subscribers.Demand
.none        // 추가 요청 없음 (0개)
.max(N)      // N개 추가 요청
.unlimited   // 무제한 (Backpressure 비활성화)</pre>

<h5>Custom Subscriber로 Backpressure 구현</h5>
<pre>class ThrottledSubscriber: Subscriber {
    typealias Input = Int
    typealias Failure = Never
    
    func receive(subscription: Subscription) {
        // 처음에 3개만 요청
        subscription.request(.max(3))
    }
    
    func receive(_ input: Int) -&gt; Subscribers.Demand {
        print("처리: \\(input)")
        // 하나 처리할 때마다 하나 더 요청
        return .max(1)
    }
    
    func receive(completion: Subscribers.Completion&lt;Never&gt;) {
        print("완료")
    }
}

let publisher = (1...100).publisher
publisher.subscribe(ThrottledSubscriber())</pre>

<h5>실무에서 Backpressure가 중요한 경우</h5>
<pre>// 검색 자동완성: 사용자 입력이 너무 빠를 때
$searchText
    .debounce(for: .milliseconds(300), scheduler: RunLoop.main)
    .removeDuplicates()
    .flatMap { query in
        self.searchAPI(query)
    }
    .sink { results in
        self.results = results
    }
    .store(in: &amp;cancellables)

// buffer: 값을 모아서 한번에 전달
publisher
    .buffer(size: 10, prefetch: .byRequest, whenFull: .dropOldest)
    .sink { ... }</pre>

<div class="highlight">
<b>💡 핵심:</b> sink와 assign은 내부적으로 <code>.unlimited</code> Demand를 사용합니다. 대부분의 UI 바인딩에서는 이것으로 충분하지만, 고빈도 데이터 스트림(센서, 웹소켓)에서는 buffer, throttle, debounce로 Backpressure를 관리해야 합니다.
</div>
`},

{name:"AnyCancellable 메모리 관리",icon:"orange",
detail:`
<h5>AnyCancellable이란?</h5>
<p>Combine 구독을 관리하는 토큰입니다. <b>deinit 시 자동으로 cancel()을 호출</b>하여 구독을 정리합니다.</p>

<h5>메모리 관리 패턴</h5>
<pre>class UserViewModel: ObservableObject {
    @Published var users: [User] = []
    private var cancellables = Set&lt;AnyCancellable&gt;()
    
    func loadUsers() {
        apiService.fetchUsers()
            .receive(on: DispatchQueue.main)
            .sink(
                receiveCompletion: { [weak self] completion in
                    if case .failure(let error) = completion {
                        self?.handleError(error)
                    }
                },
                receiveValue: { [weak self] users in
                    self?.users = users
                }
            )
            .store(in: &amp;cancellables)  // Set에 저장
    }
    // ViewModel deinit → cancellables deinit → 모든 구독 cancel
}</pre>

<h5>흔한 실수와 해결</h5>
<pre>// ❌ 실수 1: cancellable을 저장하지 않음
func loadData() {
    _ = publisher.sink { ... }  // 즉시 해제 → 구독 취소!
}

// ❌ 실수 2: 매번 새 구독을 추가만 함
func search(_ text: String) {
    // 이전 검색 구독이 계속 쌓임!
    makeRequest(text)
        .sink { ... }
        .store(in: &amp;cancellables)
}

// ✅ 해결: 검색용 cancellable을 별도 관리
private var searchCancellable: AnyCancellable?

func search(_ text: String) {
    searchCancellable?.cancel()  // 이전 구독 취소
    searchCancellable = makeRequest(text)
        .sink { ... }
}</pre>

<h5>assign(to:)의 메모리 함정</h5>
<pre>// ❌ assign(to:on:)은 self를 strong 캡처!
publisher
    .assign(to: \\.title, on: self)  // retain cycle 위험!
    .store(in: &amp;cancellables)

// ✅ assign(to:)는 @Published에 직접 바인딩 (retain cycle 없음)
publisher
    .assign(to: &amp;$title)  // AnyCancellable 반환 안 함, 자동 관리</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "AnyCancellable은 구독의 생명주기를 관리하는 토큰입니다. Set&lt;AnyCancellable&gt;에 저장하면 소유자 해제 시 모든 구독이 자동 취소됩니다. assign(to:on:)은 strong 캡처로 순환 참조 위험이 있어, @Published 프로퍼티에는 assign(to: &$property)를 사용합니다."
</div>
`}
],
questions:[
{q:"AnyCancellable을 Set에 저장하는 이유는?",level:"basic",freq:true,
answer:"<b>구독의 생명주기를 소유자에 바인딩하기 위해서입니다.</b><br><br>AnyCancellable은 deinit 시 자동으로 cancel()을 호출합니다. Set&lt;AnyCancellable&gt;에 저장하면:<br>1. 소유자(ViewController 등)가 해제될 때 Set도 해제<br>2. Set 안의 모든 AnyCancellable이 deinit → cancel() 자동 호출<br>3. 모든 구독이 정리됨<br><br>만약 저장하지 않으면 sink가 반환하는 AnyCancellable이 즉시 해제되어 구독이 바로 취소됩니다."},

{q:"Combine과 async/await의 차이와 선택 기준은?",level:"advanced",freq:true,
answer:"<b>핵심 차이: 값의 개수</b><br><br>• async/await: 단일 값 반환 (1회성 비동기 작업)<br>• Combine: 시간에 따른 여러 값의 스트림<br><br><b>선택 기준:</b><br>• 네트워크 요청 1회 → async/await<br>• 실시간 검색, 타이머, 프로퍼티 변경 감지 → Combine<br>• UI 바인딩 (@Published) → Combine<br>• 여러 비동기 작업 조합 → 상황에 따라 (AsyncSequence도 가능)<br><br>iOS 15+에서는 AsyncSequence가 Combine의 일부 역할을 대체할 수 있지만, SwiftUI의 @Published 바인딩은 여전히 Combine 기반입니다."},

{q:"Subject와 Publisher의 차이는?",level:"basic",freq:true,
answer:"<b>Subject는 외부에서 값을 주입할 수 있는 Publisher입니다.</b><br><br>일반 Publisher는 내부 로직에 의해서만 값이 방출됩니다. Subject는 <code>send(_:)</code> 메서드로 외부에서 값을 넣을 수 있죠.<br><br>두 가지 종류:<br>• <b>PassthroughSubject</b>: 현재 값 없음, 새 구독자는 이후 값만 받음<br>• <b>CurrentValueSubject</b>: 현재 값 보유, 새 구독자는 구독 즉시 현재 값 받음<br><br>실무에서는 imperative 코드(delegate, callback)를 reactive 스트림으로 브릿징할 때 주로 사용합니다."},

{q:"eraseToAnyPublisher()는 왜 필요한가요?",level:"basic",freq:false,
answer:"<b>타입 복잡도를 숨기기 위해서입니다.</b><br><br>Combine 연산자를 체이닝하면 반환 타입이 중첩됩니다:<br><code>Publishers.Map&lt;Publishers.Filter&lt;Publishers.Sequence&lt;...&gt;&gt;, String&gt;</code><br><br>이걸 API 경계에서 노출하면 구현 변경 시 타입이 바뀌어 호출부가 깨집니다. eraseToAnyPublisher()로 <code>AnyPublisher&lt;String, Error&gt;</code>로 감싸면 내부 구현을 자유롭게 변경할 수 있습니다."}
],
quizzes:[
{q:"Combine에서 Backpressure를 제어하는 메커니즘은?",
opts:["Publisher가 속도를 조절한다","Subscriber가 Demand로 요청량을 제어한다","Scheduler가 자동으로 조절한다","buffer가 항상 필요하다"],

opts:["Publisher를 캐싱한다","여러 Subscriber가 하나의 upstream 구독을 공유한다","에러를 공유한다","타입을 지운다"],

{day:13,title:"Core Data",
tags:["NSPersistentContainer","NSManagedObjectContext","Threading","Batch Operations","SwiftData"],
topics:[
{name:"NSPersistentContainer 스택 구조",icon:"blue",
detail:`
<h5>Core Data 스택이란?</h5>
<p>Core Data의 핵심 구성 요소들의 계층 구조입니다. iOS 10부터 <b>NSPersistentContainer</b>가 이 스택을 간편하게 설정해줍니다.</p>

<h5>스택 구성 요소</h5>
<pre>// Core Data Stack 계층
//
// ┌─────────────────────────────────┐
// │   NSManagedObjectContext        │  ← 작업 공간 (스크래치패드)
// ├─────────────────────────────────┤
// │   NSPersistentStoreCoordinator  │  ← 저장소 조율자
// ├─────────────────────────────────┤
// │   NSManagedObjectModel          │  ← 데이터 모델 (.xcdatamodeld)
// ├─────────────────────────────────┤
// │   NSPersistentStore (SQLite)    │  ← 실제 저장소
// └─────────────────────────────────┘</pre>

<h5>NSPersistentContainer 설정</h5>
<pre>class CoreDataStack {
    static let shared = CoreDataStack()
    
    lazy var persistentContainer: NSPersistentContainer = {
        let container = NSPersistentContainer(name: "MyApp")
        
        // 마이그레이션 옵션
        let description = container.persistentStoreDescriptions.first
        description?.shouldMigrateStoreAutomatically = true
        description?.shouldInferMappingModelAutomatically = true
        
        container.loadPersistentStores { description, error in
            if let error = error {
                fatalError("Core Data 로드 실패: \\(error)")
            }
        }
        
        // viewContext 설정
        container.viewContext.automaticallyMergesChangesFromParent = true
        container.viewContext.mergePolicy = NSMergeByPropertyObjectTrumpMergePolicy
        
        return container
    }()
    
    var viewContext: NSManagedObjectContext {
        persistentContainer.viewContext
    }
    
    func newBackgroundContext() -&gt; NSManagedObjectContext {
        persistentContainer.newBackgroundContext()
    }
}</pre>

<h5>각 구성 요소의 역할</h5>
<ul>
<li><b>NSManagedObjectModel</b>: .xcdatamodeld 파일을 런타임 객체로 표현. Entity, Attribute, Relationship 정의</li>
<li><b>NSPersistentStoreCoordinator</b>: Model과 Store 사이의 중재자. 여러 Store를 관리 가능</li>
<li><b>NSPersistentStore</b>: 실제 데이터 저장소 (SQLite, Binary, In-Memory)</li>
<li><b>NSManagedObjectContext</b>: 객체 그래프의 작업 공간. CRUD 작업이 여기서 수행됨</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "NSPersistentContainer는 Core Data 스택 설정을 캡슐화합니다. viewContext는 메인 스레드용이고, newBackgroundContext()로 백그라운드 작업용 컨텍스트를 생성합니다. automaticallyMergesChangesFromParent를 true로 설정하면 백그라운드 변경이 자동으로 UI에 반영됩니다."
</div>
`},

{name:"NSManagedObjectContext 스레딩 규칙",icon:"green",
detail:`
<h5>핵심 규칙: Context는 자신의 큐에서만 접근</h5>
<p>Core Data의 가장 중요한 규칙입니다. <b>NSManagedObjectContext는 생성된 큐(스레드)에서만 접근해야 합니다.</b> 위반 시 크래시 또는 데이터 손상이 발생합니다.</p>

<h5>Concurrency Type</h5>
<pre>// 두 가지 타입
let mainContext = NSManagedObjectContext(concurrencyType: .mainQueueConcurrencyType)
let bgContext = NSManagedObjectContext(concurrencyType: .privateQueueConcurrencyType)

// viewContext는 항상 mainQueueConcurrencyType
// newBackgroundContext()는 항상 privateQueueConcurrencyType</pre>

<h5>perform / performAndWait</h5>
<pre>// ✅ 올바른 사용: perform 블록 안에서 접근
let bgContext = persistentContainer.newBackgroundContext()

bgContext.perform {
    // 이 블록은 bgContext의 private queue에서 실행됨
    let user = User(context: bgContext)
    user.name = "철수"
    user.age = 30
    
    do {
        try bgContext.save()
    } catch {
        print("저장 실패: \\(error)")
    }
}

// performAndWait: 동기적으로 실행 (현재 스레드 블록)
bgContext.performAndWait {
    let count = try? bgContext.count(for: fetchRequest)
}

// ❌ 잘못된 사용: perform 없이 직접 접근
DispatchQueue.global().async {
    let user = User(context: self.viewContext)  // 크래시 위험!
}</pre>

<h5>Parent-Child Context 패턴</h5>
<pre>// 편집 화면에서 "취소" 기능 구현
func createEditingContext() -&gt; NSManagedObjectContext {
    let childContext = NSManagedObjectContext(concurrencyType: .mainQueueConcurrencyType)
    childContext.parent = viewContext
    return childContext
}

// 저장: child → parent → persistent store
func saveEditing(_ context: NSManagedObjectContext) throws {
    try context.save()           // child → parent (메모리만)
    try viewContext.save()       // parent → SQLite (디스크)
}

// 취소: child를 그냥 버리면 됨 (parent에 영향 없음)
func cancelEditing(_ context: NSManagedObjectContext) {
    context.rollback()
}</pre>

<h5>NSManagedObject는 Context 간 전달 불가</h5>
<pre>// ❌ 다른 context의 객체를 직접 사용
let user = fetchFromBackground(bgContext)
viewContext.perform {
    print(user.name)  // 크래시! user는 bgContext 소속
}

// ✅ objectID로 전달
let objectID = user.objectID
viewContext.perform {
    let sameUser = viewContext.object(with: objectID) as! User
    print(sameUser.name)  // 안전
}</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Core Data의 Context는 반드시 자신의 큐에서만 접근해야 합니다. perform/performAndWait 블록을 사용하고, 객체를 다른 Context로 전달할 때는 objectID를 사용합니다. -com.apple.CoreData.ConcurrencyDebug 1 플래그로 위반을 감지할 수 있습니다."
</div>
`},

{name:"Batch Operations와 SwiftData 비교",icon:"purple",
detail:`
<h5>Batch Operations: 대량 데이터 처리</h5>
<p>일반 Core Data 작업은 객체를 메모리에 로드한 후 변경합니다. 10만 건을 삭제하려면 10만 개 객체를 메모리에 올려야 하죠. <b>Batch Operation은 SQLite에 직접 쿼리</b>하여 메모리 사용 없이 처리합니다.</p>

<pre>// Batch Delete: 메모리 로드 없이 삭제
func deleteOldRecords() {
    let fetchRequest: NSFetchRequest&lt;NSFetchRequestResult&gt; = Record.fetchRequest()
    fetchRequest.predicate = NSPredicate(format: "createdAt &lt; %@", oneMonthAgo as NSDate)
    
    let batchDelete = NSBatchDeleteRequest(fetchRequest: fetchRequest)
    batchDelete.resultType = .resultTypeObjectIDs
    
    do {
        let result = try viewContext.execute(batchDelete) as? NSBatchDeleteResult
        let objectIDs = result?.result as? [NSManagedObjectID] ?? []
        
        // 중요: 메모리의 context에 변경 사항 반영
        let changes = [NSDeletedObjectsKey: objectIDs]
        NSManagedObjectContext.mergeChanges(
            fromRemoteContextSave: changes,
            into: [viewContext]
        )
    } catch {
        print("Batch delete 실패: \\(error)")
    }
}

// Batch Update: 메모리 로드 없이 업데이트
let batchUpdate = NSBatchUpdateRequest(entityName: "User")
batchUpdate.predicate = NSPredicate(format: "isActive == YES")
batchUpdate.propertiesToUpdate = ["lastSyncDate": Date()]
batchUpdate.resultType = .updatedObjectIDsResultType

// Batch Insert (iOS 13+): 대량 삽입
let batchInsert = NSBatchInsertRequest(entity: User.entity()) { (obj: NSManagedObject) -&gt; Bool in
    guard let user = obj as? User else { return true }
    // JSON 데이터로 설정
    user.name = nextRecord.name
    return false  // false = 계속, true = 중단
}</pre>

<h5>SwiftData vs Core Data 비교</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">Core Data</th><th style="padding:10px;text-align:left">SwiftData</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">모델 정의</td><td style="padding:10px;border-top:1px solid var(--g2)">.xcdatamodeld (GUI)</td><td style="padding:10px;border-top:1px solid var(--g2)">@Model 매크로 (코드)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">쿼리</td><td style="padding:10px;border-top:1px solid var(--g2)">NSFetchRequest + NSPredicate</td><td style="padding:10px;border-top:1px solid var(--g2)">#Predicate (타입 안전)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">스레딩</td><td style="padding:10px;border-top:1px solid var(--g2)">perform 블록 필수</td><td style="padding:10px;border-top:1px solid var(--g2)">@ModelActor로 간소화</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">최소 지원</td><td style="padding:10px;border-top:1px solid var(--g2)">iOS 3+</td><td style="padding:10px;border-top:1px solid var(--g2)">iOS 17+</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">내부 구현</td><td style="padding:10px;border-top:1px solid var(--g2)">독립 프레임워크</td><td style="padding:10px;border-top:1px solid var(--g2)">Core Data 위에 구축</td></tr>
</table>

<pre>// SwiftData 예시
@Model
class User {
    var name: String
    var age: Int
    @Relationship(deleteRule: .cascade) var posts: [Post]
    
    init(name: String, age: Int) {
        self.name = name
        self.age = age
    }
}

// 쿼리 (타입 안전)
let descriptor = FetchDescriptor&lt;User&gt;(
    predicate: #Predicate { $0.age > 20 },
    sortBy: [SortDescriptor(\\.name)]
)
let users = try modelContext.fetch(descriptor)</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Batch Operation은 SQLite에 직접 쿼리하여 메모리 사용 없이 대량 데이터를 처리합니다. 단, Context의 메모리 캐시와 동기화가 필요하므로 mergeChanges를 호출해야 합니다. SwiftData는 Core Data 위에 구축된 현대적 API로, @Model 매크로와 #Predicate로 타입 안전한 코드를 작성할 수 있지만 iOS 17+ 전용입니다."
</div>
`}
],
questions:[
{q:"Core Data에서 백그라운드 저장 시 UI 업데이트는 어떻게 하나요?",level:"basic",freq:true,
answer:"<b>automaticallyMergesChangesFromParent = true</b>를 설정합니다.<br><br>백그라운드 Context에서 save()하면 NSPersistentStoreCoordinator를 통해 저장됩니다. viewContext에 이 옵션이 켜져 있으면 자동으로 변경 사항을 병합하여 UI가 업데이트됩니다.<br><br>또는 NotificationCenter에서 <code>.NSManagedObjectContextDidSave</code> 알림을 받아 수동으로 <code>mergeChanges(fromContextDidSave:)</code>를 호출할 수도 있습니다."},

{q:"NSFetchedResultsController의 역할은?",level:"basic",freq:true,
answer:"<b>Core Data 쿼리 결과를 UITableView/UICollectionView와 자동 동기화</b>하는 컨트롤러입니다.<br><br>데이터가 변경되면 delegate 메서드를 통해 insert/delete/update/move 이벤트를 전달합니다. 직접 fetch하고 배열 관리하는 것보다 훨씬 효율적이고, 섹션 분리도 자동으로 해줍니다.<br><br>SwiftUI에서는 @FetchRequest가 같은 역할을 합니다."},

{q:"Core Data 마이그레이션 전략은?",level:"advanced",freq:true,
answer:"<b>두 가지 전략이 있습니다:</b><br><br>1. <b>Lightweight Migration (자동)</b>: 단순 변경(속성 추가/삭제, 이름 변경)은 Core Data가 자동 처리. shouldInferMappingModelAutomatically = true<br><br>2. <b>Heavy Migration (수동)</b>: 복잡한 변경(데이터 변환, 관계 재구성)은 Mapping Model을 직접 작성. NSEntityMigrationPolicy 서브클래스로 변환 로직 구현<br><br>실무 팁: 버전별 모델을 유지하고, 점진적 마이그레이션(v1→v2→v3)으로 안정성을 확보합니다."},

{q:"Batch Delete 후 왜 mergeChanges를 호출해야 하나요?",level:"advanced",freq:false,
answer:"<b>Batch Operation은 Context를 우회하여 SQLite에 직접 실행되기 때문입니다.</b><br><br>일반 delete는: Context에서 삭제 → save() → SQLite 반영 → Context 캐시 자동 업데이트<br>Batch delete는: SQLite에 직접 DELETE 쿼리 → Context는 모름!<br><br>mergeChanges를 호출하지 않으면 Context가 이미 삭제된 객체를 여전히 가지고 있어서 fault 접근 시 크래시가 발생합니다."}
],

topics:[
{name:"Unit Test with Mock/Protocol",icon:"blue",
detail:`
<h5>왜 Mock이 필요한가요?</h5>
<p>Unit Test는 <b>하나의 단위만 격리하여 테스트</b>해야 합니다. 네트워크, DB 같은 외부 의존성을 실제로 호출하면 느리고 불안정합니다. Mock으로 대체하면 빠르고 결정적인 테스트가 가능합니다.</p>

<h5>Protocol 기반 Mock 패턴</h5>
<pre>// 1. Protocol 정의
protocol UserRepositoryProtocol {
    func fetchUser(id: String) async throws -&gt; User
    func saveUser(_ user: User) async throws
}

// 2. 실제 구현
class UserRepository: UserRepositoryProtocol {
    func fetchUser(id: String) async throws -&gt; User {
        let data = try await networkService.request(.user(id: id))
        return try JSONDecoder().decode(User.self, from: data)
    }
    func saveUser(_ user: User) async throws { ... }
}

// 3. Mock 구현
class MockUserRepository: UserRepositoryProtocol {
    var fetchUserResult: Result&lt;User, Error&gt; = .success(User.stub())
    var fetchUserCallCount = 0
    var lastFetchedID: String?
    
    func fetchUser(id: String) async throws -&gt; User {
        fetchUserCallCount += 1
        lastFetchedID = id
        return try fetchUserResult.get()
    }
    
    var saveUserCallCount = 0
    func saveUser(_ user: User) async throws {
        saveUserCallCount += 1
    }
}

// 4. ViewModel 테스트
class UserViewModelTests: XCTestCase {
    var sut: UserViewModel!
    var mockRepo: MockUserRepository!
    
    override func setUp() {
        mockRepo = MockUserRepository()
        sut = UserViewModel(repository: mockRepo)
    }
    
    func test_loadUser_성공시_user가_설정됨() async {
        // Given
        let expectedUser = User(id: "1", name: "철수")
        mockRepo.fetchUserResult = .success(expectedUser)
        
        // When
        await sut.loadUser(id: "1")
        
        // Then
        XCTAssertEqual(sut.user?.name, "철수")
        XCTAssertEqual(mockRepo.fetchUserCallCount, 1)
        XCTAssertEqual(mockRepo.lastFetchedID, "1")
    }
    
    func test_loadUser_실패시_에러상태() async {
        // Given
        mockRepo.fetchUserResult = .failure(NetworkError.notFound)
        
        // When
        await sut.loadUser(id: "999")
        
        // Then
        XCTAssertNil(sut.user)
        XCTAssertTrue(sut.showError)
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Protocol로 의존성을 추상화하고, 테스트에서는 Mock을 주입합니다. Mock에는 호출 횟수, 전달된 파라미터, 반환값을 제어할 수 있는 프로퍼티를 둡니다. 이렇게 하면 네트워크 없이도 모든 시나리오를 빠르게 검증할 수 있습니다."
</div>
`},

{name:"Async Testing & XCTest 패턴",icon:"green",
detail:`
<h5>async/await 테스트</h5>
<pre>// Swift 5.5+: 테스트 메서드에 async 키워드 사용
func test_fetchData_async() async throws {
    // Given
    let service = MockDataService()
    service.result = .success([Item(id: 1)])
    
    // When
    let items = try await service.fetchItems()
    
    // Then
    XCTAssertEqual(items.count, 1)
}

// Combine Publisher 테스트
func test_publisher_emitsValues() {
    let expectation = expectation(description: "값 방출")
    var received: [Int] = []
    
    let publisher = [1, 2, 3].publisher
    publisher
        .sink(
            receiveCompletion: { _ in expectation.fulfill() },
            receiveValue: { received.append($0) }
        )
        .store(in: &amp;cancellables)
    
    wait(for: [expectation], timeout: 1.0)
    XCTAssertEqual(received, [1, 2, 3])
}</pre>

<h5>XCTest 주요 패턴</h5>
<pre>// Given-When-Then (AAA: Arrange-Act-Assert)
func test_패턴명_조건_기대결과() {
    // Given (준비)
    let calculator = Calculator()
    
    // When (실행)
    let result = calculator.add(2, 3)
    
    // Then (검증)
    XCTAssertEqual(result, 5)
}

// setUp / tearDown 생명주기
class MyTests: XCTestCase {
    override class func setUp() { }       // 클래스 전체에서 1번
    override func setUp() { }             // 각 테스트 메서드 전
    override func setUpWithError() throws { }  // 에러 throw 가능
    
    override func tearDown() { }          // 각 테스트 메서드 후
    override class func tearDown() { }    // 클래스 전체에서 1번
}

// XCTExpectation: 비동기 대기
func test_notification_received() {
    let exp = expectation(description: "알림 수신")
    
    NotificationCenter.default.addObserver(
        forName: .dataLoaded, object: nil, queue: nil
    ) { _ in
        exp.fulfill()
    }
    
    dataLoader.load()
    wait(for: [exp], timeout: 5.0)
}</pre>

<h5>테스트 더블 종류</h5>
<ul>
<li><b>Stub</b>: 미리 정해진 값을 반환 (행위 검증 X)</li>
<li><b>Mock</b>: 호출 여부/횟수/파라미터를 검증</li>
<li><b>Spy</b>: 실제 동작 + 호출 기록</li>
<li><b>Fake</b>: 간소화된 실제 구현 (InMemory DB 등)</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "async 테스트는 메서드에 async throws를 붙여 자연스럽게 작성합니다. Combine은 expectation으로 비동기 완료를 기다립니다. 테스트는 Given-When-Then 구조로 가독성을 높이고, setUp에서 SUT와 Mock을 초기화하여 각 테스트의 독립성을 보장합니다."
</div>
`},

{name:"Snapshot Testing",icon:"purple",
detail:`
<h5>Snapshot Testing이란?</h5>
<p>UI 컴포넌트를 이미지로 렌더링하여 <b>이전에 저장된 참조 이미지와 픽셀 단위로 비교</b>하는 테스트 방식입니다. UI 회귀를 자동으로 감지합니다.</p>

<h5>swift-snapshot-testing 라이브러리 사용</h5>
<pre>import SnapshotTesting
import XCTest

class ProfileViewTests: XCTestCase {
    
    func test_profileView_기본상태() {
        let view = ProfileView(user: .stub())
        
        assertSnapshot(
            of: view,
            as: .image(layout: .device(config: .iPhone13))
        )
    }
    
    func test_profileView_다크모드() {
        let view = ProfileView(user: .stub())
        
        assertSnapshot(
            of: view,
            as: .image(
                layout: .device(config: .iPhone13),
                traits: UITraitCollection(userInterfaceStyle: .dark)
            )
        )
    }
    
    func test_profileView_긴_이름() {
        let user = User(name: "매우 긴 이름을 가진 사용자입니다 테스트")
        let view = ProfileView(user: user)
        
        assertSnapshot(
            of: view,
            as: .image(layout: .device(config: .iPhone13))
        )
    }
    
    // SwiftUI View 테스트
    func test_swiftUI_view() {
        let view = ContentView()
        let vc = UIHostingController(rootView: view)
        
        assertSnapshot(of: vc, as: .image(on: .iPhone13))
    }
}</pre>

<h5>Snapshot Testing 전략</h5>
<pre>// 여러 디바이스/상태 한번에 테스트
func test_loginButton_allStates() {
    let states: [(String, LoginButton.State)] = [
        ("normal", .normal),
        ("loading", .loading),
        ("disabled", .disabled),
        ("error", .error("잘못된 비밀번호"))
    ]
    
    for (name, state) in states {
        let button = LoginButton(state: state)
        assertSnapshot(
            of: button,
            as: .image,
            named: name  // 각 상태별 별도 참조 이미지
        )
    }
}

// 참조 이미지 업데이트 (UI 변경 시)
// record: true로 설정하면 새 참조 이미지 생성
assertSnapshot(of: view, as: .image, record: true)</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Snapshot Testing은 UI 회귀를 자동 감지합니다. PR에서 스냅샷 차이가 발생하면 의도된 변경인지 리뷰합니다. 다크모드, 다양한 디바이스, 접근성 폰트 크기 등 여러 조건을 조합하여 테스트합니다. 단, CI 환경과 로컬의 렌더링 차이에 주의해야 합니다."
</div>
`}
],
questions:[
{q:"테스트 커버리지 100%가 좋은 목표인가요?",level:"basic",freq:true,
answer:"<b>아닙니다. 의미 있는 커버리지가 중요합니다.</b><br><br>100% 커버리지를 목표로 하면 getter/setter 같은 trivial 코드까지 테스트하게 되어 유지보수 비용만 증가합니다.<br><br>실무 기준:<br>• 비즈니스 로직 (ViewModel, UseCase): 80%+ 목표<br>• UI 레이어: Snapshot Test로 주요 상태 커버<br>• 유틸리티/헬퍼: 엣지 케이스 위주<br>• 네트워킹 레이어: Integration Test로 별도 관리<br><br>핵심은 '변경 시 깨져야 할 테스트가 깨지는가'입니다."},

{q:"XCTest에서 비동기 테스트 방법은?",level:"basic",freq:true,
answer:"<b>세 가지 방법이 있습니다:</b><br><br>1. <b>async/await</b> (권장): 테스트 메서드에 async 키워드<br><code>func test_example() async throws { }</code><br><br>2. <b>XCTestExpectation</b>: fulfill()과 wait(for:timeout:)<br>콜백 기반 API 테스트에 적합<br><br>3. <b>Combine + expectation</b>: Publisher의 완료를 기다림<br><br>iOS 16+에서는 async가 가장 깔끔합니다. 레거시 콜백 API는 expectation을 사용합니다."},

{q:"Mock과 Stub의 차이는?",level:"advanced",freq:true,
answer:"<b>검증 대상이 다릅니다.</b><br><br>• <b>Stub</b>: 상태 검증 (State Verification). 미리 정해진 값을 반환하고, 테스트는 SUT의 최종 상태를 검증<br>• <b>Mock</b>: 행위 검증 (Behavior Verification). 특정 메서드가 호출되었는지, 몇 번 호출되었는지, 어떤 파라미터로 호출되었는지를 검증<br><br>예시:<br>• Stub: mockRepo.fetchResult = .success(user) → sut.user == user 검증<br>• Mock: verify(mockRepo.save was called once with user) → 호출 자체를 검증"},

{q:"테스트 피라미드에서 각 레벨의 비율은?",level:"basic",freq:false,
answer:"<b>Unit > Integration > UI (E2E)</b><br><br>• Unit Test (70%): 빠르고 격리됨. 비즈니스 로직 중심<br>• Integration Test (20%): 모듈 간 상호작용. API 계약 검증<br>• UI/E2E Test (10%): 느리고 불안정. 핵심 사용자 플로우만<br><br>iOS에서는:<br>• Unit: XCTest + Mock<br>• Integration: 실제 네트워크/DB 포함 테스트<br>• UI: XCUITest (최소한으로)"}

{day:15,title:"App Security",
tags:["Keychain","Biometric","Certificate Pinning","Jailbreak Detection","ATS"],
topics:[
{name:"Keychain with Biometric 인증",icon:"blue",
detail:`
<h5>Keychain이란?</h5>
<p>iOS에서 민감한 데이터(비밀번호, 토큰, 인증서)를 <b>암호화하여 안전하게 저장</b>하는 시스템 서비스입니다. 앱이 삭제되어도 데이터가 유지될 수 있습니다.</p>

<h5>Keychain + Face ID/Touch ID</h5>
<pre>import Security
import LocalAuthentication

class KeychainManager {
    
    // Biometric 보호된 항목 저장
    func saveWithBiometric(token: String, account: String) throws {
        let context = LAContext()
        context.touchIDAuthenticationAllowableReuseDuration = 10
        
        // Access Control: 생체인증 필요
        guard let accessControl = SecAccessControlCreateWithFlags(
            nil,
            kSecAttrAccessibleWhenPasscodeSetThisDeviceOnly,
            .biometryCurrentSet,  // 현재 등록된 생체정보로만
            nil
        ) else {
            throw KeychainError.accessControlFailed
        }
        
        let query: [String: Any] = [
            kSecClass as String: kSecClassGenericPassword,
            kSecAttrAccount as String: account,
            kSecValueData as String: token.data(using: .utf8)!,
            kSecAttrAccessControl as String: accessControl,
            kSecUseAuthenticationContext as String: context
        ]
        
        let status = SecItemAdd(query as CFDictionary, nil)
        guard status == errSecSuccess else {
            throw KeychainError.saveFailed(status)
        }
    }
    
    // Biometric 인증 후 읽기
    func readWithBiometric(account: String) throws -&gt; String {
        let query: [String: Any] = [
            kSecClass as String: kSecClassGenericPassword,
            kSecAttrAccount as String: account,
            kSecReturnData as String: true,
            kSecUseOperationPrompt as String: "인증이 필요합니다"
        ]
        
        var result: AnyObject?
        let status = SecItemCopyMatching(query as CFDictionary, &amp;result)
        
        guard status == errSecSuccess,
              let data = result as? Data,
              let token = String(data: data, encoding: .utf8) else {
            throw KeychainError.readFailed(status)
        }
        return token
    }
}</pre>

<h5>kSecAttrAccessible 옵션</h5>
<table style="width:100%;font-size:12px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:8px;text-align:left">옵션</th><th style="padding:8px;text-align:left">접근 가능 시점</th><th style="padding:8px;text-align:left">용도</th></tr>
<tr><td style="padding:8px;border-top:1px solid var(--g2)">WhenUnlocked</td><td style="padding:8px;border-top:1px solid var(--g2)">잠금 해제 시</td><td style="padding:8px;border-top:1px solid var(--g2)">일반 토큰</td></tr>
<tr><td style="padding:8px;border-top:1px solid var(--g2)">AfterFirstUnlock</td><td style="padding:8px;border-top:1px solid var(--g2)">첫 잠금해제 후 항상</td><td style="padding:8px;border-top:1px solid var(--g2)">백그라운드 작업용</td></tr>
<tr><td style="padding:8px;border-top:1px solid var(--g2)">WhenPasscodeSetThisDeviceOnly</td><td style="padding:8px;border-top:1px solid var(--g2)">패스코드 설정 + 잠금해제</td><td style="padding:8px;border-top:1px solid var(--g2)">최고 보안</td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> "Keychain은 Secure Enclave와 연동되어 하드웨어 수준 암호화를 제공합니다. biometryCurrentSet 플래그를 사용하면 생체정보가 변경(새 지문 등록)되면 기존 항목에 접근할 수 없어 보안이 강화됩니다. ThisDeviceOnly 옵션으로 iCloud 백업에서 제외할 수 있습니다."
</div>
`},

{name:"Certificate Pinning 구현",icon:"green",
detail:`
<h5>Certificate Pinning이란?</h5>
<p>앱이 서버와 통신할 때 <b>미리 알고 있는 인증서(또는 공개키)만 신뢰</b>하도록 하는 보안 기법입니다. 중간자 공격(MITM)을 방지합니다.</p>

<h5>URLSession으로 구현</h5>
<pre>class PinnedSessionDelegate: NSObject, URLSessionDelegate {
    
    // 서버의 공개키 해시 (SHA-256)
    private let pinnedPublicKeyHashes: Set&lt;String&gt; = [
        "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=",  // 현재 인증서
        "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="   // 백업 인증서
    ]
    
    func urlSession(
        _ session: URLSession,
        didReceive challenge: URLAuthenticationChallenge,
        completionHandler: @escaping (URLSession.AuthChallengeDisposition, URLCredential?) -&gt; Void
    ) {
        guard challenge.protectionSpace.authenticationMethod == NSURLAuthenticationMethodServerTrust,
              let serverTrust = challenge.protectionSpace.serverTrust else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // 인증서 체인 검증
        let policies = [SecPolicyCreateSSL(true, challenge.protectionSpace.host as CFString)]
        SecTrustSetPolicies(serverTrust, policies as CFTypeRef)
        
        var error: CFError?
        guard SecTrustEvaluateWithError(serverTrust, &amp;error) else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // 공개키 해시 비교
        guard let serverCert = SecTrustGetCertificateAtIndex(serverTrust, 0),
              let serverPublicKey = SecCertificateCopyKey(serverCert),
              let serverPublicKeyData = SecKeyCopyExternalRepresentation(serverPublicKey, nil) as Data? else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        let hash = sha256(data: serverPublicKeyData)
        let hashBase64 = hash.base64EncodedString()
        
        if pinnedPublicKeyHashes.contains(hashBase64) {
            completionHandler(.useCredential, URLCredential(trust: serverTrust))
        } else {
            completionHandler(.cancelAuthenticationChallenge, nil)
        }
    }
}</pre>

<h5>Pinning 전략</h5>
<ul>
<li><b>Certificate Pinning</b>: 인증서 전체를 비교. 인증서 갱신 시 앱 업데이트 필요</li>
<li><b>Public Key Pinning</b>: 공개키만 비교. 인증서 갱신해도 키가 같으면 OK (권장)</li>
<li><b>백업 핀</b>: 최소 2개 이상의 핀을 포함하여 인증서 교체 시 대응</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "Public Key Pinning을 사용하여 인증서 갱신에도 유연하게 대응합니다. 반드시 백업 핀을 포함하고, 핀 불일치 시 앱이 완전히 동작 불능이 되지 않도록 fallback 전략(강제 업데이트 안내 등)을 마련합니다."
</div>
`},

{name:"Jailbreak 탐지와 ATS",icon:"purple",
detail:`
<h5>Jailbreak 탐지 방법</h5>
<pre>class SecurityChecker {
    
    static func isJailbroken() -&gt; Bool {
        #if targetEnvironment(simulator)
        return false
        #else
        // 1. 의심 파일 존재 확인
        let suspiciousPaths = [
            "/Applications/Cydia.app",
            "/Library/MobileSubstrate/MobileSubstrate.dylib",
            "/bin/bash",
            "/usr/sbin/sshd",
            "/etc/apt",
            "/private/var/lib/apt/"
        ]
        for path in suspiciousPaths {
            if FileManager.default.fileExists(atPath: path) {
                return true
            }
        }
        
        // 2. 샌드박스 밖 쓰기 시도
        let testPath = "/private/jailbreak_test"
        do {
            try "test".write(toFile: testPath, atomically: true, encoding: .utf8)
            try FileManager.default.removeItem(atPath: testPath)
            return true  // 쓰기 성공 = 탈옥
        } catch {
            // 쓰기 실패 = 정상
        }
        
        // 3. URL Scheme 확인
        if let url = URL(string: "cydia://package/com.test"),
           UIApplication.shared.canOpenURL(url) {
            return true
        }
        
        // 4. dyld 이미지 검사 (DYLD_INSERT_LIBRARIES)
        let count = _dyld_image_count()
        for i in 0..&lt;count {
            if let name = _dyld_get_image_name(i) {
                let imageName = String(cString: name)
                if imageName.contains("MobileSubstrate") ||
                   imageName.contains("cycript") {
                    return true
                }
            }
        }
        
        return false
        #endif
    }
}</pre>

<h5>App Transport Security (ATS)</h5>
<pre>// Info.plist 설정
// 기본: 모든 HTTP 차단, HTTPS만 허용

// 특정 도메인 예외 (최소한으로)
&lt;key&gt;NSAppTransportSecurity&lt;/key&gt;
&lt;dict&gt;
    &lt;key&gt;NSExceptionDomains&lt;/key&gt;
    &lt;dict&gt;
        &lt;key&gt;legacy-api.example.com&lt;/key&gt;
        &lt;dict&gt;
            &lt;key&gt;NSExceptionAllowsInsecureHTTPLoads&lt;/key&gt;
            &lt;true/&gt;
            &lt;key&gt;NSExceptionMinimumTLSVersion&lt;/key&gt;
            &lt;string&gt;TLSv1.2&lt;/string&gt;
        &lt;/dict&gt;
    &lt;/dict&gt;
&lt;/dict&gt;</pre>

<h5>ATS 요구사항</h5>
<ul>
<li>TLS 1.2 이상</li>
<li>Forward Secrecy 지원 암호화 스위트</li>
<li>SHA-256 이상의 인증서 서명</li>
<li>2048비트 이상 RSA 키 또는 256비트 이상 ECC 키</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "Jailbreak 탐지는 다층 방어로 구현합니다. 파일 존재 확인, 샌드박스 무결성, dyld 이미지 검사를 조합합니다. 단, 탈옥 탐지는 우회 가능하므로 서버 측 검증과 함께 사용해야 합니다. ATS는 기본적으로 HTTPS를 강제하며, 예외는 최소한으로 설정하고 App Review에서 사유를 설명해야 합니다."
</div>
`}
],
questions:[
{q:"Keychain과 UserDefaults의 차이는?",level:"basic",freq:true,
answer:"<b>보안 수준이 완전히 다릅니다.</b><br><br>• <b>UserDefaults</b>: plist 파일로 저장, 암호화 없음, 탈옥 시 쉽게 읽힘. 설정값, 플래그 등 비민감 데이터용<br>• <b>Keychain</b>: Secure Enclave 연동 암호화, 앱 삭제 후에도 유지 가능, 생체인증 연동 가능. 토큰, 비밀번호, 인증서 등 민감 데이터용<br><br>절대 UserDefaults에 저장하면 안 되는 것: 액세스 토큰, 비밀번호, API 키, 개인정보"},

{q:"Certificate Pinning의 위험성은?",level:"advanced",freq:true,
answer:"<b>인증서 만료/교체 시 앱이 완전히 동작 불능이 될 수 있습니다.</b><br><br>대응 전략:<br>1. <b>백업 핀 포함</b>: 최소 2개 이상의 공개키 핀<br>2. <b>Public Key Pinning</b>: 인증서가 아닌 공개키를 핀 (갱신에 유연)<br>3. <b>강제 업데이트 메커니즘</b>: 핀 불일치 시 앱 업데이트 유도<br>4. <b>Remote Config</b>: 서버에서 핀 목록을 업데이트할 수 있는 구조<br>5. <b>만료 모니터링</b>: 인증서 만료 30일 전 알림"},

{q:"iOS 앱에서 데이터 암호화 계층은?",level:"advanced",freq:false,
answer:"<b>4단계 보호 계층:</b><br><br>1. <b>하드웨어 (Secure Enclave)</b>: 키 생성/저장, 생체인증 처리<br>2. <b>파일 시스템 (Data Protection)</b>: NSFileProtectionComplete 등 파일 단위 암호화<br>3. <b>Keychain</b>: 민감 데이터 항목별 암호화 + 접근 제어<br>4. <b>앱 레벨</b>: CryptoKit으로 추가 암호화 (E2E 등)<br><br>각 계층이 독립적으로 동작하여 하나가 뚫려도 다른 계층이 보호합니다."},

{q:"Jailbreak 탐지를 우회하는 방법과 대응은?",level:"advanced",freq:true,
answer:"<b>우회 방법:</b> Frida, Liberty Lite 등의 도구로 탐지 함수를 후킹하여 항상 false 반환하도록 변조<br><br><b>대응 전략:</b><br>1. <b>다층 탐지</b>: 여러 방법을 조합하여 하나만 우회해도 다른 것이 감지<br>2. <b>코드 난독화</b>: 탐지 로직을 찾기 어렵게<br>3. <b>서버 측 검증</b>: DeviceCheck API, 앱 무결성 검증<br>4. <b>런타임 무결성</b>: 함수 포인터 변조 감지<br><br>궁극적으로 클라이언트 탐지는 우회 가능하므로, 서버에서 민감 로직을 처리하는 것이 근본 해결책입니다."}
],
