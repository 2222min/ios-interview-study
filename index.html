<style>

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}

body{font-family:-apple-system,BlinkMacSystemFont,Pretendard,sans-serif;background:var(--bg);color:var(--g8);line-height:1.6;font-size:14px}

<script>
var D=[
{day:1,title:"Value vs Reference / Copy-on-Write",
tags:["struct","class","Stack","Heap","Copy-on-Write","Existential Container"],
topics:[

{name:"Value Type vs Reference Type 기본 개념",icon:"blue",
detail:`
<h5>Value Type과 Reference Type의 차이가 뭔가요?</h5>
<p>가장 큰 차이는 <b>"복사할 때 일어나는 일"</b>입니다.</p>

<h5>Value Type (struct, enum)</h5>
<pre>struct Point {
    var x: Int
    var y: Int
}

var a = Point(x: 1, y: 2)
var b = a       // 값 복사! a와 b는 완전히 별개
b.x = 100

print(a.x)  // 1 (a는 그대로)
print(b.x)  // 100 (b만 변경)</pre>

<h5>Reference Type (class)</h5>
<pre>class Person {
    var age: Int
    init(age: Int) { self.age = age }
}

var a = Person(age: 30)
var b = a       // 참조 복사! a와 b는 같은 객체를 가리킴
b.age = 100

print(a.age)  // 100 (a도 같이 변경됨!)
print(b.age)  // 100</pre>

<h5>왜 이런 차이가 나나요?</h5>
<p>값 타입은 변수 자체가 데이터를 담고 있고, 참조 타입은 변수가 데이터의 "주소(포인터)"를 담고 있기 때문입니다.</p>

<pre>// Value Type 메모리:
// var a = Point(x:1, y:2)
// 스택: [a: x=1, y=2]  ← 값이 직접 저장됨
//
// var b = a
// 스택: [a: x=1, y=2]
//       [b: x=1, y=2]  ← 별개의 영역에 복사됨

// Reference Type 메모리:
// var a = Person(age:30)
// 스택: [a: ──┐] (포인터)
//             ▼
// 힙:   ┌─────────────┐
//       │ Person      │
//       │ age: 30     │
//       └─────────────┘
//
// var b = a
// 스택: [a: ──┐] [b: ──┐] (둘 다 같은 곳을 가리킴)
//             ▼     ▼
// 힙:   ┌─────────────┐
//       │ Person      │
//       │ age: 30     │
//       └─────────────┘</pre>

<h5>그럼 언제 struct, 언제 class를 써야 하나요?</h5>
<p>Apple의 공식 가이드라인:</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">기본 (대부분의 경우)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>struct</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">정체성(identity)이 중요할 때 (=== 비교)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">상속이 필요할 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">참조 공유가 의도된 동작일 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Objective-C 호환 필요</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class (NSObject)</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">deinit이 필요한 자원 관리</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> Swift는 "value type 우선" 언어입니다. String, Array, Dictionary, Set 같은 핵심 타입들이 모두 struct로 구현되어 있죠. 값 타입은 thread-safety, predictability, 그리고 함수형 프로그래밍 친화성을 제공합니다. 단, 큰 데이터를 자주 복사하면 비용이 클 수 있어서 Copy-on-Write로 최적화합니다.
</div>
`},

{name:"메모리 레이아웃 차이 (Stack vs Heap)",icon:"green",
detail:`
<h5>Stack과 Heap이 뭔가요?</h5>
<p>프로그램이 사용하는 메모리 영역의 두 종류입니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">Stack</th><th style="padding:10px;text-align:left">Heap</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>할당 속도</b></td><td style="padding:10px;border-top:1px solid var(--g2)">매우 빠름 (포인터 +/-)</td><td style="padding:10px;border-top:1px solid var(--g2)">느림 (malloc 호출)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>해제</b></td><td style="padding:10px;border-top:1px solid var(--g2)">함수 종료 시 자동</td><td style="padding:10px;border-top:1px solid var(--g2)">ARC가 관리</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>크기 제한</b></td><td style="padding:10px;border-top:1px solid var(--g2)">제한적 (~MB 단위)</td><td style="padding:10px;border-top:1px solid var(--g2)">큼 (~GB 단위)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>스레드</b></td><td style="padding:10px;border-top:1px solid var(--g2)">스레드별 별도</td><td style="padding:10px;border-top:1px solid var(--g2)">공유 (lock 필요)</td></tr>
</table>

<h5>struct는 Stack? class는 Heap?</h5>
<p>일반화하면 그렇지만 정확하진 않습니다. <b>"struct는 보통 인라인으로 저장되고, class는 항상 힙에 저장된다"</b>가 정확합니다.</p>

<h5>실제 메모리 크기 비교</h5>
<pre>// 같은 데이터인데 struct vs class
struct PointS {
    var x: Double  // 8 bytes
    var y: Double  // 8 bytes
}
// → 총 16 bytes, 스택에 인라인 저장

class PointC {
    var x: Double  // 8 bytes
    var y: Double  // 8 bytes
}
// 힙 할당:
//   metadata 포인터: 8 bytes
//   refCount: 8 bytes
//   x: 8 bytes
//   y: 8 bytes
// → 32 bytes (struct의 2배)
// + 스택의 포인터: 8 bytes
// + malloc overhead: ~16 bytes
// 실질적 비용: ~56 bytes (struct의 3.5배!)</pre>

<h5>struct가 항상 스택에 가는 건 아니에요</h5>
<p>아래 경우에는 struct도 힙에 저장됩니다:</p>
<ol style="padding-left:20px;margin:10px 0">
<li><b>Existential Container에 담긴 큰 struct</b>: 24 bytes 초과 시 힙</li>
<li><b>클로저에 캡처된 변수</b>: closure context는 힙</li>
<li><b>Generic 컨텍스트 (specialization 안 됐을 때)</b></li>
<li><b>Indirect enum case</b></li>
</ol>

<h5>성능 비교 (실측 기준)</h5>
<ul>
<li>struct 복사: ~1ns (스택 memcpy)</li>
<li>class retain: ~5-10ns (atomic increment)</li>
<li>class 힙 할당: ~50-100ns (malloc 호출)</li>
<li>struct 힙 할당 (existential): ~50-100ns</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "struct는 인라인 저장이라 메모리 효율이 좋고, 할당/해제가 빠릅니다. class는 항상 힙 할당이라 추가 오버헤드가 있지만, 참조로 전달하면 큰 데이터도 빠르게 공유할 수 있죠. 핵심 라이브러리(Array, Dictionary)는 struct이지만 내부에 reference type 버퍼를 가져 Copy-on-Write로 두 마리 토끼를 잡습니다."
</div>
`},

{name:"Existential Container (프로토콜 타입의 비밀)",icon:"purple",
detail:`
<h5>Existential이 뭔가요?</h5>
<p>"존재하는 어떤 타입"을 의미합니다. 프로토콜을 변수 타입으로 사용할 때 그 변수의 정체가 바로 existential입니다.</p>

<pre>protocol Animal {
    func makeSound()
}

struct Dog: Animal { ... }
struct Cat: Animal { ... }

let pet: Animal = Dog()  // ← 이게 existential
// 'Animal' 자체는 타입이 아니라 프로토콜이지만,
// 'Animal'을 채택한 어떤 구체 타입이든 담을 수 있는 컨테이너 역할을 합니다.</pre>

<h5>Existential Container 내부 구조</h5>
<p>이런 변수는 단순 포인터가 아닙니다. 다음 5개의 워드(64비트 시스템에서 8바이트씩)를 담는 박스입니다:</p>

<pre>// Existential Container = 5 words = 40 bytes
//
// ┌─────────────────────────────────┐
// │  Inline Value Buffer (24 bytes) │  ← 작은 값은 여기에 직접 저장
// ├─────────────────────────────────┤
// │  Value Witness Table ptr (8B)   │  ← 복사/소멸/크기 함수 테이블
// ├─────────────────────────────────┤
// │  Protocol Witness Table ptr (8B)│  ← 프로토콜 메서드 테이블
// └─────────────────────────────────┘</pre>

<h5>Inline Value Buffer (24 bytes 룰)</h5>
<p>값의 크기가 24바이트(3 words) 이하면 buffer에 직접 저장됩니다. 초과하면 힙 할당 후 포인터만 buffer에 저장됩니다.</p>

<pre>// 작은 struct → 인라인 저장 (힙 할당 없음, 빠름)
struct Small: Animal {
    var x: Int  // 8 bytes
    var y: Int  // 8 bytes
    func makeSound() { print("작음") }
}
let pet1: Animal = Small(x:1, y:2)
// Inline buffer에 그대로 저장 → 빠름

// 큰 struct → 힙 할당 (느림)
struct Large: Animal {
    var x: Int      // 8B
    var y: Int      // 8B
    var z: Int      // 8B
    var w: Int      // 8B
    var v: Int      // 8B (총 40B)
    func makeSound() { print("큼") }
}
let pet2: Animal = Large(x:1, y:2, z:3, w:4, v:5)
// 24B 초과 → 힙에 Large 할당 → buffer엔 힙 포인터만</pre>

<h5>Value Witness Table (VWT)</h5>
<p>"이 타입을 어떻게 다뤄야 하는지"에 대한 함수 테이블입니다.</p>
<ul>
<li><code>size</code>: 이 타입의 크기는?</li>
<li><code>copy</code>: 어떻게 복사하지?</li>
<li><code>destroy</code>: 어떻게 메모리 해제하지?</li>
<li><code>equals</code>: 어떻게 비교하지?</li>
</ul>
<p>제네릭 컨텍스트에서 컴파일러가 구체 타입을 모를 때 이 테이블을 통해 런타임에 처리합니다.</p>

<h5>Protocol Witness Table (PWT)</h5>
<p>"이 타입이 프로토콜의 메서드를 어떻게 구현했는지"에 대한 테이블입니다.</p>

<pre>// 컴파일러가 자동 생성:
// Dog의 Animal PWT:
//   makeSound 함수 포인터 → Dog.makeSound 구현체

// 호출 시:
let pet: Animal = Dog()
pet.makeSound()
// 1. existential container의 PWT 포인터 따라가기
// 2. PWT[0] (makeSound 슬롯)에서 함수 포인터 가져오기
// 3. 그 함수 호출 → Dog.makeSound 실행
// → 간접 호출 발생 (성능 비용)</pre>

<h5>왜 이렇게 복잡하게 만들었나요?</h5>
<p>"어떤 타입이든 담을 수 있는 변수"를 만들려면 컴파일 타임에 타입을 알 수 없습니다. 그래서 런타임에 필요한 모든 정보를 컨테이너에 함께 담고 다니는 거죠. 대가는 약간의 메모리와 간접 호출 오버헤드입니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "프로토콜 타입(any Protocol)은 Existential Container라는 5워드 박스로 표현됩니다. 24바이트 이하의 값은 인라인 저장되어 빠르고, 초과하면 힙 할당이 발생합니다. Witness Table을 통한 dynamic dispatch가 일어나기 때문에 some Protocol(opaque type)이나 generic을 쓰면 static dispatch로 더 빠릅니다. 모듈 인터페이스에선 any로 유연성을 확보하고, 성능 중요 코드에선 some으로 최적화하는 게 일반적입니다."
</div>
`},

{name:"Copy-on-Write (COW) 내부 동작",icon:"orange",
detail:`
<h5>COW가 뭔가요?</h5>
<p>"복사 시 즉시 복사하지 않고, 실제 수정이 일어날 때만 복사한다"는 최적화 기법입니다.</p>

<h5>왜 필요한가요?</h5>
<p>Array 같은 큰 컬렉션이 struct(값 타입)면, 함수에 넘길 때마다 전체 복사가 일어나면 너무 비효율적입니다. 100만 개 원소를 가진 배열을 매번 복사하면 끔찍하죠.</p>

<pre>var bigArray = [Int](repeating: 0, count: 1_000_000)
var copy = bigArray  // 만약 진짜 복사라면? → 1M × 8B = 8MB 복사!

// 하지만 실제로는 COW 덕분에 거의 즉시 끝남
// 둘이 같은 메모리를 공유하다가, 수정 시점에 비로소 복사</pre>

<h5>Swift 표준 라이브러리의 COW</h5>
<p>Array, Dictionary, Set, String이 모두 COW를 구현하고 있습니다. 이들은 struct이지만 내부에 <b>reference type 버퍼</b>를 가집니다.</p>

<pre>// Array의 내부 구조 (단순화)
struct Array&lt;Element&gt; {
    var _buffer: _ArrayBuffer&lt;Element&gt;  // ← 이게 class!
}

// 동작 시나리오:
var a = [1, 2, 3]      // _buffer (refCount: 1)
var b = a              // 같은 _buffer 공유 (refCount: 2)
                       // ← 메모리 복사 없음! 빠름!

b.append(4)            
// 1. isKnownUniquelyReferenced(&_buffer) 확인
// 2. refCount > 1 → 다른 곳에서도 쓰고 있다!
// 3. 새 버퍼 할당 + 기존 데이터 복사
// 4. 새 버퍼에 4 추가
// 5. b._buffer = 새 버퍼 (refCount: 1)
// 6. a._buffer = 기존 버퍼 (refCount: 1)</pre>

<h5>isKnownUniquelyReferenced</h5>
<p>"이 참조를 가진 게 나뿐인가?"를 검사하는 함수입니다. COW 구현의 핵심이죠.</p>
<ul>
<li>true → 나만 쓰니까 직접 수정해도 안전</li>
<li>false → 다른 곳도 쓰니까 복사 후 수정</li>
</ul>

<h5>커스텀 COW 구현하기</h5>
<pre>final class Storage&lt;T&gt; {
    var value: T
    init(_ value: T) { self.value = value }
}

struct COWWrapper&lt;T&gt; {
    private var storage: Storage&lt;T&gt;
    
    init(_ value: T) {
        storage = Storage(value)
    }
    
    var value: T {
        get { storage.value }
        set {
            // 핵심 로직!
            if isKnownUniquelyReferenced(&storage) {
                // 나만 참조 중 → 직접 수정 (복사 X)
                storage.value = newValue
            } else {
                // 다른 곳도 참조 중 → 새 storage 할당
                storage = Storage(newValue)
            }
        }
    }
}</pre>

<h5>주의사항</h5>
<ul>
<li><b>Storage는 반드시 final class</b>: ObjC 브릿지 클래스에는 isKnownUniquelyReferenced가 동작 안 함</li>
<li><b>thread-safe하지 않음</b>: 두 스레드가 동시에 수정하면 race condition 가능</li>
</ul>

<h5>COW가 깨지는 흔한 실수</h5>
<pre>// ❌ 의도치 않은 복사 유발
func processArray(_ arr: inout [Int]) {
    let backup = arr      // refCount +1!
    arr.append(999)        // 다른 곳(backup)이 쓰니까 → 복사 발생!
    // backup이 살아있는 동안은 arr 수정 시 매번 복사
}

// ✅ 불필요한 참조 제거
func processArray(_ arr: inout [Int]) {
    arr.append(999)        // refCount == 1 → 복사 없이 직접 수정
}</pre>

<h5>Small String Optimization</h5>
<p>String도 COW를 쓰지만, 추가로 <b>15바이트 이하의 짧은 문자열은 힙 할당 없이 String 구조체 내부(16바이트)에 직접 저장</b>합니다. SSO(Small String Optimization)라고 부릅니다.</p>

<pre>let s1 = "안녕"          // 6 bytes (UTF-8) → 인라인 저장 (힙 X)
let s2 = "Hello, World!" // 13 bytes → 인라인 저장 (힙 X)
let s3 = "긴 문자열... 16바이트 초과"  // → 힙 버퍼 + COW</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Swift의 컬렉션 타입들은 struct이지만 내부에 reference type 버퍼를 두고 Copy-on-Write를 구현합니다. 덕분에 값 타입의 안전성(독립적 수정)과 참조 타입의 효율성(빠른 복사)을 동시에 얻죠. isKnownUniquelyReferenced로 유일 참조 여부를 검사하여 실제 복사 시점을 늦춥니다. 이 메커니즘 덕분에 [1...1_000_000]을 함수에 넘겨도 비용이 거의 없습니다."
</div>
`}

],
questions:[
{q:"Swift에서 struct가 항상 스택에 저장되나요?",level:"basic",freq:true,
answer:"<b>아닙니다.</b> 일반적으로는 스택에 인라인 저장되지만, 다음 경우엔 힙에 저장됩니다:<br><br>1. <b>Existential Container에 담긴 큰 struct (24바이트 초과)</b>: 인라인 버퍼를 넘으면 힙 할당<br>2. <b>클로저에 캡처된 변수</b>: 클로저 컨텍스트는 힙에 있음<br>3. <b>Generic 컨텍스트 (specialization 실패 시)</b>: 컴파일러가 구체 타입을 모르면 힙<br>4. <b>Indirect enum case</b>: 재귀 enum은 힙 사용<br><br>그래서 \"struct = 스택\"은 정확하지 않고, 정확한 표현은 \"struct는 보통 인라인 저장\"입니다."},

{q:"Array를 함수 파라미터로 전달하면 복사되나요?",level:"basic",freq:true,
answer:"의미적으로는 복사지만, <b>Copy-on-Write 덕분에 실제 메모리 복사는 수정 시점까지 지연</b>됩니다.<br><br>함수 안에서 배열을 읽기만 하면 복사 비용 없음 (refCount만 +1). 수정하는 순간 비로소 복사가 일어납니다.<br><br>주의: <code>inout</code>으로 받으면 참조처럼 동작해서 원본을 직접 수정합니다. 복사 자체가 안 일어나죠."},

{q:"isKnownUniquelyReferenced가 ObjC 클래스에서 동작 안 하는 이유는?",level:"advanced",freq:false,
answer:"이 함수는 Swift native class의 inline refCount를 검사하도록 설계되었습니다. ObjC 클래스는 다른 메모리 모델(NSObject 기반)을 사용하기 때문에 항상 false를 반환합니다.<br><br>그래서 커스텀 COW를 구현할 때 Storage 클래스는 반드시 <code>final class</code>(상속 불가)로 선언해야 합니다. 이래야 컴파일러가 Swift native class로 처리하고 정확한 검사가 가능합니다."},

{q:"any Protocol과 some Protocol의 성능 차이는?",level:"advanced",freq:true,
answer:"<b>any (Existential)</b>: 런타임에 타입 결정. Existential Container와 Witness Table 통한 dynamic dispatch. 함수 호출 ~5-20ns.<br><br><b>some (Opaque Type)</b>: 컴파일 타임에 구체 타입 결정. Static dispatch + 인라인 가능. 함수 호출 ~1ns.<br><br>차이가 크지 않아 보이지만 hot loop에서 누적되면 큽니다. SwiftUI body가 some View를 반환하는 이유도 이 때문입니다 — 컴파일러가 View 트리의 정확한 타입을 알아야 효율적인 diff가 가능하죠.<br><br>가이드: 모듈 경계에선 any로 유연성, 모듈 내부에선 some/generic으로 성능."},

{q:"struct 안에 class 프로퍼티가 있으면 어떻게 되나요?",level:"advanced",freq:true,
answer:"struct를 복사할 때 class 프로퍼티는 <b>참조만 복사</b>됩니다 (shallow copy). 두 struct가 같은 class 인스턴스를 공유하게 되죠.<br><br>예시:<br><pre>class Container { var value = 0 }\nstruct Wrapper { var box: Container }\n\nvar a = Wrapper(box: Container())\nvar b = a  // struct 복사\nb.box.value = 100\nprint(a.box.value)  // 100! (같은 Container 공유)</pre>이걸 방지하려면 mutating setter에서 class를 deep copy해야 합니다. Array 같은 표준 타입은 COW로 자동 처리하지만, 직접 만든 struct는 수동 처리 필요."}
],

{day:2,title:"ARC / 메모리 관리",

{name:"ARC 기본 — 자동 메모리 관리의 원리",icon:"blue",
detail:`
<h5>ARC가 무엇이고, Swift는 메모리를 어떻게 관리하나요?</h5>
<p><b>ARC = Automatic Reference Counting.</b> 컴파일 타임에 컴파일러가 코드를 분석해서 <code>retain</code>(참조 카운트 +1)과 <code>release</code>(참조 카운트 -1) 호출을 자동으로 삽입해주는 메모리 관리 시스템입니다.</p>
<p>핵심 원리: <b>"참조하는 곳이 몇 개인지 세고, 0이 되면 즉시 해제"</b></p>

<pre>// 우리가 작성한 코드:
func process() {
    let user = User(name: "철수")
    print(user.name)
}

// 컴파일러가 실제로 변환한 코드 (의사 코드):
func process() {
    let user = User(name: "철수")  // retain → count=1
    print(user.name)
    // release → count=0 → deinit 호출 → 메모리 해제
}</pre>

<h5>ARC vs GC 비교</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">ARC</th><th style="padding:10px;text-align:left">GC (Java, Go 등)</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>동작 시점</b></td><td style="padding:10px;border-top:1px solid var(--g2)">컴파일 타임 코드 삽입</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임 주기적 실행</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>해제 시점</b></td><td style="padding:10px;border-top:1px solid var(--g2)">참조 카운트 0 즉시 (결정적)</td><td style="padding:10px;border-top:1px solid var(--g2)">GC 사이클 도래 시 (비결정적)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>Pause</b></td><td style="padding:10px;border-top:1px solid var(--g2)">없음</td><td style="padding:10px;border-top:1px solid var(--g2)">GC pause 발생</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>순환 참조</b></td><td style="padding:10px;border-top:1px solid var(--g2)">자동 해결 X (개발자 책임)</td><td style="padding:10px;border-top:1px solid var(--g2)">자동 해결 O</td></tr>
</table>

<h5>ARC는 어떤 타입에 적용되나요?</h5>
<p><b>reference type(class, closure, actor)에만 적용됩니다.</b></p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">타입</th><th style="padding:10px;text-align:left">ARC?</th><th style="padding:10px;text-align:left">메모리 관리</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">struct</td><td style="padding:10px;border-top:1px solid var(--g2)">❌</td><td style="padding:10px;border-top:1px solid var(--g2)">스택 자동 해제 (스코프 끝)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">enum</td><td style="padding:10px;border-top:1px solid var(--g2)">❌</td><td style="padding:10px;border-top:1px solid var(--g2)">스택 자동 해제</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">class</td><td style="padding:10px;border-top:1px solid var(--g2)">✅</td><td style="padding:10px;border-top:1px solid var(--g2)">힙 + 참조 카운팅</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">closure</td><td style="padding:10px;border-top:1px solid var(--g2)">✅</td><td style="padding:10px;border-top:1px solid var(--g2)">힙 (closure context)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">actor</td><td style="padding:10px;border-top:1px solid var(--g2)">✅</td><td style="padding:10px;border-top:1px solid var(--g2)">힙 (참조 타입)</td></tr>
</table>

<h5>Strong Reference란?</h5>
<p>"이 객체를 사라지지 않게 잡아두겠다"고 선언하는 참조입니다. <code>var/let</code>으로 선언하면 별도 키워드 없이 모두 strong reference입니다.</p>
<pre>let a = User()    // strong (count: 1)
let b = a         // strong (count: 2)
let c = a         // strong (count: 3)
// a, b, c가 모두 스코프 벗어나야 deinit 호출됨</pre>

<h5>Reference Count는 언제 증가/감소?</h5>
<p><b>증가:</b></p>
<ul>
<li>변수에 객체 할당 (<code>let x = obj</code>)</li>
<li>함수 파라미터로 전달 (대부분의 경우)</li>
<li>컬렉션에 추가</li>
<li>클로저가 캡처</li>
<li>다른 객체의 strong 프로퍼티에 할당</li>
</ul>
<p><b>감소:</b></p>
<ul>
<li>변수가 스코프를 벗어남</li>
<li>nil 또는 다른 객체로 재할당</li>
<li>컬렉션에서 제거</li>
<li>클로저 해제</li>
</ul>
<p>참고: <code>-O</code> 최적화 시 컴파일러가 불필요한 retain/release를 제거하여, 사람이 예상하는 횟수와 실제 호출 횟수가 다를 수 있습니다 (Guaranteed Parameter 컨벤션).</p>

<h5>Reference Count가 0이 되면?</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>deinit 호출</b> — 객체의 deinit 메서드 실행</li>
<li><b>자식 프로퍼티 release</b> — strong 프로퍼티들 RC -1 (연쇄 해제)</li>
<li><b>weak 참조 nil 처리</b> — 이 객체를 weak로 참조하던 변수들이 모두 nil</li>
<li><b>메모리 해제</b> — 힙 메모리를 시스템에 반환</li>
<li><b>Side Table 정리</b> — weak count도 0이면 Side Table 자체도 해제</li>
</ol>

<h5>deinit이 호출되지 않으면 의심할 4가지</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>Retain Cycle</b>: 두 객체가 서로 strong 참조 → 영원히 RC가 0 안 됨</li>
<li><b>Closure Capture</b>: 클로저가 self를 strong 캡처한 채 어딘가에 저장됨</li>
<li><b>Timer / NotificationCenter</b>: Timer.target은 strong, observer 해제 누락</li>
<li><b>전역 변수 / 싱글톤 보관</b>: 의도치 않게 전역에 저장되어 영원히 살아있음</li>
</ol>

<p><b>탐지:</b> deinit에 print 추가 → 화면 dismiss 후 안 찍히면 의심. Memory Graph Debugger로 시각화. Instruments Leaks 자동 탐지.</p>

<div class="highlight">
<b>💡 면접 답변 정석:</b> "ARC는 컴파일 타임에 retain/release를 자동 삽입하는 메모리 관리 시스템으로, class·closure·actor 같은 reference type에만 적용됩니다. struct/enum은 스택 기반 자동 해제. RC가 0이 되면 즉시 deinit 호출 후 메모리 해제 + weak 참조 nil 처리. deinit이 호출되지 않으면 retain cycle, closure capture, Timer/Notification 같은 잠재 누수를 의심합니다."
</div>
`},
,
{name:"HeapObject — 클래스 인스턴스의 메모리 구조",icon:"green",
detail:`
<h5>Swift 클래스 인스턴스는 메모리 어디에?</h5>
<p><b>항상 힙(Heap)에 저장됩니다.</b> 스택에 저장되는 경우는 없습니다.</p>
<p>이유:</p>
<ul>
<li>lifetime이 함수 스코프와 무관하게 길어질 수 있음 (다른 변수에 할당, 컬렉션에 추가)</li>
<li>ARC가 추적해야 하므로 고정된 주소가 필요. 스택은 frame이 사라지면 주소도 사라짐</li>
<li>크기가 동적이거나 큰 경우가 많아 스택에 부적합</li>
</ul>

<h5>클래스 인스턴스 내부에는 무엇이 들어있나?</h5>
<p>"<b>헤더 + 프로퍼티</b>" 구조입니다.</p>
<pre>┌─────────────────────────────────────┐
│ HEADER (16 bytes, 우리가 안 보임)    │
│  ├─ metadata 포인터 (8B)            │  ← 타입 정보 (isa)
│  └─ refCounts (8B)                  │  ← 참조 카운트
├─────────────────────────────────────┤
│ PROPERTIES (우리가 선언한 것)        │
│  ├─ age: Int (8B)                   │
│  ├─ name: String (16B)              │
│  └─ ...                             │
└─────────────────────────────────────┘</pre>
<p>그래서 <code>class Empty { }</code>처럼 빈 클래스도 인스턴스 크기는 최소 16 bytes (헤더만).</p>

<h5>HeapObject는 무엇인가요?</h5>
<p><b>HeapObject는 Swift 런타임 내부에서 모든 클래스 인스턴스를 표현하는 C++ 구조체</b>입니다.</p>
<pre>// Swift 런타임 소스 코드 (C++)
struct HeapObject {
    HeapMetadata const *metadata;  // 8B - 타입 정보 포인터
    InlineRefCounts refCounts;     // 8B - 참조 카운트 (비트 압축)
    // 그 다음에 프로퍼티들이 이어짐
};</pre>
<p>모든 Swift class는 컴파일 시 이 HeapObject 구조를 헤더로 갖도록 변환됩니다. ObjC의 <code>isa</code> 포인터와 비슷하지만, refCount까지 인라인으로 포함시킨다는 점이 다릅니다.</p>

<h5>InlineRefCounts 비트 레이아웃</h5>
<p>64bit(8 bytes) 안에 비트 단위로 여러 정보를 압축해 놓았습니다:</p>
<pre>// InlineRefCounts (64bit)
//
// ┌──────────────┬───┬──────────────┬───┐
// │ strong count │ D │ unowned count│ U │
// │  (31 bits)   │   │  (31 bits)   │   │
// └──────────────┴───┴──────────────┴───┘
//
// strong: 일반 strong 참조 개수
// D (1bit): isDeinitializing — deinit 진행 중?
// unowned: unowned 참조 개수
// U (1bit): useSlowRC — Side Table 사용 중? (weak 있으면 1)</pre>
<p>왜 비트로 압축했나? 모든 인스턴스에 8B만 추가하기 위해서. 인스턴스 100만 개면 8MB 차이.</p>

<h5>실제 메모리 모습</h5>
<pre>class Person {
    var age: Int = 30
    var name: String = "철수"
}
let p = Person()

// 메모리 모습:
스택: [p (포인터 8B)] ──┐
                        │
힙:  ┌──────────────────▼─────────────────┐ ← 객체 시작 주소
     │ metadata (8B)                       │  헤더
     │ refCount (8B): strong=1, unowned=1  │  헤더
     ├─────────────────────────────────────┤
     │ age: 30 (8B)                        │  내 데이터
     │ name: "철수" (16B)                  │
     └─────────────────────────────────────┘
     총 ~40 bytes (+ malloc overhead)</pre>

<h5>값 타입은 항상 stack에 저장되나요?</h5>
<p><b>아닙니다.</b> 값 타입도 다음 경우엔 힙에 저장됩니다:</p>
<ol style="padding-left:20px;margin:10px 0">
<li><b>Existential Container의 24바이트 초과 struct</b>: 인라인 버퍼 초과 시 힙</li>
<li><b>클로저에 캡처된 변수</b>: closure context는 힙</li>
<li><b>Generic 컨텍스트 (specialization 실패 시)</b>: 컴파일러가 구체 타입 모르면 힙</li>
<li><b>Indirect enum case</b>: 재귀 enum은 힙</li>
<li><b>다른 class 인스턴스의 프로퍼티</b>: class가 힙에 있으니 같이 힙</li>
</ol>
<p>그래서 정확한 표현은 "struct는 보통 인라인 저장(스택 또는 다른 객체의 일부)"이지 "항상 스택"은 아닙니다.</p>

<h5>let user = User()에서 user 변수와 인스턴스는 각각 어디?</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">대상</th><th style="padding:10px;text-align:left">위치</th><th style="padding:10px;text-align:left">설명</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>user</code> 변수</td><td style="padding:10px;border-top:1px solid var(--g2)">스택 (8B)</td><td style="padding:10px;border-top:1px solid var(--g2)">힙 객체를 가리키는 포인터</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>User()</code> 인스턴스</td><td style="padding:10px;border-top:1px solid var(--g2)">힙</td><td style="padding:10px;border-top:1px solid var(--g2)">실제 객체 (헤더 16B + 프로퍼티)</td></tr>
</table>
<p>예외: 변수가 클로저에 캡처되면 user 변수도 힙(closure context). <code>self.user</code>처럼 프로퍼티면 self 객체 내부(역시 힙).</p>

<div class="highlight">
<b>💡 면접 답변 정석:</b> "Swift 클래스 인스턴스는 항상 힙에 할당되며, Swift 런타임의 HeapObject 구조로 표현됩니다. 헤더에 metadata 포인터(8B)와 InlineRefCounts(8B)가 있고 그 뒤에 프로퍼티가 옵니다. 참조 카운트는 InlineRefCounts에 비트 단위로 압축되어 strong/unowned/플래그를 포함합니다. 변수 자체는 보통 스택의 포인터지만, 클로저 캡처되거나 다른 힙 객체에 속하면 힙에 위치합니다."
</div>
`},
,
{name:"weak vs unowned — 약한 참조 완벽 정리",icon:"purple",
detail:`
<h5>핵심 비교표</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">weak</th><th style="padding:10px;text-align:left">unowned</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Optional</td><td style="padding:10px;border-top:1px solid var(--g2)">필수</td><td style="padding:10px;border-top:1px solid var(--g2)">non-Optional 가능</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">대상 해제 후</td><td style="padding:10px;border-top:1px solid var(--g2)">자동 nil (zeroing)</td><td style="padding:10px;border-top:1px solid var(--g2)">크래시 (dangling pointer)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Side Table</td><td style="padding:10px;border-top:1px solid var(--g2)">필요</td><td style="padding:10px;border-top:1px solid var(--g2)">불필요</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">접근 비용</td><td style="padding:10px;border-top:1px solid var(--g2)">~10-20ns (간접 참조)</td><td style="padding:10px;border-top:1px solid var(--g2)">~2-3ns (객체 내부 카운트)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">사용 시점</td><td style="padding:10px;border-top:1px solid var(--g2)">대상이 먼저 해제 가능</td><td style="padding:10px;border-top:1px solid var(--g2)">대상이 항상 더 오래 삶</td></tr>
</table>

<h5>weak 동작</h5>
<pre>class Owner {
    weak var pet: Pet?    // weak는 항상 Optional!
}

let owner = Owner()
do {
    let pet = Pet()
    owner.pet = pet
    print(owner.pet?.name)  // "Pet 이름"
}  // 여기서 pet 해제
print(owner.pet)  // nil (자동으로 nil이 됨!)</pre>

<h5>unowned 동작</h5>
<pre>class Pet {
    unowned let owner: Owner   // unowned는 non-Optional!
    init(owner: Owner) { self.owner = owner }
}

var owner: Owner? = Owner()
let pet = Pet(owner: owner!)
owner = nil  // owner 해제
print(pet.owner)  // 💥 크래시!</pre>

<h5>weak는 왜 Optional이어야 하나요?</h5>
<p>weak의 본질이 "대상이 해제되면 자동 nil"이기 때문입니다. nil이 될 수 있다 = Optional.</p>
<pre>weak var d: SomeDelegate?   // ✅
weak let d: SomeDelegate?   // ❌ let은 변경 불가, 자동 nil 모순
weak var d: SomeDelegate    // ❌ Optional 아님</pre>

<h5>unowned는 Optional이 될 수 있나요?</h5>
<p>iOS 12+에서는 가능하지만 일반적이지 않습니다. unowned의 핵심 의도가 "절대 nil 안 됨"이라 Optional로 쓸 거면 weak가 자연스럽습니다.</p>

<h5>실전 선택 가이드</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th><th style="padding:10px;text-align:left">이유</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">delegate 패턴</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">delegate가 먼저 해제 가능</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">closure에서 self 캡처 (비동기)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">콜백 시점에 self 사라질 수 있음</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">child → parent 참조</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>unowned</b></td><td style="padding:10px;border-top:1px solid var(--g2)">parent가 항상 더 오래 삶</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">즉시 실행 closure에서 self</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>unowned</b></td><td style="padding:10px;border-top:1px solid var(--g2)">실행 중엔 self 보장</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">확신 없을 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">크래시보다 nil이 안전</td></tr>
</table>

<h5>delegate를 weak로 선언하는 이유?</h5>
<p><b>retain cycle을 방지</b>하기 위해서입니다.</p>
<pre>// 흔한 구조:
class VC: UIViewController, ServiceDelegate {
    let service = Service()       // VC → service (strong)
    
    override func viewDidLoad() {
        service.delegate = self   // service → delegate
    }
}

// delegate가 strong이면:
// VC → service → delegate(VC) → 순환 → VC.deinit 안 됨!

// delegate가 weak면:
// VC → service → delegate(weak, VC) → 순환 깨짐 → 정상 해제</pre>

<h5>protocol에 AnyObject 제약이 필요한 이유?</h5>
<p><b>weak는 reference type(class)에만 적용 가능</b>하기 때문입니다.</p>
<pre>protocol ServiceDelegate { ... }     // 제약 없음

class Service {
    weak var delegate: ServiceDelegate?
    // ❌ 컴파일 에러:
    // 'weak' must not be applied to non-class-bound 'ServiceDelegate'
}

// 해결: AnyObject 제약 추가
protocol ServiceDelegate: AnyObject { // class 전용으로 제한
    func didFinish()
}

class Service {
    weak var delegate: ServiceDelegate?  // ✅
}</pre>
<p>AnyObject는 "이 프로토콜은 class만 채택할 수 있다"고 컴파일러에 알려줍니다. struct/enum은 채택 불가하므로 weak 안전.</p>

<h5>unowned(unsafe)는?</h5>
<p><b>절대 사용하지 마세요.</b> unowned 체크조차 하지 않아서 해제된 메모리에 그대로 접근합니다. 운 좋으면 동작하고, 운 나쁘면 알 수 없는 버그. C의 raw pointer와 같은 위험.</p>

<div class="highlight">
<b>💡 면접 답변 정석:</b> "weak는 Optional이고 대상 해제 시 자동 nil(zeroing reference), unowned는 non-optional이고 해제 후 접근 시 크래시. weak는 Side Table을 통해 동작해서 약간의 성능 비용이 있고, unowned는 객체 내부 카운트만 사용해 빠릅니다. delegate는 weak로 retain cycle을 방지하며, 프로토콜에 AnyObject 제약을 추가해 class만 채택 가능하게 강제해야 weak 적용이 가능합니다. 의심스러우면 항상 weak가 안전합니다."
</div>
`},
,
{name:"Side Table — weak가 동작하는 비밀",icon:"orange",
detail:`
<h5>왜 객체 내부 refCount만으로는 weak를 관리할 수 없나요?</h5>
<p>핵심 시나리오:</p>
<pre>let p = Person()           // count: 1
weak var w1 = p
weak var w2 = p
weak var w3 = p
// p = nil 했을 때, w1, w2, w3를 어떻게 모두 nil로 만들지?</pre>
<p>p가 해제될 때 "이 객체를 weak로 참조하는 모든 변수"를 찾아 nil 처리해야 합니다. 그러려면:</p>
<ol style="padding-left:20px;margin:10px 0">
<li>weak 참조 목록을 어딘가에 저장해야 함</li>
<li>객체가 해제됐다는 신호를 weak 변수들에게 전달해야 함</li>
<li>객체 자체는 이미 해제되었지만 weak 변수들은 살아있어야 함</li>
</ol>
<p>객체 내부에만 정보를 두면 객체 해제 시 그 정보도 사라집니다. 그래서 객체 외부에 별도 자료구조가 필요한데, 그게 <b>Side Table</b>입니다.</p>

<h5>Side Table이란?</h5>
<p>weak 참조를 지원하기 위해 별도로 할당되는 추가 메모리 영역입니다.</p>
<pre>// Swift 런타임 내부 (C++)
struct HeapObjectSideTableEntry {
    SideTableRefCounts refCounts;        // strong + unowned + weak count
    std::atomic&lt;WeakRefCount&gt; weakBits;  // weak 참조 개수
    HeapObject *object;                  // 원본 객체 포인터
};</pre>

<h5>일반 strong vs weak 메모리 모습</h5>
<pre>// 일반 strong: 직접 관리
HeapObject {
    metadata
    refCounts: strong=3  ← 단순 카운트만
    properties...
}

// weak가 있으면: Side Table을 거침
HeapObject {
    metadata
    refCounts: useSlowRC=1  ← "Side Table 보세요" 플래그
    properties...
}
       ↓ 별도 할당
SideTable {
    refCounts: strong=2, weak=3
    object: HeapObject 포인터
}</pre>

<h5>weak 변수가 자동 nil 되는 원리</h5>
<p>핵심 트릭: <b>weak 변수는 객체가 아니라 Side Table을 가리킨다.</b></p>
<pre>// 1. weak var w = p 시점:
//    Side Table 생성 (없으면)
//    Side Table.weakCount += 1
//    w는 Side Table을 가리킴 (객체를 직접 가리키지 않음!)
//
// 2. p 해제 시:
//    객체 strong count = 0 → deinit 호출
//    Side Table에 "객체 해제됨" 마킹
//    하지만 Side Table 자체는 아직 살아있음 (w가 참조 중)
//
// 3. w 접근 시:
//    Side Table에서 strong count 확인
//    strong == 0 → return nil
//
// 4. w도 해제되면:
//    Side Table.weakCount = 0
//    Side Table 자체도 해제</pre>
<p>이 메커니즘 덕분에 객체가 사라져도 weak 변수는 안전하게 nil을 받을 수 있습니다.</p>

<h5>Side Table은 항상 생성되나요?</h5>
<p><b>아닙니다. Lazy하게 할당됩니다.</b></p>
<pre>let p = Person()
// 이 시점: Side Table 없음, HeapObject만 존재

weak var w = p
// 이 시점: Side Table 생성!
// HeapObject.refCounts.useSlowRC = 1로 설정
// 이후 모든 RC 작업이 Side Table을 통해 일어남</pre>
<p>이래서 weak를 안 쓰는 객체는 Side Table 비용이 0입니다. weak를 쓰면 그때부터 추가 메모리(~32 bytes)가 발생.</p>

<h5>weak 참조가 많아지면 성능 영향은?</h5>
<p><b>(1) 메모리:</b></p>
<ul>
<li>객체당 Side Table: ~32 bytes</li>
<li>weak 참조 1개당 추가: 8 bytes</li>
<li>객체 1만 개에 weak 5개씩이면 ~1.6MB</li>
</ul>
<p><b>(2) 접근 비용 비교 (실측 기준):</b></p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">참조 종류</th><th style="padding:10px;text-align:left">접근 비용</th><th style="padding:10px;text-align:left">설명</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">strong</td><td style="padding:10px;border-top:1px solid var(--g2)">~1ns</td><td style="padding:10px;border-top:1px solid var(--g2)">직접 포인터</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">unowned</td><td style="padding:10px;border-top:1px solid var(--g2)">~2-3ns</td><td style="padding:10px;border-top:1px solid var(--g2)">객체 내부 count 확인</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">weak</td><td style="padding:10px;border-top:1px solid var(--g2)">~10-20ns</td><td style="padding:10px;border-top:1px solid var(--g2)">Side Table 거쳐 atomic load</td></tr>
</table>

<h5>최적화 패턴</h5>
<pre>// ❌ 매 반복마다 weak 접근 (Side Table 거침)
items.forEach {
    self?.process($0)        // 매번 ~15ns
}

// ✅ 한 번 strong 변환 후 사용
guard let strong = self else { return }
items.forEach {
    strong.process($0)        // 매번 ~1ns
}</pre>
<p>UI 코드에선 무시할 수준이지만, hot loop에서는 차이가 누적됩니다.</p>

<div class="highlight">
<b>💡 면접 답변 정석:</b> "weak 참조는 Side Table이라는 별도 자료구조를 통해 관리됩니다. 객체 내부 카운트만으로는 '객체 해제 후에도 살아있는 weak 변수에 nil 통보'가 불가능하기 때문이죠. weak 변수는 객체가 아닌 Side Table을 가리키고, 접근 시 strong count를 확인해 0이면 nil을 반환합니다. Side Table은 weak가 처음 생길 때 lazy하게 할당되며, 접근 비용이 strong보다 약간 높아 hot loop에서는 strong으로 변환 후 사용하는 게 유리합니다."
</div>
`},
,
{name:"Retain Cycle — 실전 누수 패턴 진단",icon:"blue",
detail:`
<h5>Retain Cycle이란?</h5>
<p>두 객체(또는 여러 객체)가 <b>서로를 strong으로 참조</b>하여 reference count가 영원히 0이 되지 않는 상황입니다.</p>
<pre>// 가장 단순한 예
class A {
    var b: B?  // strong
}
class B {
    var a: A?  // strong
}

let a = A()
let b = B()
a.b = b
b.a = a
// 외부 변수 a, b가 사라져도:
// A의 retain count: 1 (B.a가 잡고 있음)
// B의 retain count: 1 (A.b가 잡고 있음)
// → 둘 다 영원히 해제 안 됨</pre>

<h5>왜 메모리 누수가 생기나요?</h5>
<p>ARC가 객체를 해제하는 유일한 조건은 "strong count가 0". 순환 참조가 있으면 외부에서 더 이상 참조하지 않더라도 서로가 서로를 잡고 있어 count가 0이 안 됩니다.</p>
<ul>
<li>아무도 사용하지 않는 객체가 메모리에 남음</li>
<li>같은 시나리오 반복 시 누수 누적 → 메모리 사용량 증가</li>
<li>최악의 경우 시스템이 앱을 메모리 부족으로 종료</li>
</ul>
<p><b>중요:</b> 단순 누수보다 <b>deinit이 호출되지 않는 것이 더 큰 문제</b>일 수 있습니다. deinit에서 정리하던 자원(파일, observer, Timer 등)이 영원히 정리 안 됨.</p>

<h5>해결: 한쪽을 weak로</h5>
<pre>class A {
    var b: B?       // strong (A가 B를 소유)
}
class B {
    weak var a: A?  // ✅ weak로 변경
}

// 이제 a = nil 하면:
// 1. b.a는 weak이라 a retain count에 영향 없음
// 2. a count = 0 → A deinit 호출
// 3. A deinit 시 self.b 해제
// 4. b count = 0 → B deinit 호출</pre>

<h5>실전 패턴 1: Closure에서 self 캡처 (가장 흔함)</h5>
<pre>class ViewController: UIViewController {
    var dataLoader = DataLoader()
    
    override func viewDidLoad() {
        super.viewDidLoad()
        
        // ❌ 순환 참조!
        dataLoader.onComplete = { result in
            self.handleResult(result)  // closure가 self를 strong 캡처
        }
        // self → dataLoader → onComplete → self ... 순환!
        
        // ✅ 해결: [weak self]
        dataLoader.onComplete = { [weak self] result in
            guard let self = self else { return }
            self.handleResult(result)
        }
    }
}</pre>

<h5>실전 패턴 2: Delegate strong 참조</h5>
<pre>// ❌ delegate를 strong으로 (흔한 실수)
protocol DownloadDelegate {       // AnyObject 없음
    func didFinish()
}
class Downloader {
    var delegate: DownloadDelegate?  // 기본 strong!
}

class VC: UIViewController, DownloadDelegate {
    let downloader = Downloader()
    
    override func viewDidLoad() {
        downloader.delegate = self
        // VC → downloader → delegate(VC) → 순환!
    }
}

// ✅ 해결: AnyObject + weak
protocol DownloadDelegate: AnyObject {  // class 전용
    func didFinish()
}
class Downloader {
    weak var delegate: DownloadDelegate?  // weak!
}</pre>

<h5>실전 패턴 3: Timer (정말 흔한 함정)</h5>
<pre>class TimerVC: UIViewController {
    var timer: Timer?
    
    override func viewDidLoad() {
        super.viewDidLoad()
        
        // ❌ Timer는 target을 strong retain!
        timer = Timer.scheduledTimer(
            timeInterval: 1.0,
            target: self,           // ← strong!
            selector: #selector(tick),
            userInfo: nil,
            repeats: true
        )
        // RunLoop → Timer → self → timer → Timer ... 순환
        // 이 VC를 pop해도 절대 deinit 안 됨!
    }
    
    @objc func tick() { print("tick") }
}

// ✅ 해결 1: 명시적으로 invalidate
override func viewWillDisappear(_ animated: Bool) {
    super.viewWillDisappear(animated)
    timer?.invalidate()
    timer = nil
}

// ✅ 해결 2: Block-based Timer (iOS 10+)
timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { [weak self] _ in
    self?.tick()
}</pre>

<h5>실전 패턴 4: NotificationCenter</h5>
<pre>// ❌ observer를 등록하고 해제 안 함
class VC: UIViewController {
    override func viewDidLoad() {
        NotificationCenter.default.addObserver(
            self,
            selector: #selector(handleNotification),
            name: .someEvent,
            object: nil
        )
        // NotificationCenter가 self를 strong 보유
    }
}

// ✅ iOS 9+에서는 자동 해제되지만, 명시적 해제 권장
deinit {
    NotificationCenter.default.removeObserver(self)
}

// ✅ 또는 block 기반 + token 관리
let token = NotificationCenter.default.addObserver(
    forName: .someEvent, object: nil, queue: .main
) { [weak self] _ in
    self?.handle()
}</pre>

<h5>탐지 체크리스트</h5>
<ol style="padding-left:20px;margin:10px 0">
<li>모든 클래스 deinit에 print 추가 → 화면 dismiss 후 안 찍히면 의심</li>
<li>Memory Graph Debugger → 보라색 ! 표시 확인</li>
<li>Instruments Leaks 정기 실행</li>
<li>코드 리뷰 시 closure에 [weak self] 누락 확인</li>
<li>delegate 프로퍼티가 weak인지 확인</li>
<li>Timer/NotificationCenter observer 해제 코드 확인</li>
<li>화면 진입을 10번 반복했을 때 객체가 10개 살아있으면 누수</li>
</ol>

<div class="highlight">
<b>💡 면접 답변 정석:</b> "Retain Cycle은 두 객체가 서로를 strong으로 참조하여 RC가 0이 되지 않는 상황입니다. 결과적으로 deinit이 호출되지 않아 메모리 누수와 자원 누수가 발생합니다. 가장 흔한 4가지 패턴은 closure capture, delegate strong 참조, Timer target retain, NotificationCenter observer 미해제입니다. 각각 [weak self], weak delegate + AnyObject 제약, invalidate 호출 또는 block-based Timer, removeObserver로 해결합니다. 저는 deinit에 print를 두고 Memory Graph Debugger로 정기 검증합니다."
</div>
`},
,
{name:"Autorelease Pool — 대량 객체 메모리 제어",icon:"green",
detail:`
<h5>Autorelease Pool이 뭔가요?</h5>
<p>Objective-C 시절부터 내려온 메모리 관리 메커니즘입니다. 풀에 담긴 객체들이 풀이 닫히는 시점에 한꺼번에 해제됩니다.</p>

<h5>왜 필요한가요?</h5>
<p>임시 객체가 많이 생성되는 루프에서 메모리 사용량이 폭발하는 걸 막기 위해서입니다.</p>
<pre>// ❌ 메모리 폭발 예시
func processImages() {
    for i in 0..&lt;1_000_000 {
        let str = NSString(format: "image_%d.png", i)
        // NSString은 autorelease 객체 → 풀 닫힐 때까지 살아있음
        // 함수 끝날 때까지 100만 개의 NSString이 메모리에 누적!
    }
}

// ✅ 매 반복마다 풀을 만들고 닫음
func processImages() {
    for i in 0..&lt;1_000_000 {
        autoreleasepool {
            let str = NSString(format: "image_%d.png", i)
        }  // 여기서 풀 닫힘 → str 해제됨
    }
}</pre>

<h5>중요: 순수 Swift 객체는 대상이 아님</h5>
<p>Swift native class와 struct는 autorelease pool과 무관합니다. ARC가 즉시 release하기 때문이죠. autoreleasepool이 영향을 미치는 건:</p>
<ul>
<li>NSString, NSArray, NSDictionary 등 NS- 접두사 객체</li>
<li>Objective-C 라이브러리에서 가져온 객체</li>
<li>일부 Foundation API가 내부적으로 만드는 임시 객체</li>
</ul>

<h5>실무 사례 1: Core Data Batch Import</h5>
<pre>func importLargeDataset(_ records: [JSONRecord]) {
    let context = persistentContainer.newBackgroundContext()
    
    context.perform {
        // 100만 건을 1000건씩 나눠서 처리
        for chunk in records.chunked(into: 1000) {
            autoreleasepool {
                for record in chunk {
                    let entity = MyEntity(context: context)
                    entity.configure(with: record)
                }
                try? context.save()
                context.reset()  // managed objects 해제
            }
        }
    }
}</pre>

<h5>실무 사례 2: 이미지 처리</h5>
<pre>// 대량 이미지를 썸네일로 변환
func generateThumbnails(_ urls: [URL]) {
    for url in urls {
        autoreleasepool {
            guard let image = UIImage(contentsOfFile: url.path) else { return }
            let thumbnail = image.resized(to: CGSize(width: 100, height: 100))
            saveThumbnail(thumbnail, for: url)
            // image와 thumbnail이 풀 닫힐 때 해제됨
        }
    }
}</pre>

<h5>main runloop에는 자동으로 있어요</h5>
<p>iOS 앱의 main thread RunLoop은 매 사이클마다 autorelease pool을 자동으로 만들고 닫습니다. 그래서 일반적인 UI 코드에서는 명시적으로 쓸 필요가 없습니다.</p>

questions:[
{q:"ARC와 GC의 가장 큰 차이는?",level:"basic",freq:true,
answer:"<b>해제 시점의 결정성</b>입니다.<br><br>ARC: 컴파일 타임 코드 삽입 → 참조 카운트 0 즉시 deinit (deterministic, 코드만 보면 정확히 예측 가능).<br><br>GC: 런타임 주기적 수집 → 언제 해제될지 정확히 알 수 없음.<br><br>이 차이로 인해:<br>• ARC: GC pause 없음 → UI 반응성 우수, 모바일 적합<br>• ARC: 파일 핸들, 락 해제 같은 RAII 패턴 가능<br>• GC: 순환 참조 자동 해결 → 개발자 부담 적음<br>• GC: 메모리 사용량이 일시적으로 더 높을 수 있음"},

{q:"ARC가 적용되는 타입은? struct, enum, class 중 어디?",level:"basic",freq:true,
answer:"<b>class, closure, actor 같은 reference type에만 적용됩니다.</b><br><br>struct, enum 같은 value type은 ARC 대상이 아닙니다. 스택에 저장되어 스코프 종료 시 자동 해제되거나, 다른 객체에 포함되어 그 객체와 함께 관리됩니다.<br><br>주의: struct 안에 class 프로퍼티가 있다면 그 class 프로퍼티는 ARC 적용. struct 자체는 아닙니다."},

{q:"Strong Reference가 정확히 무엇인가요?",level:"basic",freq:true,
answer:"\"이 객체를 사라지지 않게 잡아두겠다\"고 선언하는 참조입니다. <b>strong reference가 +1되면 retain count가 +1</b>되어 객체가 살아있게 됩니다.<br><br>Swift에서는 별도 키워드 없이 <code>var/let</code>으로 선언하면 모두 strong입니다 (ObjC의 <code>__strong</code>이 기본값이 된 셈).<br><br>대비되는 개념: weak(자동 nil), unowned(non-owning).<br><br>Strong이 의미 있는 이유: ARC가 \"누군가가 잡고 있는가?\"를 판단하는 기준이 strong count이기 때문."},

{q:"Reference Count는 언제 증가하고 언제 감소하나요?",level:"basic",freq:true,
answer:"<b>증가:</b><br>• 변수에 할당 (<code>let x = obj</code>)<br>• 함수 파라미터로 전달 (대부분의 경우)<br>• 컬렉션(Array, Dictionary)에 추가<br>• 클로저가 캡처<br>• 다른 객체의 strong 프로퍼티에 할당<br><br><b>감소:</b><br>• 변수가 스코프를 벗어남<br>• 변수에 nil/다른 객체 할당<br>• 컬렉션에서 제거<br>• 클로저 해제<br><br>주의: 컴파일러가 -O 최적화에서 불필요한 retain/release를 제거할 수 있어 사람이 예상하는 횟수와 실제 호출 횟수가 다를 수 있습니다 (Guaranteed Parameter 컨벤션)."},

{q:"Reference Count가 0이 되면 어떤 일이 발생하나요?",level:"basic",freq:true,
answer:"순서대로:<br><br>1. <b>deinit 호출</b>: 객체의 deinit 메서드 실행<br>2. <b>자식 프로퍼티 release</b>: strong 참조들의 RC가 -1 (연쇄 해제)<br>3. <b>weak 참조 nil 처리</b>: 이 객체를 weak로 참조하던 변수들이 모두 nil이 됨<br>4. <b>메모리 해제</b>: 힙 메모리를 시스템에 반환<br>5. <b>Side Table 정리</b>: weak count도 0이면 Side Table 자체도 해제<br><br>이 순서는 결정적(deterministic)이라 시점이 정확히 예측 가능합니다."},

{q:"deinit이 호출되지 않으면 어떤 상황을 의심하나요?",level:"basic",freq:true,
answer:"가장 흔한 4가지 원인:<br><br>1. <b>Retain Cycle</b>: 두 객체가 서로 strong 참조 → 영원히 RC가 0 안 됨<br>2. <b>Closure Capture</b>: 클로저가 self를 strong 캡처한 채 어딘가에 저장됨<br>3. <b>Timer / NotificationCenter</b>: Timer의 target은 strong, observer 해제 누락<br>4. <b>전역 변수 / 싱글톤 보관</b>: 의도치 않게 전역에 저장되어 영원히 살아있음<br><br>탐지: deinit에 print 추가 → 화면 dismiss 후 안 찍히면 의심. Memory Graph Debugger로 시각화. Instruments Leaks 자동 탐지."},

{q:"closure capture list의 동작 원리는?",level:"advanced",freq:true,
answer:"capture list는 <b>클로저가 생성되는 시점에 변수를 캡처하는 방식을 명시</b>하는 문법입니다.<br><br>기본 동작:<br>• reference type: strong 캡처 (retain count +1)<br>• value type: 값 복사<br><br>capture list로 변경 가능:<br>• <code>[weak self]</code>: weak 캡처<br>• <code>[unowned self]</code>: unowned 캡처<br>• <code>[x = someValue]</code>: 클로저 생성 시점의 값으로 복사<br>• <code>[weak delegate, x = currentX]</code>: 여러 개 동시 가능<br><br>예시:<pre>var x = 10\nlet closure = { [x] in print(x) }  // 10 캡처\nx = 20\nclosure()  // 10 출력 (x=20이 아님!)</pre>"},

{q:"weak self 후 guard let self 하면 retain count가 올라가나요?",level:"basic",freq:true,
answer:"맞습니다. <b>guard let self 시점에 strong count가 +1됩니다.</b> 클로저 안에서 strong 참조가 임시로 만들어지는 거죠.<br><br>중요한 건 <b>'클로저 스코프가 끝나면 즉시 release 된다'</b>는 점입니다. 그러니 deinit이 '지연'되는 것이지 '방지'되는 것은 아닙니다.<br><br>주의: 만약 클로저 안에서 또 다른 async 작업을 시작하고 거기서도 self를 캡처하면, 그 동안은 self가 살아있게 됩니다. 의도치 않은 lifetime 연장이 될 수 있어요."},

{q:"Combine에서 순환 참조를 어떻게 방지하나요?",level:"basic",freq:true,
answer:"두 가지 방법:<br><br><b>1. AnyCancellable + Set</b><br>모든 subscription을 <code>Set&lt;AnyCancellable&gt;</code>에 저장합니다. 소유자가 deinit될 때 Set이 해제되고, 그 안의 AnyCancellable들이 해제되면서 자동으로 cancel됩니다.<br><br><b>2. sink 클로저에서 [weak self]</b><br>일반 closure와 똑같이 [weak self]로 캡처합니다.<br><br><b>주의:</b> <code>.assign(to: \\.title, on: self)</code>는 self를 strong 캡처합니다! 대신 <code>.assign(to: &$title)</code>(@Published 프로퍼티에 직접)을 쓰는 게 안전합니다."},

{q:"Swift 클래스 인스턴스는 메모리 어디에 저장되나요?",level:"basic",freq:true,
answer:"<b>항상 힙(Heap)에 저장됩니다.</b> 스택에 저장되는 경우는 없습니다.<br><br>이유:<br>1. lifetime이 함수 스코프와 무관하게 길어질 수 있음 (다른 변수에 할당, 컬렉션에 추가 등)<br>2. ARC가 추적해야 하므로 고정된 주소가 필요한데, 스택은 frame이 사라지면 주소도 사라짐<br>3. 크기가 동적이거나 큰 경우가 많아 스택에 부적합<br><br>변수 자체(<code>let user = ...</code>의 user)는 보통 스택의 포인터지만, 실제 객체는 힙입니다."},

{q:"클래스 인스턴스 내부에는 어떤 정보들이 들어있나요?",level:"advanced",freq:true,
answer:"\"헤더 + 프로퍼티\" 구조입니다.<br><br><b>HEADER (16 bytes, 우리가 안 보이는 부분):</b><br>• metadata 포인터 (8B): 타입 정보, vtable, ObjC isa 역할<br>• InlineRefCounts (8B): strong/unowned count + 플래그<br><br><b>PROPERTIES:</b><br>• 우리가 선언한 프로퍼티들이 순서대로 저장<br>• 프로퍼티 정렬 규칙(alignment) 적용<br><br>그래서 <code>class Empty { }</code>처럼 빈 클래스도 인스턴스 크기는 최소 16 bytes입니다."},

{q:"HeapObject 개념을 들어본 적 있나요?",level:"advanced",freq:false,
answer:"<b>HeapObject는 Swift 런타임 내부에서 모든 클래스 인스턴스를 표현하는 C++ 구조체</b>입니다.<br><br><pre>struct HeapObject {\n    HeapMetadata const *metadata;  // 8B\n    InlineRefCounts refCounts;     // 8B\n    // 그 다음에 프로퍼티들\n};</pre>모든 Swift class는 컴파일 시 이 HeapObject 구조를 헤더로 갖도록 변환됩니다.<br><br>ObjC와 비교: ObjC도 isa 포인터가 있지만, refCount는 별도 테이블로 관리. Swift는 refCount까지 인라인으로 객체에 포함시켜 메모리 효율이 좋습니다."},

{q:"InlineRefCounts에는 어떤 정보가 압축되어 있나요?",level:"advanced",freq:false,
answer:"64bit(8 bytes) 안에 비트 단위로 다음 정보가 압축되어 있습니다:<br><br>• <b>strong count (31 bits)</b>: 일반 strong 참조 개수<br>• <b>isDeinitializing (1 bit)</b>: deinit 진행 중 플래그<br>• <b>unowned count (31 bits)</b>: unowned 참조 개수<br>• <b>useSlowRC (1 bit)</b>: Side Table 사용 여부 (weak 있으면 1)<br><br>왜 압축했나? 모든 인스턴스에 8B 추가만 하기 위해서. 인스턴스가 100만 개면 8MB 차이입니다.<br><br>weak 참조가 추가되면 useSlowRC가 1로 변경되고, 모든 RC 작업이 Side Table을 통해 일어납니다."},

{q:"값 타입은 항상 stack에 저장되나요?",level:"advanced",freq:true,
answer:"<b>아닙니다.</b> 값 타입도 다음 경우엔 힙에 저장됩니다:<br><br>1. <b>Existential Container의 24바이트 초과 struct</b>: 인라인 버퍼 초과 시 힙 할당<br>2. <b>클로저에 캡처된 변수</b>: closure context는 힙<br>3. <b>Generic 컨텍스트 (specialization 실패 시)</b>: 컴파일러가 구체 타입 모르면 힙<br>4. <b>Indirect enum case</b>: 재귀 enum은 힙<br>5. <b>다른 class 인스턴스의 프로퍼티</b>: class가 힙에 있으니 같이 힙<br><br>그래서 정확한 표현은 \"struct는 보통 인라인 저장(스택 또는 다른 객체의 일부)\"입니다."},

{q:"let user = User()에서 user 변수와 인스턴스는 각각 어디에?",level:"basic",freq:true,
answer:"<b>일반적인 경우:</b><br>• <code>user</code> 변수 → 스택 (8B 포인터)<br>• <code>User()</code> 인스턴스 → 힙 (헤더 16B + 프로퍼티)<br><br><b>예외:</b><br>• 변수가 클로저에 캡처되면 user 변수도 힙(closure context)으로 이동<br>• <code>self.user</code>처럼 프로퍼티라면 self 객체 안에 포함되어 힙<br>• 변수가 컬렉션에 들어가면 컬렉션 버퍼(보통 힙)에 위치<br><br>중요: 변수는 \"객체를 가리키는 포인터\"이고 객체 자체와 다릅니다. 변수의 위치와 객체의 위치는 별개입니다."},

{q:"weak는 왜 항상 Optional이어야 하나요?",level:"basic",freq:true,
answer:"weak의 본질이 <b>\"대상이 해제되면 자동으로 nil이 된다\"</b>이기 때문입니다. nil이 될 수 있다는 것 자체가 Optional이라는 뜻이죠.<br><br><pre>weak var d: SomeDelegate?  // ✅\nweak let d: SomeDelegate?  // ❌ let은 변경 불가, 자동 nil 처리 모순\nweak var d: SomeDelegate   // ❌ Optional 아님</pre>let도 안 됩니다 — 자동으로 nil이 되는데 let이면 모순이거든요.<br><br>비교: unowned는 \"절대 nil 안 된다\"는 강한 의도라서 non-Optional이 자연스럽습니다."},

{q:"unowned는 Optional이 될 수 없나요?",level:"advanced",freq:false,
answer:"iOS 12+에서는 <b>가능하지만 일반적이지 않습니다</b>.<br><br><pre>// 일반적: non-optional\nunowned let owner: Owner\n\n// 가능하지만 드물게 사용\nunowned(safe) var ref: SomeClass?</pre>unowned의 핵심 의도는 \"대상이 절대 nil이 되지 않는다고 확신\"하는 것입니다. Optional로 쓸 거면 이미 nil이 될 수 있다는 뜻이라 weak를 쓰는 게 더 자연스럽습니다.<br><br>역사적 배경: 옛 Swift에서는 unowned는 항상 non-optional이었습니다. 이후 더 유연한 사용을 위해 Optional도 허용되었지만, 의미적으로 weak가 더 적합한 경우가 대부분입니다."},

{q:"weak 참조 대상이 해제되면 weak 변수에는?",level:"basic",freq:true,
answer:"자동으로 <b>nil</b>이 됩니다. 이를 \"zeroing reference\"라고 부릅니다.<br><br><pre>weak var w: Pet?\ndo {\n    let p = Pet()\n    w = p\n    print(w != nil)  // true\n}  // p 해제\nprint(w != nil)  // false (자동 nil)</pre>이게 가능한 원리: 객체가 해제될 때 Side Table을 통해 모든 weak 참조를 추적하고 nil 처리. 그래서 weak를 사용하려면 객체가 Side Table을 가질 수 있어야 하고, 이는 자동으로 처리됩니다."},

{q:"unowned 대상이 먼저 해제되면 어떤 문제가?",level:"basic",freq:true,
answer:"접근하는 순간 <b>크래시</b>가 발생합니다. EXC_BAD_ACCESS 또는 fatalError.<br><br><pre>var owner: Owner? = Owner()\nlet pet = Pet(owner: owner!)\nowner = nil  // owner 해제\n\nprint(pet.owner)  // 💥 크래시!</pre>unowned는 \"이 참조가 항상 유효하다\"고 컴파일러에 약속하는 것입니다. 그 약속을 어기면 dangling pointer 접근이 되어 즉시 크래시.<br><br>그래서 unowned는 <b>대상이 자기보다 항상 오래 산다는 확신</b>이 있을 때만 써야 합니다. 의심스러우면 weak가 안전합니다."},

{q:"unowned는 언제 쓰는 게 안전한가요?",level:"advanced",freq:true,
answer:"<b>대상 객체의 lifetime이 자신보다 항상 길거나 같다고 확신할 수 있을 때</b>만 안전합니다.<br><br>대표적인 안전한 케이스:<br>• Parent-child 관계에서 child가 parent를 참조 (parent가 항상 더 오래 삶)<br>• 즉시 실행되는 closure에서 self 캡처<br>• ViewModel이 자신을 소유하는 ViewController를 참조 (생명주기가 동기화됨)<br><br>위험한 케이스:<br>• 비동기 콜백 (네트워크, 타이머) — 콜백 시점에 객체가 사라졌을 수 있음<br>• delegate 패턴 — delegate가 먼저 dealloc될 가능성<br><br>확신이 없으면 weak가 정답입니다."},

{q:"delegate 패턴에서 delegate를 weak로 선언하는 이유는?",level:"basic",freq:true,
answer:"<b>retain cycle을 방지</b>하기 위해서입니다.<br><br>delegate 패턴의 일반 구조:<br>• ViewController가 Service를 strong 보유<br>• Service가 delegate(=ViewController)를 보유<br><br>만약 delegate가 strong이면:<br>VC → Service (strong) → delegate=VC (strong) → 순환!<br><br>delegate를 weak로 선언하면 순환이 끊어져 VC가 정상 해제됩니다.<br><br>이 패턴은 Apple의 UIKit 전체에서 일관되게 적용됩니다 (UITableView.delegate, UIScrollView.delegate 등 모두 weak)."},

{q:"protocol에 AnyObject 제약이 필요한 이유는?",level:"basic",freq:true,
answer:"<b>weak가 reference type(class)에만 적용 가능하기 때문</b>입니다.<br><br>struct/enum 같은 value type은 weak로 만들 수 없습니다 (값 자체가 복사되니까 \"참조가 없어졌다\"는 개념이 없음).<br><br><pre>protocol ServiceDelegate { ... }  // class 제약 없음\n\nclass Service {\n    weak var delegate: ServiceDelegate?\n    // ❌ 컴파일 에러:\n    // 'weak' must not be applied to non-class-bound 'ServiceDelegate'\n}\n\n// 해결:\nprotocol ServiceDelegate: AnyObject {  // class 전용\n    func didFinish()\n}\n\nclass Service {\n    weak var delegate: ServiceDelegate?  // ✅\n}</pre>AnyObject는 \"이 프로토콜은 class만 채택할 수 있다\"고 컴파일러에 알려주는 제약입니다."},

{q:"Side Table이 무엇인가요?",level:"advanced",freq:true,
answer:"<b>weak 참조를 지원하기 위해 별도로 할당되는 추가 메모리 영역</b>입니다.<br><br><pre>struct HeapObjectSideTableEntry {\n    SideTableRefCounts refCounts;\n    atomic&lt;WeakRefCount&gt; weakBits;\n    HeapObject *object;  // 원본 객체 포인터\n};</pre>특징:<br>• 객체별로 하나씩 만들어짐 (lazy 할당)<br>• 처음에는 없다가 weak 참조가 처음 생길 때 할당<br>• 메모리: 약 32 bytes<br>• thread-safe (atomic 연산 사용)<br><br>왜 \"Side\"? HeapObject가 메인이고, 이건 보조(side) 역할이라는 의미입니다."},

{q:"객체 해제 시 weak 변수가 자동 nil 되는 원리는?",level:"advanced",freq:true,
answer:"실제 동작 순서:<br><br>1. <b>weak var w = p 시점</b><br>• Side Table 생성 (없으면)<br>• Side Table.weakCount += 1<br>• w는 Side Table을 가리킴 (객체를 직접 가리키지 않음!)<br><br>2. <b>p 해제 시</b><br>• 객체 strong count = 0 → deinit 호출<br>• Side Table에 \"객체 해제됨\" 마킹<br>• 하지만 Side Table 자체는 아직 살아있음 (w가 참조 중)<br><br>3. <b>w 접근 시</b><br>• Side Table에서 strong count 확인<br>• strong == 0 → return nil<br><br>4. <b>w도 해제되면</b><br>• Side Table.weakCount = 0<br>• Side Table 자체도 해제<br><br>이 메커니즘 덕분에 객체가 사라져도 weak 변수는 안전하게 nil을 받을 수 있습니다."},

{q:"Side Table은 항상 생성되나요?",level:"advanced",freq:false,
answer:"<b>아닙니다. Lazy하게 할당됩니다.</b><br><br>처음에는 없다가, <b>weak 참조가 처음 생기는 시점</b>에 할당됩니다.<br><br><pre>let p = Person()\n// 이 시점: Side Table 없음, HeapObject만 존재\n\nweak var w = p\n// 이 시점: Side Table 생성!\n// HeapObject.refCounts.useSlowRC = 1로 설정\n// 이후 모든 RC 작업이 Side Table 통해 일어남</pre>이래서 weak를 안 쓰는 객체는 Side Table 비용이 0입니다. weak를 쓰면 그때부터 추가 메모리(~32 bytes)가 발생.<br><br>이 lazy 전략 덕분에 ARC 오버헤드가 최소화됩니다."},

{q:"weak 참조가 많아지면 성능 영향은?",level:"advanced",freq:false,
answer:"두 가지 영향:<br><br><b>(1) 메모리:</b><br>• 객체당 Side Table: ~32 bytes<br>• weak 참조 1개당: 추가 8 bytes<br>• 객체 1만 개에 weak 5개씩이면 ~1.6MB<br><br><b>(2) 접근 비용:</b><br>• strong: ~1ns (직접 포인터)<br>• unowned: ~2-3ns (객체 내부 count 확인)<br>• weak: ~10-20ns (Side Table 거쳐 atomic load)<br><br>UI 코드에선 무시할 수준이지만, hot loop에서는 차이가 누적됩니다.<br><br>최적화 패턴:<pre>// ❌ 매 반복마다 weak 접근\nitems.forEach { self?.process($0) }  // 매번 ~15ns\n\n// ✅ 한 번 strong 변환 후 사용\nguard let strong = self else { return }\nitems.forEach { strong.process($0) }  // 매번 ~1ns</pre>"},

{q:"Retain Cycle이 발생하면 왜 메모리 누수가 생기나요?",level:"basic",freq:true,
answer:"ARC가 객체를 해제하는 유일한 조건은 <b>\"strong count가 0\"</b>입니다.<br><br>순환 참조가 있으면 외부에서 더 이상 참조하지 않더라도 서로가 서로를 잡고 있어 count가 0이 안 됩니다. 결과:<br><br>1. <b>아무도 사용하지 않는 객체가 메모리에 남음</b> (메모리 누수)<br>2. 같은 시나리오를 반복하면 누수가 누적되어 메모리 사용량 증가<br>3. 최악의 경우 시스템이 앱을 메모리 부족으로 종료<br><br>중요: 단순 메모리 누수보다 <b>deinit이 호출되지 않는 것이 더 큰 문제</b>일 수 있습니다. deinit에서 정리하던 자원(파일, observer, Timer 등)이 영원히 정리 안 되니까요."},

{q:"다음 closure 코드의 retain cycle 문제는?",level:"basic",freq:true,
answer:"흔한 closure capture 문제:<pre>class VC: UIViewController {\n    var loader = DataLoader()\n    override func viewDidLoad() {\n        loader.onComplete = { result in\n            self.handleResult(result)  // ⚠️\n        }\n    }\n}</pre><b>분석:</b><br>• VC → loader (strong, 프로퍼티)<br>• loader → onComplete (strong, 프로퍼티)<br>• onComplete → self (strong, 캡처)<br>• self == VC → 순환 완성!<br><br><b>증상:</b> VC를 dismiss해도 deinit이 호출되지 않음. 화면 진입을 반복하면 메모리에 VC 인스턴스가 누적.<br><br><b>해결:</b><pre>loader.onComplete = { [weak self] result in\n    guard let self = self else { return }\n    self.handleResult(result)\n}</pre>"},

{q:"Timer가 메모리 누수를 일으키는 이유와 해결법은?",level:"basic",freq:true,
answer:"<b>Timer.scheduledTimer(target:)</b>의 target 파라미터는 strong reference입니다.<br><br>발생 구조:<br>• RunLoop → Timer (strong, 등록)<br>• Timer → target=self (strong)<br>• VC → timer (strong, 프로퍼티)<br>• 순환! VC를 pop해도 Timer가 살아서 self를 잡고 있음<br><br><b>해결 1: 명시적 invalidate</b><pre>override func viewWillDisappear(_ animated: Bool) {\n    super.viewWillDisappear(animated)\n    timer?.invalidate()\n    timer = nil\n}</pre><b>해결 2: Block-based Timer (iOS 10+) + weak self</b><pre>timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { [weak self] _ in\n    self?.tick()\n}</pre>참고: invalidate는 RunLoop에서 Timer를 제거하므로 순환의 핵심 고리를 끊습니다."}

],

quizzes:[
{q:"다음 중 ARC에 대한 설명으로 <b>올바르지 않은 것</b>은?",
opts:["컴파일 타임에 retain/release 코드를 자동 삽입한다","순환 참조를 자동으로 탐지하고 해제한다","strong reference count가 0이 되면 즉시 deinit이 호출된다","atomic operation으로 thread-safe하게 카운트를 관리한다"],
answer:1,
hint:"ARC는 순환 참조를 자동으로 해결하지 못합니다. 그래서 weak/unowned를 사용해 개발자가 명시적으로 해결해야 합니다."},

{q:"weak reference에 대한 설명으로 <b>올바른 것</b>은?",
opts:["HeapObject 내부에 직접 weak count가 저장된다","Side Table 없이도 동작 가능하다","참조 대상이 해제되면 자동으로 nil이 된다 (zeroing)","unowned보다 접근 비용이 낮다"],
answer:2,
hint:"weak는 'zeroing reference'라고도 불립니다. 대상이 해제되면 자동으로 nil이 되며, 이를 위해 Side Table이 필요합니다."},

{q:"다음 코드에서 메모리 누수가 발생하는 이유는?<br><pre>class VC: UIViewController {\n  var timer: Timer?\n  override func viewDidLoad() {\n    super.viewDidLoad()\n    timer = Timer.scheduledTimer(\n      timeInterval: 1, target: self,\n      selector: #selector(tick),\n      userInfo: nil, repeats: true)\n  }\n}</pre>",
opts:["Timer가 target 파라미터(self)를 strong으로 retain하기 때문","viewDidLoad에서 Timer를 생성하면 안 되기 때문","#selector 방식은 항상 메모리 누수를 유발하기 때문","Timer는 반드시 main thread에서만 사용해야 하기 때문"],
answer:0,
hint:"Timer(target:)에서 target은 strong reference입니다. RunLoop → Timer → self → timer → Timer 순환이 발생합니다. invalidate를 호출하거나 block-based Timer를 사용해야 합니다."},

{q:"<code>[weak self]</code>를 사용할 때 다음 중 가장 권장되는 패턴은?",
opts:["self?.method() 처럼 매번 옵셔널 체이닝을 사용한다","guard let self = self else { return } 으로 strong 변환 후 사용한다","[unowned self]로 변경하여 항상 빠르게 동작하도록 한다","capture list 없이 self를 그대로 사용한다"],
answer:1,
hint:"매번 self?.를 쓰면 매번 Side Table을 통한 weak 접근이 발생합니다. guard let으로 한 번 strong 변환하면 그 이후로는 빠른 직접 접근이 가능합니다."}
]
}
,
{day:3,title:"Protocol Oriented Programming & Generics",
tags:["Protocol","Protocol Extension","Witness Table","Dispatch","Generics","Specialization","some/any","associatedtype","Type Erasure"],
topics:[
{name:"POP 기초 (Protocol과 Protocol Extension)",icon:"blue",
detail:`
<h5>Protocol Oriented Programming이란?</h5>
<p>Protocol Oriented Programming, 즉 POP는 클래스 상속보다 <b>protocol을 중심으로 역할과 기능을 정의하는 설계 방식</b>입니다.</p>
<p>Swift에서는 <code>class</code>뿐 아니라 <code>struct</code>, <code>enum</code>도 protocol을 채택할 수 있습니다. 그래서 값 타입 기반 설계에서도 다형성을 사용할 수 있습니다.</p>
<pre>protocol UserRepresentable {
    var name: String { get }
}
<p>struct User: UserRepresentable {
    let name: String
}</p>
<p>enum Guest: UserRepresentable {
    case anonymous</p>
<p>var name: String { "guest" }
}</pre></p>
<h5>OOP와 비교했을 때 POP의 장점</h5>
<p>OOP는 보통 class 상속을 중심으로 공통 기능을 재사용합니다. 하지만 class 상속은 아래 문제가 생길 수 있습니다.</p>
<ul><li>단일 상속만 가능</li><li>상위 class에 강하게 결합됨</li><li>reference type 공유로 인해 사이드 이펙트가 생길 수 있음</li><li>상속 계층이 깊어질수록 추적이 어려움</li></ul>
반면 POP는 역할을 protocol 단위로 나누고 조합할 수 있습니다.
<pre>protocol Configurable {
    func configure()
}
<p>protocol Trackable {
    func track()
}</p>
<p>final class ProductCell: UIView, Configurable, Trackable {
    func configure() {}
    func track() {}
}</pre></p>
<h5>protocol은 요구사항, protocol extension은 기본 구현</h5>
<code>protocol</code>은 타입이 반드시 만족해야 하는 요구사항을 정의합니다.
<pre>protocol Flyable {
    func fly()
}</pre>
<code>protocol extension</code>은 그 요구사항에 대한 기본 구현이나 공통 기능을 제공합니다.
<pre>extension Flyable {
    func fly() {
        print("날아갑니다")
    }
}
<p>struct Bird: Flyable { }
Bird().fly() // 날아갑니다</pre></p>
<h5>주의: 저장 프로퍼티는 둘 수 없다</h5>
<p>protocol에는 요구사항으로 선언할 수 있지만 기본값은 줄 수 없고, extension에서도 저장 프로퍼티는 불가능하며 computed property만 기본 구현할 수 있습니다.</p>
<pre>protocol UserRepresentable {
    var name: String { get }            // ✅ 요구사항
    // var name: String = "min"         // ❌ 기본값 불가
}
<p>extension UserRepresentable {
    var displayName: String { name }    // ✅ computed only
}</pre></p>
<div class="highlight">면접 답변 예시: Protocol Oriented Programming은 클래스 상속보다 프로토콜을 중심으로 타입의 역할과 요구사항을 정의하는 설계 방식입니다. Swift에서는 struct, enum, class 모두 protocol을 채택할 수 있어 value type 기반 설계에서도 다형성을 사용할 수 있습니다. <code>protocol</code>은 요구사항, <code>protocol extension</code>은 기본 구현과 공통 기능을 제공하며, 저장 프로퍼티는 둘 다 가질 수 없습니다.</div>

`},
{name:"Method Dispatch와 Protocol Witness Table 함정",icon:"green",
detail:`
<h5>Dispatch가 뭔가요?</h5>
<p>Dispatch는 <code>obj.method()</code>를 호출했을 때 <b>어떤 실제 함수를 실행할지 결정하는 방식</b>입니다. Swift에는 4가지가 있습니다.</p>
<h5>1) Static Dispatch (가장 빠름)</h5>
<p>컴파일 타임에 호출할 함수가 결정됩니다. 인라인 최적화가 가능합니다.</p>
<pre>struct Calculator {
    func add(_ a: Int, _ b: Int) -&gt; Int { a + b }
}
let c = Calculator()
c.add(1, 2) // 컴파일러가 호출 대상을 정확히 앎</pre>
<code>struct</code>, <code>enum</code>, <code>final class</code>, private 메서드 등에서 발생합니다.
<h5>2) V-Table Dispatch (class 상속)</h5>
<pre>class Animal {
    func speak() { print("...") }
}
class Cat: Animal {
    override func speak() { print("야옹") }
}
<p>let animal: Animal = Cat()
animal.speak() // vtable을 통해 Cat.speak 호출</pre></p>
<h5>3) Witness Table Dispatch (protocol)</h5>
<pre>protocol Speakable {
    func speak()
}
struct Dog: Speakable {
    func speak() { print("멍") }
}
<p>let value: any Speakable = Dog()
value.speak() // existential container의 PWT 통해 호출</pre></p>
<h5>4) Message Dispatch (Objective-C)</h5>
<pre>class Legacy: NSObject {
    @objc dynamic func action() {}
}</pre>
<code>@objc dynamic</code>, KVO, selector 기반 호출에서 사용됩니다.
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">Dispatch</th><th style="padding:10px;text-align:left">결정 시점</th><th style="padding:10px;text-align:left">대표 사례</th><th style="padding:10px;text-align:left">특징</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Static</td><td style="padding:10px;border-top:1px solid var(--g2)">컴파일 타임</td><td style="padding:10px;border-top:1px solid var(--g2)">struct, enum, final class</td><td style="padding:10px;border-top:1px solid var(--g2)">가장 빠름, 인라인 가능</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">V-Table</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임</td><td style="padding:10px;border-top:1px solid var(--g2)">class override</td><td style="padding:10px;border-top:1px solid var(--g2)">상속 기반 다형성</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Witness Table</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임</td><td style="padding:10px;border-top:1px solid var(--g2)">any Protocol</td><td style="padding:10px;border-top:1px solid var(--g2)">protocol 기반 다형성</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Message</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임</td><td style="padding:10px;border-top:1px solid var(--g2)">@objc dynamic</td><td style="padding:10px;border-top:1px solid var(--g2)">Objective-C 런타임 유연성</td></tr></table>
<div class="highlight">Static은 컴파일 타임, 나머지는 런타임 간접 호출 비용이 있다 정도로 이해하면 충분합니다.</div>
<h5>Protocol Witness Table (PWT)</h5>
<p>PWT는 <b>어떤 타입이 프로토콜 요구사항을 어떻게 구현했는지 담은 함수 포인터 테이블</b>입니다. 컴파일러가 자동으로 만듭니다.</p>
<pre>protocol Drawable {
    func draw()
    var color: String { get }
}
struct Circle: Drawable {
    func draw() { print("원 그리기") }
    var color: String { "red" }
}
<p>// 개념적으로:
// Circle_Drawable_PWT
// [0] = Circle.draw
// [1] = Circle.color.getter</pre></p>
<code>any Drawable</code>로 호출하면 existential container 안의 witness table을 따라가 실제 구현을 호출합니다.
<h5>함정: protocol extension 메서드는 PWT에 들어가지 않는다</h5>
<p>이 함정이 면접에서 정말 자주 나옵니다.</p>
<pre>protocol Greetable {
    func greet()              // requirement
}
<p>extension Greetable {
    func greet() { print("Hello") }   // 기본 구현
    func farewell() { print("Bye") }  // ⚠️ requirement 아님!
}</p>
<p>struct Korean: Greetable {
    func greet() { print("안녕") }
    func farewell() { print("잘가") }
}</pre></p>
<p>구체 타입으로 호출하면 자기 구현이 호출됩니다.</p>
<pre>let korean = Korean()
korean.farewell() // "잘가" (static dispatch)</pre>
<p>하지만 protocol 타입으로 호출하면 다릅니다.</p>
<pre>let value: any Greetable = Korean()
value.greet()    // "안녕" (PWT에 등록 → dynamic dispatch)
value.farewell() // "Bye"  ⚠️ (PWT에 없음 → static dispatch로 extension 기본 구현 호출!)</pre>
<h5>해결: requirement에 명시</h5>
<pre>protocol Greetable {
    func greet()
    func farewell()  // ← 본문에 선언!
}</pre>
<p>이제 <code>value.farewell()</code>도 "잘가"가 호출됩니다.</p>
<div class="highlight">면접 킬러 포인트: protocol extension의 메서드가 protocol requirement에 선언되어 있지 않으면 witness table에 들어가지 않습니다. 그래서 protocol 타입으로 호출할 때 extension의 기본 구현이 static하게 선택될 수 있습니다.</div>

`},
{name:"some Protocol vs any Protocol",icon:"purple",
detail:`
<h5>some Protocol = Opaque Type</h5>
<code>some Protocol</code>은 <b>프로토콜을 만족하는 하나의 구체 타입을 숨긴다</b>는 의미입니다.
<pre>protocol Animal {
    func speak()
}
struct Dog: Animal {
    func speak() { print("멍") }
}
<p>func makeAnimal() -&gt; some Animal {
    Dog()
}</pre></p>
<p>호출자는 실제 타입이 <code>Dog</code>인지 모르지만, 컴파일러는 알고 있습니다. 그래서 최적화에 유리하고 existential container가 필요 없습니다.</p>
<h5>some은 "아무거나"가 아니다</h5>
<pre>struct Cat: Animal {
    func speak() { print("야옹") }
}
<p>func makeAnimal(_ isDog: Bool) -&gt; some Animal {
    if isDog {
        return Dog()
    } else {
        return Cat() // ❌ 컴파일 에러
    }
}</pre></p>
<code>some Animal</code>은 <code>Animal</code>을 만족하는 아무 타입이나 반환한다는 뜻이 아닙니다. <b>하나의 concrete type으로 고정되어야 합니다.</b> 다른 타입을 반환해야 한다면 <code>any Animal</code>을 쓰거나 enum으로 감싸야 합니다.
<h5>any Protocol = Existential Type</h5>
<code>any Protocol</code>은 protocol을 만족하는 값을 담을 수 있는 existential container입니다.
<pre>let animals: [any Animal] = [Dog(), Cat()]</pre>
<p>서로 다른 concrete type을 하나의 배열에 담을 수 있습니다. 대신 concrete type 정보가 지워지고 witness table dispatch가 발생할 수 있습니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">구분</th><th style="padding:10px;text-align:left">some Protocol</th><th style="padding:10px;text-align:left">any Protocol</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">개념</td><td style="padding:10px;border-top:1px solid var(--g2)">Opaque Type</td><td style="padding:10px;border-top:1px solid var(--g2)">Existential Type</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">실제 타입</td><td style="padding:10px;border-top:1px solid var(--g2)">하나로 고정</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임에 다양할 수 있음</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">타입 결정</td><td style="padding:10px;border-top:1px solid var(--g2)">컴파일러가 알고 있음</td><td style="padding:10px;border-top:1px solid var(--g2)">박스 내부에 숨겨짐</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">existential container</td><td style="padding:10px;border-top:1px solid var(--g2)">없음</td><td style="padding:10px;border-top:1px solid var(--g2)">있음</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">성능</td><td style="padding:10px;border-top:1px solid var(--g2)">최적화 유리</td><td style="padding:10px;border-top:1px solid var(--g2)">간접 호출 비용 가능</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">사용 예</td><td style="padding:10px;border-top:1px solid var(--g2)">SwiftUI <code>some View</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>[any Animal]</code>, 런타임 다형성</td></tr></table>
<h5>Generic과 some Protocol의 관계</h5>
<p>함수 파라미터 위치에서 <code>some Protocol</code>은 대부분 generic의 축약 문법처럼 볼 수 있습니다.</p>
<pre>func printName&lt;T: UserRepresentable&gt;(_ user: T) { print(user.name) }
func printName(_ user: some UserRepresentable) { print(user.name) }</pre>
<p>두 함수는 단일 파라미터 기준으로 거의 동일합니다. 하지만 generic은 타입 파라미터 <code>T</code>를 여러 위치에서 재사용해 타입 관계를 표현할 수 있습니다.</p>
<pre>// 두 파라미터가 반드시 같은 타입
func compare&lt;T: UserRepresentable&gt;(_ lhs: T, _ rhs: T) {
    print(lhs.name == rhs.name)
}
<p>// 두 파라미터가 서로 다른 타입이어도 됨
func compare(_ lhs: some UserRepresentable, _ rhs: some UserRepresentable) {
    print(lhs.name == rhs.name)
}</pre></p>
<h5>Generic 반환과 some 반환의 결정적 차이</h5>
<pre>func makeUser&lt;T: UserRepresentable&gt;() -&gt; T {
    return User(name: "min") // ❌ 불가능
}</pre>
<p>Generic의 <code>T</code>는 <b>호출자가 결정하는 타입</b>이기 때문입니다. 호출자가 <code>Admin</code>을 기대할 수도 있는데 함수 내부에서 무조건 <code>User</code>를 반환할 수는 없습니다.</p>
<pre>let admin: Admin = makeUser()  // 호출자가 T = Admin이라고 명시</pre>
<p>반면 <code>some</code>은 함수 내부가 타입을 결정합니다.</p>
<pre>func makeUser() -&gt; some UserRepresentable {
    User(name: "min")  // ✅ 함수 내부가 결정, 외부에는 숨김
}</pre>
<div class="highlight">면접 답변 예시: <code>some Protocol</code>은 실제 concrete type을 외부에 숨기지만 컴파일러는 알고 있는 opaque type입니다. 하나의 구체 타입으로 고정되어야 하고 성능 최적화에 유리합니다. 반면 <code>any Protocol</code>은 existential type으로 여러 concrete type을 런타임에 담을 수 있지만 existential container와 witness table dispatch 비용이 생길 수 있습니다. Generic의 <code>T</code>는 호출자가 결정하지만, <code>some</code>은 함수 내부가 결정한다는 점도 중요한 차이입니다.</div>

`},
{name:"associatedtype과 Type Erasure (Self Requirement 포함)",icon:"orange",
detail:`
<h5>associatedtype이 있는 Protocol</h5>
<pre>protocol Repository {
    associatedtype Entity
    func fetch() -&gt; Entity
}
<p>struct UserRepository: Repository {
    func fetch() -&gt; User { User(name: "min") }
}</p>
<p>struct ProductRepository: Repository {
    func fetch() -&gt; Product { Product() }
}</pre></p>
<code>associatedtype</code>은 protocol을 채택하는 concrete type마다 달라질 수 있는 타입입니다. <code>UserRepository.Entity == User</code>, <code>ProductRepository.Entity == Product</code>.
<h5>existential로 쓰면 associatedtype 정보가 약해진다</h5>
<pre>let repo: any Repository = UserRepository()
let result = repo.fetch()
// result의 타입을 컴파일러가 명확히 알기 어려움</pre>
<code>any Repository</code>만으로는 <code>Entity</code>가 <code>User</code>인지 <code>Product</code>인지 알 수 없어 type-safe하게 다루기 어렵습니다.
<h5>Generic으로 받으면 정보가 보존된다</h5>
<pre>func load&lt;R: Repository&gt;(_ repository: R) {
    let entity = repository.fetch()  // R.Entity 정보 유지
}</pre>
<h5>Heterogeneous Collection 문제</h5>
<pre>protocol Container {
    associatedtype Item
    var items: [Item] { get }
}
<p>struct IntContainer: Container { let items: [Int] }
struct StringContainer: Container { let items: [String] }</p>
<p>let containers: [any Container] = [
    IntContainer(items: [1, 2, 3]),
    StringContainer(items: ["a", "b"])
]</p>
<p>let first = containers[0]
// first.items는 [Int]? [String]? — 컴파일러 보장 어려움</pre></p>
<p>해결 방향:
<ol><li>Generic으로 <code>Item</code>을 고정한다</li><li>가능한 타입이 정해져 있다면 enum으로 감싼다</li><li>Type Erasure wrapper를 만든다</li></ol>
<h5>Type Erasure</h5></p>
<p>Type Erasure는 <b>구체 타입 정보를 외부 API에서 숨기고, 하나의 wrapper 타입으로 감싸는 기법</b>입니다. 대표 예시: <code>AnySequence<Element></code>, <code>AnyPublisher<Output, Failure></code>, <code>AnyHashable</code>.</p>
<p>중요: Type Erasure는 모든 타입 정보를 지우는 게 아닙니다.</p>
<pre>AnyPublisher&lt;User, Error&gt;</pre>
<ul><li>유지: <code>Output == User</code>, <code>Failure == Error</code></li><li>지움: 내부 publisher 구체 타입 (<code>URLSession.DataTaskPublisher</code>, <code>Map</code>, <code>Decode</code> 등의 복잡한 조합)</li></ul>
<pre>func fetchUser() -&gt; AnyPublisher&lt;User, Error&gt; {
    URLSession.shared.dataTaskPublisher(for: url)
        .map(\\.data)
        .decode(type: User.self, decoder: JSONDecoder())
        .eraseToAnyPublisher()
}</pre>
<h5>some Publisher vs AnyPublisher</h5>
<pre>func fetchUser() -&gt; some Publisher
// opaque return type — 외부에 숨기지만 함수 내부는 하나의 concrete publisher로 고정
<p>func fetchUser() -&gt; AnyPublisher&lt;User, Error&gt;
// type erasure — 내부 concrete publisher를 숨기고, Output/Failure만 노출</pre></p>
<p>조건에 따라 서로 다른 publisher를 반환해야 할 때는 <code>AnyPublisher</code>가 편합니다.</p>
<pre>func fetchUser(useCache: Bool) -&gt; AnyPublisher&lt;User, Error&gt; {
    if useCache {
        return Just(User(name: "cache"))
            .setFailureType(to: Error.self)
            .eraseToAnyPublisher()
    } else {
        return networkPublisher.eraseToAnyPublisher()
    }
}</pre>
<h5>Self Requirement 문제 (Equatable 포함)</h5>
<pre>protocol Copyable {
    func copy() -&gt; Self
}</pre>
<code>Self</code>는 protocol 자체가 아니라 <b>이 protocol을 채택한 concrete type 자기 자신</b>을 의미합니다.
<pre>struct Document: Copyable {
    func copy() -&gt; Document { self }  // Self == Document
}
<p>let value: any Copyable = Document()
let copied = value.copy()
// existential 밖에서 Self가 무엇인지 알기 어려움</pre></p>
<code>Equatable</code>도 Self requirement를 가집니다.
<pre>protocol Equatable {
    static func == (lhs: Self, rhs: Self) -&gt; Bool
}</pre>
<p>같은 concrete type끼리만 비교 가능하다는 의미입니다.</p>
<pre>func compare&lt;T: Equatable&gt;(_ lhs: T, _ rhs: T) -&gt; Bool {
    lhs == rhs  // ✅ T로 같은 타입 보장
}
<p>func compare(_ lhs: any Equatable, _ rhs: any Equatable) -&gt; Bool {
    // lhs == rhs  ❌ 내부 concrete type이 같다는 보장 없음
    false
}</p>
<p>let lhs: any Equatable = 1
let rhs: any Equatable = "1"
// Int == String 비교는 불가</pre></p>
<code>any Equatable</code>끼리는 단순히 <code>==</code>를 호출하기 어렵고, <code>AnyHashable</code>이나 커스텀 Type Erasure wrapper가 필요할 수 있습니다.
<div class="highlight">면접 답변 예시: associatedtype과 Self requirement는 concrete type 정보가 필요한 protocol 요소입니다. existential로 감싸면 그 정보가 추상화되어 type-safe하게 다루기 어려워집니다. 그래서 Generic constraint로 받으면 concrete type과 associatedtype 정보가 보존되고, 그게 어려운 경우 Type Erasure wrapper(<code>AnyPublisher</code>처럼)를 만들어 중요한 타입 정보는 generic parameter로 유지하면서 내부 구체 타입은 숨기는 방식을 씁니다.</div>

`},
{name:"Generic 심화 (where, Composition, Specialization)",icon:"blue",
detail:`
<h5>where clause</h5>
<p>Generic에서 <code>where</code>로 더 구체적인 조건을 줄 수 있습니다.</p>
<pre>func printAll&lt;C: Collection&gt;(_ collection: C) where C.Element == String {
    collection.forEach { print($0) }
}
<p>printAll(["a", "b", "c"])   // ✅
// printAll([1, 2, 3])      // ❌ Element가 Int</pre></p>
<p>associatedtype의 타입 일치나 추가 protocol 채택 조건을 표현할 때 유용합니다.</p>
<pre>func compareElements&lt;A: Collection, B: Collection&gt;(
    _ a: A,
    _ b: B
) where A.Element == B.Element, A.Element: Equatable {
    // 두 컬렉션의 Element 타입이 같고 Equatable일 때만 가능
}</pre>
<h5>Protocol Composition</h5>
<p>여러 프로토콜 또는 클래스 제약을 조합해 하나의 타입 조건처럼 사용하는 방식입니다.</p>
<pre>protocol Configurable { func configure() }
protocol Trackable    { func track() }
<p>func configure(_ view: UIView &amp; Configurable &amp; Trackable) {
    view.configure()
    view.track()
}</pre></p>
<p>이 함수의 의미: <code>view</code>는 <code>UIView</code>의 하위 타입이면서 동시에 <code>Configurable</code>과 <code>Trackable</code>을 모두 만족해야 합니다.</p>
<p>Generic으로도 표현할 수 있습니다.</p>
<pre>func configure&lt;T&gt;(_ view: T) where T: UIView, T: Configurable, T: Trackable {
    view.configure()
    view.track()
}</pre>
<p>장점은 필요한 역할만 조합해 요구할 수 있다는 점이지만, 조합이 너무 많아지면 타입 시그니처가 복잡해지고 한 객체에 너무 많은 역할을 요구하게 됩니다.</p>
<pre>UIView &amp; Configurable &amp; Trackable &amp; Reusable &amp; Bindable  // 너무 많아지면 설계 점검 필요</pre>
<h5>Generic Specialization</h5>
<p>Generic 함수가 실제 concrete type으로 호출될 때, 컴파일러가 해당 타입에 맞는 전용 구현처럼 최적화하는 과정입니다.</p>
<pre>func printValue&lt;T&gt;(_ value: T) {
    print(value)
}
<p>printValue(10)
printValue("hello")</pre></p>
<p>컴파일러는 개념적으로 이렇게 처리할 수 있습니다.</p>
<pre>func printValue_Int(_ value: Int) { print(value) }
func printValue_String(_ value: String) { print(value) }</pre>
<p>장점:
<ul><li>concrete type 기준으로 최적화 가능</li><li>인라인 최적화 가능</li><li>witness table / existential container 비용 감소</li><li><code>any Protocol</code>보다 성능상 유리할 수 있음</li></ul>
단, generic을 쓴다고 항상 specialization이 보장되는 것은 아닙니다. 모듈 경계, 최적화 옵션, 코드 크기 증가 가능성 때문에 컴파일러가 전용 코드를 만들지 않을 수 있습니다.</p>
<h5>@inlinable</h5>
<p>다른 모듈의 public generic 함수는 호출 모듈에서 함수 본문을 볼 수 없어 specialization이 제한될 수 있습니다. <code>@inlinable</code>을 붙이면 함수 본문이 모듈 인터페이스에 노출되어 호출 쪽에서 최적화할 수 있습니다.</p>
<pre>@inlinable
public func processItems&lt;T&gt;(_ items: [T]) -&gt; Int {
    items.count
}</pre>
<p>Trade-off:
<ul><li>장점: 모듈 경계를 넘어 specialization 가능</li><li>단점: 바이너리 크기 증가, 구현 노출, ABI 안정성 제약</li></ul>
<div class="highlight">면접 포인트: Generic은 concrete type 정보를 유지하기 때문에 specialization과 inline 최적화에 유리합니다. 하지만 모듈 경계에서는 <code>@inlinable</code> 같은 추가 고려가 필요합니다. <code>where</code>는 단순 protocol 제약 이상의 associatedtype 일치나 추가 조건을 표현할 때, Protocol Composition은 여러 역할을 조합할 때 사용합니다.</div>
---</p>
`},
{name:"실무 선택 기준 (Concrete vs Generic vs any)와 POP 남용 주의",icon:"green",
detail:`
<h5>세 가지 함수 시그니처</h5>
<pre>func run(_ service: UserService)                       // Concrete
func run&lt;T: UserServiceProtocol&gt;(_ service: T)         // Generic
func run(_ service: any UserServiceProtocol)           // Existential</pre>
<h5>1) Concrete Type</h5>
<p>구현체가 하나이고 다형성이 필요 없다면 concrete type이 가장 단순합니다.</p>
<p>장점:
<ul><li>가장 단순함</li><li>코드 추적이 쉬움</li><li>불필요한 protocol을 만들지 않아도 됨</li></ul>
<h5>2) Generic</h5></p>
<p>여러 구현체를 받을 수 있어야 하지만 타입 정보를 보존해야 할 때 선택합니다.</p>
<p>적합한 경우:
<ul><li>타입 관계를 유지해야 함</li><li>associatedtype / Self requirement가 중요함</li><li>성능 최적화가 중요함</li><li><code>T</code>를 파라미터, 반환 타입, 내부 타입과 연결해야 함</li></ul>
<h5>3) Existential (any)</h5></p>
<p>구체 타입을 숨기고 런타임 다형성이 필요할 때 선택합니다.</p>
<p>적합한 경우:
<ul><li>서로 다른 구현체를 하나의 배열에 담아야 함</li><li>API 경계에서 구체 타입을 숨기고 싶음</li><li>타입 관계가 중요하지 않고 protocol requirement만 호출하면 됨</li></ul>
<pre>let services: [any UserServiceProtocol] = [
    RealUserService(),
    MockUserService(),
    CachedUserService()
]</pre></p>
<h5>POP를 남용하면 생기는 문제</h5>
<p>POP가 항상 좋은 것은 아닙니다. 모든 타입에 protocol을 만들면 추상화 비용이 커집니다.</p>
<pre>protocol UserServiceType {}
protocol UserServiceProtocol {}
protocol UserRepresentable {}
// 비슷한 protocol이 중복되고, 어디에 무엇이 있는지 추적이 어려워짐</pre>
<p>문제점:
<ol><li>구현체가 하나뿐인데 protocol이 생겨 코드 이동이 많아짐</li><li>비슷한 역할의 protocol이 중복됨</li><li>실제 동작을 추적하기 어려워짐</li><li><code>associatedtype</code>, <code>some</code>, <code>any</code>, type erasure가 섞이면 에러 메시지와 디버깅이 어려워짐</li><li><code>any Protocol</code>을 남용하면 existential container와 witness table dispatch 비용이 생길 수 있음</li></ol>
<h5>핵심 문장</h5></p>
<div class="highlight"><b>Concrete type을 기본으로 두고, 타입 관계와 성능이 중요하면 Generic이나 <code>some</code>을 사용하고, 런타임 다형성이나 heterogeneous collection이 필요하면 <code>any</code>를 선택합니다.</b></div>
<div class="highlight"><b>Protocol은 가능해서 만드는 게 아니라, 역할 분리와 다형성이 필요할 때 만든다.</b></div>

`}
],
questions:[
{q:"Protocol Oriented Programming이 뭔가요?",level:"basic",freq:true,
answer:"<p>Protocol Oriented Programming은 class 상속보다 protocol을 중심으로 역할과 요구사항을 정의하는 설계 방식입니다. Swift에서는 struct, enum, class 모두 protocol을 채택할 수 있어서 value type 기반 설계에서도 다형성을 사용할 수 있습니다. 또한 protocol extension으로 기본 구현을 제공해 상속 없이 코드 재사용과 기능 조합이 가능합니다.</p>"},
{q:"protocol과 protocol extension의 차이는?",level:"basic",freq:true,
answer:"<code>protocol</code>은 타입이 반드시 만족해야 하는 요구사항을 정의합니다. <code>protocol extension</code>은 그 요구사항에 대한 기본 구현이나 공통 기능을 제공합니다. 다만 protocol과 protocol extension 모두 저장 프로퍼티는 가질 수 없고, computed property 기본 구현만 가능합니다."},
{q:"protocol extension 메서드가 override되지 않는 경우는?",level:"basic",freq:true,
answer:"<p>protocol requirement에 선언되지 않은 extension 전용 메서드입니다. 이 메서드는 witness table에 등록되지 않기 때문에 <code>any Protocol</code> 타입으로 호출하면 concrete type의 동일한 이름 메서드가 있어도 extension 기본 구현이 호출될 수 있습니다. 진짜 다형적으로 호출하려면 protocol 본문에 requirement로 선언해야 합니다.</p>"},
{q:"some과 any의 차이를 한 줄로 설명한다면?",level:"basic",freq:true,
answer:"<code>some</code>은 컴파일 타임에 하나의 concrete type으로 고정되는 opaque type이고, <code>any</code>는 런타임에 여러 concrete type을 담을 수 있는 existential type입니다."},
{q:"함수 파라미터에서 generic과 some Protocol은 같은가요?",level:"basic",freq:true,
answer:"<p>단일 파라미터에서는 거의 generic의 축약 문법처럼 볼 수 있습니다. 하지만 generic은 <code>T</code>를 여러 위치에서 재사용해 타입 관계를 표현할 수 있습니다. 반면 각각의 <code>some Protocol</code> 파라미터는 독립적인 opaque parameter로 취급됩니다.</p>"},
{q:"`func makeUser<T>() -> T`에서 내부에서 `User()`를 반환하면 왜 문제가 되나요?",level:"basic",freq:true,
answer:"<p>Generic 반환 타입의 <code>T</code>는 호출자가 결정합니다. 호출자가 <code>Admin</code>을 기대할 수도 있는데 함수 내부에서 무조건 <code>User</code>를 반환하면 타입이 맞지 않습니다. 반면 <code>some UserRepresentable</code>은 함수 구현부가 하나의 concrete type을 정하고 외부에 숨기는 방식이므로 <code>User</code>를 고정 반환할 수 있습니다.</p>"},
{q:"`some Animal`에서 조건에 따라 `Dog`, `Cat`을 반환하면 왜 안 되나요?",level:"basic",freq:true,
answer:"<code>some Animal</code>은 <code>Animal</code>을 만족하는 아무 타입이나 반환한다는 뜻이 아니라, 하나의 concrete type을 숨긴다는 뜻입니다. 따라서 모든 return path에서 같은 concrete type을 반환해야 합니다. 조건에 따라 다른 타입을 반환해야 하면 <code>any Animal</code> 또는 enum wrapper를 사용해야 합니다."},
{q:"associatedtype이 있는 protocol은 왜 existential로 쓰기 어렵나요?",level:"advanced",freq:true,
answer:"<p>associatedtype은 protocol을 채택하는 concrete type마다 달라질 수 있습니다. <code>any Repository</code>처럼 existential로 감싸면 concrete type이 지워지고 <code>Entity</code>가 무엇인지 컴파일러가 알기 어려워집니다. 그래서 associatedtype 정보가 중요한 API에서는 generic constraint를 선호합니다.</p>"},
{q:"Generic으로 받는 것과 `any Protocol`로 받는 것의 차이는?",level:"advanced",freq:true,
answer:"<p>Generic은 concrete type 정보와 associatedtype 정보를 보존합니다. 그래서 타입 안정성과 최적화에 유리합니다. 반면 <code>any Protocol</code>은 existential container에 담기면서 concrete type 정보가 숨겨지고, witness table dispatch가 필요할 수 있습니다.</p>"},
{q:"Type Erasure가 뭔가요?",level:"advanced",freq:true,
answer:"<p>Type Erasure는 concrete type 정보를 외부에 노출하지 않기 위해 wrapper 타입으로 감싸는 기법입니다. <code>AnyPublisher<User, Error></code>는 <code>Output == User</code>, <code>Failure == Error</code> 정보는 유지하면서 내부 publisher의 복잡한 concrete type은 숨깁니다.</p>"},
{q:"`some Publisher`와 `AnyPublisher<User, Error>`의 차이는?",level:"advanced",freq:true,
answer:"<code>some Publisher</code>는 opaque return type으로 외부에 concrete type을 숨기지만, 함수 내부에서는 하나의 concrete publisher 타입으로 고정되어야 합니다. <code>AnyPublisher<User, Error></code>는 type erasure를 통해 내부 publisher 타입을 숨기고 외부에는 <code>User</code>와 <code>Error</code> 타입 정보만 명확히 노출합니다. 조건에 따라 서로 다른 publisher를 반환해야 하면 <code>AnyPublisher</code>가 실무적으로 편합니다."},
{q:"`Self requirement`가 있는 protocol은 왜 existential에서 까다로운가요?",level:"advanced",freq:true,
answer:"<code>Self</code>는 protocol 자체가 아니라 해당 protocol을 채택한 concrete type을 의미합니다. <code>func copy() -> Self</code>는 실제 concrete type과 같은 타입을 반환해야 하는데, <code>any Copyable</code>로 감싸면 외부에서는 그 concrete type을 알기 어렵습니다."},
{q:"`any Equatable`끼리 `==`가 어려운 이유는?",level:"advanced",freq:false,
answer:"<code>Equatable</code>의 <code>==</code>는 <code>Self</code>끼리 비교해야 합니다. Generic의 <code>T: Equatable</code>은 두 값이 같은 <code>T</code> 타입임을 보장하지만, <code>any Equatable</code> 두 개는 내부 concrete type이 서로 다를 수 있습니다. 따라서 <code>any Equatable</code>끼리는 단순히 <code>==</code>를 호출하기 어렵고, <code>AnyHashable</code> 같은 wrapper가 필요할 수 있습니다."},
{q:"where clause는 언제 사용하나요?",level:"advanced",freq:false,
answer:"<p>Generic 타입에 더 구체적인 제약을 걸 때 사용합니다. 예를 들어 <code>C: Collection where C.Element == String</code>은 Collection이면서 Element가 String인 타입만 허용한다는 뜻입니다. associatedtype의 타입 일치나 추가 protocol 제약을 표현할 때 유용합니다.</p>"},
{q:"Protocol Composition이 뭔가요?",level:"advanced",freq:false,
answer:"<p>여러 프로토콜 또는 클래스 제약을 조합해 하나의 타입 조건처럼 사용하는 방식입니다. 예를 들어 <code>UIView & Configurable & Trackable</code>은 UIView 하위 타입이면서 Configurable과 Trackable을 모두 만족해야 한다는 뜻입니다. 필요한 역할만 조합할 수 있지만, 너무 많아지면 타입 시그니처가 복잡해지고 설계가 무거워질 수 있습니다.</p>"},
{q:"Generic Specialization이 뭔가요?",level:"advanced",freq:false,
answer:"<p>Generic 함수가 실제 concrete type으로 호출될 때 컴파일러가 해당 타입에 맞는 전용 구현처럼 최적화하는 과정입니다. 예를 들어 <code>printValue<T></code>가 <code>Int</code>, <code>String</code>으로 호출되면 각각의 타입에 맞게 최적화할 수 있습니다. 이로 인해 인라이닝과 static dispatch에 가까운 최적화가 가능해집니다.</p>"},
{q:"POP를 남용하면 어떤 문제가 생기나요?",level:"advanced",freq:false,
answer:"<p>불필요한 protocol이 많아져 코드 추적이 어려워지고, 비슷한 역할의 protocol이 중복될 수 있습니다. 구현체가 하나뿐인데 protocol을 만들면 추상화 비용만 증가합니다. 따라서 protocol은 다형성, 테스트 대역, 모듈 간 의존성 분리처럼 명확한 이유가 있을 때 도입하는 것이 좋습니다.</p>"},
{q:"Concrete Type, Generic, any Protocol은 어떻게 선택하나요?",level:"advanced",freq:false,
answer:"<p>구현체가 하나이고 추상화가 필요 없으면 concrete type을 사용합니다. 여러 구현체를 받을 수 있어야 하면서 타입 정보와 성능이 중요하면 generic을 사용합니다. 구체 타입을 숨기고 런타임 다형성이나 heterogeneous collection이 필요하면 <code>any Protocol</code>을 사용합니다.</p>"}
],
