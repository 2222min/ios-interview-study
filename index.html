{day:4,title:"Concurrency: GCD와 Swift Concurrency",
tags:["GCD","DispatchQueue","DispatchGroup","DispatchWorkItem","async/await","Task","Actor","Sendable","MainActor"],
topics:[
{name:"GCD: Queue, Thread, sync/async",icon:"blue",
detail:`
<h5>GCD가 뭔가요?</h5>
<p>GCD(Grand Central Dispatch)는 Apple이 제공하는 동시성 API입니다. 개발자가 직접 Thread를 만들고 관리하는 대신, <b>Queue에 작업을 넣으면 시스템이 적절한 Thread에서 실행</b>해줍니다.</p>
<p>핵심은 이겁니다.</p>
<pre>Thread = 실제로 코드가 실행되는 실행 단위
Queue  = 실행할 작업을 담고, 순서와 동시성 정책을 관리하는 추상화</pre>
<p>즉, Queue와 Thread는 같은 개념이 아닙니다. 개발자는 Queue에 작업을 넣고, 실제 어떤 Thread에서 실행할지는 GCD가 시스템 상태에 따라 결정합니다.</p>
<pre>DispatchQueue.global().async {
    print("작업 실행")
}</pre>
<p>위 코드에서 우리는 global queue에 작업을 넣을 뿐이고, 실제 Thread 배정은 GCD가 합니다.</p>
<h5>Serial Queue vs Concurrent Queue</h5>
<p>Serial/Concurrent는 <b>Queue의 실행 정책</b>입니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">구분</th><th style="padding:10px;text-align:left">의미</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Serial Queue</td><td style="padding:10px;border-top:1px solid var(--g2)">한 번에 하나씩, 들어온 순서대로 작업 실행</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Concurrent Queue</td><td style="padding:10px;border-top:1px solid var(--g2)">여러 작업을 동시에 실행할 수 있음</td></tr></table>
<pre>let serial = DispatchQueue(label: "com.app.serial")
<p>serial.async { print("A") }
serial.async { print("B") }
serial.async { print("C") }</p>
<p>// A → B → C 순서로 실행</pre></p>
<p>Serial Queue는 <b>큐에 들어온 block 자체의 실행 순서</b>를 보장합니다. 다만 block 내부에서 다시 비동기 작업을 시작하면, 그 비동기 작업의 완료 순서까지 보장하지는 않습니다.</p>
<pre>let serial = DispatchQueue(label: "com.app.serial")
<p>serial.async {
    URLSession.shared.dataTask(with: urlA) { _, _, _ in
        print("A 완료")
    }.resume()
}</p>
<p>serial.async {
    URLSession.shared.dataTask(with: urlB) { _, _, _ in
        print("B 완료")
    }.resume()
}</pre></p>
<p>이 경우 A 요청을 시작한 뒤 B 요청을 시작하는 순서는 보장됩니다. 하지만 네트워크 응답은 B가 먼저 올 수도 있습니다.</p>
<p>Concurrent Queue는 여러 작업의 동시 실행을 <b>허용</b>하지만, 모든 작업이 반드시 동시에 실행된다는 뜻은 아닙니다. 실제 실행 시점과 Thread 배정은 CPU 코어 수, 시스템 부하, QoS 등에 따라 달라집니다.</p>
<pre>let concurrent = DispatchQueue(label: "com.app.concurrent", attributes: .concurrent)
<p>concurrent.async { print("A") }
concurrent.async { print("B") }
concurrent.async { print("C") }</p>
<p>// 출력 순서 보장 안 됨</pre></p>
<h5>sync vs async</h5>
<p>sync/async는 <b>호출자가 작업 완료를 기다리는지 여부</b>입니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">구분</th><th style="padding:10px;text-align:left">의미</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>sync</code></td><td style="padding:10px;border-top:1px solid var(--g2)">Queue에 넣은 작업이 끝날 때까지 현재 실행 흐름을 block</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>async</code></td><td style="padding:10px;border-top:1px solid var(--g2)">Queue에 작업을 예약하고, 완료를 기다리지 않고 다음 코드 실행</td></tr></table>
<pre>print("A")
DispatchQueue.global().sync {
    print("B")
}
print("C")
// A → B → C</pre>
<pre>print("A")
DispatchQueue.global().async {
    print("B")
}
print("C")
// 보통 A → C → B</pre>
<p>중요한 점은 이것입니다.</p>
<pre>Serial/Concurrent = Queue가 작업을 어떻게 실행할지
sync/async        = 호출자가 작업 완료를 기다릴지</pre>
<p>따라서 <code>serial.async</code>는 비동기지만 Serial Queue이므로 작업은 하나씩 순서대로 실행됩니다.</p>
<h5>DispatchQueue.main.async를 자주 쓰는 이유</h5>
<p>UIKit, SwiftUI의 UI 업데이트는 Main Thread에서 해야 합니다. 그래서 네트워크 요청, 이미지 디코딩, 파일 처리 같은 작업은 background에서 처리하고, 결과를 화면에 반영할 때 Main Queue로 돌아옵니다.</p>
<pre>DispatchQueue.global(qos: .userInitiated).async {
    let image = decodeImage(data)
<p>DispatchQueue.main.async {
        self.imageView.image = image
    }
}</pre></p>
<code>DispatchQueue.main.async</code>는 Main Queue에 작업을 예약할 뿐, 항상 즉시 실행되는 것은 아닙니다. Main Queue는 Serial Queue이기 때문에 현재 실행 중인 작업과 앞에 쌓인 작업이 끝난 뒤 실행됩니다.
<h5>⚠️ Main Thread에서 main.sync를 호출하면?</h5>
<p>Main Thread에서 <code>DispatchQueue.main.sync</code>를 호출하면 deadlock이 발생합니다.</p>
<pre>// 이미 Main Thread에서 실행 중이라고 가정
DispatchQueue.main.sync {
    print("UI Update")
}</pre>
<p>흐름은 이렇습니다.</p>
<pre>Main Thread:
main.sync 블록이 끝날 때까지 기다림
<p>Main Queue:
sync 블록을 실행하려면 Main Thread가 비어야 함</p>
<p>결과:
서로 기다리면서 deadlock</pre></p>
<code>main.async</code>는 작업을 예약하고 현재 흐름을 막지 않기 때문에 이런 deadlock을 피할 수 있습니다.
<h5>DispatchGroup: 여러 작업이 모두 끝난 뒤 처리</h5>
<code>DispatchGroup</code>은 여러 비동기 작업을 동시에 실행하고, <b>모든 작업이 끝난 뒤 후처리</b>를 하고 싶을 때 사용합니다.
<pre>let group = DispatchGroup()
<p>var user: User?
var posts: [Post]?
var comments: [Comment]?</p>
<p>group.enter()
api.fetchUser { result in
    defer { group.leave() }
    user = try? result.get()
}</p>
<p>group.enter()
api.fetchPosts { result in
    defer { group.leave() }
    posts = try? result.get()
}</p>
<p>group.enter()
api.fetchComments { result in
    defer { group.leave() }
    comments = try? result.get()
}</p>
<p>group.notify(queue: .main) {
    self.updateUI(user: user, posts: posts, comments: comments)
}</pre></p>
<pre>enter() = 작업 시작 카운트 +1
leave() = 작업 완료 카운트 -1
notify() = 카운트가 0이 되면 실행</pre>
<code>enter()</code>와 <code>leave()</code> 개수가 맞지 않으면 <code>notify</code>가 영원히 호출되지 않거나, 반대로 <code>leave()</code>가 더 많으면 크래시가 발생할 수 있습니다. 그래서 콜백 내부에서는 <code>defer { group.leave() }</code>를 자주 사용합니다.
<h5>DispatchWorkItem: 작업을 객체처럼 다루기</h5>
<code>DispatchWorkItem</code>은 GCD에 넣을 작업 block을 객체처럼 보관하고 싶을 때 사용합니다. 대표적으로 작업 취소 요청, 완료 후 notify, debounce 구현에 사용됩니다.
<pre>let workItem = DispatchWorkItem {
    print("무거운 작업")
}
<p>workItem.notify(queue: .main) {
    print("작업 완료 후 UI 업데이트")
}</p>
<p>DispatchQueue.global().async(execute: workItem)</pre></p>
<p>검색어 입력 debounce 예시는 다음과 같습니다.</p>
<pre>var searchWorkItem: DispatchWorkItem?
<p>func searchTextDidChange(_ text: String) {
    searchWorkItem?.cancel()</p>
<p>let workItem = DispatchWorkItem { [weak self] in
        self?.requestSearchAPI(text)
    }</p>
<p>searchWorkItem = workItem
    DispatchQueue.main.asyncAfter(deadline: .now() + 0.5, execute: workItem)
}</pre></p>
<p>GCD의 <code>cancel()</code>은 이미 실행 중인 작업을 강제로 멈추지 않습니다. 취소 상태를 표시할 뿐이고, 작업 내부에서 직접 <code>isCancelled</code>를 확인해야 합니다.</p>
<div class="highlight">면접 포인트: GCD에서 Queue는 작업을 담는 추상화이고 Thread는 실제 실행 단위입니다. Serial/Concurrent는 Queue의 실행 정책, sync/async는 호출자가 기다리는지 여부입니다. UI 업데이트는 Main Queue에서 해야 하며, Main Thread에서 <code>main.sync</code>를 호출하면 deadlock이 발생합니다.</div>

`},
{name:"QoS, Thread Explosion, 네트워크 작업의 오해",icon:"green",
detail:`
<h5>QoS는 우선순위 명령이 아니라 힌트</h5>
<p>QoS(Quality of Service)는 작업의 중요도와 긴급도를 시스템에 알려주는 힌트입니다. 시스템은 이를 참고해 CPU, 스레드 스케줄링, 에너지 사용을 조절합니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">QoS</th><th style="padding:10px;text-align:left">기준</th><th style="padding:10px;text-align:left">예시</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.userInteractive</code></td><td style="padding:10px;border-top:1px solid var(--g2)">사용자의 즉각적인 반응에 필요</td><td style="padding:10px;border-top:1px solid var(--g2)">터치 반응, 애니메이션</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.userInitiated</code></td><td style="padding:10px;border-top:1px solid var(--g2)">사용자가 결과를 기다림</td><td style="padding:10px;border-top:1px solid var(--g2)">버튼 탭 후 화면 로딩, 검색 결과 로딩</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.utility</code></td><td style="padding:10px;border-top:1px solid var(--g2)">시간이 걸려도 되지만 완료가 필요</td><td style="padding:10px;border-top:1px solid var(--g2)">파일 다운로드, 데이터 동기화</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.background</code></td><td style="padding:10px;border-top:1px solid var(--g2)">사용자에게 당장 보이지 않음</td><td style="padding:10px;border-top:1px solid var(--g2)">로그 업로드, 캐시 정리</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.default</code></td><td style="padding:10px;border-top:1px solid var(--g2)">명시하지 않은 기본값</td><td style="padding:10px;border-top:1px solid var(--g2)">일반 작업</td></tr></table>
무조건 높은 QoS를 준다고 앱이 빨라지는 것은 아닙니다. 캐시 정리나 로그 업로드를 <code>userInteractive</code>로 실행하면 실제 UI 작업과 리소스를 경쟁하게 되어 오히려 반응성이 떨어질 수 있습니다.
<pre>DispatchQueue.global(qos: .userInitiated).async {
    let data = fetchData()
<p>DispatchQueue.main.async {
        self.show(data)
    }
}</pre></p>
<h5>Thread Explosion이란?</h5>
<p>Thread Explosion은 동시에 처리하려는 작업이 많아지면서 시스템이 많은 Thread를 만들거나 깨우게 되고, 그 결과 메모리 사용량 증가, context switching 증가, CPU 경쟁, 성능 저하가 발생하는 현상입니다.</p>
<p>특히 문제가 되는 것은 <b>blocking 작업</b>입니다.</p>
<pre>let semaphore = DispatchSemaphore(value: 0)
<p>for _ in 0..&lt;1000 {
    DispatchQueue.global().async {
        semaphore.wait()   // 현재 Thread를 block
        doWork()
        semaphore.signal()
    }
}</pre></p>
<p>이런 코드에서는 Thread가 <code>wait()</code>에서 막힌 채 반환되지 않습니다. GCD는 처리량을 유지하려고 추가 Thread를 만들 수 있고, 그 작업들도 다시 block되면 Thread 수가 과도하게 늘어납니다.</p>
<p>주의해야 하는 blocking 호출은 다음과 같습니다.</p>
<pre>semaphore.wait()
DispatchGroup.wait()
NSLock.lock() 후 오래 대기
queue.sync 중첩 호출
동기 네트워크/파일 작업</pre>
<p>해결 방향은 다음과 같습니다.</p>
<pre>// OperationQueue로 동시 실행 수 제한
let queue = OperationQueue()
queue.maxConcurrentOperationCount = 4
<p>// Swift Concurrency에서는 TaskGroup 사용 후 필요 시 동시성 제한 설계</pre></p>
<h5>네트워크 요청은 DispatchQueue.global().async로 감싸야 할까?</h5>
<p>일반적으로 Moya나 Alamofire 네트워킹을 직접 <code>DispatchQueue.global().async</code>로 감쌀 필요는 없습니다.</p>
<pre>Moya
 ↓
Alamofire
 ↓
URLSession
 ↓
iOS networking system</pre>
<p>실제 네트워크 I/O는 <code>URLSession</code>과 시스템 네트워크 레이어가 비동기로 처리합니다. <code>DispatchQueue</code>는 네트워크 통신 자체를 수행하기보다는, 응답 콜백이나 데이터 가공을 어느 Queue에서 실행할지 제어하는 데 사용됩니다.</p>
<p>RxMoya를 사용한다면 <code>zip</code>도 Thread를 직접 만드는 도구가 아닙니다.</p>
<pre>Single.zip(
    provider.rx.request(.user),
    provider.rx.request(.posts),
    provider.rx.request(.comments)
)
.observe(on: MainScheduler.instance)
.subscribe(onSuccess: { user, posts, comments in
    self.updateUI()
})
.disposed(by: disposeBag)</pre>
<code>zip</code>은 여러 Single을 구독하고, 각 결과가 모두 준비되면 묶어서 방출하는 조합 연산자입니다. 병렬성은 <code>zip</code>이 Thread를 만들어서 생기는 것이 아니라, 각 네트워크 요청이 <code>URLSession</code> 기반 비동기 작업으로 동시에 시작되기 때문에 생깁니다.
<p>UI 업데이트가 있다면 <code>observe(on: MainScheduler.instance)</code> 또는 MainActor로 명확히 전환해야 합니다.</p>
<div class="highlight">면접 포인트: QoS는 "무조건 빨리 실행해줘"가 아니라 "이 작업이 사용자 경험상 얼마나 중요한지"를 알려주는 힌트입니다. Thread Explosion은 작업이 많아서가 아니라, 많은 작업이 Thread를 block한 채 반환하지 않을 때 주로 발생합니다. 네트워크 요청 자체는 URLSession이 비동기로 처리하므로 global queue로 감싸는 것이 본질적인 병렬 처리 방법은 아닙니다.</div>

`},
{name:"Swift Concurrency: async/await, Task, TaskGroup",icon:"purple",
detail:`
<h5>async/await가 해결하는 문제</h5>
<p>기존 completion handler 방식은 비동기 흐름이 깊어질수록 코드가 복잡해지고, 에러 처리와 취소 처리가 흩어지기 쉽습니다.</p>
<pre>func loadProfile(id: String, completion: @escaping (Result&lt;User, Error&gt;) -&gt; Void) {
    fetchUser(id: id) { userResult in
        switch userResult {
        case .success(let user):
            fetchPosts(userId: user.id) { postsResult in
                // 중첩 증가
            }
        case .failure(let error):
            completion(.failure(error))
        }
    }
}</pre>
<code>async/await</code>는 비동기 코드를 동기 코드처럼 읽히게 만듭니다.
<pre>func loadProfile(id: String) async throws -&gt; UserProfile {
    let user = try await fetchUser(id: id)
    let posts = try await fetchPosts(userId: user.id)
    return UserProfile(user: user, posts: posts)
}</pre>
<h5>await는 Thread를 block하지 않는다</h5>
<code>await</code>는 "결과를 기다린다"는 의미지만, GCD의 <code>sync</code>나 semaphore의 <code>wait()</code>처럼 Thread를 붙잡고 기다리지 않습니다.
<pre>await 지점 도달
→ 현재 Task가 suspension
→ Thread는 다른 작업을 실행할 수 있음
→ 비동기 작업 완료 후 Task가 재개</pre>
<pre>func fetchData() async throws -&gt; Data {
    let (data, _) = try await URLSession.shared.data(from: url)
    return data
}</pre>
<p>여기서 네트워크 응답을 기다리는 동안 현재 Thread는 반환될 수 있습니다. 이 점이 blocking 기반 GCD 코드와 큰 차이입니다.</p>
<h5>Task는 Thread가 아니다</h5>
<code>Task</code>는 Swift Concurrency에서 비동기 작업을 표현하는 단위입니다. Thread는 실제 실행 자원이고, Task는 런타임이 스케줄링하는 작업입니다.
<pre>Task {
    let user = try await fetchUser()
    print(user)
}</pre>
<pre>Task   = 비동기 작업 단위
Thread = 실제 코드 실행 단위</pre>
<code>await</code> 전과 후가 항상 같은 Thread에서 실행된다고 보장할 수 없습니다.
<h5>Task와 Task.detached</h5>
<code>Task {}</code>는 현재 context를 어느 정도 상속합니다. 예를 들어 <code>@MainActor</code> 안에서 생성된 <code>Task</code>는 MainActor context를 상속할 수 있습니다.
<pre>@MainActor
func userTapped() {
    Task {
        self.isLoading = true
        await loadData()
        self.isLoading = false
    }
}</pre>
<code>Task.detached {}</code>는 현재 actor context와 분리된 독립 작업입니다. 그래서 UI 상태나 actor-isolated 상태에 접근할 때 더 조심해야 합니다.
<pre>@MainActor
func userTapped() {
    Task.detached {
        let result = await heavyWork()
<p>await MainActor.run {
            self.show(result)
        }
    }
}</pre></p>
<p>일반적으로는 <code>Task {}</code>를 우선 사용하고, 현재 actor context와 완전히 분리해야 하는 명확한 이유가 있을 때만 <code>Task.detached</code>를 사용합니다.</p>
<h5>순차 실행, 병렬 실행, 결과 순서</h5>
<p>서로 의존성이 있는 작업은 순차 실행이 맞습니다.</p>
<pre>let user = try await fetchUser()
let posts = try await fetchPosts(userId: user.id)</pre>
<p>서로 독립적인 작업은 <code>async let</code>으로 병렬 실행할 수 있습니다.</p>
<pre>async let profile = fetchProfile()
async let banners = fetchBanners()
async let products = fetchProducts()
<p>let screenData = try await ScreenData(
    profile: profile,
    banners: banners,
    products: products
)</pre></p>
<code>async let</code>은 작업 개수가 고정되어 있을 때 적합합니다.
<p>작업 개수가 런타임에 결정되면 <code>TaskGroup</code>이 적합합니다.</p>
<pre>func downloadImages(urls: [URL]) async throws -&gt; [UIImage] {
    try await withThrowingTaskGroup(of: (Int, UIImage).self) { group in
        for (index, url) in urls.enumerated() {
            group.addTask {
                let image = try await downloadImage(from: url)
                return (index, image)
            }
        }
<p>var result = Array&lt;UIImage?&gt;(repeating: nil, count: urls.count)</p>
<p>for try await (index, image) in group {
            result[index] = image
        }</p>
<p>return result.compactMap { $0 }
    }
}</pre></p>
<p>TaskGroup에서 중요한 점은 다음입니다.</p>
<pre>addTask 순서     = 작업을 추가한 순서
실제 실행 순서   = 보장 안 됨
결과 수신 순서   = 완료된 순서
원래 순서 필요   = index를 같이 반환해서 재정렬</pre>
<p>여러 <code>Task {}</code>를 순서대로 만들었다고 해서 첫 번째 Task가 반드시 먼저 실행되거나 actor에 먼저 도착한다고 보장할 수 없습니다. 순서를 보장하려면 같은 Task 안에서 <code>await</code>를 순차적으로 호출해야 합니다.</p>
<pre>let value = await counter.get()
await counter.increase()</pre>
<h5>Swift Concurrency의 취소</h5>
<p>Swift Concurrency의 취소도 협력적 취소입니다.</p>
<pre>let task = Task {
    try await loadData()
}
<p>task.cancel()</pre></p>
<code>cancel()</code>을 호출한다고 이미 실행 중인 작업이 즉시 강제 종료되지는 않습니다. 작업 내부에서 취소 여부를 확인해야 합니다.
<pre>func heavyWork() async throws {
    for item in items {
        try Task.checkCancellation()
        try await process(item)
    }
}</pre>
<pre>if Task.isCancelled {
    return
}</pre>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">API</th><th style="padding:10px;text-align:left">의미</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>Task.checkCancellation()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">취소 상태면 <code>CancellationError</code> throw</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>Task.isCancelled</code></td><td style="padding:10px;border-top:1px solid var(--g2)">취소 여부를 Bool로 확인</td></tr></table>
<div class="highlight">면접 포인트: <code>await</code>는 Thread를 block하는 것이 아니라 Task를 suspension하는 지점입니다. <code>Task</code>는 Thread가 아니며, <code>async let</code>은 고정 개수 병렬 작업, <code>TaskGroup</code>은 동적 개수 병렬 작업에 적합합니다. 여러 Task의 실행 순서와 완료 순서는 보장되지 않으므로, 순서가 중요하면 같은 Task 안에서 순차 호출하거나 index로 재정렬해야 합니다.</div>

`},
{name:"Actor, @MainActor, Sendable",icon:"orange",
detail:`
<h5>Actor가 해결하는 문제</h5>
<p>Actor는 내부 mutable state를 동시 접근으로부터 보호하는 참조 타입입니다. 기존에 Serial Queue나 Lock으로 보호하던 공유 상태를 Swift Concurrency의 actor isolation으로 표현할 수 있습니다.</p>
<pre>final class UnsafeCounter {
    var value = 0
<p>func increase() {
        value += 1
    }
}</pre></p>
<p>위 class는 여러 Thread/Task에서 동시에 접근하면 data race가 생길 수 있습니다.</p>
<pre>actor Counter {
    private var value = 0
<p>func increase() {
        value += 1
    }</p>
<p>func get() -&gt; Int {
        value
    }
}</pre></p>
<p>외부에서 actor-isolated state에 접근하려면 <code>await</code>가 필요합니다.</p>
<pre>let counter = Counter()
<p>Task {
    await counter.increase()
    let value = await counter.get()
}</pre></p>
<p>여기서 <code>await</code>는 동일 Thread에 접근하기 위한 것이 아닙니다.</p>
<pre>await counter.get()
= Counter actor가 보호하는 상태를 안전하게 읽을 차례를 기다림
= Thread를 block하는 것이 아니라 현재 Task가 suspension됨</pre>
<p>Actor는 내부 상태 접근을 한 번에 하나씩 처리합니다. 하지만 여러 Task 중 어떤 요청이 먼저 actor에 도착할지는 스케줄러에 따라 달라질 수 있습니다.</p>
<h5>Actor 프로퍼티 접근</h5>
<p>actor의 저장 프로퍼티 접근은 불변인지 가변인지에 따라 다릅니다.</p>
<pre>actor UserStore {
    let id: Int = 1
    private var name: String = "min"
<p>func currentName() -&gt; String {
        name
    }
}</pre></p>
<pre>let store = UserStore()
<p>print(store.id)                       // let은 외부에서 바로 읽을 수 있음
let name = await store.currentName()  // var는 actor 순서를 거쳐야 함</pre></p>
<p>정리하면 다음과 같습니다.</p>
<pre>let 저장 프로퍼티 read → 보통 바로 가능
var 저장 프로퍼티 read → actor-isolated라 await 필요
var 저장 프로퍼티 write → 외부 직접 변경 불가, actor 메서드로 변경</pre>
<h5>Actor Reentrancy: data race는 막지만 로직 race는 남는다</h5>
<p>Actor는 내부 상태의 data race를 막아줍니다. 하지만 actor 메서드 내부에서 <code>await</code>를 만나면 해당 작업이 suspension되고, 그 사이 actor가 다른 작업을 처리할 수 있습니다.</p>
<p>예를 들어 토큰 매니저를 보겠습니다.</p>
<pre>actor TokenManager {
    private var token: String?
<p>func getToken() async throws -&gt; String {
        if let token {
            return token
        }</p>
<p>let newToken = try await requestNewToken()
        self.token = newToken
        return newToken
    }
}</pre></p>
<p>동시에 두 Task가 호출하면 다음 흐름이 가능합니다.</p>
<pre>Task A: token nil 확인
Task A: requestNewToken() await로 일시 중단
<p>그 사이</p>
<p>Task B: token nil 확인
Task B: requestNewToken() 호출</p>
<p>결과:
토큰 갱신 API가 두 번 호출될 수 있음</pre></p>
<p>Actor가 <code>token</code>의 data race는 막았지만, "토큰 갱신은 한 번만 해야 한다"는 비즈니스 로직까지 자동으로 보장하지는 못한 것입니다.</p>
<p>해결하려면 <code>await</code> 전에 다른 호출자가 볼 수 있는 상태를 먼저 남겨야 합니다.</p>
<pre>actor TokenManager {
    private var token: String?
    private var refreshTask: Task&lt;String, Error&gt;?
<p>func getToken() async throws -&gt; String {
        if let token {
            return token
        }</p>
<p>if let refreshTask {
            return try await refreshTask.value
        }</p>
<p>let task = Task {
            try await requestNewToken()
        }</p>
<p>refreshTask = task</p>
<p>do {
            let newToken = try await task.value
            token = newToken
            refreshTask = nil
            return newToken
        } catch {
            refreshTask = nil
            throw error
        }
    }
}</pre></p>
<p>핵심은 이것입니다.</p>
<pre>Actor는 메모리 안전성은 도와주지만,
await 전후의 비즈니스 로직 전체를 원자적으로 보장하지는 않는다.</pre>
<h5>@MainActor와 MainThread의 관계</h5>
<code>@MainActor</code>와 Main Thread는 강하게 연결되어 있지만 완전히 같은 개념은 아닙니다.
<pre>MainThread = 실제 UI 작업이 실행되는 OS Thread
MainActor  = Swift Concurrency에서 UI 관련 상태 접근을 직렬화하는 Global Actor
@MainActor = 이 코드/상태를 MainActor에 격리하겠다는 선언</pre>
<p>Apple 플랫폼에서 MainActor는 일반적으로 Main Thread와 연결되어 있어 UI 업데이트에 사용됩니다.</p>
<pre>@MainActor
final class ViewModel {
    private(set) var state: State = .idle
<p>func updateState(_ state: State) {
        self.state = state
    }
}</pre></p>
<code>DispatchQueue.main.async</code>는 런타임에 Main Queue로 작업을 예약하는 방식입니다. 반면 <code>@MainActor</code>는 Swift Concurrency의 타입 시스템이 actor isolation을 검사해주는 선언적 방식입니다.
<pre>// GCD 방식
DispatchQueue.main.async {
    self.label.text = "완료"
}
<p>// Swift Concurrency 방식
await MainActor.run {
    self.label.text = "완료"
}</pre></p>
<p>주의할 점은 <code>@MainActor</code> 안에서 무거운 작업을 하면 UI가 버벅일 수 있다는 것입니다. ViewModel 전체에 <code>@MainActor</code>를 붙이면 UI 상태 변경은 안전해지지만, 무거운 파싱이나 계산까지 MainActor에서 실행되지 않도록 분리해야 합니다.</p>
<pre>func load() async {
    let model = await repository.fetchAndParse()
<p>await MainActor.run {
        self.state = .loaded(model)
    }
}</pre></p>
<h5>Sendable이란?</h5>
<code>Sendable</code>은 쉽게 말해 <b>다른 비동기 작업으로 넘겨도 안전한 타입인지 표시하는 약속</b>입니다.
<p>어렵게 말하는 "동시성 경계"는 다음처럼 이해하면 됩니다.</p>
<pre>동시성 경계를 넘는다
= 어떤 값이 다른 Task나 Actor로 전달된다
= 동시에 실행될 수 있는 다른 실행 흐름으로 값이 넘어간다</pre>
<p>예를 들어 <code>Task</code> 내부로 값을 넘기는 것도 동시성 경계를 넘는 상황입니다.</p>
<pre>let user = User(id: 1, name: "min")
<p>Task {
    print(user)
}</pre></p>
<p>값 타입이고 내부 프로퍼티가 모두 안전하면 <code>Sendable</code>로 다루기 쉽습니다.</p>
<pre>struct UserResponse: Decodable, Sendable {
    let id: Int
    let name: String
}</pre>
<p>반면 mutable class는 여러 Task에서 같은 인스턴스를 동시에 변경할 수 있어 위험합니다.</p>
<pre>final class UserSession {
    var token: String = ""
}
<p>let session = UserSession()</p>
<p>Task { session.token = "A" }
Task { session.token = "B" }</pre></p>
<p>struct라도 내부에 mutable class를 들고 있으면 안전하지 않을 수 있습니다.</p>
<pre>final class Profile {
    var nickname: String = ""
}
<p>struct User {
    let id: Int
    let profile: Profile
}</pre></p>
<p>즉, struct라서 무조건 Sendable인 것이 아니라 <b>안에 들어있는 값까지 모두 안전해야 Sendable</b>입니다.</p>
<p>actor는 기본적으로 Sendable로 취급됩니다. actor는 참조 타입이지만 내부 mutable state 접근이 actor isolation으로 보호되기 때문입니다.</p>
<p>다만 actor 내부의 mutable reference type을 외부로 그대로 반환하면 actor 보호 밖으로 빠져나가기 때문에 조심해야 합니다.</p>
<pre>final class Session {
    var token: String = ""
}
<p>actor SessionStore {
    private var session = Session()</p>
<p>func currentSession() -&gt; Session {
        session // 위험: actor 밖에서 같은 참조를 동시에 수정할 수 있음
    }
}</pre></p>
<p>더 안전한 방식은 Sendable한 값 타입 snapshot을 반환하는 것입니다.</p>
<pre>struct SessionSnapshot: Sendable {
    let token: String
}
<p>actor SessionStore {
    private var token = ""</p>
<p>func currentSession() -&gt; SessionSnapshot {
        SessionSnapshot(token: token)
    }
}</pre></p>
<code>@unchecked Sendable</code>은 컴파일러가 안전성을 확인하지 못하지만, 개발자가 lock 등으로 직접 thread-safety를 보장하겠다고 선언하는 것입니다.
<pre>final class SafeCounter: @unchecked Sendable {
    private var value = 0
    private let lock = NSLock()
<p>func increase() {
        lock.lock()
        defer { lock.unlock() }
        value += 1
    }
}</pre></p>
<p>잘못 사용하면 컴파일러가 data race를 막아주지 못하므로 정말 필요한 경우에만 사용해야 합니다.</p>
<div class="highlight">면접 포인트: Actor는 내부 mutable state 접근을 직렬화해 data race를 막습니다. 하지만 actor 메서드 안의 <code>await</code> 지점에서는 reentrancy가 발생할 수 있어 로직 race는 별도로 설계해야 합니다. <code>Sendable</code>은 여러 비동기 작업으로 값을 넘겨도 안전하다고 말할 수 있는 타입이며, actor는 기본적으로 Sendable이지만 actor 밖으로 mutable reference를 그대로 내보내면 위험합니다.</div>

{day:5,title:"RunLoop / UI 업데이트 메커니즘",
tags:["RunLoop","UI Update Cycle","Layout Cycle","Display Cycle","CADisplayLink","Main Thread","CATransaction"],
topics:[
{name:"RunLoop과 UI 업데이트 사이클",icon:"blue",
detail:`
<h5>RunLoop의 정체</h5>
<p>RunLoop은 <b>스레드가 할 일이 없을 때는 잠들어 있다가, 이벤트나 타이머 같은 작업이 들어오면 깨어나서 처리하고 다시 대기하는 이벤트 처리 루프</b>입니다.</p>
<p>스레드는 기본적으로 코드를 실행하고 끝나면 종료됩니다. 하지만 iOS 앱의 Main Thread는 앱이 살아있는 동안 계속 사용자 입력, Timer, Source, 화면 갱신 요청을 처리해야 합니다. 이때 Main Thread가 종료되지 않고 계속 이벤트를 받을 수 있게 만드는 구조가 Main RunLoop입니다.</p>
<pre>// 개념적인 의사 코드
while appIsRunning {
    waitForEvent()                  // mach_msg로 커널에서 대기 (CPU 사용 안 함)
<p>handleInputSources()            // Source 0 / Source 1
    fireTimers()
    executeMainQueueBlocks()</p>
<p>processLayoutIfNeeded()
    processDisplayIfNeeded()
    commitCoreAnimationTransaction()</p>
<p>sleepUntilNextEvent()
}</pre></p>
<p>중요한 점은 RunLoop이 단순히 코드를 "한 번 실행하는 단위"가 아니라는 것입니다. RunLoop은 <b>이벤트를 기다리고, 처리하고, 화면 갱신을 commit하고, 다시 잠드는 반복 구조</b>입니다.</p>
<h5>RunLoop의 한 사이클</h5>
<p>RunLoop 한 사이클에서 처리하는 것들:</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">단계</th><th style="padding:10px;text-align:left">처리 대상</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Source 0</td><td style="padding:10px;border-top:1px solid var(--g2)"><code>performSelector</code>, 터치 이벤트 등 (port-based가 아닌 것)</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Source 1</td><td style="padding:10px;border-top:1px solid var(--g2)">port-based 시스템 이벤트</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Timer</td><td style="padding:10px;border-top:1px solid var(--g2)">등록된 Timer fire</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Observer</td><td style="padding:10px;border-top:1px solid var(--g2)">beforeWaiting, afterWaiting 등 lifecycle hook</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Main Queue 작업</td><td style="padding:10px;border-top:1px solid var(--g2)"><code>DispatchQueue.main.async</code>로 예약된 block</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">Layout / Display</td><td style="padding:10px;border-top:1px solid var(--g2)">더티 상태인 View들의 layout pass, display pass</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">CA Commit</td><td style="padding:10px;border-top:1px solid var(--g2)">Core Animation transaction을 Render Server로 전달</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">대기</td><td style="padding:10px;border-top:1px solid var(--g2)"><code>mach_msg</code>로 커널에서 새 이벤트 대기</td></tr></table>
<h5>UI 업데이트가 즉시 화면에 반영되지 않는 이유</h5>
<p>UIKit에서 다음 코드를 실행했다고 해서 화면 픽셀이 즉시 바뀌는 것은 아닙니다.</p>
<pre>titleLabel.text = "Loading"
titleLabel.text = "Complete"</pre>
<code>titleLabel.text</code> 프로퍼티 값은 각 라인이 실행되는 즉시 메모리상에서 변경됩니다. 하지만 실제 화면 반영은 보통 Main RunLoop의 layout/display update cycle과 Core Animation commit 이후에 이루어집니다.
<p>즉, 위 코드에서는 <code>"Loading"</code>이 메모리상 값으로 잠깐 들어갔다가 바로 <code>"Complete"</code>로 덮이고, 실제 화면에는 최종 값인 <code>"Complete"</code>만 보일 가능성이 높습니다.</p>
<pre>프로퍼티 값 변경
→ 즉시 메모리상 상태 변경
<p>실제 화면 반영
→ 다음 layout/display cycle
→ Core Animation transaction commit
→ Render Server / GPU
→ 다음 frame에 표시</pre></p>
<p>UIKit은 여러 UI 변경을 매번 즉시 그리지 않고, 같은 cycle 안에서 발생한 변경을 병합해서 처리할 수 있습니다.</p>
<pre>@objc private func didTapButton() {
    titleLabel.text = "A"
<p>DispatchQueue.main.async {
        self.titleLabel.text = "B"
    }</p>
<p>titleLabel.text = "C"
}</pre></p>
<p>실행 순서는 <code>A → C → B</code>이고, 화면에는 보통 최종 값인 <code>"B"</code>만 보입니다. <code>DispatchQueue.main.async</code>는 Main Thread에서 호출해도 즉시 실행되지 않고, 현재 Main Queue 작업이 끝난 뒤 실행됩니다.</p>
<div class="highlight"><b>최종 핵심 문장</b>: UIKit의 UI 변경은 메모리상 상태 변경은 즉시 일어나지만, 실제 화면 반영은 Main RunLoop의 layout/display cycle과 Core Animation transaction commit 이후에 이루어집니다.</div>
<h5>RunLoop Mode와 Timer 함정</h5>
<p>RunLoop은 한 번에 하나의 mode로 동작합니다. mode마다 처리 대상이 되는 source, timer, observer가 다릅니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">Mode</th><th style="padding:10px;text-align:left">의미</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.default</code></td><td style="padding:10px;border-top:1px solid var(--g2)">일반적인 앱 동작 상태</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.tracking</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>UIScrollView</code> 드래그처럼 터치를 추적하는 상태</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.common</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>.default</code>, <code>.tracking</code> 등에 공통으로 포함될 수 있는 mode 집합</td></tr></table>
대표적인 함정은 <code>Timer.scheduledTimer</code>입니다.
<pre>timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { _ in
    print("tick")
}</pre>
<code>scheduledTimer</code>는 기본적으로 <code>.default</code> mode에 등록됩니다. 사용자가 <code>UIScrollView</code>를 드래그하면 Main RunLoop이 <code>.tracking</code> mode로 전환되고, <code>.default</code> mode에만 등록된 Timer는 fire되지 않습니다.
<pre>일반 상태
→ RunLoop default mode → Timer 동작
<p>스크롤 드래그 중
→ RunLoop tracking mode → default mode Timer는 실행되지 않음</pre></p>
<p>스크롤 중에도 Timer가 동작해야 한다면 <code>.common</code> mode에 등록합니다.</p>
<pre>let timer = Timer(timeInterval: 1.0, repeats: true) { [weak self] _ in
    self?.countLabel.text = "\\(Date())"
}
RunLoop.main.add(timer, forMode: .common)</pre>
<p>스크롤 자체는 60fps 이상의 부드러움이 필요해서 다른 무거운 작업이 끼어들면 안 됩니다. 그래서 시스템이 의도적으로 <code>.tracking</code> 모드에서 일반 Timer를 멈추는 것입니다. <code>.common</code>에 등록하면 스크롤 중에도 실행되므로 작업이 무겁다면 오히려 스크롤 성능을 해칠 수 있습니다.</p>
<div class="highlight">면접 포인트: Timer가 스크롤 중 멈추는 이유는 Main Thread가 반드시 바빠서가 아니라, Timer가 등록된 RunLoop mode와 현재 RunLoop mode가 다르기 때문입니다.</div>

`},
{name:"UI Layout Cycle",icon:"green",
detail:`
<h5>Layout Cycle의 역할</h5>
<p>Layout Cycle은 View의 크기와 위치를 계산하는 과정입니다. 대표 메서드는 세 가지입니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">메서드</th><th style="padding:10px;text-align:left">역할</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>setNeedsLayout()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">다음 layout pass에서 다시 배치가 필요하다고 표시</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>layoutIfNeeded()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">layout이 필요한 상태라면 즉시 layout pass 수행</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>layoutSubviews()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">실제 subview frame 배치가 일어나는 UIView 메서드</td></tr></table>
<h5>setNeedsLayout()</h5>
<code>setNeedsLayout()</code>은 즉시 <code>layoutSubviews()</code>를 호출하지 않습니다. 대신 해당 View의 layout이 더 이상 유효하지 않으니 다음 layout pass에서 다시 계산해야 한다고 표시합니다.
<pre>view.setNeedsLayout()
view.setNeedsLayout()
view.setNeedsLayout()</pre>
<p>같은 RunLoop cycle 안에서 여러 번 호출해도 일반적으로 layout pass는 병합되어 한 번만 수행될 수 있습니다. "3번 호출했으니 <code>layoutSubviews()</code>도 3번 호출된다"는 잘못된 설명입니다.</p>
<h5>layoutSubviews()</h5>
<code>layoutSubviews()</code>는 실제로 subview들의 frame을 배치하는 메서드입니다. 개발자가 직접 호출하기보다는 UIKit이 layout pass 중에 호출합니다.
<pre>final class ProfileView: UIView {
    private let nameLabel = UILabel()
<p>override func layoutSubviews() {
        super.layoutSubviews()
        nameLabel.frame = bounds.insetBy(dx: 16, dy: 8)
    }
}</pre></p>
<code>layoutSubviews()</code>가 호출될 수 있는 대표 상황:
<pre>bounds 변경
subview 추가 / 제거
constraint 변경
setNeedsLayout() 이후 layout pass 도달
layoutIfNeeded()로 즉시 layout 강제</pre>
<p>주의할 점은 <code>layoutSubviews()</code> 안에서 조건 없이 <code>setNeedsLayout()</code>을 호출하면 안 된다는 것입니다.</p>
<pre>override func layoutSubviews() {
    super.layoutSubviews()
    label.frame = bounds.insetBy(dx: 8, dy: 4)
<p>setNeedsLayout()  // ❌ 위험: layout loop 가능
}</pre></p>
<p>방어가 필요하다면 상태 변경 여부를 비교해야 합니다.</p>
<pre>private var previousBounds: CGRect = .zero
<p>override func layoutSubviews() {
    super.layoutSubviews()
    label.frame = bounds.insetBy(dx: 8, dy: 4)</p>
<p>guard previousBounds != bounds else { return }
    previousBounds = bounds
    // 정말 필요한 추가 처리만
}</pre></p>
<h5>layoutIfNeeded()</h5>
<code>layoutIfNeeded()</code>는 항상 layout을 강제로 수행하는 메서드가 아닙니다. 정확히는 <b>현재 View hierarchy에 layout이 필요한 상태라면 즉시 layout pass를 수행</b>합니다.
<pre>func updateName(_ name: String) {
    nameLabel.text = name
    setNeedsLayout()
    layoutIfNeeded()  // 직전에 dirty 상태가 됐으므로 즉시 layoutSubviews() 호출
}</pre>
<p>layout이 필요한 상태가 아니라면 <code>layoutIfNeeded()</code>는 별다른 일을 하지 않을 수 있습니다.</p>
<h5>ViewController Lifecycle과 Layout Cycle</h5>
<pre>viewDidLoad()
→ viewWillAppear()
→ viewWillLayoutSubviews()
→ view.layoutSubviews()
→ viewDidLayoutSubviews()
→ viewDidAppear()</pre>
<code>viewDidLoad</code>는 View가 메모리에 올라온 시점이라 subview 추가, constraint 설정, 초기 바인딩에 적합하지만, 최종 frame이 확정되었다고 가정하면 안 됩니다.
<pre>override func viewDidLoad() {
    super.viewDidLoad()
    print(view.bounds.width)  // ⚠️ 최종값이 아닐 수 있음
}</pre>
<p>Frame이나 safeArea 기반 후처리는 <code>viewDidLayoutSubviews()</code> 이후가 더 안전합니다. 단, 여러 번 호출될 수 있으므로 일회성 작업은 flag로 방어해야 합니다.</p>
<h5>Constraint Animation에서 layoutIfNeeded를 쓰는 이유</h5>
<p>Constraint는 화면에 직접 그려지는 값이 아니라 Auto Layout의 입력값입니다. 실제로 화면에서 애니메이션되는 것은 constraint 자체가 아니라, constraint 변경 결과로 계산된 frame 또는 backing layer의 bounds/position입니다.</p>
<pre>@objc private func didTapButton() {
    view.layoutIfNeeded()         // 1. 시작 layout 확정
    heightConstraint.constant = 200 // 2. constraint 변경
<p>UIView.animate(withDuration: 0.3) {
        self.view.layoutIfNeeded()  // 3. 변경된 constraint를 frame 변화로 commit
    }
}</pre></p>
<pre>1. 현재 layout 상태 확정
<ol><li>constraint constant 변경</li><li>animation block 안에서 layoutIfNeeded()</li><li>변경된 constraint 기준으로 frame 계산</li><li>frame / layer property 변화가 animation transaction에 포함</li><li>시작 frame → 종료 frame으로 보간</pre></li></ol>
반대로 <code>UIView.animate { self.heightConstraint.constant = 200 }</code>는 자연스럽게 애니메이션되지 않을 수 있습니다. constant만 바꿨을 뿐 새 constraint 결과를 frame 변화로 계산시키는 layout pass가 animation transaction 안에서 일어나지 않을 수 있기 때문입니다.
<h5>layoutIfNeeded는 어느 View에 호출해야 하나요?</h5>
<div class="highlight">변경된 constraint를 포함하고, 실제로 다시 배치해야 하는 View들의 <b>가장 가까운 공통 상위 View</b>에 <code>layoutIfNeeded()</code>를 호출하는 것이 적절합니다.</div>
<code>boxView</code>가 <code>containerView</code>의 subview이고 <code>boxView</code>의 height constraint를 바꾼다면, <code>boxView.layoutIfNeeded()</code>보다 <code>containerView.layoutIfNeeded()</code>가 더 적절합니다. <code>boxView</code> 자신의 frame은 자기 자신이 아니라 superview의 layout 과정에서 결정되기 때문입니다.
<pre>heightConstraint.constant = 200
<p>UIView.animate(withDuration: 0.3) {
    self.containerView.layoutIfNeeded()
}</pre></p>

`},
{name:"Display Cycle (setNeedsDisplay vs setNeedsLayout)",icon:"purple",
detail:`
<h5>Display Cycle의 역할</h5>
<p>Layout Cycle이 View의 위치와 크기를 계산한다면, Display Cycle은 View의 <b>그림 내용</b>을 다시 그립니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">메서드</th><th style="padding:10px;text-align:left">연결되는 작업</th><th style="padding:10px;text-align:left">사용 상황</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>setNeedsLayout()</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>layoutSubviews()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">subview 위치/크기 변경</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>setNeedsDisplay()</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>draw(_:)</code></td><td style="padding:10px;border-top:1px solid var(--g2)">직접 그리는 내용 변경</td></tr></table>
<h5>setNeedsDisplay()</h5>
<code>setNeedsDisplay()</code>는 View의 drawing contents가 변경되었으니 다음 drawing cycle에서 다시 그려달라고 표시하는 메서드입니다.
<pre>final class GraphView: UIView {
    var points: [CGPoint] = [] {
        didSet { setNeedsDisplay() }
    }
<p>override func draw(_ rect: CGRect) {
        super.draw(rect)
        // points 기반 그래프 그리기
    }
}</pre></p>
<code>points</code>가 바뀌면 바로 <code>draw(_:)</code>가 호출되는 것이 아닙니다.
<pre>points 변경
→ setNeedsDisplay()
→ display dirty 상태 표시
→ 다음 drawing cycle에서 draw(_:) 호출
→ layer contents 반영
→ 화면 표시</pre>
<p>같은 RunLoop cycle 안에서 <code>points</code>가 여러 번 바뀌어도 <code>draw(_:)</code>가 매번 즉시 호출되는 것은 아닙니다. 일반적으로 마지막 상태 기준으로 한 번 그려질 가능성이 높습니다.</p>
<h5>ProgressBar 예시 — 둘의 구분 기준</h5>
<code>ProgressBarView</code>가 <code>draw(_:)</code>에서 직접 bar를 그린다면 <code>progress</code> 변경 시 <code>setNeedsDisplay()</code>가 맞습니다.
<pre>final class ProgressBarView: UIView {
    var progress: CGFloat = 0 {
        didSet { setNeedsDisplay() }
    }
<p>override func draw(_ rect: CGRect) {
        super.draw(rect)
        // progress 값에 따라 bar를 직접 그림
    }
}</pre></p>
<p>반대로 ProgressBar가 내부 <code>barView</code>의 width constraint나 frame으로 구현되어 있다면 layout 변경입니다.</p>
<pre>var progress: CGFloat = 0 {
    didSet {
        barWidthConstraint.constant = bounds.width * progress
        setNeedsLayout()
    }
}</pre>
<p>기준은 명확합니다.</p>
<pre>직접 drawing 기반        → setNeedsDisplay()
subview frame / constraint 기반 → setNeedsLayout() 또는 layoutIfNeeded()</pre>

`},
{name:"왜 UI는 Main Thread에서만?",icon:"orange",
detail:`
<h5>UIKit이 thread-safe하지 않다는 의미</h5>
<p>thread-safe하다는 것은 여러 스레드가 동시에 접근해도 객체의 상태가 깨지지 않도록 내부적으로 보호되어 있다는 뜻입니다. UIKit은 대부분 thread-safe하지 않습니다.</p>
<pre>DispatchQueue.global().async {
    self.label.text = "A"  // ⚠️ 위험
}
<p>DispatchQueue.main.async {
    self.label.text = "B"
}</pre></p>
<code>label.text</code> 변경은 단순 문자열 대입처럼 보이지만 실제로는 여러 내부 상태 변경으로 이어집니다.
<pre>text 변경
→ intrinsicContentSize 변경 가능
→ layout invalidation 필요
→ display invalidation 필요
→ CALayer contents 갱신 필요</pre>
<p>이 과정에서 한 스레드는 layout 계산 중인데 다른 스레드가 frame이나 constraint를 바꾸면 UIKit 내부 상태의 일관성이 깨질 수 있습니다.</p>
<h5>왜 thread-safe하게 만들지 않았나요?</h5>
<p>핵심은 <b>성능</b>입니다. 모든 UI 객체를 아무 스레드에서나 안전하게 수정할 수 있게 만들려면 UIKit 내부의 많은 상태 접근에 lock 같은 동기화 장치가 필요합니다.</p>
<pre>lock.lock()
label.text = "A"
updateIntrinsicContentSize()
markNeedsLayout()
markNeedsDisplay()
lock.unlock()</pre>
<p>UI 작업은 매우 자주 발생합니다. 스크롤이나 애니메이션 중에는 한 프레임 안에 cell 재사용, label text 변경, image 변경, constraint 계산, frame 변경, layer property 변경 등이 매우 많이 발생합니다. 60fps 기준 한 프레임 예산은 약 16.67ms이고, 이 시간 안에 이벤트 처리, layout, display, commit까지 끝내야 합니다.</p>
<p>모든 UI 접근마다 lock을 걸면 동기화 비용이 누적되어 프레임 유지에 불리합니다. 그래서 UIKit은 다음 설계를 선택했습니다.</p>
<pre>모든 UI API를 thread-safe하게 만든다
→ 안전하지만 무겁다
<p>UI는 Main Thread에서만 접근한다는 규칙을 둔다
→ lock 비용을 줄이고 빠르게 동작한다</pre></p>
<p>UIKit은 안전을 내부 lock으로 해결하기보다 <b>Main Thread 단일 접근 규칙</b>으로 해결하는 구조입니다.</p>
<h5>Main Thread block과 UI 반영</h5>
<p>Main Thread에서 오래 걸리는 작업을 하면 UI 변경이 화면에 반영되지 못합니다.</p>
<pre>@objc private func didTapButton() {
    titleLabel.text = "Loading"
    Thread.sleep(forTimeInterval: 3)
    titleLabel.text = "Complete"
}</pre>
<code>"Loading"</code>은 메모리상 값으로는 즉시 들어가지만, 바로 Main Thread가 3초 동안 block됩니다. RunLoop이 layout/display cycle을 처리할 수 없으므로 사용자는 <code>"Loading"</code>을 보지 못하고 <code>"Complete"</code>만 볼 가능성이 높습니다.
<p>반대로 무거운 작업을 background queue로 보내면 Main Thread는 계속 update cycle을 돌 수 있습니다.</p>
<pre>@objc private func didTapButton() {
    titleLabel.text = "Loading"
<p>DispatchQueue.global(qos: .userInitiated).async {
        Thread.sleep(forTimeInterval: 3)
        DispatchQueue.main.async {
            self.titleLabel.text = "Complete"
        }
    }
}</pre></p>
<code>asyncAfter</code>도 Main Thread를 block하지 않습니다.
<pre>DispatchQueue.main.asyncAfter(deadline: .now() + 3) {
    self.titleLabel.text = "Complete"
}</pre>
<code>asyncAfter</code>는 3초 동안 Main Thread를 멈추는 것이 아니라, 지정한 deadline 이후 Main Queue에 block을 enqueue합니다.
<pre>Thread.sleep                        → 현재 스레드를 실제로 멈춤
DispatchQueue.main.asyncAfter      → 현재 스레드는 멈추지 않고 작업 실행 시점만 예약</pre>
<h5>동기 네트워크 + 로딩 인디케이터 함정</h5>
<pre>@objc private func didTapButton() {
    loadingView.isHidden = false
    let result = requestSynchronously()       // Main Thread block!
    titleLabel.text = result.title
    loadingView.isHidden = true
}</pre>
<pre>loadingView.isHidden = false
→ 로딩뷰가 보여야 하는 상태가 됨
→ requestSynchronously()가 Main Thread block
→ RunLoop이 화면 업데이트를 못 함
→ 요청 완료
→ loadingView.isHidden = true
→ 최종 상태만 화면에 반영</pre>
<p>개선은 네트워크 작업은 비동기, UI 업데이트만 Main Thread 또는 MainActor에서 처리하는 것입니다.</p>
<pre>@objc private func didTapButton() {
    loadingView.isHidden = false
<p>Task {
        do {
            let result = try await request()
            await MainActor.run {
                self.titleLabel.text = result.title
                self.loadingView.isHidden = true
            }
        } catch {
            await MainActor.run {
                self.loadingView.isHidden = true
            }
        }
    }
}</pre></p>
<div class="highlight">면접 답변: UIKit은 대부분 thread-safe하지 않습니다. UI 변경은 단순히 프로퍼티 하나를 바꾸는 것이 아니라 View hierarchy, Auto Layout, CALayer 상태 변경까지 이어집니다. 이 상태들이 여러 스레드에서 동시에 변경되면 UIKit 내부 상태의 일관성이 깨질 수 있어 UI 업데이트는 Main Thread에서 직렬적으로 처리해야 합니다. 모든 UI 접근에 lock을 걸면 동기화 비용이 60fps frame budget에 불리하므로, UIKit은 "UI는 Main Thread에서만 접근한다"는 규칙으로 빠르게 동작하도록 설계되어 있습니다.</div>

`},
{name:"CADisplayLink와 Frame Budget",icon:"blue",
detail:`
<h5>CADisplayLink란?</h5>
<code>CADisplayLink</code>는 Timer처럼 단순 시간 간격으로 동작하는 것이 아니라, 디스플레이 refresh 타이밍에 맞춰 selector를 호출하는 객체입니다.
<pre>Timer            → 정해진 시간 간격마다 실행
CADisplayLink    → 화면이 다시 그려질 타이밍마다 실행</pre>
<p>따라서 프레임 단위 애니메이션, 게임 루프, progress 업데이트, 커스텀 drawing 업데이트에 적합합니다.</p>
<pre>displayLink = CADisplayLink(target: self, selector: #selector(updateFrame))
displayLink.add(to: .main, forMode: .common)
<p>@objc private func updateFrame(_ link: CADisplayLink) {
    progressView.progress += 0.01
}</pre></p>
<h5>CADisplayLink와 RunLoop Mode</h5>
<code>CADisplayLink</code>도 RunLoop에 등록되어 동작하므로 어떤 mode에 등록했는지가 중요합니다. <code>.default</code>에만 등록하면 스크롤 중 Main RunLoop이 <code>.tracking</code> mode로 전환될 때 callback이 멈출 수 있습니다. 스크롤 중에도 호출되어야 한다면 <code>.common</code>에 등록합니다.
<pre>displayLink.add(to: .main, forMode: .common)</pre>
<h5>60fps와 120fps Frame Budget</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0"><tr style="background:var(--g1)"><th style="padding:10px;text-align:left">디스플레이</th><th style="padding:10px;text-align:left">주파수</th><th style="padding:10px;text-align:left">한 프레임 예산</th></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">일반 디스플레이</td><td style="padding:10px;border-top:1px solid var(--g2)">60Hz</td><td style="padding:10px;border-top:1px solid var(--g2)">약 16.67ms</td></tr><tr><td style="padding:10px;border-top:1px solid var(--g2)">ProMotion</td><td style="padding:10px;border-top:1px solid var(--g2)">120Hz</td><td style="padding:10px;border-top:1px solid var(--g2)">약 8.33ms</td></tr></table>
60fps 기준으로 한 프레임 안에 다음 작업들이 끝나야 합니다.
<pre>이벤트 처리
→ 애니메이션 상태 업데이트
→ layout
→ display
→ Core Animation commit
→ Render Server / GPU 처리</pre>
<code>CADisplayLink</code> callback 안에서 무거운 작업을 수행하면 Main Thread가 점유되어 다음 frame을 제때 준비하지 못합니다.
<pre>@objc private func updateFrame() {
    heavyCalculation()  // ❌ 오래 걸리면 프레임 드랍
    progressView.progress += 0.01
}</pre>
<p>결과: 프레임 드랍, 애니메이션 끊김, 스크롤 버벅임, 터치 반응 지연.</p>
<p>개선 방향:</p>
<pre>CADisplayLink callback에서는 최소 상태 반영만 수행
무거운 계산은 background queue에서 미리 처리
계산 결과 캐싱
매 프레임 전체 계산 금지
timestamp 기반 업데이트 사용</pre>
<p>Frame count 기반 증가는 refresh rate에 따라 속도가 달라질 수 있으므로 timestamp delta 기반이 안전합니다.</p>
<pre>private var lastTimestamp: CFTimeInterval = 0
private var progress: CGFloat = 0
<p>@objc private func updateFrame(_ link: CADisplayLink) {
    if lastTimestamp == 0 {
        lastTimestamp = link.timestamp
        return
    }</p>
<p>let deltaTime = link.timestamp - lastTimestamp
    lastTimestamp = link.timestamp</p>
<p>progress += CGFloat(deltaTime) * 0.3
    progressView.progress = min(progress, 1.0)
}</pre></p>
<h5>ProMotion 지원</h5>
<p>ProMotion 디바이스에서 120fps를 활용하려면 <code>preferredFrameRateRange</code>를 명시해야 합니다. 미명시 시 기본값은 60fps로 제한됩니다.</p>
<pre>displayLink.preferredFrameRateRange = CAFrameRateRange(
    minimum: 60, maximum: 120, preferred: 120
)</pre>
<p>게임이나 애니메이션 외에 일반 작업에 CADisplayLink를 쓰지 마세요. 매 프레임마다 깨워서 배터리 소모가 큽니다.</p>

`}
],
questions:[
{q:"UIKit의 UI 업데이트는 왜 즉시 화면에 반영되지 않나요?",level:"basic",freq:true,
answer:"<p>UIKit에서 UI 프로퍼티를 변경하면 객체의 상태는 즉시 바뀌지만, 실제 화면 반영은 즉시 일어나지 않습니다. UIKit은 변경된 View를 layout 또는 display가 필요한 상태로 표시하고, Main RunLoop의 update cycle에서 layout pass와 display pass를 처리합니다. <code>setNeedsLayout()</code>은 다음 layout pass를 예약하는 것이고, <code>layoutSubviews()</code>는 실제 frame 계산이 일어나는 지점입니다. 이후 Core Animation transaction이 RunLoop의 commit 시점에 Render Server로 전달되고, 다음 frame에 실제 화면으로 표시됩니다. 그래서 여러 UI 변경은 같은 cycle 안에서 병합될 수 있고, 중간 상태가 아니라 최종 상태만 화면에 보일 수 있습니다.</p>"},
{q:"`DispatchQueue.main.async`를 썼는데도 Loading이 안 보이는 이유는?",level:"basic",freq:true,
answer:"<code>titleLabel.text = \"Loading\"</code>은 즉시 메모리상 값을 변경합니다. 하지만 실제 화면 반영은 RunLoop update cycle과 CA transaction commit 이후에 일어납니다. <code>DispatchQueue.main.async</code> block은 현재 메서드 실행이 끝난 뒤 Main Queue에서 실행됩니다. 이 block이 화면 commit 전에 실행되면 <code>\"Loading\"</code>이 화면에 그려지기 전에 <code>\"Complete\"</code>로 덮일 수 있어, 사용자는 최종 값만 볼 가능성이 높습니다."},
{q:"Main Thread에서 `Thread.sleep`을 호출하면 왜 문제가 되나요?",level:"basic",freq:true,
answer:"<code>\"Loading\"</code> 값은 메모리상 즉시 들어가지만, Main Thread가 sleep으로 block되면 RunLoop이 layout/display cycle을 처리할 수 없습니다. 따라서 <code>\"Loading\"</code>은 실제 화면에 표시되지 못하고, sleep 이후 <code>\"Complete\"</code>로 변경된 최종 상태만 반영됩니다. Main Thread가 block되는 동안 터치, 스크롤, 애니메이션도 멈춥니다."},
{q:"`setNeedsLayout()`과 `layoutIfNeeded()`의 차이는?",level:"basic",freq:true,
answer:"<code>setNeedsLayout()</code>은 layout이 필요하다는 표시만 하고 즉시 layout을 수행하지 않습니다. 같은 RunLoop cycle 안에서 여러 번 호출되면 병합될 수 있습니다. <code>layoutIfNeeded()</code>는 현재 layout이 필요한 상태라면 즉시 layout pass를 수행합니다. 그래서 constraint 변경 후 animation block 안에서 호출하면 Auto Layout 결과로 계산된 frame 변화가 animation transaction에 포함되어 부드러운 애니메이션이 됩니다."},
{q:"Constraint Animation에서 실제로 애니메이션되는 것은 constraint인가요?",level:"basic",freq:true,
answer:"<p>아닙니다. Constraint는 Auto Layout의 입력값입니다. 실제로 애니메이션되는 것은 constraint 변경 결과로 계산된 frame, 더 정확히는 backing layer의 bounds, position 같은 animatable property입니다. constraint constant 변경 → Auto Layout이 새 frame 계산 → CALayer bounds/position 변화 → Core Animation이 layer property 변화 보간 순서입니다.</p>"},
{q:"`layoutSubviews()` 안에서 `setNeedsLayout()`을 호출하면 왜 위험한가요?",level:"basic",freq:true,
answer:"<code>layoutSubviews()</code>는 layout pass 중에 호출되는 메서드입니다. 그 내부에서 조건 없이 <code>setNeedsLayout()</code>을 호출하면 layout이 끝나는 시점에 다시 layout이 필요하다고 표시하게 됩니다. 다음 layout cycle에서 <code>layoutSubviews()</code>가 반복 호출될 수 있고, 심하면 layout loop나 성능 저하가 발생합니다."},
{q:"`setNeedsDisplay()`와 `setNeedsLayout()`은 어떻게 구분하나요?",level:"basic",freq:true,
answer:"<code>setNeedsLayout()</code>은 subview의 위치나 크기 재계산이 필요할 때 사용하며 <code>layoutSubviews()</code>와 연결됩니다. <code>setNeedsDisplay()</code>는 직접 그리는 내용이 바뀌었을 때 사용하며 <code>draw(_:)</code>와 연결됩니다. bar를 <code>draw(_:)</code>에서 직접 그리면 setNeedsDisplay, barView의 width constraint로 표현하면 setNeedsLayout/layoutIfNeeded."},
{q:"스크롤 중 Timer나 CADisplayLink가 멈추는 이유는?",level:"advanced",freq:true,
answer:"<code>Timer.scheduledTimer</code>나 <code>.default</code> mode에 등록된 <code>CADisplayLink</code>는 기본적으로 RunLoop의 <code>.default</code> mode에서만 동작합니다. <code>UIScrollView</code>를 드래그하면 Main RunLoop이 터치 추적을 위해 <code>.tracking</code> mode로 전환되고, 이때 <code>.default</code> mode에만 등록된 객체는 실행 대상이 아니므로 멈춘 것처럼 보입니다. 스크롤 중에도 동작해야 한다면 <code>.common</code> mode에 등록합니다."},
{q:"CADisplayLink callback에서 무거운 작업을 하면 어떻게 되나요?",level:"advanced",freq:true,
answer:"<code>CADisplayLink</code>는 display refresh 타이밍에 맞춰 Main RunLoop에서 호출됩니다. 60fps 기준 한 프레임 예산은 약 16.67ms이고, 이 시간 안에 이벤트 처리, 애니메이션 업데이트, layout, display, Core Animation commit까지 끝나야 합니다. callback 안에서 무거운 계산을 수행하면 Main Thread가 점유되어 다음 frame을 제때 준비하지 못하고, 프레임 드랍이나 스크롤 버벅임이 발생합니다. callback에서는 최소한의 상태 반영만 하고, 무거운 계산은 background에서 처리하거나 캐싱해야 합니다."},
{q:"`DispatchQueue.main.asyncAfter`는 Main Thread를 block하나요?",level:"advanced",freq:true,
answer:"<p>아닙니다. <code>asyncAfter</code>는 지정한 deadline 이후 Main Queue에 block을 enqueue할 뿐, 현재 스레드를 멈추지 않습니다. <code>Thread.sleep</code>은 실제로 스레드를 block하지만, <code>asyncAfter</code>는 작업 실행 시점만 예약합니다. 그래서 <code>asyncAfter</code> 호출 후에도 Main Thread는 RunLoop을 계속 돌면서 다른 이벤트와 layout/display cycle을 처리할 수 있습니다.</p>"}
],

{day:6,title:"UIKit 렌더링 파이프라인과 성능",
tags:["Core Animation","Off-Screen","TableView","Cell Reuse","Diffable Data Source"],
topics:[
{name:"렌더링 파이프라인",icon:"blue",
detail:`
<h5>한 프레임이 화면에 나오기까지</h5>
<p>화면에 픽셀이 그려지는 건 단순한 일이 아닙니다. UIKit은 변경사항을 즉시 픽셀로 그리는 방식이 아니라, Main Thread RunLoop의 업데이트 사이클에서 View/Layer 변경사항을 모아 처리하고, Core Animation이 이를 Render Server와 GPU로 넘겨 최종 화면을 만듭니다.</p>
<pre>// 프레임 렌더링 단계 (60fps 기준 16.67ms 안에)
//
// [App Process / Main Thread RunLoop]
// 1. Layout  : Auto Layout, frame/bounds 계산, layoutSubviews()
// 2. Display : draw(_:) 호출 가능, 텍스트/커스텀 드로잉 준비
// 3. Prepare : 이미지 디코딩, 텍스처 업로드 등 GPU 리소스 준비
// 4. Commit  : 변경된 CALayer Tree를 Core Animation transaction으로 묶음
//        ──IPC 전송──→
//
// [Render Server (backboardd 프로세스)]
// 5. Layer Tree 처리
// 6. Layer Tree를 바탕으로 GPU 렌더링 명령 생성
//        ──전송──→
//
// [GPU]
// 7. 실제 렌더링
// 8. 여러 Layer 합성(compositing)
// 9. 다음 VSync 타이밍에 디스플레이로 표시
//
// 총 예산: 16.67ms (60Hz) 또는 8.33ms (120Hz ProMotion)
// 앱 단계: ~10ms 권장</pre>
<div class="highlight">핵심은 앱이 Render Server에 <b>Layout Tree</b>를 넘기는 것이 아니라, 변경된 <b>CALayer Tree</b>를 넘긴다는 점입니다. Render Server는 이 Layer Tree를 GPU가 이해할 수 있는 렌더링 명령으로 바꾸고, GPU가 렌더링과 합성을 수행합니다.</div>
<h5>RunLoop 업데이트 사이클과 연결</h5>
<code>view.backgroundColor</code>, <code>constraint.constant</code>, <code>label.text</code> 같은 값을 바꿨다고 해서 그 순간 바로 화면 픽셀이 바뀌는 것은 아닙니다. 대부분의 변경은 "레이아웃 필요", "디스플레이 필요" 상태로 표시되고, RunLoop가 잠들기 전 업데이트 사이클에서 Layout/Display/Commit이 한 번에 처리됩니다.
<pre>heightConstraint.constant = 200
view.setNeedsLayout()        // 다음 layout pass 예약
customView.setNeedsDisplay() // 다음 display pass에서 draw(_:) 예약
<p>// 필요한 경우 지금 즉시 layout pass 수행
view.layoutIfNeeded()</pre></p>
<ul><li><code>setNeedsLayout()</code>은 위치와 크기 계산이 다시 필요하다고 표시합니다. 다음 layout pass에서 <code>layoutSubviews()</code>가 호출될 수 있습니다.</li><li><code>layoutIfNeeded()</code>는 현재 레이아웃이 dirty 상태라면 다음 RunLoop까지 기다리지 않고 즉시 layout pass를 수행합니다. 제약 변경 애니메이션에서 자주 사용합니다.</li><li><code>setNeedsDisplay()</code>는 레이아웃이 아니라 drawing이 다시 필요하다고 표시합니다. 다음 display pass에서 <code>draw(_:)</code>가 호출될 수 있습니다.</li></ul>
<h5>layoutSubviews()와 draw(_:)의 차이</h5>
<code>layoutSubviews()</code>는 subview의 위치와 크기를 배치하는 함수이고, <code>draw(_:)</code>는 Core Graphics로 실제 콘텐츠를 직접 그리는 함수입니다. 즉, <b>layoutSubviews는 배치</b>, <b>draw는 그리기</b>입니다.
<pre>override func layoutSubviews() {
    super.layoutSubviews()
    imageView.frame = bounds        // 배치
}
<p>override func draw(_ rect: CGRect) {
    UIColor.red.setFill()
    UIBezierPath(ovalIn: rect).fill() // 그리기
}</pre></p>
<code>draw(_:)</code>는 Display 단계에서 호출될 수 있으며, 도형/선/텍스트/이미지 등을 CPU에서 Core Graphics로 backing store에 그리는 작업입니다. 셀에서 복잡한 <code>draw(_:)</code>가 반복되면 Display 단계의 CPU 비용이 커져 스크롤 성능에 영향을 줄 수 있습니다. 단순한 선, 원, progress 같은 UI는 <code>draw(_:)</code> 대신 <code>CAShapeLayer</code>를 사용하면 path 기반으로 Core Animation이 관리할 수 있어 더 적합한 경우가 많습니다.
<h5>왜 Render Server가 별도 프로세스인가요?</h5>
<p>앱이 크래시해도 시스템 UI는 계속 동작해야 하기 때문입니다. 또한 여러 앱의 UI를 합성하려면 중앙에서 관리하는 게 효율적입니다. 앱 프로세스와 Render Server는 서로 다른 프로세스이므로 직접 메서드 호출처럼 통신할 수 없습니다. 그래서 Core Animation은 Commit 단계에서 변경된 Layer Tree를 <b>IPC(Inter-Process Communication)</b> 로 Render Server에 전달합니다.</p>
<h5>Core Animation의 역할</h5>
<p>Core Animation은 "선언적 애니메이션 + GPU 가속" 프레임워크입니다. UIView의 모든 시각 속성(frame, alpha, transform 등)은 사실 CALayer의 속성입니다.</p>
<pre>// UIView는 사실 CALayer의 래퍼
view.alpha = 0.5
// → view.layer.opacity = 0.5
// → CALayer가 GPU에 전달
// → GPU가 알파 블렌딩 처리</pre>
<div class="highlight">💡 <b>면접 포인트</b>: "iOS의 렌더링은 앱 → Render Server → GPU의 3단계 파이프라인입니다. 앱은 Main Thread RunLoop의 업데이트 사이클에서 Layout, Display, Prepare, Commit을 처리하고, 변경된 CALayer Tree를 IPC로 Render Server에 전달합니다. Render Server는 이를 GPU 명령으로 변환하고, GPU는 렌더링과 합성을 수행한 뒤 다음 VSync 타이밍에 화면에 표시합니다."</div>

`},
{name:"Off-Screen Rendering (오프스크린 렌더링)",icon:"green",
detail:`
<h5>Off-Screen Rendering이 뭔가요?</h5>
<p>GPU가 메인 화면 버퍼가 아닌 별도의 임시 버퍼에 먼저 그린 후, 그 결과를 다시 메인 버퍼에 합성하는 동작입니다. 추가 렌더링 패스가 발생해 비용이 큽니다.</p>
<p>비용 구조는 다음과 같습니다.</p>
<ul><li>임시 버퍼 메모리 할당</li><li>GPU 컨텍스트 스위칭</li><li>임시 버퍼에 렌더링</li><li>다시 메인 버퍼에 합성</li></ul>
한두 번이면 무시할 수준이지만, 셀 50개에 다 발생하면 프레임 드롭의 주범이 됩니다.
<h5>오프스크린을 유발하는 대표적인 케이스</h5>
<b>1) cornerRadius + masksToBounds</b>
<pre>// ❌ 오프스크린 렌더링 발생 가능
imageView.layer.cornerRadius = 10
imageView.layer.masksToBounds = true
// 또는 imageView.clipsToBounds = true</pre>
<code>cornerRadius</code> 자체가 항상 문제라기보다, <code>masksToBounds</code>/<code>clipsToBounds</code>와 함께 사용되어 내부 콘텐츠를 둥근 영역에 맞게 잘라야 할 때 비용이 커질 수 있습니다. 시스템은 내용을 임시 버퍼에 먼저 그리고, radius 모양의 mask를 적용한 뒤, 그 결과를 다시 메인 화면 버퍼에 합성해야 할 수 있습니다.
<pre>// ✅ 대안 1: 이미지를 백그라운드에서 미리 둥글게 처리
// ✅ 대안 2: clipping이 필요 없는 구조로 분리
// ✅ 대안 3: 셀처럼 반복되는 UI에서는 사용 범위 최소화
imageView.layer.cornerRadius = 10
imageView.layer.cornerCurve = .continuous</pre>
<b>2) shadow without shadowPath</b>
<pre>// ❌ shadow 모양 계산을 위해 오프스크린
view.layer.shadowColor = UIColor.black.cgColor
view.layer.shadowOffset = CGSize(width: 0, height: 2)
view.layer.shadowOpacity = 0.5
<p>// ✅ shadowPath 명시
view.layer.shadowPath = UIBezierPath(
    roundedRect: view.bounds,
    cornerRadius: 10
).cgPath</pre></p>
<code>shadowPath</code>의 핵심은 그림자의 모양을 시스템이 추측하지 않게 개발자가 명시적으로 알려주는 것입니다. <code>shadowPath</code>가 없으면 Core Animation이 Layer의 alpha 영역을 분석해 shadow shape을 계산해야 할 수 있고, 이 과정에서 오프스크린 렌더링이 발생할 수 있습니다.
<b>3) Mask Layer</b>
<pre>// 항상 오프스크린
view.layer.mask = someMaskLayer</pre>
<b>4) Group Opacity</b>
<pre>// alpha 자체가 항상 오프스크린을 유발하는 것은 아님
// 여러 subview를 하나의 그룹처럼 투명 처리해야 하는 경우 비용이 커질 수 있음
view.alpha = 0.5
view.layer.allowsGroupOpacity = true</pre>
<code>alpha < 1</code>은 보통 알파 블렌딩 비용으로 이해하는 것이 더 정확합니다. 다만 여러 subview를 가진 그룹 전체에 opacity를 적용해야 하는 경우에는 먼저 그룹을 임시 버퍼에 그리고, 그 결과에 alpha를 적용해야 할 수 있습니다.
<h5>탐지 방법: Color Off-Screen-Rendered</h5>
<p>시뮬레이터의 Debug 메뉴 → Color Off-Screen-Rendered. 노란색으로 표시되는 영역이 오프스크린 렌더링 중입니다. Instruments의 Core Animation 템플릿에서도 확인할 수 있습니다.</p>
<h5>이미지 미리 처리</h5>
<pre>// 백그라운드에서 둥근 이미지 미리 만들기
extension UIImage {
    func withRoundedCorners(radius: CGFloat) -&gt; UIImage {
        let renderer = UIGraphicsImageRenderer(size: size)
        return renderer.image { ctx in
            let rect = CGRect(origin: .zero, size: size)
            UIBezierPath(roundedRect: rect, cornerRadius: radius).addClip()
            self.draw(in: rect)
        }
    }
}
// 이미지 자체를 둥글게 → cornerRadius 불필요 → 오프스크린 없음</pre>
<div class="highlight">💡 <b>면접 포인트</b>: "오프스크린 렌더링은 GPU가 바로 화면 버퍼에 그리지 못하고 임시 버퍼에 먼저 렌더링한 뒤 다시 합성하는 과정입니다. <code>cornerRadius + masksToBounds</code>, <code>shadowPath</code> 없는 shadow, mask layer, group opacity 상황이 대표적입니다. 셀처럼 반복되는 UI에서 많이 발생하면 GPU 합성 비용이 커져 스크롤 성능이 떨어질 수 있습니다."</div>

`},
{name:"UITableView/UICollectionView 성능",icon:"purple",
detail:`
<h5>Cell Reuse 메커니즘</h5>
<p>화면에 보이는 셀만 메모리에 유지하고, 화면 밖으로 나간 셀은 재사용 풀에 들어갑니다.</p>
<pre>// dequeueReusableCell 동작:
// 1. reuse pool에서 같은 identifier의 셀 검색
// 2. 있으면: prepareForReuse() 호출 → 반환
// 3. 없으면: 새 셀 생성 (init 또는 nib 로드)
<p>class MyCell: UITableViewCell {
    private var imageTask: URLSessionDataTask?
    private var currentImageURL: URL?
    var disposeBag = DisposeBag()</p>
<p>override func prepareForReuse() {
        super.prepareForReuse()
        // ⚠️ 여기서 이전 상태 초기화 필수
        titleLabel.text = nil
        imageView.image = nil           // 이전 이미지 제거
        badgeView.isHidden = true       // hidden/selected/highlight 상태 원복</p>
<p>imageTask?.cancel()             // 진행 중인 네트워크 취소
        imageTask = nil
        currentImageURL = nil</p>
<p>disposeBag = DisposeBag()       // RxSwift 구독 해제
    }
}</pre></p>
<p>이미지 다운로드를 취소하지 않으면, 이전 데이터 기준으로 시작된 비동기 요청이 셀 재사용 이후에도 살아 있다가 새 데이터가 바인딩된 셀에 잘못된 이미지를 넣을 수 있습니다. 취소만으로 부족한 경우가 있으므로 콜백 시점에 <code>currentImageURL == responseURL</code>처럼 현재 셀이 여전히 같은 데이터를 표현하는지도 확인하는 것이 안전합니다.</p>
<p>RxSwift를 사용하는 셀에서는 이전 데이터 기준으로 만들어진 구독이 살아 있으면 중복 바인딩이나 잘못된 UI 업데이트가 발생할 수 있습니다. 그래서 <code>prepareForReuse()</code>에서 <code>disposeBag = DisposeBag()</code>으로 셀 데이터 바인딩과 관련된 구독을 끊고, <code>configure</code> 시점에 새 데이터 기준으로 다시 바인딩합니다.</p>
<h5>Self-Sizing Cell의 비용</h5>
<p>Self-Sizing Cell은 Auto Layout을 기반으로 실제 셀 높이를 계산합니다. 구현은 편하지만 셀 내부 제약이 복잡하거나 뷰 계층이 깊으면 높이 계산 비용이 커질 수 있습니다. 또한 <code>estimatedRowHeight</code>가 실제 높이와 많이 다르면 contentSize 재계산, 스크롤 위치 보정, 레이아웃 재계산이 발생해 스크롤바가 튀거나 버벅일 수 있습니다.</p>
<pre>// estimatedRowHeight 미설정 시:
// 모든 셀의 높이를 한 번씩 계산해야 함 → 첫 로딩 느림
<p>// ✅ 실제 평균 높이에 가까운 추정값 제공
tableView.estimatedRowHeight = 80
tableView.rowHeight = UITableView.automaticDimension</p>
<p>// 더 빠른 방법: 높이 캐싱
var heightCache: [IndexPath: CGFloat] = [:]</p>
<p>func tableView(_ tv: UITableView, willDisplay cell: UITableViewCell, forRowAt ip: IndexPath) {
    heightCache[ip] = cell.frame.height
}</p>
<p>func tableView(_ tv: UITableView, estimatedHeightForRowAt ip: IndexPath) -&gt; CGFloat {
    return heightCache[ip] ?? 80
}</pre></p>
<code>UICollectionViewCompositionalLayout</code>에서도 원리는 같습니다. <code>estimated(1)</code>처럼 실제 셀 높이와 차이가 큰 값을 주면 초기 contentSize와 실제 레이아웃 결과 차이가 커져 invalidation과 스크롤 보정이 늘어날 수 있습니다. 동적 높이가 필요하다면 item과 group의 height를 모두 <code>estimated</code>로 두되, 실제 평균 높이에 가까운 값을 주는 것이 좋습니다.
<pre>let itemSize = NSCollectionLayoutSize(
    widthDimension: .fractionalWidth(1.0),
    heightDimension: .estimated(120)
)
let item = NSCollectionLayoutItem(layoutSize: itemSize)
<p>let groupSize = NSCollectionLayoutSize(
    widthDimension: .fractionalWidth(1.0),
    heightDimension: .estimated(120)
)
let group = NSCollectionLayoutGroup.vertical(
    layoutSize: groupSize,
    subitems: [item]
)</pre></p>
<h5>Prefetching (iOS 10+)</h5>
<p>스크롤 방향을 예측하여 곧 화면에 나타날 indexPath의 데이터나 리소스를 미리 준비합니다. 이미지 다운로드, 썸네일 준비, 페이지네이션 요청처럼 셀이 실제로 보이는 시점에 시작하면 늦을 수 있는 작업에 적합합니다. 단, 스크롤 방향이 바뀌면 필요 없는 요청이 생길 수 있으므로 반드시 취소 흐름을 함께 설계해야 합니다.</p>
<pre>extension VC: UITableViewDataSourcePrefetching {
    func tableView(_ tv: UITableView, prefetchRowsAt indexPaths: [IndexPath]) {
        let urls = indexPaths.compactMap { items[$0.row].imageURL }
        ImagePrefetcher(urls: urls).start()  // 미리 다운로드
    }
<p>func tableView(_ tv: UITableView, cancelPrefetchingForRowsAt ips: [IndexPath]) {
        // 스크롤 방향 변경 → 불필요한 프리페치 취소
    }
}</p>
<p>tableView.prefetchDataSource = self</pre></p>
<h5>Diffable Data Source (iOS 13+)</h5>
<p>기존 reload/insert/delete 호출의 크래시 위험을 줄이고, snapshot 기반으로 데이터 상태를 선언적으로 관리할 수 있습니다. 기존 indexPath 기반 batch update는 실제 data source 개수와 UI 업데이트 호출이 어긋나면 <code>Invalid update</code> 크래시가 발생할 수 있습니다. Diffable은 이전 snapshot과 새 snapshot을 비교해 insert/delete/move 같은 변경분을 계산하고 적용합니다.</p>
<pre>var dataSource: UITableViewDiffableDataSource&lt;Section, Item&gt;!
<p>dataSource = UITableViewDiffableDataSource(tableView: tableView) { tv, ip, item in
    let cell = tv.dequeueReusableCell(withIdentifier: "Cell", for: ip)
    cell.textLabel?.text = item.title
    return cell
}</p>
<p>func update(items: [Item]) {
    var snapshot = NSDiffableDataSourceSnapshot&lt;Section, Item&gt;()
    snapshot.appendSections([.main])
    snapshot.appendItems(items)
    dataSource.apply(snapshot, animatingDifferences: true)
    // 이전 snapshot과 새 snapshot을 비교해 변경분 적용
}</pre></p>
<code>reloadData()</code>는 리스트 전체를 다시 로드하는 명령에 가깝습니다. 보이는 셀 구성, 레이아웃 계산, display 작업이 다시 발생할 수 있어 스크롤 중 자주 호출하면 UX가 나빠질 수 있습니다. 반면 Diffable의 <code>apply(snapshot:)</code>은 이전 상태와 새 상태를 비교해 필요한 변경을 적용하므로 변경분 애니메이션과 안정성 측면에서 유리합니다.
<p>주의할 점은 <code>Hashable</code> 설계입니다. Diffable은 <code>Hashable</code>을 기반으로 아이템의 동일성(identity)을 판단합니다. 같은 아이템인데 매번 다른 hash가 나오면 불필요한 delete/insert와 깜빡임이 생길 수 있고, 반대로 실제 내용이 바뀌었는데 변경을 인지하지 못하면 UI가 갱신되지 않을 수 있습니다. 보통 안정적인 <code>id</code>로 identity를 잡고, 같은 아이템의 내용만 바뀐 경우에는 <code>reloadItems</code> 또는 iOS 15+의 <code>reconfigureItems</code>를 명시적으로 사용합니다.</p>
<pre>// iOS 15+ : 기존 셀을 최대한 유지하면서 content만 다시 configure
snapshot.reconfigureItems([item])
dataSource.apply(snapshot, animatingDifferences: true)
<p>// 셀 높이/구조가 바뀌는 경우에는 reloadItems 고려
snapshot.reloadItems([item])</pre></p>
<ul><li><code>reloadItems</code>: 셀을 다시 로드하는 성격이 강합니다. 셀 높이, 레이아웃, 셀 타입이 바뀌는 경우에 적합합니다.</li><li><code>reconfigureItems</code>: 기존 셀을 유지한 채 content만 다시 설정하는 더 가벼운 방식입니다. 좋아요 수, 북마크 상태, 읽음 상태처럼 레이아웃 구조가 크게 바뀌지 않는 업데이트에 적합합니다.</li></ul>
<h5>스크롤 버벅임을 의심하는 순서</h5>
<p>스크롤이 멈추거나 버벅이는 현상은 보통 Main Thread가 한 프레임 안에 다음 화면을 준비하지 못해서 발생합니다. 원인을 볼 때는 아래 순서로 확인하면 좋습니다.</p>
<ol><li><code>cellForRowAt</code> / <code>cellForItemAt</code>에서 동기 네트워크, 파일 IO, 이미지 디코딩, 복잡한 계산을 하고 있지 않은지 확인</li><li>이미지 다운로드/디코딩/리사이징이 백그라운드에서 처리되고, 최종 UI 반영만 Main Thread에서 일어나는지 확인</li><li>Self-Sizing Cell의 estimated height가 실제 평균 높이와 많이 차이 나지 않는지 확인</li><li>Auto Layout 제약이 복잡하거나 View 계층이 깊지 않은지 확인</li><li><code>cornerRadius + masksToBounds</code>, <code>shadowPath</code> 없는 shadow 등 오프스크린 렌더링이 많이 발생하지 않는지 확인</li><li>스크롤 중 <code>reloadData()</code>나 <code>apply(snapshot:)</code>를 과도하게 호출하지 않는지 확인</li><li><code>prepareForReuse()</code>에서 이전 비동기 작업과 구독을 정리하고 있는지 확인</li></ol>
<div class="highlight">💡 <b>면접 포인트</b>: "대규모 피드 화면에선 <code>prepareForReuse()</code>에서 이전 상태를 깨끗이 정리하는 게 핵심입니다. 이미지 다운로드 취소와 identity 검증을 하지 않으면 잘못된 셀에 이미지가 표시될 수 있습니다. 또한 스크롤 버벅임은 Main Thread 병목, 이미지 디코딩, Self-Sizing Cell, 오프스크린 렌더링, 과도한 reload/apply 호출을 순서대로 의심해볼 수 있습니다."</div>

`}
],
questions:[
{q:"UIKit 렌더링 파이프라인을 설명해주세요.",level:"basic",freq:true,
answer:"<p>UIKit 렌더링은 크게 앱 프로세스, Render Server, GPU 단계로 나눌 수 있습니다. 앱 프로세스에서는 Main Thread RunLoop의 업데이트 사이클에서 Layout, Display, Prepare, Commit이 처리됩니다. Layout은 View/Layer의 위치와 크기를 계산하고, Display는 <code>draw(_:)</code>나 텍스트 렌더링처럼 Layer에 표시할 콘텐츠를 준비합니다. Prepare는 이미지 디코딩이나 GPU 리소스 준비 단계이고, Commit에서는 변경된 CALayer Tree를 Core Animation transaction으로 묶어 IPC로 Render Server에 전달합니다. Render Server는 이를 GPU 명령으로 바꾸고, GPU가 렌더링과 합성을 수행한 뒤 다음 VSync 타이밍에 화면에 표시합니다.</p>"},
{q:"오프스크린 렌더링이 무엇이고 어떻게 탐지하나요?",level:"basic",freq:true,
answer:"<p>GPU가 메인 화면 버퍼가 아닌 임시 버퍼에 먼저 그린 후 합성하는 동작입니다. 추가 렌더링 패스와 임시 버퍼 비용이 발생해 성능에 좋지 않습니다. 주요 원인은 <code>cornerRadius + masksToBounds</code>, <code>shadowPath</code> 없는 shadow, mask layer, group opacity입니다. 단, <code>alpha</code>나 <code>cornerRadius</code> 자체가 항상 오프스크린을 유발한다고 말하기보다는 특정 조합에서 발생할 수 있다고 설명하는 것이 정확합니다.</p> <p>탐지는 시뮬레이터의 Debug → Color Off-Screen-Rendered 옵션으로 합니다. 노란색 영역이 오프스크린 렌더링 중인 부분이고, Instruments의 Core Animation 템플릿에서도 확인할 수 있습니다.</p>"},
{q:"prepareForReuse에서 무엇을 해야 하나요?",level:"basic",freq:true,
answer:"<p>셀이 재사용되기 직전 호출되므로, 이전 상태를 깨끗이 초기화해야 합니다.</p> <ol><li><code>imageView.image = nil</code> (깜빡임 방지)</li><li>진행 중인 이미지 다운로드 취소</li><li>RxSwift DisposeBag 재생성</li><li>Combine subscriptions 정리</li><li>애니메이션 취소</li><li>텍스트/색상 등 변경된 속성 원복</li></ol> 이미지 다운로드를 취소하지 않으면 비동기 콜백이 셀 재사용 이후에 도착해 잘못된 이미지를 셀에 넣을 수 있습니다. 취소만으로 부족한 경우 콜백 시점에 <code>currentImageURL == responseURL</code>로 identity를 한 번 더 검증하는 것이 안전합니다. 무거운 초기화(제약 조건 생성 등)는 init에서 한 번만 하고, prepareForReuse에서는 가벼운 리셋만 하는 것이 좋습니다."},
{q:"Diffable Data Source의 장점은?",level:"basic",freq:true,
answer:"<ol><li><b>크래시 방지</b>: 기존 insertRows/deleteRows의 numberOfRows 불일치 크래시를 줄일 수 있음</li><li><b>snapshot 기반 상태 관리</b>: 현재 UI 상태를 snapshot으로 선언적으로 표현</li><li><b>자동 변경분 계산</b>: 이전 snapshot과 새 snapshot을 비교해 insert/delete/move 적용</li><li><b>자동 애니메이션</b>: animatingDifferences로 자연스러운 전환</li><li><b>type-safe</b>: Section/Item 타입을 generic으로 명시</li></ol> 주의할 점은 <code>Hashable</code> 설계입니다. 같은 아이템인데 매번 다른 hash가 나오면 불필요한 delete/insert가 발생할 수 있고, 반대로 내용이 바뀌었는데 갱신 의도를 전달하지 않으면 UI가 업데이트되지 않을 수 있습니다. 같은 아이템의 내용만 바뀌는 경우에는 <code>reloadItems</code> 또는 iOS 15+의 <code>reconfigureItems</code>를 고려합니다."},
{q:"shadowPath를 명시하는 이유는?",level:"basic",freq:true,
answer:"<code>shadowPath</code> 없이 shadow를 적용하면, 시스템이 매 프레임마다 view의 alpha 채널을 분석해 shadow shape을 계산해야 할 수 있습니다. 이 계산이 오프스크린 렌더링을 유발해 성능이 떨어집니다. <code>shadowPath</code>를 미리 만들어주면 GPU가 shape을 알고 있어 직접 그리므로 오프스크린이 없습니다. <pre>view.layer.shadowPath = UIBezierPath(     roundedRect: view.bounds,     cornerRadius: 10 ).cgPath</pre>"},
{q:"setNeedsLayout, layoutIfNeeded, setNeedsDisplay의 차이는?",level:"basic",freq:true,
answer:"<code>setNeedsLayout()</code>은 위치와 크기 계산이 다시 필요하다고 표시만 하고, 다음 layout pass에서 <code>layoutSubviews()</code>가 호출되도록 예약합니다. <code>layoutIfNeeded()</code>는 레이아웃이 dirty 상태라면 다음 RunLoop를 기다리지 않고 즉시 layout pass를 수행합니다. 제약 변경 애니메이션에서 <code>constraint.constant</code> 변경 후 <code>animate</code> 블록 안에서 <code>layoutIfNeeded()</code>를 호출하는 패턴이 자주 쓰입니다. <code>setNeedsDisplay()</code>는 레이아웃이 아니라 drawing이 다시 필요하다고 표시하며, 다음 display pass에서 <code>draw(_:)</code>가 호출될 수 있도록 예약합니다."},
{q:"`reloadData()`와 Diffable의 `apply(snapshot:)`의 차이는?",level:"basic",freq:true,
answer:"<code>reloadData()</code>는 리스트 전체를 다시 로드하는 성격이 강합니다. 보이는 셀 구성, 레이아웃 계산, display 작업이 다시 발생할 수 있어 스크롤 중 자주 호출하면 UX가 나빠질 수 있고 셀 상태(스크롤 위치, 선택, 애니메이션 등)가 끊길 수 있습니다. 반면 Diffable의 <code>apply(snapshot:)</code>은 이전 snapshot과 새 snapshot을 비교해 insert/delete/move/reload 같은 변경분만 적용하므로 변경분 애니메이션과 안정성 측면에서 유리합니다. 같은 아이템의 내용만 바뀌었고 셀 구조나 높이가 그대로면 iOS 15+의 <code>reconfigureItems</code>를 사용해 기존 셀을 유지한 채 content만 다시 configure하는 것이 가장 가볍습니다."}

detail:`
<h5>iOS 13에서 바뀐 것</h5>
<p>iOS 13 이전: <code>UIApplicationDelegate</code>가 모든 lifecycle 관리.<br>iOS 13 이후: <code>UISceneDelegate</code>가 UI lifecycle 담당. AppDelegate는 앱 전역 설정만.</p>

<h5>왜 분리했나요?</h5>
<p>iPad의 멀티 윈도우 지원 때문입니다. 한 앱이 여러 창을 가질 수 있게 되면서, 각 창(Scene)이 독립적인 lifecycle을 가져야 했습니다.</p>

<h5>앱 상태 (Application State)</h5>
<pre>// 앱 전체 상태:
Not Running → Inactive → Active → Background → Suspended → Terminated
                              ↕
                        Inactive

// 각 상태 의미:
// Not Running: 실행 안 됨
// Inactive: 포그라운드지만 이벤트 못 받음 (전화 수신 등)
// Active: 정상 동작 중
// Background: 백그라운드 실행 중 (제한된 시간)
// Suspended: 백그라운드에서 실행 멈춤 (메모리만 점유)
// Terminated: 종료됨</pre>

<h5>Scene 상태</h5>
<pre>// 각 윈도우의 상태:
Unattached → Foreground Inactive → Foreground Active
                                ↕
                           Background → Suspended → 시스템이 메모리 회수 시 제거</pre>

<h5>앱 시작 시 콜백 순서</h5>
<pre>// 1. AppDelegate 메서드:
func application(_ app: UIApplication,
                 didFinishLaunchingWithOptions: ...) -> Bool {
    // 앱 전역 초기화 (최소한만!)
    // 너무 오래 걸리면 watchdog이 앱 강제 종료
    return true
}

// 2. SceneDelegate 메서드들:
func scene(_ scene: UIScene,
           willConnectTo session: UISceneSession,
           options: UIScene.ConnectionOptions) {
    // UI 설정, 첫 화면 구성
}

func sceneWillEnterForeground(_ scene: UIScene) {
    // 포그라운드 진입 준비
}

func sceneDidBecomeActive(_ scene: UIScene) {
    // 활성화 완료, 사용자 입력 받을 준비
}</pre>

<h5>백그라운드 진입 콜백 (가장 중요!)</h5>
<pre>func sceneWillResignActive(_ scene: UIScene) {
    // 비활성화 시작 (전화, 알림 센터 등)
    // 게임이라면 일시정지

func sceneDidEnterBackground(_ scene: UIScene) {
    // ⚠️ 5초 이내에 작업 완료해야 함!
    // 이 시점에 앱 스위처용 스냅샷 촬영됨
    
    // 해야 할 일:
    saveContext()           // Core Data 저장
    archiveUserDefaults()   // 설정 저장
    invalidateTimers()      // 리소스 정리
    
    // 더 긴 작업 필요하면 BGTaskScheduler 사용
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "iOS 13+ 멀티 윈도우 지원 시 SceneDelegate 기반으로 전환해야 합니다. AppDelegate는 앱 전역 설정(Firebase 초기화 등), SceneDelegate는 UI 상태 관리(네비게이션 스택 등)로 책임을 분리하는 게 깔끔합니다."
</div>
`},

{name:"Background Execution",icon:"green",
detail:`
<h5>백그라운드에서 코드 실행하기</h5>
<p>iOS는 배터리 보호를 위해 백그라운드 실행을 엄격히 제한합니다. 두 가지 방법이 있습니다.</p>

<h5>1. UIBackgroundTask (짧은 작업, ~30초)</h5>
<p>"앱이 백그라운드로 가도 이 작업은 마저 끝낼게요"라고 시스템에 요청합니다.</p>
<pre>func sceneDidEnterBackground(_ scene: UIScene) {
    var bgTask: UIBackgroundTaskIdentifier = .invalid
    
    bgTask = UIApplication.shared.beginBackgroundTask {
        // 시간 초과 시 호출됨
        UIApplication.shared.endBackgroundTask(bgTask)
        bgTask = .invalid
    }
    
    DispatchQueue.global().async {
        // 백그라운드에서 작업 수행
        self.uploadPendingData()
        
        // 작업 완료 시 반드시 endBackgroundTask 호출!
        UIApplication.shared.endBackgroundTask(bgTask)
        bgTask = .invalid
    }
}</pre>
<p>최대 ~30초 정도 보장됩니다. 종료 시점은 시스템이 결정합니다.</p>

<h5>2. BGTaskScheduler (iOS 13+, 긴 작업)</h5>
<p>"가끔 앱을 깨워서 백그라운드 작업을 시켜주세요"라고 시스템에 등록합니다.</p>
<pre>// Info.plist에 BGTaskSchedulerPermittedIdentifiers 등록 필요
// "com.app.refresh" 같은 식별자

// AppDelegate에서 등록:
BGTaskScheduler.shared.register(
    forTaskWithIdentifier: "com.app.refresh",
    using: nil
) { task in
    handleRefresh(task: task as! BGAppRefreshTask)
}

// 다음 실행 예약
func scheduleAppRefresh() {
    let request = BGAppRefreshTaskRequest(identifier: "com.app.refresh")
    request.earliestBeginDate = Date(timeIntervalSinceNow: 15 * 60)  // 15분 후
    try? BGTaskScheduler.shared.submit(request)
}

// 실제 처리
func handleRefresh(task: BGAppRefreshTask) {
    scheduleAppRefresh()  // 다음 실행 예약 (안 하면 더 이상 안 깨움!)
    
    let operation = RefreshOperation()
    
    task.expirationHandler = {
        operation.cancel()  // 시간 초과 시 취소
    }
    
    operation.completionBlock = {
        task.setTaskCompleted(success: !operation.isCancelled)
    }
    
    operationQueue.addOperation(operation)
}</pre>

<p>BGTaskScheduler는 시스템이 "지금 깨우는 게 좋겠다"는 시점에 호출합니다. 정확한 시간 보장은 없습니다.</p>

<h5>다른 백그라운드 모드</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">모드</th><th style="padding:10px;text-align:left">용도</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Audio</td><td style="padding:10px;border-top:1px solid var(--g2)">음악 재생 앱</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Location</td><td style="padding:10px;border-top:1px solid var(--g2)">내비, 운동 추적</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">VoIP</td><td style="padding:10px;border-top:1px solid var(--g2)">전화 앱</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Background fetch</td><td style="padding:10px;border-top:1px solid var(--g2)">콘텐츠 미리 가져오기</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Remote notifications</td><td style="padding:10px;border-top:1px solid var(--g2)">silent push로 깨우기</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Background processing</td><td style="padding:10px;border-top:1px solid var(--g2)">긴 처리 (BGProcessingTask)</td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> "iOS 백그라운드 실행은 배터리 보호를 위해 매우 제한적입니다. UIBackgroundTask는 즉각적인 짧은 마무리(~30초), BGTaskScheduler는 가끔 시스템이 깨워주는 정기 작업입니다. 정확한 타이밍이 필요하면 silent push를 활용하는 패턴도 있어요."
</div>
`},

{name:"앱이 종료되는 다양한 시점",icon:"purple",
detail:`
<h5>앱이 종료되는 5가지 경우</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>사용자가 명시적으로 종료</b>: 앱 스위처에서 위로 스와이프</li>
<li><b>메모리 부족 (Jetsam)</b>: 시스템이 백그라운드 앱을 죽임</li>
<li><b>크래시</b>: 예외 발생</li>
<li><b>Watchdog 타임아웃</b>: didFinishLaunching이 너무 오래 걸림</li>
<li><b>앱 업데이트</b>: 새 버전 설치 시</li>
</ol>

<h5>각 경우의 콜백</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">종료 시점</th><th style="padding:10px;text-align:left">applicationWillTerminate</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">사용자 강제 종료</td><td style="padding:10px;border-top:1px solid var(--g2)">호출 안 됨!</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">백그라운드에서 시스템 종료</td><td style="padding:10px;border-top:1px solid var(--g2)">호출됨 (Background 상태일 때만)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Suspended에서 메모리 회수</td><td style="padding:10px;border-top:1px solid var(--g2)">호출 안 됨!</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">크래시</td><td style="padding:10px;border-top:1px solid var(--g2)">호출 안 됨</td></tr>
</table>

<p><b>핵심: applicationWillTerminate를 절대 믿지 마세요.</b> 중요한 데이터는 sceneDidEnterBackground에서 저장해야 합니다.</p>

<h5>didReceiveMemoryWarning</h5>
<pre>// 시스템 메모리 압박 시 포그라운드 앱에 전달
override func didReceiveMemoryWarning() {
    super.didReceiveMemoryWarning()
    
    // 캐시 정리
    imageCache.removeAllObjects()
    
    // 사용 안 하는 리소스 해제
    if !isViewLoaded || view.window == nil {
        view = nil
    }
}

// 이 경고를 무시하면 시스템이 앱을 강제 종료!</pre>

<h5>State Restoration (상태 복원)</h5>
<p>앱이 시스템에 의해 종료된 후 다시 시작될 때, 사용자가 보던 화면으로 복원해주는 기능입니다.</p>
<pre>// SceneDelegate
func stateRestorationActivity(for scene: UIScene) -> NSUserActivity? {
    // 앱 종료 직전 호출 → 상태 저장
    let activity = NSUserActivity(activityType: "com.app.viewing")
    activity.userInfo = [
        "selectedTab": tabIndex,
        "scrollY": scrollOffset,
        "detailItemID": currentItemID ?? ""
    ]
    return activity
}

func scene(_ scene: UIScene,
           willConnectTo session: UISceneSession,
           options: UIScene.ConnectionOptions) {
    if let activity = session.stateRestorationActivity {
        // 저장된 상태로 복원
        let tab = activity.userInfo?["selectedTab"] as? Int ?? 0
        let scrollY = activity.userInfo?["scrollY"] as? CGFloat ?? 0
        // ... 복원 로직
    }
}

// 주의:
// - 사용자가 명시적으로 종료(스와이프 킬)하면 복원 안 됨
// - 민감 화면(비밀번호 입력 등)은 복원 안 하는 게 좋음</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "applicationWillTerminate에 의존하면 안 됩니다. 사용자 강제 종료, Suspended에서의 시스템 종료에는 호출되지 않거든요. 중요한 데이터는 항상 백그라운드 진입 시점(sceneDidEnterBackground)에 저장해야 안전합니다."
</div>
`}

],
questions:[
{q:"앱이 메모리 부족으로 종료될 때 어떤 콜백이 호출되나요?",level:"advanced",freq:true,
answer:"<b>아무것도 호출되지 않습니다.</b><br><br>Suspended 상태에서 시스템(Jetsam)이 조용히 프로세스를 종료시킵니다. <code>applicationWillTerminate</code>도, <code>sceneDidEnterBackground</code>도 다시 호출되지 않습니다.<br><br>그래서 중요한 데이터는 백그라운드 진입 시점(<code>sceneDidEnterBackground</code>)에 모두 저장해두어야 합니다. <code>applicationWillTerminate</code>는 백그라운드 상태에서 시스템이 정상 종료할 때만 호출되며, 신뢰할 수 없습니다."},

{q:"didReceiveMemoryWarning은 언제 오나요?",level:"basic",freq:true,
answer:"시스템 전체 메모리가 부족할 때 포그라운드 앱에 전달됩니다.<br><br>여기서 해야 할 일:<br>- 이미지/데이터 캐시 정리<br>- 보이지 않는 ViewController의 무거운 리소스 해제<br>- 재계산 가능한 데이터 버리기<br><br>이 경고를 무시하면 시스템이 앱을 강제 종료할 수 있습니다. 또한 여러 번 무시하면 시스템이 \"이 앱은 메모리를 안 줄이네\" 학습해서 더 빨리 죽일 수도 있어요."},

{q:"AppDelegate와 SceneDelegate는 어떻게 책임을 나누나요?",level:"basic",freq:true,
answer:"<b>AppDelegate:</b> 앱 전역 설정. 한 번만 실행되는 것들.<br>- Firebase, Crashlytics 초기화<br>- 푸시 알림 권한<br>- 앱 전역 상태 (로그인 등)<br>- BGTaskScheduler 등록<br><br><b>SceneDelegate:</b> 윈도우(Scene) 단위 UI 상태.<br>- 첫 화면 구성<br>- 네비게이션 스택<br>- 활성/비활성 전환 처리<br>- 상태 복원<br><br>iPad 멀티 윈도우에서 각 Scene이 독립적인 UI를 가지므로 분리가 의미 있습니다."},

{q:"BGTaskScheduler를 사용하는 이유는?",level:"basic",freq:false,
answer:"앱이 백그라운드/종료된 상태에서도 가끔 작업을 수행해야 할 때 사용합니다. 예: 배경 동기화, 정기적 데이터 갱신.<br><br>특징:<br>- 시스템이 \"지금 깨우면 좋겠다\"는 시점에 호출 (정확한 시간 보장 X)<br>- 배터리, 네트워크 상태 등을 고려해 시스템이 결정<br>- handleAppRefresh에서 다음 실행을 다시 예약해야 계속 깨움<br>- expirationHandler에서 작업 취소 처리 필수<br><br>UIBackgroundTask와 차이: BG는 단발성 마무리, BGTaskScheduler는 정기적 깨움."}
],
