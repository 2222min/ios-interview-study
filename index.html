{day:14,title:"Testing",
tags:["Unit Test","Mock","Protocol","async testing","Snapshot Test","XCTest"],
topics:[
{name:"Unit Test with Mock/Protocol",icon:"blue",
detail:`
<h5>왜 Mock이 필요한가요?</h5>
<p>Unit Test는 <b>하나의 단위만 격리하여 테스트</b>해야 합니다. 네트워크, DB 같은 외부 의존성을 실제로 호출하면 느리고 불안정합니다. Mock으로 대체하면 빠르고 결정적인 테스트가 가능합니다.</p>

<h5>Protocol 기반 Mock 패턴</h5>
<pre>// 1. Protocol 정의
protocol UserRepositoryProtocol {
    func fetchUser(id: String) async throws -&gt; User
    func saveUser(_ user: User) async throws
}

// 2. 실제 구현
class UserRepository: UserRepositoryProtocol {
    func fetchUser(id: String) async throws -&gt; User {
        let data = try await networkService.request(.user(id: id))
        return try JSONDecoder().decode(User.self, from: data)
    }
    func saveUser(_ user: User) async throws { ... }
}

// 3. Mock 구현
class MockUserRepository: UserRepositoryProtocol {
    var fetchUserResult: Result&lt;User, Error&gt; = .success(User.stub())
    var fetchUserCallCount = 0
    var lastFetchedID: String?
    
    func fetchUser(id: String) async throws -&gt; User {
        fetchUserCallCount += 1
        lastFetchedID = id
        return try fetchUserResult.get()
    }
    
    var saveUserCallCount = 0
    func saveUser(_ user: User) async throws {
        saveUserCallCount += 1
    }
}

// 4. ViewModel 테스트
class UserViewModelTests: XCTestCase {
    var sut: UserViewModel!
    var mockRepo: MockUserRepository!
    
    override func setUp() {
        mockRepo = MockUserRepository()
        sut = UserViewModel(repository: mockRepo)
    }
    
    func test_loadUser_성공시_user가_설정됨() async {
        // Given
        let expectedUser = User(id: "1", name: "철수")
        mockRepo.fetchUserResult = .success(expectedUser)
        
        // When
        await sut.loadUser(id: "1")
        
        // Then
        XCTAssertEqual(sut.user?.name, "철수")
        XCTAssertEqual(mockRepo.fetchUserCallCount, 1)
        XCTAssertEqual(mockRepo.lastFetchedID, "1")
    }
    
    func test_loadUser_실패시_에러상태() async {
        // Given
        mockRepo.fetchUserResult = .failure(NetworkError.notFound)
        
        // When
        await sut.loadUser(id: "999")
        
        // Then
        XCTAssertNil(sut.user)
        XCTAssertTrue(sut.showError)
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Protocol로 의존성을 추상화하고, 테스트에서는 Mock을 주입합니다. Mock에는 호출 횟수, 전달된 파라미터, 반환값을 제어할 수 있는 프로퍼티를 둡니다. 이렇게 하면 네트워크 없이도 모든 시나리오를 빠르게 검증할 수 있습니다."
</div>
`},

{name:"Async Testing & XCTest 패턴",icon:"green",
detail:`
<h5>async/await 테스트</h5>
<pre>// Swift 5.5+: 테스트 메서드에 async 키워드 사용
func test_fetchData_async() async throws {
    // Given
    let service = MockDataService()
    service.result = .success([Item(id: 1)])
    
    // When
    let items = try await service.fetchItems()
    
    // Then
    XCTAssertEqual(items.count, 1)
}

// Combine Publisher 테스트
func test_publisher_emitsValues() {
    let expectation = expectation(description: "값 방출")
    var received: [Int] = []
    
    let publisher = [1, 2, 3].publisher
    publisher
        .sink(
            receiveCompletion: { _ in expectation.fulfill() },
            receiveValue: { received.append($0) }
        )
        .store(in: &amp;cancellables)
    
    wait(for: [expectation], timeout: 1.0)
    XCTAssertEqual(received, [1, 2, 3])
}</pre>

<h5>XCTest 주요 패턴</h5>
<pre>// Given-When-Then (AAA: Arrange-Act-Assert)
func test_패턴명_조건_기대결과() {
    // Given (준비)
    let calculator = Calculator()
    
    // When (실행)
    let result = calculator.add(2, 3)
    
    // Then (검증)
    XCTAssertEqual(result, 5)
}

// setUp / tearDown 생명주기
class MyTests: XCTestCase {
    override class func setUp() { }       // 클래스 전체에서 1번
    override func setUp() { }             // 각 테스트 메서드 전
    override func setUpWithError() throws { }  // 에러 throw 가능
    
    override func tearDown() { }          // 각 테스트 메서드 후
    override class func tearDown() { }    // 클래스 전체에서 1번
}

// XCTExpectation: 비동기 대기
func test_notification_received() {
    let exp = expectation(description: "알림 수신")
    
    NotificationCenter.default.addObserver(
        forName: .dataLoaded, object: nil, queue: nil
    ) { _ in
        exp.fulfill()
    }
    
    dataLoader.load()
    wait(for: [exp], timeout: 5.0)
}</pre>

<h5>테스트 더블 종류</h5>
<ul>
<li><b>Stub</b>: 미리 정해진 값을 반환 (행위 검증 X)</li>
<li><b>Mock</b>: 호출 여부/횟수/파라미터를 검증</li>
<li><b>Spy</b>: 실제 동작 + 호출 기록</li>
<li><b>Fake</b>: 간소화된 실제 구현 (InMemory DB 등)</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "async 테스트는 메서드에 async throws를 붙여 자연스럽게 작성합니다. Combine은 expectation으로 비동기 완료를 기다립니다. 테스트는 Given-When-Then 구조로 가독성을 높이고, setUp에서 SUT와 Mock을 초기화하여 각 테스트의 독립성을 보장합니다."
</div>
`},

{name:"Snapshot Testing",icon:"purple",
detail:`
<h5>Snapshot Testing이란?</h5>
<p>UI 컴포넌트를 이미지로 렌더링하여 <b>이전에 저장된 참조 이미지와 픽셀 단위로 비교</b>하는 테스트 방식입니다. UI 회귀를 자동으로 감지합니다.</p>

<h5>swift-snapshot-testing 라이브러리 사용</h5>
<pre>import SnapshotTesting
import XCTest

class ProfileViewTests: XCTestCase {
    
    func test_profileView_기본상태() {
        let view = ProfileView(user: .stub())
        
        assertSnapshot(
            of: view,
            as: .image(layout: .device(config: .iPhone13))
        )
    }
    
    func test_profileView_다크모드() {
        let view = ProfileView(user: .stub())
        
        assertSnapshot(
            of: view,
            as: .image(
                layout: .device(config: .iPhone13),
                traits: UITraitCollection(userInterfaceStyle: .dark)
            )
        )
    }
    
    func test_profileView_긴_이름() {
        let user = User(name: "매우 긴 이름을 가진 사용자입니다 테스트")
        let view = ProfileView(user: user)
        
        assertSnapshot(
            of: view,
            as: .image(layout: .device(config: .iPhone13))
        )
    }

<h5>Snapshot Testing 전략</h5>
<pre>// 여러 디바이스/상태 한번에 테스트

detail:`
<h5>Keychain이란?</h5>
<p>iOS에서 민감한 데이터(비밀번호, 토큰, 인증서)를 <b>암호화하여 안전하게 저장</b>하는 시스템 서비스입니다. 앱이 삭제되어도 데이터가 유지될 수 있습니다.</p>

<h5>Keychain + Face ID/Touch ID</h5>
<pre>import Security
import LocalAuthentication

class KeychainManager {
    
    // Biometric 보호된 항목 저장
    func saveWithBiometric(token: String, account: String) throws {
        let context = LAContext()
        context.touchIDAuthenticationAllowableReuseDuration = 10
        
        // Access Control: 생체인증 필요
        guard let accessControl = SecAccessControlCreateWithFlags(
            nil,
            kSecAttrAccessibleWhenPasscodeSetThisDeviceOnly,
            .biometryCurrentSet,  // 현재 등록된 생체정보로만
            nil
        ) else {
            throw KeychainError.accessControlFailed
        }
        
        let query: [String: Any] = [
            kSecClass as String: kSecClassGenericPassword,
            kSecAttrAccount as String: account,
            kSecValueData as String: token.data(using: .utf8)!,
            kSecAttrAccessControl as String: accessControl,
            kSecUseAuthenticationContext as String: context
        ]
        
        let status = SecItemAdd(query as CFDictionary, nil)
        guard status == errSecSuccess else {
            throw KeychainError.saveFailed(status)
        }
    }
    
    // Biometric 인증 후 읽기
    func readWithBiometric(account: String) throws -&gt; String {
        let query: [String: Any] = [
            kSecClass as String: kSecClassGenericPassword,
            kSecAttrAccount as String: account,
            kSecReturnData as String: true,
            kSecUseOperationPrompt as String: "인증이 필요합니다"
        ]
        
        var result: AnyObject?
        let status = SecItemCopyMatching(query as CFDictionary, &amp;result)
        
        guard status == errSecSuccess,
              let data = result as? Data,
              let token = String(data: data, encoding: .utf8) else {
            throw KeychainError.readFailed(status)
        }
        return token
    }
}</pre>

<h5>kSecAttrAccessible 옵션</h5>
<table style="width:100%;font-size:12px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:8px;text-align:left">옵션</th><th style="padding:8px;text-align:left">접근 가능 시점</th><th style="padding:8px;text-align:left">용도</th></tr>
<tr><td style="padding:8px;border-top:1px solid var(--g2)">WhenUnlocked</td><td style="padding:8px;border-top:1px solid var(--g2)">잠금 해제 시</td><td style="padding:8px;border-top:1px solid var(--g2)">일반 토큰</td></tr>

</table>

<div class="highlight">
<b>💡 면접 포인트:</b> "Keychain은 Secure Enclave와 연동되어 하드웨어 수준 암호화를 제공합니다. biometryCurrentSet 플래그를 사용하면 생체정보가 변경(새 지문 등록)되면 기존 항목에 접근할 수 없어 보안이 강화됩니다. ThisDeviceOnly 옵션으로 iCloud 백업에서 제외할 수 있습니다."
</div>

{name:"Certificate Pinning 구현",icon:"green",
detail:`
<h5>Certificate Pinning이란?</h5>
<p>앱이 서버와 통신할 때 <b>미리 알고 있는 인증서(또는 공개키)만 신뢰</b>하도록 하는 보안 기법입니다. 중간자 공격(MITM)을 방지합니다.</p>

<h5>URLSession으로 구현</h5>
<pre>class PinnedSessionDelegate: NSObject, URLSessionDelegate {
    
    // 서버의 공개키 해시 (SHA-256)
    private let pinnedPublicKeyHashes: Set&lt;String&gt; = [
        "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=",  // 현재 인증서
        "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="   // 백업 인증서
    ]
    
    func urlSession(
        _ session: URLSession,
        didReceive challenge: URLAuthenticationChallenge,
        completionHandler: @escaping (URLSession.AuthChallengeDisposition, URLCredential?) -&gt; Void
    ) {
        guard challenge.protectionSpace.authenticationMethod == NSURLAuthenticationMethodServerTrust,
              let serverTrust = challenge.protectionSpace.serverTrust else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // 인증서 체인 검증
        let policies = [SecPolicyCreateSSL(true, challenge.protectionSpace.host as CFString)]
        SecTrustSetPolicies(serverTrust, policies as CFTypeRef)
        
        var error: CFError?
        guard SecTrustEvaluateWithError(serverTrust, &amp;error) else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        // 공개키 해시 비교
        guard let serverCert = SecTrustGetCertificateAtIndex(serverTrust, 0),
              let serverPublicKey = SecCertificateCopyKey(serverCert),
              let serverPublicKeyData = SecKeyCopyExternalRepresentation(serverPublicKey, nil) as Data? else {
            completionHandler(.cancelAuthenticationChallenge, nil)
            return
        }
        
        let hash = sha256(data: serverPublicKeyData)
        let hashBase64 = hash.base64EncodedString()
        
        if pinnedPublicKeyHashes.contains(hashBase64) {
            completionHandler(.useCredential, URLCredential(trust: serverTrust))
        } else {
            completionHandler(.cancelAuthenticationChallenge, nil)
        }
    }
}</pre>

<h5>Pinning 전략</h5>
<ul>
<li><b>Certificate Pinning</b>: 인증서 전체를 비교. 인증서 갱신 시 앱 업데이트 필요</li>
<li><b>Public Key Pinning</b>: 공개키만 비교. 인증서 갱신해도 키가 같으면 OK (권장)</li>
<li><b>백업 핀</b>: 최소 2개 이상의 핀을 포함하여 인증서 교체 시 대응</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "Public Key Pinning을 사용하여 인증서 갱신에도 유연하게 대응합니다. 반드시 백업 핀을 포함하고, 핀 불일치 시 앱이 완전히 동작 불능이 되지 않도록 fallback 전략(강제 업데이트 안내 등)을 마련합니다."
</div>
`},

{name:"Jailbreak 탐지와 ATS",icon:"purple",
detail:`
<h5>Jailbreak 탐지 방법</h5>
<pre>class SecurityChecker {
    
    static func isJailbroken() -&gt; Bool {
        #if targetEnvironment(simulator)
        return false
        #else
        // 1. 의심 파일 존재 확인
        let suspiciousPaths = [
            "/Applications/Cydia.app",
            "/Library/MobileSubstrate/MobileSubstrate.dylib",
            "/bin/bash",
            "/usr/sbin/sshd",
            "/etc/apt",
            "/private/var/lib/apt/"
        ]
        for path in suspiciousPaths {
            if FileManager.default.fileExists(atPath: path) {
                return true
            }
        }
        
        // 2. 샌드박스 밖 쓰기 시도
        let testPath = "/private/jailbreak_test"
        do {
            try "test".write(toFile: testPath, atomically: true, encoding: .utf8)
            try FileManager.default.removeItem(atPath: testPath)
            return true  // 쓰기 성공 = 탈옥
        } catch {
            // 쓰기 실패 = 정상
        }
        
        // 3. URL Scheme 확인
        if let url = URL(string: "cydia://package/com.test"),
           UIApplication.shared.canOpenURL(url) {
            return true
        }
        
        // 4. dyld 이미지 검사 (DYLD_INSERT_LIBRARIES)
        let count = _dyld_image_count()
        for i in 0..&lt;count {
            if let name = _dyld_get_image_name(i) {
                let imageName = String(cString: name)
                if imageName.contains("MobileSubstrate") ||
                   imageName.contains("cycript") {
                    return true
                }
            }
        }
        
        return false
        #endif
    }
}</pre>

<h5>App Transport Security (ATS)</h5>
<pre>// Info.plist 설정
// 기본: 모든 HTTP 차단, HTTPS만 허용

// 특정 도메인 예외 (최소한으로)
&lt;key&gt;NSAppTransportSecurity&lt;/key&gt;
&lt;dict&gt;
    &lt;key&gt;NSExceptionDomains&lt;/key&gt;
    &lt;dict&gt;
        &lt;key&gt;legacy-api.example.com&lt;/key&gt;
        &lt;dict&gt;
            &lt;key&gt;NSExceptionAllowsInsecureHTTPLoads&lt;/key&gt;
            &lt;true/&gt;
            &lt;key&gt;NSExceptionMinimumTLSVersion&lt;/key&gt;
            &lt;string&gt;TLSv1.2&lt;/string&gt;
        &lt;/dict&gt;
    &lt;/dict&gt;
&lt;/dict&gt;</pre>

<h5>ATS 요구사항</h5>
<ul>
<li>TLS 1.2 이상</li>
<li>Forward Secrecy 지원 암호화 스위트</li>
<li>SHA-256 이상의 인증서 서명</li>
<li>2048비트 이상 RSA 키 또는 256비트 이상 ECC 키</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "Jailbreak 탐지는 다층 방어로 구현합니다. 파일 존재 확인, 샌드박스 무결성, dyld 이미지 검사를 조합합니다. 단, 탈옥 탐지는 우회 가능하므로 서버 측 검증과 함께 사용해야 합니다. ATS는 기본적으로 HTTPS를 강제하며, 예외는 최소한으로 설정하고 App Review에서 사유를 설명해야 합니다."
</div>

{q:"Keychain과 UserDefaults의 차이는?",level:"basic",freq:true,
answer:"<b>보안 수준이 완전히 다릅니다.</b><br><br>• <b>UserDefaults</b>: plist 파일로 저장, 암호화 없음, 탈옥 시 쉽게 읽힘. 설정값, 플래그 등 비민감 데이터용<br>• <b>Keychain</b>: Secure Enclave 연동 암호화, 앱 삭제 후에도 유지 가능, 생체인증 연동 가능. 토큰, 비밀번호, 인증서 등 민감 데이터용<br><br>절대 UserDefaults에 저장하면 안 되는 것: 액세스 토큰, 비밀번호, API 키, 개인정보"},

{day:16,title:"Image Processing & Caching",
tags:["Downsampling","ImageIO","NSCache","Memory Cost","Kingfisher","SDWebImage"],
topics:[
{name:"Downsampling with ImageIO",icon:"blue",
detail:`
<h5>왜 Downsampling이 필요한가요?</h5>
<p>4000x3000 픽셀 사진을 100x100 UIImageView에 표시한다고 해봅시다. UIImage로 그냥 로드하면 <b>48MB(4000×3000×4bytes)</b>가 메모리에 올라갑니다. 실제 필요한 건 40KB(100×100×4bytes)뿐인데요.</p>

<h5>ImageIO를 사용한 효율적 Downsampling</h5>
<pre>import ImageIO

func downsample(imageAt url: URL, to pointSize: CGSize, scale: CGFloat) -&gt; UIImage? {
    let maxDimensionInPixels = max(pointSize.width, pointSize.height) * scale
    
    let imageSourceOptions = [kCGImageSourceShouldCache: false] as CFDictionary
    guard let imageSource = CGImageSourceCreateWithURL(url as CFURL, imageSourceOptions) else {
        return nil
    }
    
    let downsampleOptions = [
        kCGImageSourceCreateThumbnailFromImageAlways: true,
        kCGImageSourceShouldCacheImmediately: true,
        kCGImageSourceCreateThumbnailWithTransform: true,
        kCGImageSourceThumbnailMaxPixelSize: maxDimensionInPixels
    ] as CFDictionary
    
    guard let downsampledImage = CGImageSourceCreateThumbnailAtIndex(imageSource, 0, downsampleOptions) else {
        return nil
    }
    
    return UIImage(cgImage: downsampledImage)
}

// 사용 예시
let thumbnailSize = CGSize(width: 100, height: 100)
let image = downsample(
    imageAt: imageURL,
    to: thumbnailSize,
    scale: UIScreen.main.scale  // @2x, @3x 대응
)</pre>

<h5>UIImage(contentsOfFile:) vs ImageIO</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">UIImage</th><th style="padding:10px;text-align:left">ImageIO</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">메모리</td><td style="padding:10px;border-top:1px solid var(--g2)">전체 이미지 디코딩</td><td style="padding:10px;border-top:1px solid var(--g2)">필요한 크기만 디코딩</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">디코딩 시점</td><td style="padding:10px;border-top:1px solid var(--g2)">렌더링 시 (메인 스레드)</td><td style="padding:10px;border-top:1px solid var(--g2)">명시적 제어 가능</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">EXIF 회전</td><td style="padding:10px;border-top:1px solid var(--g2)">자동 처리</td><td style="padding:10px;border-top:1px solid var(--g2)">CreateThumbnailWithTransform으로 처리</td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> "ImageIO의 CGImageSourceCreateThumbnailAtIndex는 전체 이미지를 메모리에 올리지 않고 필요한 크기로만 디코딩합니다. 컬렉션뷰에서 수백 개의 이미지를 표시할 때 메모리 사용량을 90% 이상 줄일 수 있습니다. kCGImageSourceShouldCache: false로 원본 캐싱을 방지하는 것이 핵심입니다."
</div>
`},

{name:"NSCache 3-Level Caching 전략",icon:"green",
detail:`
<h5>3단계 캐싱 구조</h5>
<pre>// Level 1: Memory Cache (NSCache)
// Level 2: Disk Cache (FileManager)
// Level 3: Network (URLSession)
//
// 조회 순서: Memory → Disk → Network
// 저장 순서: Network → Disk → Memory

class ImageCache {
    static let shared = ImageCache()
    
    // Level 1: 메모리 캐시
    private let memoryCache: NSCache&lt;NSString, UIImage&gt; = {
        let cache = NSCache&lt;NSString, UIImage&gt;()
        cache.countLimit = 100           // 최대 100개
        cache.totalCostLimit = 50 * 1024 * 1024  // 50MB
        return cache
    }()
    
    // Level 2: 디스크 캐시
    private let diskCacheURL: URL = {
        let paths = FileManager.default.urls(for: .cachesDirectory, in: .userDomainMask)
        return paths[0].appendingPathComponent("ImageCache")
    }()
    
    func image(for url: URL) async -&gt; UIImage? {
        let key = url.absoluteString as NSString
        
        // Level 1: 메모리 확인
        if let cached = memoryCache.object(forKey: key) {
            return cached
        }
        
        // Level 2: 디스크 확인
        let diskPath = diskCacheURL.appendingPathComponent(key.hash.description)
        if let diskImage = UIImage(contentsOfFile: diskPath.path) {
            memoryCache.setObject(diskImage, forKey: key, cost: diskImage.memoryCost)
            return diskImage
        }
        
        // Level 3: 네트워크
        guard let (data, _) = try? await URLSession.shared.data(from: url),
              let image = UIImage(data: data) else {
            return nil
        }
        
        // 캐시 저장
        memoryCache.setObject(image, forKey: key, cost: image.memoryCost)
        try? data.write(to: diskPath)
        
        return image
    }
}</pre>

<h5>NSCache의 특징</h5>
<ul>
<li><b>Thread-safe</b>: 별도 동기화 없이 여러 스레드에서 접근 가능</li>
<li><b>Auto-eviction</b>: 메모리 압박 시 자동으로 항목 제거</li>
<li><b>Cost 기반 관리</b>: totalCostLimit으로 메모리 상한 설정</li>
<li><b>Dictionary와 차이</b>: 키를 strong 참조하지 않음, 메모리 경고 시 자동 정리</li>
</ul>

<h5>이미지 메모리 비용 계산</h5>
<pre>extension UIImage {
    var memoryCost: Int {
        guard let cgImage = self.cgImage else { return 0 }
        return cgImage.bytesPerRow * cgImage.height
        // = width * height * 4 (RGBA, 픽셀당 4바이트)
    }
}

// 예시:
// 1920x1080 이미지 = 1920 * 1080 * 4 = 8,294,400 bytes ≈ 8MB
// 100x100 썸네일 = 100 * 100 * 4 = 40,000 bytes ≈ 40KB</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "3단계 캐싱으로 Memory → Disk → Network 순서로 조회합니다. NSCache는 thread-safe하고 메모리 압박 시 자동 정리됩니다. cost를 이미지의 실제 메모리 크기(width×height×4)로 설정하여 totalCostLimit으로 메모리 상한을 관리합니다."
</div>
`},

{name:"Kingfisher / SDWebImage 패턴",icon:"orange",
detail:`
<h5>Kingfisher 핵심 아키텍처</h5>
<pre>// Kingfisher 사용법
import Kingfisher

imageView.kf.setImage(
    with: url,
    placeholder: UIImage(named: "placeholder"),
    options: [
        .processor(DownsamplingImageProcessor(size: imageView.bounds.size)),
        .scaleFactor(UIScreen.main.scale),
        .cacheOriginalImage,
        .transition(.fade(0.3))
    ],
    completionHandler: { result in
        switch result {
        case .success(let value):
            print("캐시 타입: \\(value.cacheType)")  // .memory, .disk, .none
        case .failure(let error):
            print("에러: \\(error)")
        }
    }
)

// 캐시 관리
ImageCache.default.memoryStorage.config.totalCostLimit = 300 * 1024 * 1024
ImageCache.default.diskStorage.config.sizeLimit = 1000 * 1024 * 1024
ImageCache.default.diskStorage.config.expiration = .days(7)

// 캐시 정리
ImageCache.default.clearMemoryCache()
ImageCache.default.clearDiskCache { print("디스크 캐시 정리 완료") }</pre>

<h5>UICollectionView에서의 이미지 처리 패턴</h5>
<pre>class ImageCell: UICollectionViewCell {
    private let imageView = UIImageView()
    
    override func prepareForReuse() {
        super.prepareForReuse()
        // 재사용 시 이전 다운로드 취소 (중요!)
        imageView.kf.cancelDownloadTask()
        imageView.image = nil
    }
    
    func configure(with url: URL) {
        imageView.kf.setImage(
            with: url,
            options: [
                .processor(DownsamplingImageProcessor(size: imageView.bounds.size)),
                .scaleFactor(UIScreen.main.scale),
                .transition(.fade(0.2)),
                .cacheOriginalImage
            ]
        )
    }
}

// Prefetching으로 스크롤 성능 향상
extension ViewController: UICollectionViewDataSourcePrefetching {
    func collectionView(_ collectionView: UICollectionView, 
                       prefetchItemsAt indexPaths: [IndexPath]) {
        let urls = indexPaths.compactMap { items[$0.item].imageURL }
        ImagePrefetcher(urls: urls).start()
    }
    
    func collectionView(_ collectionView: UICollectionView, 
                       cancelPrefetchingForItemsAt indexPaths: [IndexPath]) {
        let urls = indexPaths.compactMap { items[$0.item].imageURL }
        ImagePrefetcher(urls: urls).stop()
    }
}</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Kingfisher는 다운로드, 캐싱, 이미지 처리를 통합 관리합니다. prepareForReuse에서 이전 다운로드를 취소하여 셀 재사용 시 잘못된 이미지가 표시되는 것을 방지합니다. Prefetching으로 스크롤 전에 미리 다운로드하여 사용자 경험을 향상시킵니다."
</div>
`}
],

{day:17,title:"App Launch Time 최적화",
tags:["dyld","pre-main","Static Framework","Dynamic Framework","lazy initialization"],
topics:[
{name:"dyld 로딩과 pre-main 시간",icon:"blue",
detail:`
<h5>앱 실행 과정 (pre-main)</h5>
<p>사용자가 앱 아이콘을 탭한 순간부터 main() 함수가 호출되기까지의 시간입니다. Apple은 <b>400ms 이내</b>를 권장합니다.</p>

<pre>// 앱 실행 단계
//
// ┌─────────────────────────────────────────────┐
// │ 1. Kernel: 프로세스 생성, ASLR 적용          │
// ├─────────────────────────────────────────────┤
// │ 2. dyld: Dynamic Linker                     │
// │    ├─ Load dylibs (동적 라이브러리 로드)      │
// │    ├─ Rebase (ASLR 오프셋 적용)             │
// │    ├─ Bind (외부 심볼 연결)                  │
// │    └─ ObjC Runtime (클래스 등록, 카테고리)    │
// ├─────────────────────────────────────────────┤
// │ 3. Static Initializers (+load, __attribute__)│
// ├─────────────────────────────────────────────┤
// │ 4. main() 호출                              │
// ├─────────────────────────────────────────────┤
// │ 5. UIApplicationMain                        │
// │    ├─ AppDelegate 초기화                     │
// │    ├─ didFinishLaunchingWithOptions          │
// │    └─ 첫 화면 렌더링                         │
// └─────────────────────────────────────────────┘</pre>

<h5>pre-main 시간 측정</h5>
<pre>// Xcode에서 측정: Edit Scheme → Run → Arguments
// Environment Variables에 추가:
// DYLD_PRINT_STATISTICS = 1

// 출력 예시:
// Total pre-main time: 1.2 seconds (100.0%)
//          dylib loading time: 350ms (29.1%)
//         rebase/binding time:  80ms (6.6%)
//     ObjC setup time:         120ms (10.0%)
//          initializer time:   650ms (54.1%)
//          slowest intializers:
//            libSystem.B.dylib:   8ms
//            libMainThreadChecker: 42ms
//            MyApp:              580ms</pre>

<h5>dyld 3 / dyld 4 개선사항</h5>
<ul>
<li><b>Launch Closure 캐싱</b>: 첫 실행 시 분석 결과를 캐싱하여 이후 실행 가속</li>
<li><b>Pre-warming</b>: iOS 15+에서 시스템이 앱을 미리 부분 실행</li>
<li><b>dyld shared cache</b>: 시스템 프레임워크를 미리 최적화하여 공유</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "pre-main 시간은 DYLD_PRINT_STATISTICS로 측정합니다. dylib 로딩, rebase/binding, ObjC 런타임 설정, static initializer 순서로 실행됩니다. Dynamic Framework 수를 줄이고, +load 메서드를 제거하며, 불필요한 ObjC 클래스를 정리하는 것이 핵심 최적화입니다."
</div>
`},

{name:"Static vs Dynamic Framework",icon:"green",
detail:`
<h5>Static Framework</h5>
<p>빌드 시 앱 바이너리에 <b>코드가 복사</b>됩니다. 실행 시 별도 로딩이 필요 없습니다.</p>

<h5>Dynamic Framework</h5>
<p>별도 바이너리로 존재하며, <b>실행 시 dyld가 로드</b>합니다. 로딩 시간이 추가됩니다.</p>

<pre>// 비교
// Static Framework:
// ┌──────────────────┐
// │   MyApp Binary   │
// │  ┌────────────┐  │
// │  │ FrameworkA │  │  ← 코드가 앱에 포함됨
// │  │ FrameworkB │  │
// │  └────────────┘  │
// └──────────────────┘
// 장점: 실행 시 로딩 없음, 앱 시작 빠름
// 단점: 앱 바이너리 크기 증가, 빌드 시간 증가

// Dynamic Framework:
// ┌──────────────────┐  ┌────────────┐
// │   MyApp Binary   │  │ FrameworkA │  ← 별도 파일
// │   (참조만 포함)   │  │ FrameworkB │
// └──────────────────┘  └────────────┘
// 장점: 코드 공유 가능, 빌드 캐시 효과
// 단점: dyld 로딩 시간 추가</pre>

<h5>Apple 권장사항</h5>
<pre>// Dynamic Framework 개수 제한
// Apple WWDC 2016: "6개 이하 권장"
// 각 Dynamic Framework 로딩에 약 10~30ms 소요
// 20개면 200~600ms가 pre-main에 추가됨

// 실무 전략:
// 1. Feature 모듈: Static (앱 시작 영향 없음)
// 2. Core/공유 모듈: Static (광범위 사용)
// 3. 개발 빌드: Dynamic (빠른 증분 빌드)
// 4. 릴리즈 빌드: Static (빠른 앱 시작)</pre>

<h5>Tuist/SPM에서 설정</h5>
<pre>// SPM: 기본 Static, Dynamic으로 변경 가능
let package = Package(
    products: [
        .library(name: "MyLib", type: .static, targets: ["MyLib"]),
        .library(name: "MyDynLib", type: .dynamic, targets: ["MyDynLib"])
    ]
)

// Tuist
let framework = Target(
    name: "FeatureHome",
    product: .staticFramework,  // 또는 .framework (dynamic)
    ...
)</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Static Framework는 앱 바이너리에 포함되어 실행 시 로딩이 없고, Dynamic Framework는 dyld가 런타임에 로드합니다. 릴리즈 빌드에서는 Static을 사용하여 앱 시작 시간을 최적화하고, 개발 빌드에서는 Dynamic으로 빌드 시간을 단축합니다. Apple은 Dynamic Framework를 6개 이하로 권장합니다."
</div>
`},

{name:"Lazy Initialization 패턴",icon:"orange",
detail:`
<h5>앱 시작 시 모든 것을 초기화하지 마세요</h5>
<p>didFinishLaunchingWithOptions에서 모든 SDK와 서비스를 초기화하면 앱 시작이 느려집니다. <b>실제로 필요한 시점까지 초기화를 지연</b>하는 것이 핵심입니다.</p>

<h5>Lazy 초기화 전략</h5>
<pre>// ❌ 모든 것을 앱 시작 시 초기화
func application(_ application: UIApplication,
    didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -&gt; Bool {
    
    FirebaseApp.configure()          // 200ms
    Crashlytics.configure()          // 50ms
    AnalyticsSDK.initialize()        // 100ms
    PushNotification.register()      // 30ms
    DeepLinkManager.setup()          // 20ms
    ABTestingSDK.initialize()        // 80ms
    // 총 480ms 추가!
    return true
}

// ✅ 우선순위별 분리
func application(_ application: UIApplication,
    didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -&gt; Bool {
    
    // Phase 1: 필수 (첫 화면 표시에 필요)
    CoreDataStack.shared.setup()
    AuthManager.shared.restoreSession()
    
    return true
}

// Phase 2: 첫 화면 표시 후
func applicationDidBecomeActive(_ application: UIApplication) {
    DispatchQueue.main.async {
        FirebaseApp.configure()
        Crashlytics.configure()
    }
}

// Phase 3: 실제 사용 시점 (Lazy)
class AnalyticsManager {
    static let shared: AnalyticsManager = {
        let manager = AnalyticsManager()
        manager.initialize()  // 첫 접근 시에만 초기화
        return manager
    }()
}</pre>

<h5>Swift의 lazy 키워드 활용</h5>
<pre>class ViewController: UIViewController {
    // 화면에 표시될 때만 생성
    lazy var heavyView: ComplexChartView = {
        let view = ComplexChartView()
        view.configure(with: chartData)
        return view
    }()
    
    // 필요할 때만 생성되는 포맷터
    lazy var dateFormatter: DateFormatter = {
        let formatter = DateFormatter()
        formatter.dateFormat = "yyyy-MM-dd"
        formatter.locale = Locale(identifier: "ko_KR")
        return formatter
    }()
}

// 주의: lazy는 thread-safe하지 않음!
// 여러 스레드에서 동시 접근 시 두 번 초기화될 수 있음
// 해결: static let (dispatch_once 보장)
class Singleton {
    static let shared = Singleton()  // thread-safe
    private init() { }
}</pre>

<h5>Launch Time 측정 도구</h5>
<ul>
<li><b>DYLD_PRINT_STATISTICS</b>: pre-main 시간 분석</li>
<li><b>Instruments → App Launch</b>: 전체 실행 과정 프로파일링</li>
<li><b>MetricKit</b>: 실제 사용자 기기에서의 실행 시간 수집</li>
<li><b>os_signpost</b>: 커스텀 구간 측정</li>
</ul>

<div class="highlight">
<b>💡 면접 답변:</b> "앱 시작 최적화는 세 단계로 접근합니다. 첫째, pre-main 최적화(Dynamic Framework 줄이기, +load 제거). 둘째, didFinishLaunching 최소화(필수 초기화만). 셋째, lazy initialization으로 나머지를 지연. 저는 이 전략으로 앱 시작 시간을 2.1초에서 0.8초로 단축한 경험이 있습니다."
</div>
`}
],
questions:[
{q:"앱 시작 시간 최적화에서 가장 효과적인 방법은?",level:"basic",freq:true,
answer:"<b>Dynamic Framework 수를 줄이는 것이 가장 효과적입니다.</b><br><br>각 Dynamic Framework는 10~30ms의 로딩 시간을 추가합니다. 20개를 Static으로 전환하면 200~600ms를 절약할 수 있습니다.<br><br>그 다음으로:<br>1. didFinishLaunching에서 불필요한 초기화 제거/지연<br>2. +load 메서드를 +initialize로 교체<br>3. 사용하지 않는 ObjC 클래스 제거<br>4. Asset Catalog 최적화"},

{day:18,title:"Instruments 프로파일링",
tags:["Time Profiler","Allocations","Leaks","Core Animation","MetricKit"],
topics:[
{name:"Time Profiler & Allocations",icon:"blue",
detail:`
<h5>Time Profiler</h5>
<p>CPU 사용량을 시간 기반으로 샘플링하여 <b>어떤 함수가 CPU 시간을 많이 소비하는지</b> 분석합니다. 1ms마다 콜 스택을 캡처합니다.</p>

<h5>Time Profiler 사용법</h5>
<pre>// Xcode → Product → Profile (⌘I) → Time Profiler 선택

// 핵심 설정:
// 1. "Separate by Thread" 체크 → 메인 스레드 병목 확인
// 2. "Invert Call Tree" 체크 → 가장 비용 큰 함수부터 표시
// 3. "Hide System Libraries" 체크 → 내 코드만 표시

// 분석 포인트:
// - Main Thread에서 오래 걸리는 작업 → 프레임 드롭 원인
// - Weight(%)가 높은 함수 → 최적화 대상
// - 반복 호출되는 함수 → 캐싱 고려</pre>

<h5>Allocations</h5>
<p>메모리 할당/해제를 추적합니다. <b>메모리 증가 추세와 누수</b>를 파악합니다.</p>

<pre>// Allocations 분석 방법:
//
// 1. "Mark Generation" 버튼으로 스냅샷 찍기
//    - 화면 진입 전 Mark → 화면 진입 → 화면 나감 → Mark
//    - 두 Mark 사이에 남아있는 객체 = 잠재적 누수
//
// 2. "All Heap Allocations" 필터링
//    - 내 클래스명으로 검색
//    - Persistent(해제 안 된) 객체 확인
//
// 3. Growth 확인
//    - 같은 동작 반복 시 메모리가 계속 증가하면 누수

// 코드에서 메모리 추적
import os

let signpostLog = OSLog(subsystem: "com.myapp", category: "Performance")

func processData() {
    os_signpost(.begin, log: signpostLog, name: "DataProcessing")
    // ... 작업
    os_signpost(.end, log: signpostLog, name: "DataProcessing")
}</pre>

<h5>Leaks Instrument</h5>
<pre>// Leaks: 순환 참조로 인한 메모리 누수 자동 탐지
//
// 동작 원리:
// 1. 힙의 모든 객체를 스캔
// 2. 루트(스택, 전역변수)에서 도달 불가능한 객체 탐지
// 3. 해당 객체의 retain cycle 그래프 표시
//
// 실무 팁:
// - 화면 push/pop을 반복하며 Leaks 확인
// - 보라색 X 표시 = 누수 발견
// - Cycles & Roots 탭에서 순환 참조 경로 확인

// 디버그 빌드에서 누수 감지 자동화
class LeakDetector {
    static func detect(_ object: AnyObject, file: String = #file) {
        let weak = Weak(object: object)
        DispatchQueue.main.asyncAfter(deadline: .now() + 2.0) {
            if weak.object != nil {
                print("⚠️ 잠재적 누수: \\(type(of: object)) in \\(file)")
            }
        }
    }
}

private class Weak {
    weak var object: AnyObject?
    init(object: AnyObject) { self.object = object }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Time Profiler로 CPU 병목을 찾고, Allocations로 메모리 증가 추세를 확인합니다. Leaks는 순환 참조를 자동 탐지합니다. 실무에서는 화면 전환을 반복하며 Mark Generation으로 메모리 누수를 체계적으로 검증합니다."
</div>
`},

{name:"Core Animation 디버깅",icon:"green",
detail:`
<h5>Core Animation Instrument</h5>
<p>UI 렌더링 성능을 분석합니다. <b>60fps(16.67ms/frame)</b>를 유지하지 못하는 원인을 찾습니다.</p>

<h5>주요 디버깅 옵션</h5>
<pre>// Simulator → Debug 메뉴 또는 Instruments → Core Animation

// 1. Color Blended Layers (빨간색 = 블렌딩 발생)
//    - 투명 뷰가 겹치면 GPU가 블렌딩 계산
//    - 해결: backgroundColor 설정, isOpaque = true

// 2. Color Offscreen-Rendered (노란색 = 오프스크린 렌더링)
//    - cornerRadius + clipsToBounds 조합
//    - shadow 없이 shadowPath 미설정
//    - 해결: layer.shouldRasterize = true 또는 미리 그린 이미지 사용

// 3. Color Hits Green and Misses Red
//    - shouldRasterize 캐시 히트/미스 확인
//    - 빨간색이 많으면 캐시가 무효화되고 있음

// 4. Color Copied Images (파란색 = 이미지 복사)
//    - GPU가 처리할 수 없는 포맷의 이미지
//    - 해결: 적절한 포맷으로 미리 변환</pre>

<h5>오프스크린 렌더링 최적화</h5>
<pre>// ❌ 오프스크린 렌더링 유발
imageView.layer.cornerRadius = 10
imageView.clipsToBounds = true  // 오프스크린!

// ✅ 해결 1: CALayer의 maskedCorners 사용 (iOS 11+)
imageView.layer.cornerRadius = 10
imageView.layer.maskedCorners = [.layerMinXMinYCorner, .layerMaxXMinYCorner]
// clipsToBounds 없이도 동작

// ✅ 해결 2: 미리 둥근 이미지 생성
func roundedImage(_ image: UIImage, radius: CGFloat) -&gt; UIImage {
    let renderer = UIGraphicsImageRenderer(size: image.size)
    return renderer.image { context in
        let rect = CGRect(origin: .zero, size: image.size)
        UIBezierPath(roundedRect: rect, cornerRadius: radius).addClip()
        image.draw(in: rect)
    }
}

// ❌ Shadow 오프스크린 렌더링
view.layer.shadowColor = UIColor.black.cgColor
view.layer.shadowOffset = CGSize(width: 0, height: 2)
view.layer.shadowOpacity = 0.3
// shadowPath 없으면 매 프레임 계산!

// ✅ shadowPath 지정
view.layer.shadowPath = UIBezierPath(
    roundedRect: view.bounds,
    cornerRadius: view.layer.cornerRadius
).cgPath</pre>

<h5>프레임 드롭 원인 Top 5</h5>
<ol>
<li>메인 스레드에서 이미지 디코딩</li>
<li>오프스크린 렌더링 (cornerRadius + clipsToBounds)</li>
<li>투명 뷰 과다 블렌딩</li>
<li>Auto Layout 복잡도 (중첩 스택뷰)</li>
<li>셀 높이 계산 반복 (UITableView)</li>
</ol>

<div class="highlight">
<b>💡 면접 답변:</b> "Core Animation 디버깅에서 Color Blended Layers로 불필요한 투명도를, Color Offscreen-Rendered로 오프스크린 렌더링을 확인합니다. cornerRadius는 clipsToBounds 대신 maskedCorners를 사용하고, shadow는 반드시 shadowPath를 지정하여 GPU 부하를 줄입니다."
</div>
`},

{name:"MetricKit으로 실사용자 성능 수집",icon:"purple",
detail:`
<h5>MetricKit이란?</h5>
<p>iOS 13+에서 <b>실제 사용자 기기의 성능 데이터를 수집</b>하는 프레임워크입니다. 24시간 단위로 집계된 메트릭을 앱에 전달합니다.</p>

<h5>MetricKit 설정</h5>
<pre>import MetricKit

class MetricsManager: NSObject, MXMetricManagerSubscriber {
    
    static let shared = MetricsManager()
    
    func setup() {
        MXMetricManager.shared.add(self)
    }
    
    // 24시간마다 호출 (iOS 14+에서는 즉시 진단도 가능)
    func didReceive(_ payloads: [MXMetricPayload]) {
        for payload in payloads {
            // 앱 실행 시간
            if let launchMetrics = payload.applicationLaunchMetrics {
                let resumeTime = launchMetrics.histogrammedResumeTime
                let optimizedTime = launchMetrics.histogrammedOptimizedTimeToFirstDraw
                reportToServer(launch: optimizedTime)
            }
            
            // 메모리
            if let memoryMetrics = payload.memoryMetrics {
                let peakMemory = memoryMetrics.peakMemoryUsage
                reportToServer(memory: peakMemory)
            }
            
            // CPU
            if let cpuMetrics = payload.cpuMetrics {
                let cpuTime = cpuMetrics.cumulativeCPUTime
                reportToServer(cpu: cpuTime)
            }
            
            // 디스크 I/O
            if let diskMetrics = payload.diskIOMetrics {
                let writes = diskMetrics.cumulativeLogicalWrites
                reportToServer(disk: writes)
            }
        }
    }
    
    // iOS 14+: 크래시/행 진단
    func didReceive(_ payloads: [MXDiagnosticPayload]) {
        for payload in payloads {
            // 크래시 리포트
            if let crashDiagnostics = payload.crashDiagnostics {
                for crash in crashDiagnostics {
                    let callStack = crash.callStackTree
                    reportCrash(callStack)
                }
            }
            
            // 행(Hang) 진단 - 메인 스레드 블록
            if let hangDiagnostics = payload.hangDiagnostics {
                for hang in hangDiagnostics {
                    let duration = hang.hangDuration
                    reportHang(duration: duration, stack: hang.callStackTree)
                }
            }
        }
    }
}</pre>

`}

answer:"<b>콜 스택을 뒤집어서 가장 비용이 큰 '말단 함수'부터 보여줍니다.</b><br><br>기본 모드는 main() → AppDelegate → ViewController → ... 순서로 위에서 아래로 보여줍니다. Invert하면 실제로 CPU를 소비한 함수가 맨 위에 오므로 병목을 빠르게 찾을 수 있습니다.<br><br>예: JSONDecoder.decode()가 40% → 이 함수를 최적화하거나 백그라운드로 이동"},

{day:19,title:"Design Patterns",
tags:["Observer","KVO","Combine","Builder","Strategy","Coordinator"],
topics:[
{name:"Observer / KVO / Combine 비교",icon:"blue",
detail:`
<h5>세 가지 관찰 패턴</h5>
<p>iOS에서 "값이 변했을 때 알림을 받는" 방법은 크게 세 가지입니다. 각각의 특성과 적합한 상황이 다릅니다.</p>

<h5>1. NotificationCenter (Observer 패턴)</h5>
<pre>// 발행
NotificationCenter.default.post(
    name: .userDidLogin,
    object: nil,
    userInfo: ["userId": "123"]
)

// 구독
let observer = NotificationCenter.default.addObserver(
    forName: .userDidLogin,
    object: nil,
    queue: .main
) { notification in
    let userId = notification.userInfo?["userId"] as? String
    print("로그인: \\(userId ?? "")")
}

// 해제 (iOS 9+ 에서는 자동이지만 명시적 해제 권장)
NotificationCenter.default.removeObserver(observer)</pre>

<h5>2. KVO (Key-Value Observing)</h5>
<pre>// NSObject 상속 + @objc dynamic 필요
class UserProfile: NSObject {
    @objc dynamic var name: String = ""
    @objc dynamic var score: Int = 0
}

// 관찰
let profile = UserProfile()
let observation = profile.observe(\\.score, options: [.new, .old]) { object, change in
    print("점수 변경: \\(change.oldValue ?? 0) → \\(change.newValue ?? 0)")
}

// observation이 해제되면 자동으로 관찰 중단
// 또는 observation.invalidate()</pre>

<h5>3. Combine (@Published)</h5>
<pre>class UserViewModel: ObservableObject {
    @Published var username: String = ""
    @Published var isValid: Bool = false
}

let vm = UserViewModel()
vm.$username
    .map { $0.count >= 3 }
    .assign(to: &amp;vm.$isValid)

vm.$isValid
    .sink { print("유효성: \\($0)") }
    .store(in: &amp;cancellables)</pre>

{name:"Builder & Strategy 패턴",icon:"green",
detail:`
<h5>Builder 패턴: 복잡한 객체 단계적 생성</h5>
<pre>// 네트워크 요청 빌더
class RequestBuilder {
    private var url: URL?
    private var method: HTTPMethod = .get
    private var headers: [String: String] = [:]
    private var body: Data?
    private var timeout: TimeInterval = 30
    
    @discardableResult
    func setURL(_ url: URL) -&gt; Self {
        self.url = url
        return self
    }
    
    @discardableResult
    func setMethod(_ method: HTTPMethod) -&gt; Self {
        self.method = method
        return self
    }
    
    @discardableResult
    func addHeader(key: String, value: String) -&gt; Self {
        headers[key] = value
        return self
    }
    
    @discardableResult
    func setBody&lt;T: Encodable&gt;(_ body: T) -&gt; Self {
        self.body = try? JSONEncoder().encode(body)
        return self
    }
    
    func build() throws -&gt; URLRequest {
        guard let url = url else { throw BuilderError.missingURL }
        var request = URLRequest(url: url, timeoutInterval: timeout)
        request.httpMethod = method.rawValue
        request.allHTTPHeaderFields = headers
        request.httpBody = body
        return request
    }
}

// 사용
let request = try RequestBuilder()
    .setURL(URL(string: "https://api.example.com/users")!)
    .setMethod(.post)
    .addHeader(key: "Authorization", value: "Bearer \\(token)")
    .setBody(CreateUserDTO(name: "철수"))
    .build()</pre>

<h5>Strategy 패턴: 알고리즘을 교체 가능하게</h5>
<pre>// 정렬 전략
protocol SortStrategy {
    func sort(_ items: [Item]) -&gt; [Item]
}

class DateSortStrategy: SortStrategy {
    func sort(_ items: [Item]) -&gt; [Item] {
        items.sorted { $0.date > $1.date }
    }
}

class PriceSortStrategy: SortStrategy {
    func sort(_ items: [Item]) -&gt; [Item] {
        items.sorted { $0.price &lt; $1.price }
    }
}

class PopularitySortStrategy: SortStrategy {
    func sort(_ items: [Item]) -&gt; [Item] {
        items.sorted { $0.viewCount > $1.viewCount }
    }
}

// Context: 전략을 사용하는 클래스
class ProductListViewModel {
    private var sortStrategy: SortStrategy = DateSortStrategy()
    private var allItems: [Item] = []
    
    var displayItems: [Item] {
        sortStrategy.sort(allItems)
    }
    
    func changeSortOrder(_ strategy: SortStrategy) {
        self.sortStrategy = strategy
        // UI 업데이트
    }
}

// 사용
viewModel.changeSortOrder(PriceSortStrategy())</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Builder 패턴은 복잡한 객체를 단계적으로 구성할 때 사용합니다. @discardableResult와 Self 반환으로 메서드 체이닝을 구현합니다. Strategy 패턴은 동일한 인터페이스로 알고리즘을 교체할 때 사용합니다. 정렬, 유효성 검증, 가격 계산 등 런타임에 로직이 바뀌는 경우에 적합합니다."
</div>
`},

{name:"Coordinator 패턴",icon:"purple",
detail:`
<h5>Coordinator란?</h5>
<p>화면 전환(Navigation) 로직을 ViewController에서 분리하여 <b>별도 객체가 관리</b>하도록 하는 패턴입니다. ViewController는 "다음에 뭘 보여줄지" 모르고, Coordinator가 결정합니다.</p>

<h5>기본 구조</h5>
<pre>protocol Coordinator: AnyObject {
    var childCoordinators: [Coordinator] { get set }
    var navigationController: UINavigationController { get set }
    func start()
}

// 앱 전체를 관리하는 메인 Coordinator
class AppCoordinator: Coordinator {
    var childCoordinators: [Coordinator] = []
    var navigationController: UINavigationController
    
    init(navigationController: UINavigationController) {
        self.navigationController = navigationController
    }
    
    func start() {
        if AuthManager.shared.isLoggedIn {
            showMainFlow()
        } else {
            showLoginFlow()
        }
    }
    
    private func showLoginFlow() {
        let loginCoordinator = LoginCoordinator(navigationController: navigationController)
        loginCoordinator.delegate = self
        childCoordinators.append(loginCoordinator)
        loginCoordinator.start()
    }
    
    private func showMainFlow() {
        let mainCoordinator = MainTabCoordinator(navigationController: navigationController)
        childCoordinators.append(mainCoordinator)
        mainCoordinator.start()
    }
}

// 로그인 플로우 Coordinator
class LoginCoordinator: Coordinator {
    var childCoordinators: [Coordinator] = []
    var navigationController: UINavigationController
    weak var delegate: LoginCoordinatorDelegate?
    
    init(navigationController: UINavigationController) {
        self.navigationController = navigationController
    }
    
    func start() {
        let loginVC = LoginViewController()
        loginVC.delegate = self
        navigationController.pushViewController(loginVC, animated: true)
    }
}

extension LoginCoordinator: LoginViewControllerDelegate {
    func didTapSignUp() {
        let signUpVC = SignUpViewController()
        signUpVC.delegate = self
        navigationController.pushViewController(signUpVC, animated: true)
    }
    
    func didLoginSuccessfully() {
        delegate?.loginDidComplete(self)
    }
}</pre>

<h5>Coordinator의 장점</h5>
<ul>
<li><b>ViewController 경량화</b>: 화면 전환 코드 제거</li>
<li><b>재사용성</b>: 같은 VC를 다른 플로우에서 재사용 가능</li>
<li><b>테스트 용이</b>: Navigation 로직을 독립적으로 테스트</li>
<li><b>Deep Link 처리</b>: Coordinator가 직접 원하는 화면으로 이동</li>
</ul>

<h5>Child Coordinator 해제</h5>
<pre>// 중요: child가 끝나면 반드시 배열에서 제거
extension AppCoordinator: LoginCoordinatorDelegate {
    func loginDidComplete(_ coordinator: LoginCoordinator) {
        childCoordinators.removeAll { $0 === coordinator }
        showMainFlow()
    }
}</pre>

<div class="highlight">
<b>💡 면접 답변:</b> "Coordinator 패턴은 화면 전환 로직을 ViewController에서 분리합니다. VC는 사용자 액션을 delegate로 전달하고, Coordinator가 다음 화면을 결정합니다. 이렇게 하면 VC 간 의존성이 사라져 재사용이 쉽고, Deep Link 처리도 Coordinator에서 일관되게 관리할 수 있습니다."
</div>
`}
],
questions:[
{q:"Coordinator 패턴에서 메모리 관리 주의점은?",level:"basic",freq:true,
answer:"<b>childCoordinators 배열에서 완료된 Coordinator를 제거해야 합니다.</b><br><br>Coordinator는 childCoordinators 배열로 자식을 strong 참조합니다. 자식 플로우가 끝났는데 배열에서 제거하지 않으면 메모리 누수가 발생합니다.<br><br>또한 delegate는 반드시 weak로 선언해야 합니다. parent ↔ child 간 순환 참조를 방지하기 위해서입니다."},

{q:"Strategy 패턴과 State 패턴의 차이는?",level:"advanced",freq:false,
answer:"<b>의도가 다릅니다.</b><br><br>• <b>Strategy</b>: 클라이언트가 명시적으로 알고리즘을 선택/교체. '어떻게 할 것인가'에 초점<br>• <b>State</b>: 객체의 내부 상태에 따라 행동이 자동으로 변경. '현재 상태가 무엇인가'에 초점<br><br>예시:<br>• Strategy: 사용자가 정렬 방식을 선택 (가격순, 날짜순)<br>• State: 주문 상태에 따라 가능한 액션이 변경 (대기→결제→배송→완료)"},

{q:"Builder 패턴을 Swift에서 대체할 수 있는 방법은?",level:"advanced",freq:true,
answer:"<b>Swift의 기본 파라미터와 구조체로 대체 가능한 경우가 많습니다.</b><br><br>1. <b>기본 파라미터</b>: init(url:, method: .get, timeout: 30)<br>2. <b>구조체 + mutating</b>: 설정 구조체를 만들어 전달<br>3. <b>Result Builder</b>: SwiftUI의 @ViewBuilder처럼 DSL 구성<br><br>Builder가 여전히 유용한 경우:<br>• 생성 단계가 복잡하고 순서가 중요할 때<br>• 유효성 검증이 build() 시점에 필요할 때<br>• 같은 빌더로 다양한 변형을 만들 때"},

{q:"NotificationCenter의 단점은?",level:"basic",freq:true,
answer:"<b>타입 안전성이 없고 추적이 어렵습니다.</b><br><br>1. <b>타입 불안전</b>: userInfo가 [AnyHashable: Any]라서 런타임 캐스팅 필요<br>2. <b>추적 어려움</b>: 누가 post하고 누가 observe하는지 코드만 봐서는 파악 어려움<br>3. <b>순서 보장 없음</b>: 여러 observer의 실행 순서가 불확정<br>4. <b>해제 누락 위험</b>: removeObserver를 빠뜨리면 크래시 가능 (iOS 9 이전)<br><br>대안: Combine의 PassthroughSubject로 타입 안전한 이벤트 버스 구현"}
],

{name:"Feed App 시스템 설계",icon:"blue",
detail:`
<h5>면접에서 Feed App 설계 질문</h5>
<p>"인스타그램/트위터 같은 피드 앱의 iOS 클라이언트를 설계해주세요"는 시니어 면접의 단골 질문입니다.</p>

<h5>설계 프레임워크 (4단계)</h5>
<pre>// 1단계: 요구사항 명확화 (2분)
// - 피드 타입: 텍스트? 이미지? 비디오?
// - 페이지네이션: 무한 스크롤? Pull-to-refresh?
// - 오프라인 지원 필요?
// - 실시간 업데이트?

// 2단계: 고수준 아키텍처 (5분)
//
// ┌─────────────────────────────────────────┐
// │              Presentation               │
// │  FeedViewController ← FeedViewModel     │
// ├─────────────────────────────────────────┤
// │              Domain                     │
// │  FeedUseCase ← FeedRepository(Protocol) │
// ├─────────────────────────────────────────┤
// │              Data                       │
// │  FeedRepositoryImpl                     │
// │  ├─ RemoteDataSource (API)              │
// │  ├─ LocalDataSource (Core Data)         │
// │  └─ CachePolicy                        │
// ├─────────────────────────────────────────┤
// │              Infrastructure             │
// │  NetworkService, ImageCache, Analytics  │
// └─────────────────────────────────────────┘</pre>

<h5>3단계: 핵심 컴포넌트 상세 (10분)</h5>
<pre>// 페이지네이션
class FeedViewModel: ObservableObject {
    @Published var posts: [Post] = []
    @Published var isLoading = false
    private var cursor: String?
    private var hasMore = true
    
    func loadNextPage() async {
        guard !isLoading, hasMore else { return }
        isLoading = true
        
        let result = await feedUseCase.fetchFeed(cursor: cursor, limit: 20)
        switch result {
        case .success(let response):
            posts.append(contentsOf: response.posts)
            cursor = response.nextCursor
            hasMore = response.hasMore
        case .failure(let error):
            handleError(error)
        }
        isLoading = false
    }
}

// 이미지 로딩 전략
// - 썸네일: 즉시 로드 (작은 크기)
// - 원본: 탭 시 로드
// - Prefetch: 다음 5개 셀 미리 로드
// - 캐시: Memory → Disk → Network

// 오프라인 지원
class CachePolicy {
    func shouldFetchFromNetwork(lastSync: Date?) -&gt; Bool {
        guard let lastSync = lastSync else { return true }
        return Date().timeIntervalSince(lastSync) > 300  // 5분
    }
    
    func fetchFeed() async -&gt; [Post] {
        if shouldFetchFromNetwork(lastSync: lastSyncDate) {
            let posts = try await remoteDataSource.fetch()
            localDataSource.save(posts)
            return posts
        }
        return localDataSource.fetch()
    }
}</pre>

<h5>4단계: 트레이드오프 논의 (3분)</h5>
<ul>
<li><b>Cursor vs Offset 페이지네이션</b>: Cursor가 실시간 피드에 적합 (중간 삽입/삭제에 안전)</li>
<li><b>Pull vs Push 업데이트</b>: WebSocket은 배터리 소모, Polling은 지연. 하이브리드 권장</li>
<li><b>캐시 무효화</b>: TTL 기반 vs 서버 Push 기반</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "시스템 설계 질문에서는 바로 코드를 쓰지 말고, 요구사항 명확화 → 고수준 설계 → 상세 설계 → 트레이드오프 순서로 진행합니다. 면접관이 원하는 건 '정답'이 아니라 '사고 과정'입니다."
</div>
`},

{name:"Chat App 시스템 설계",icon:"green",
detail:`
<h5>실시간 채팅 앱 iOS 클라이언트 설계</h5>

<h5>핵심 도전 과제</h5>
<ul>
<li>실시간 메시지 송수신</li>
<li>오프라인 메시지 큐잉</li>
<li>메시지 순서 보장</li>
<li>읽음 확인</li>
<li>미디어 전송</li>
</ul>

<h5>아키텍처</h5>
<pre>// 실시간 통신 레이어
class WebSocketManager {
    private var socket: URLSessionWebSocketTask?
    private let messageSubject = PassthroughSubject&lt;ChatMessage, Never&gt;()
    
    var messages: AnyPublisher&lt;ChatMessage, Never&gt; {
        messageSubject.eraseToAnyPublisher()
    }
    
    func connect() {
        let url = URL(string: "wss://chat.example.com/ws")!
        socket = URLSession.shared.webSocketTask(with: url)
        socket?.resume()
        receiveMessage()
    }
    
    private func receiveMessage() {
        socket?.receive { [weak self] result in
            switch result {
            case .success(.string(let text)):
                if let message = try? JSONDecoder().decode(ChatMessage.self, from: Data(text.utf8)) {
                    self?.messageSubject.send(message)
                }
            default: break
            }
            self?.receiveMessage()  // 계속 수신 대기
        }
    }
    
    func send(_ message: ChatMessage) {
        let data = try? JSONEncoder().encode(message)
        socket?.send(.string(String(data: data!, encoding: .utf8)!)) { error in
            if let error = error {
                // 오프라인 큐에 저장
                OfflineQueue.shared.enqueue(message)
            }
        }
    }
}

// 메시지 상태 관리
enum MessageStatus {
    case sending    // 전송 중 (로컬)
    case sent       // 서버 도달
    case delivered  // 상대방 기기 도달
    case read       // 상대방 읽음
    case failed     // 전송 실패
}

// 오프라인 큐
class OfflineQueue {
    static let shared = OfflineQueue()
    private var queue: [ChatMessage] = []
    
    func enqueue(_ message: ChatMessage) {
        queue.append(message)
        persistToDisk()
    }
    
    func flush() async {
        for message in queue {
            try? await sendToServer(message)
        }
        queue.removeAll()
    }
}</pre>

<h5>메시지 순서 보장</h5>

{name:"STAR-T 답변 프레임워크",icon:"orange",
detail:`
<h5>STAR-T란?</h5>
<p>행동 면접(Behavioral Interview) 질문에 구조적으로 답변하는 프레임워크입니다. 기술 면접에서도 경험 기반 질문에 활용합니다.</p>

<h5>구조</h5>
<pre>// S - Situation (상황): 배경 설명 (1~2문장)
// T - Task (과제): 내가 해결해야 했던 문제 (1문장)
// A - Action (행동): 내가 취한 구체적 행동 (2~3문장)
// R - Result (결과): 정량적 결과 (숫자로!)
// T - Takeaway (교훈): 배운 점, 다음에 다르게 할 것</pre>

<h5>예시 1: 성능 최적화 경험</h5>
<pre>// Q: "성능 문제를 해결한 경험을 말씀해주세요"

// S: "커머스 앱의 상품 목록 화면에서 스크롤 시 
//     심한 프레임 드롭이 발생했습니다."

// T: "60fps를 유지하면서 이미지가 많은 목록을

//     프로덕션 성능을 상시 모니터링하고 있습니다."</pre>

<h5>예시 2: 아키텍처 결정</h5>
<pre>// Q: "기술적으로 어려운 결정을 내린 경험은?"

// S: "5명이 동시 개발하는 앱에서 빌드 시간이 8분을 넘어

// T: "빌드 시간을 3분 이내로 줄이면서 
//     팀원들의 학습 비용을 최소화해야 했습니다."

// A: "Tuist를 도입하여 모듈화를 진행했습니다.
//     Feature/Domain/Core 3계층으로 분리하고,
//     Interface 모듈 패턴으로 빌드 캐시를 극대화했습니다.
//     팀 세미나와 템플릿을 제공하여 학습 비용을 줄였습니다."

// R: "클린 빌드 8분 → 3분, 증분 빌드 2분 → 20초.
//     PR 머지 충돌이 주 15건에서 3건으로 감소.
//     팀 만족도 조사에서 개발 환경 점수 4.2/5.0."

// T: "도구 도입보다 팀의 합의와 교육이 더 중요하다는 걸 
//     배웠습니다. 기술 결정은 항상 팀과 함께 해야 합니다."</pre>

<h5>흔한 Follow-up 질문과 대응</h5>
<table style="width:100%;font-size:12px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:8px;text-align:left">질문</th><th style="padding:8px;text-align:left">의도</th><th style="padding:8px;text-align:left">대응 전략</th></tr>
<tr><td style="padding:8px;border-top:1px solid var(--g2)">"다시 한다면 다르게 할 것은?"</td><td style="padding:8px;border-top:1px solid var(--g2)">성장 마인드셋</td><td style="padding:8px;border-top:1px solid var(--g2)">구체적 개선점 + 이유</td></tr>

<tr><td style="padding:8px;border-top:1px solid var(--g2)">"측정은 어떻게?"</td><td style="padding:8px;border-top:1px solid var(--g2)">데이터 중심</td><td style="padding:8px;border-top:1px solid var(--g2)">구체적 도구와 메트릭 언급</td></tr>
</table>

<div class="highlight">
<b>💡 핵심:</b> STAR-T에서 가장 중요한 건 <b>R(Result)의 정량적 수치</b>입니다. "개선했습니다"가 아니라 "38fps→58fps, 메모리 68% 감소"처럼 숫자로 말하세요. 면접관은 임팩트를 측정할 수 있는 엔지니어를 원합니다.
</div>
`}

var cur=0;
function init(){
  var t=document.getElementById("dtabs");
  var h="";
  for(var i=0;i<D.length;i++){h+='<div class="dt'+(i===0?' on':'')+'" onclick="go('+i+')">Day '+(i+1)+'</div>';}
  t.innerHTML=h;
  go(0);
}
function go(i){
  cur=i;
  document.getElementById("dayLabel").textContent="Day "+(i+1);
  document.querySelectorAll(".dt").forEach(function(e,j){e.className="dt"+(j===i?" on":"");});
  var p=Math.round((i+1)/D.length*100);
  document.getElementById("ptxt").textContent=p+"%";
  document.getElementById("pbar").style.width=p+"%";
  document.getElementById("pdays").textContent=(i+1)+" / "+D.length+" Days";
  document.getElementById("pcirc").setAttribute("stroke-dashoffset",239-239*p/100);
  document.getElementById("qcnt").textContent=(D[i].questions||[]).length;
  render();
}
function render(){
  var d=D[cur];
  var m=document.getElementById("main");
  m.innerHTML=
    '<div class="mh"><h1>Day '+(cur+1)+' &mdash; '+d.title+'</h1>'+
    '<button onclick="this.textContent=this.textContent.indexOf(\'☆\')>=0?\'★ 즐겨찾기\':\'☆ 즐겨찾기\'">☆ 즐겨찾기</button></div>'+
    '<div class="ctabs">'+
    '<div class="ct on" data-tab="overview" onclick="showTab(this)">📋 개요</div>'+
    '<div class="ct" data-tab="core" onclick="showTab(this)">📝 핵심 정리</div>'+
    '<div class="ct" data-tab="questions" onclick="showTab(this)">💬 꼬리 질문</div>'+
    '<div class="ct" data-tab="quiz" onclick="showTab(this)">✏️ 퀴즈</div>'+
    '</div>'+
    '<div class="panel on" id="p-overview">'+mkOv(d)+'</div>'+
    '<div class="panel" id="p-core">'+mkCore(d)+'</div>'+
    '<div class="panel" id="p-questions">'+mkQ(d)+'</div>'+
    '<div class="panel" id="p-quiz">'+mkQuiz(d)+'</div>';
}
function showTab(el){
  var tab = typeof el === 'string' ? el : el.dataset.tab;
  document.querySelectorAll(".ct").forEach(function(e){e.className="ct"+(e.dataset.tab===tab?" on":"");});
  document.querySelectorAll(".panel").forEach(function(e){e.className="panel"+(e.id==="p-"+tab?" on":"");});
  return false;
}
function mkOv(d){
  var tg=d.tags.map(function(t){return'<span># '+t+'</span>';}).join("");
  var cards="";
  var icons=["▶","⚡","◆","●","◉","◈"];
  d.topics.forEach(function(t,i){
    var preview = t.detail.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().substring(0,100);
    cards+='<div class="tc" onclick="showTab(\'core\')"><h4>'+icons[i%6]+' '+t.name+'</h4><ul><li>'+preview+'...</li></ul><div class="m">⏱ 학습 시간 8~10분</div></div>';
  });
  return '<div class="obox"><h3>📚 오늘의 학습 목표</h3><p>'+d.title+' 주제의 핵심 개념을 깊이 있게 이해하고, 면접에서 자주 나오는 꼬리 질문까지 대비합니다. 단순 암기가 아닌 내부 동작 원리와 실무 적용까지 학습합니다.</p><div class="tags">'+tg+'</div></div>'+
    '<div class="tgrid">'+cards+'</div>'+
    '<div class="tip">💡 <b>학습 순서 추천</b> &mdash; 핵심 정리에서 상세 내용을 읽고 → 꼬리 질문으로 깊이 확인 → 퀴즈로 이해도 점검 → 본인 언어로 설명 연습. 카드를 클릭하면 핵심 정리 탭으로 이동합니다.</div>';
}
function mkCore(d){
  var html="";
  var icons=["▶","⚡","◆","●","◉","◈"];
  d.topics.forEach(function(t,i){
    html+=
      '<div class="acc-card" data-idx="'+i+'">'+
        '<div class="acc-head" onclick="toggleAcc('+i+')">'+
          '<span class="acc-icon">'+icons[i%6]+'</span>'+
          '<span class="acc-title">'+t.name+'</span>'+
          '<span class="acc-toggle">▼</span>'+
        '</div>'+
        '<div class="acc-body">'+t.detail+'</div>'+
      '</div>';
  });
  return '<div class="acc-list">'+html+'</div>';
}
function toggleAcc(idx){
  var card = document.querySelector('.acc-card[data-idx="'+idx+'"]');
  if(card){ card.classList.toggle('open'); }
}
function mkQ(d){
  if(!d.questions||!d.questions.length) return '<p style="color:var(--g5);padding:20px">꼬리 질문은 곧 추가됩니다.</p>';
  var html="";
  d.questions.forEach(function(q,i){
    var lb=q.level==="basic"?'<span class="badge b-basic">기본</span>':'<span class="badge b-adv">심화</span>';
    var fb=q.freq?'<span class="badge b-freq">빈출</span>':"";
    html+=
      '<div class="qi" data-qidx="'+i+'">'+
        '<div class="qh" onclick="toggleQ('+i+')">'+
          '<span class="qn">'+(i+1)+'</span>'+
          '<span class="qt">'+q.q+'</span>'+
          lb+fb+
          '<span class="qtoggle">▼</span>'+
        '</div>'+
        '<div class="qa">'+q.answer+'</div>'+
      '</div>';
  });
  return html+'<div class="tip">💡 <b>활용 팁</b> &mdash; 각 질문에 대해 1~2분 내로 핵심을 설명해보세요. 실무 경험과 연결하면 더 좋은 인상을 줄 수 있습니다.</div>';
}
function toggleQ(idx){
  var qi = document.querySelector('.qi[data-qidx="'+idx+'"]');
  if(qi){ qi.classList.toggle('open'); }
}
function mkQuiz(d){
  if(!d.quizzes||!d.quizzes.length) return '<p style="color:var(--g5);padding:20px">퀴즈는 곧 추가됩니다.</p>';
  window._qi = window._qi || 0;
  if(window._qi >= d.quizzes.length) window._qi = 0;
  var qz=d.quizzes[window._qi];
  var opts="";
  qz.opts.forEach(function(o,i){
    opts+='<div class="qopt" onclick="pickQ(this,'+i+','+qz.answer+')"><span class="r"></span><span>'+o+'</span></div>';
  });
  return '<div class="qbox"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><b>문제 '+(window._qi+1)+' / '+d.quizzes.length+'</b><div style="flex:1;height:6px;background:var(--g2);border-radius:3px;overflow:hidden"><div style="width:'+Math.round((window._qi+1)/d.quizzes.length*100)+'%;height:100%;background:var(--p);border-radius:3px"></div></div></div><div class="qq">Q. '+qz.q+'</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+opts+'</div><div class="hint">💡 <b>힌트:</b> '+qz.hint+'</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--g5)">✅ 맞힌 문제 '+(window._qok||0)+' &nbsp; ❌ 틀린 문제 '+(window._qno||0)+'</span><button style="padding:10px 18px;border-radius:8px;background:var(--p);color:#fff;border:none;font-size:14px;cursor:pointer" onclick="nextQ()">다음 문제 ▶</button></div></div>';
}
function pickQ(el,idx,ans){
  el.parentElement.querySelectorAll(".qopt").forEach(function(e){e.className="qopt";});
  el.className="qopt sel "+(idx===ans?"ok":"no");
  if(idx===ans){window._qok=(window._qok||0)+1;}else{window._qno=(window._qno||0)+1;}
}
function nextQ(){
  var d=D[cur];
  window._qi=((window._qi||0)+1)%d.quizzes.length;
  render();
  showTab("quiz");
}
init();

</script>
