<style>

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}

body{font-family:-apple-system,BlinkMacSystemFont,Pretendard,sans-serif;background:var(--bg);color:var(--g8);line-height:1.6;font-size:14px}

<script>
var D=[
{day:1,title:"Value vs Reference / Copy-on-Write",
tags:["struct","class","Stack","Heap","Copy-on-Write","Existential Container"],
topics:[

{name:"Value Type vs Reference Type 기본 개념",icon:"blue",
detail:`
<h5>Value Type과 Reference Type의 차이가 뭔가요?</h5>
<p>가장 큰 차이는 <b>"복사할 때 일어나는 일"</b>입니다.</p>

<h5>Value Type (struct, enum)</h5>
<pre>struct Point {
    var x: Int
    var y: Int
}

var a = Point(x: 1, y: 2)
var b = a       // 값 복사! a와 b는 완전히 별개
b.x = 100

print(a.x)  // 1 (a는 그대로)
print(b.x)  // 100 (b만 변경)</pre>

<h5>Reference Type (class)</h5>
<pre>class Person {
    var age: Int
    init(age: Int) { self.age = age }
}

var a = Person(age: 30)
var b = a       // 참조 복사! a와 b는 같은 객체를 가리킴
b.age = 100

print(a.age)  // 100 (a도 같이 변경됨!)
print(b.age)  // 100</pre>

<h5>왜 이런 차이가 나나요?</h5>
<p>값 타입은 변수 자체가 데이터를 담고 있고, 참조 타입은 변수가 데이터의 "주소(포인터)"를 담고 있기 때문입니다.</p>

<pre>// Value Type 메모리:
// var a = Point(x:1, y:2)
// 스택: [a: x=1, y=2]  ← 값이 직접 저장됨
//
// var b = a
// 스택: [a: x=1, y=2]
//       [b: x=1, y=2]  ← 별개의 영역에 복사됨

// Reference Type 메모리:
// var a = Person(age:30)
// 스택: [a: ──┐] (포인터)
//             ▼
// 힙:   ┌─────────────┐
//       │ Person      │
//       │ age: 30     │
//       └─────────────┘
//
// var b = a
// 스택: [a: ──┐] [b: ──┐] (둘 다 같은 곳을 가리킴)
//             ▼     ▼
// 힙:   ┌─────────────┐
//       │ Person      │
//       │ age: 30     │
//       └─────────────┘</pre>

<h5>그럼 언제 struct, 언제 class를 써야 하나요?</h5>
<p>Apple의 공식 가이드라인:</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">기본 (대부분의 경우)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>struct</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">정체성(identity)이 중요할 때 (=== 비교)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">상속이 필요할 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">참조 공유가 의도된 동작일 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Objective-C 호환 필요</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class (NSObject)</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">deinit이 필요한 자원 관리</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>class</b></td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> Swift는 "value type 우선" 언어입니다. String, Array, Dictionary, Set 같은 핵심 타입들이 모두 struct로 구현되어 있죠. 값 타입은 thread-safety, predictability, 그리고 함수형 프로그래밍 친화성을 제공합니다. 단, 큰 데이터를 자주 복사하면 비용이 클 수 있어서 Copy-on-Write로 최적화합니다.
</div>
`},

{name:"메모리 레이아웃 차이 (Stack vs Heap)",icon:"green",
detail:`
<h5>Stack과 Heap이 뭔가요?</h5>
<p>프로그램이 사용하는 메모리 영역의 두 종류입니다.</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">Stack</th><th style="padding:10px;text-align:left">Heap</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>할당 속도</b></td><td style="padding:10px;border-top:1px solid var(--g2)">매우 빠름 (포인터 +/-)</td><td style="padding:10px;border-top:1px solid var(--g2)">느림 (malloc 호출)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>해제</b></td><td style="padding:10px;border-top:1px solid var(--g2)">함수 종료 시 자동</td><td style="padding:10px;border-top:1px solid var(--g2)">ARC가 관리</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>크기 제한</b></td><td style="padding:10px;border-top:1px solid var(--g2)">제한적 (~MB 단위)</td><td style="padding:10px;border-top:1px solid var(--g2)">큼 (~GB 단위)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>스레드</b></td><td style="padding:10px;border-top:1px solid var(--g2)">스레드별 별도</td><td style="padding:10px;border-top:1px solid var(--g2)">공유 (lock 필요)</td></tr>
</table>

<h5>struct는 Stack? class는 Heap?</h5>
<p>일반화하면 그렇지만 정확하진 않습니다. <b>"struct는 보통 인라인으로 저장되고, class는 항상 힙에 저장된다"</b>가 정확합니다.</p>

<h5>실제 메모리 크기 비교</h5>
<pre>// 같은 데이터인데 struct vs class
struct PointS {
    var x: Double  // 8 bytes
    var y: Double  // 8 bytes
}
// → 총 16 bytes, 스택에 인라인 저장

class PointC {
    var x: Double  // 8 bytes
    var y: Double  // 8 bytes
}
// 힙 할당:
//   metadata 포인터: 8 bytes
//   refCount: 8 bytes
//   x: 8 bytes
//   y: 8 bytes
// → 32 bytes (struct의 2배)
// + 스택의 포인터: 8 bytes
// + malloc overhead: ~16 bytes
// 실질적 비용: ~56 bytes (struct의 3.5배!)</pre>

<h5>struct가 항상 스택에 가는 건 아니에요</h5>
<p>아래 경우에는 struct도 힙에 저장됩니다:</p>
<ol style="padding-left:20px;margin:10px 0">
<li><b>Existential Container에 담긴 큰 struct</b>: 24 bytes 초과 시 힙</li>
<li><b>클로저에 캡처된 변수</b>: closure context는 힙</li>
<li><b>Generic 컨텍스트 (specialization 안 됐을 때)</b></li>
<li><b>Indirect enum case</b></li>
</ol>

<h5>성능 비교 (실측 기준)</h5>
<ul>
<li>struct 복사: ~1ns (스택 memcpy)</li>
<li>class retain: ~5-10ns (atomic increment)</li>
<li>class 힙 할당: ~50-100ns (malloc 호출)</li>
<li>struct 힙 할당 (existential): ~50-100ns</li>
</ul>

<div class="highlight">
<b>💡 면접 포인트:</b> "struct는 인라인 저장이라 메모리 효율이 좋고, 할당/해제가 빠릅니다. class는 항상 힙 할당이라 추가 오버헤드가 있지만, 참조로 전달하면 큰 데이터도 빠르게 공유할 수 있죠. 핵심 라이브러리(Array, Dictionary)는 struct이지만 내부에 reference type 버퍼를 가져 Copy-on-Write로 두 마리 토끼를 잡습니다."
</div>
`},

{name:"Existential Container (프로토콜 타입의 비밀)",icon:"purple",
detail:`
<h5>Existential이 뭔가요?</h5>
<p>"존재하는 어떤 타입"을 의미합니다. 프로토콜을 변수 타입으로 사용할 때 그 변수의 정체가 바로 existential입니다.</p>

<pre>protocol Animal {
    func makeSound()
}

struct Dog: Animal { ... }
struct Cat: Animal { ... }

let pet: Animal = Dog()  // ← 이게 existential
// 'Animal' 자체는 타입이 아니라 프로토콜이지만,
// 'Animal'을 채택한 어떤 구체 타입이든 담을 수 있는 컨테이너 역할을 합니다.</pre>

<h5>Existential Container 내부 구조</h5>
<p>이런 변수는 단순 포인터가 아닙니다. 다음 5개의 워드(64비트 시스템에서 8바이트씩)를 담는 박스입니다:</p>

<pre>// Existential Container = 5 words = 40 bytes
//
// ┌─────────────────────────────────┐
// │  Inline Value Buffer (24 bytes) │  ← 작은 값은 여기에 직접 저장
// ├─────────────────────────────────┤
// │  Value Witness Table ptr (8B)   │  ← 복사/소멸/크기 함수 테이블
// ├─────────────────────────────────┤
// │  Protocol Witness Table ptr (8B)│  ← 프로토콜 메서드 테이블
// └─────────────────────────────────┘</pre>

<h5>Inline Value Buffer (24 bytes 룰)</h5>
<p>값의 크기가 24바이트(3 words) 이하면 buffer에 직접 저장됩니다. 초과하면 힙 할당 후 포인터만 buffer에 저장됩니다.</p>

<pre>// 작은 struct → 인라인 저장 (힙 할당 없음, 빠름)
struct Small: Animal {
    var x: Int  // 8 bytes
    var y: Int  // 8 bytes
    func makeSound() { print("작음") }
}
let pet1: Animal = Small(x:1, y:2)
// Inline buffer에 그대로 저장 → 빠름

// 큰 struct → 힙 할당 (느림)
struct Large: Animal {
    var x: Int      // 8B
    var y: Int      // 8B
    var z: Int      // 8B
    var w: Int      // 8B
    var v: Int      // 8B (총 40B)
    func makeSound() { print("큼") }
}
let pet2: Animal = Large(x:1, y:2, z:3, w:4, v:5)
// 24B 초과 → 힙에 Large 할당 → buffer엔 힙 포인터만</pre>

<h5>Value Witness Table (VWT)</h5>
<p>"이 타입을 어떻게 다뤄야 하는지"에 대한 함수 테이블입니다.</p>
<ul>
<li><code>size</code>: 이 타입의 크기는?</li>
<li><code>copy</code>: 어떻게 복사하지?</li>
<li><code>destroy</code>: 어떻게 메모리 해제하지?</li>
<li><code>equals</code>: 어떻게 비교하지?</li>
</ul>
<p>제네릭 컨텍스트에서 컴파일러가 구체 타입을 모를 때 이 테이블을 통해 런타임에 처리합니다.</p>

<h5>Protocol Witness Table (PWT)</h5>
<p>"이 타입이 프로토콜의 메서드를 어떻게 구현했는지"에 대한 테이블입니다.</p>

<pre>// 컴파일러가 자동 생성:
// Dog의 Animal PWT:
//   makeSound 함수 포인터 → Dog.makeSound 구현체

// 호출 시:
let pet: Animal = Dog()
pet.makeSound()
// 1. existential container의 PWT 포인터 따라가기
// 2. PWT[0] (makeSound 슬롯)에서 함수 포인터 가져오기
// 3. 그 함수 호출 → Dog.makeSound 실행
// → 간접 호출 발생 (성능 비용)</pre>

<h5>왜 이렇게 복잡하게 만들었나요?</h5>
<p>"어떤 타입이든 담을 수 있는 변수"를 만들려면 컴파일 타임에 타입을 알 수 없습니다. 그래서 런타임에 필요한 모든 정보를 컨테이너에 함께 담고 다니는 거죠. 대가는 약간의 메모리와 간접 호출 오버헤드입니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "프로토콜 타입(any Protocol)은 Existential Container라는 5워드 박스로 표현됩니다. 24바이트 이하의 값은 인라인 저장되어 빠르고, 초과하면 힙 할당이 발생합니다. Witness Table을 통한 dynamic dispatch가 일어나기 때문에 some Protocol(opaque type)이나 generic을 쓰면 static dispatch로 더 빠릅니다. 모듈 인터페이스에선 any로 유연성을 확보하고, 성능 중요 코드에선 some으로 최적화하는 게 일반적입니다."
</div>
`},

{name:"Copy-on-Write (COW) 내부 동작",icon:"orange",
detail:`
<h5>COW가 뭔가요?</h5>
<p>"복사 시 즉시 복사하지 않고, 실제 수정이 일어날 때만 복사한다"는 최적화 기법입니다.</p>

<h5>왜 필요한가요?</h5>
<p>Array 같은 큰 컬렉션이 struct(값 타입)면, 함수에 넘길 때마다 전체 복사가 일어나면 너무 비효율적입니다. 100만 개 원소를 가진 배열을 매번 복사하면 끔찍하죠.</p>

<pre>var bigArray = [Int](repeating: 0, count: 1_000_000)
var copy = bigArray  // 만약 진짜 복사라면? → 1M × 8B = 8MB 복사!

// 하지만 실제로는 COW 덕분에 거의 즉시 끝남
// 둘이 같은 메모리를 공유하다가, 수정 시점에 비로소 복사</pre>

<h5>Swift 표준 라이브러리의 COW</h5>
<p>Array, Dictionary, Set, String이 모두 COW를 구현하고 있습니다. 이들은 struct이지만 내부에 <b>reference type 버퍼</b>를 가집니다.</p>

<pre>// Array의 내부 구조 (단순화)
struct Array&lt;Element&gt; {
    var _buffer: _ArrayBuffer&lt;Element&gt;  // ← 이게 class!
}

// 동작 시나리오:
var a = [1, 2, 3]      // _buffer (refCount: 1)
var b = a              // 같은 _buffer 공유 (refCount: 2)
                       // ← 메모리 복사 없음! 빠름!

b.append(4)            
// 1. isKnownUniquelyReferenced(&_buffer) 확인
// 2. refCount > 1 → 다른 곳에서도 쓰고 있다!
// 3. 새 버퍼 할당 + 기존 데이터 복사
// 4. 새 버퍼에 4 추가
// 5. b._buffer = 새 버퍼 (refCount: 1)
// 6. a._buffer = 기존 버퍼 (refCount: 1)</pre>

<h5>isKnownUniquelyReferenced</h5>
<p>"이 참조를 가진 게 나뿐인가?"를 검사하는 함수입니다. COW 구현의 핵심이죠.</p>
<ul>
<li>true → 나만 쓰니까 직접 수정해도 안전</li>
<li>false → 다른 곳도 쓰니까 복사 후 수정</li>
</ul>

<h5>커스텀 COW 구현하기</h5>
<pre>final class Storage&lt;T&gt; {
    var value: T
    init(_ value: T) { self.value = value }
}

struct COWWrapper&lt;T&gt; {
    private var storage: Storage&lt;T&gt;
    
    init(_ value: T) {
        storage = Storage(value)
    }
    
    var value: T {
        get { storage.value }
        set {
            // 핵심 로직!
            if isKnownUniquelyReferenced(&storage) {
                // 나만 참조 중 → 직접 수정 (복사 X)
                storage.value = newValue
            } else {
                // 다른 곳도 참조 중 → 새 storage 할당
                storage = Storage(newValue)
            }
        }
    }
}</pre>

<h5>주의사항</h5>
<ul>
<li><b>Storage는 반드시 final class</b>: ObjC 브릿지 클래스에는 isKnownUniquelyReferenced가 동작 안 함</li>
<li><b>thread-safe하지 않음</b>: 두 스레드가 동시에 수정하면 race condition 가능</li>
</ul>

<h5>COW가 깨지는 흔한 실수</h5>
<pre>// ❌ 의도치 않은 복사 유발
func processArray(_ arr: inout [Int]) {
    let backup = arr      // refCount +1!
    arr.append(999)        // 다른 곳(backup)이 쓰니까 → 복사 발생!
    // backup이 살아있는 동안은 arr 수정 시 매번 복사
}

// ✅ 불필요한 참조 제거
func processArray(_ arr: inout [Int]) {
    arr.append(999)        // refCount == 1 → 복사 없이 직접 수정
}</pre>

<h5>Small String Optimization</h5>
<p>String도 COW를 쓰지만, 추가로 <b>15바이트 이하의 짧은 문자열은 힙 할당 없이 String 구조체 내부(16바이트)에 직접 저장</b>합니다. SSO(Small String Optimization)라고 부릅니다.</p>

<pre>let s1 = "안녕"          // 6 bytes (UTF-8) → 인라인 저장 (힙 X)
let s2 = "Hello, World!" // 13 bytes → 인라인 저장 (힙 X)
let s3 = "긴 문자열... 16바이트 초과"  // → 힙 버퍼 + COW</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Swift의 컬렉션 타입들은 struct이지만 내부에 reference type 버퍼를 두고 Copy-on-Write를 구현합니다. 덕분에 값 타입의 안전성(독립적 수정)과 참조 타입의 효율성(빠른 복사)을 동시에 얻죠. isKnownUniquelyReferenced로 유일 참조 여부를 검사하여 실제 복사 시점을 늦춥니다. 이 메커니즘 덕분에 [1...1_000_000]을 함수에 넘겨도 비용이 거의 없습니다."
</div>
`}

],
questions:[
{q:"Swift에서 struct가 항상 스택에 저장되나요?",level:"basic",freq:true,
answer:"<b>아닙니다.</b> 일반적으로는 스택에 인라인 저장되지만, 다음 경우엔 힙에 저장됩니다:<br><br>1. <b>Existential Container에 담긴 큰 struct (24바이트 초과)</b>: 인라인 버퍼를 넘으면 힙 할당<br>2. <b>클로저에 캡처된 변수</b>: 클로저 컨텍스트는 힙에 있음<br>3. <b>Generic 컨텍스트 (specialization 실패 시)</b>: 컴파일러가 구체 타입을 모르면 힙<br>4. <b>Indirect enum case</b>: 재귀 enum은 힙 사용<br><br>그래서 \"struct = 스택\"은 정확하지 않고, 정확한 표현은 \"struct는 보통 인라인 저장\"입니다."},

{q:"Array를 함수 파라미터로 전달하면 복사되나요?",level:"basic",freq:true,
answer:"의미적으로는 복사지만, <b>Copy-on-Write 덕분에 실제 메모리 복사는 수정 시점까지 지연</b>됩니다.<br><br>함수 안에서 배열을 읽기만 하면 복사 비용 없음 (refCount만 +1). 수정하는 순간 비로소 복사가 일어납니다.<br><br>주의: <code>inout</code>으로 받으면 참조처럼 동작해서 원본을 직접 수정합니다. 복사 자체가 안 일어나죠."},

{q:"isKnownUniquelyReferenced가 ObjC 클래스에서 동작 안 하는 이유는?",level:"advanced",freq:false,
answer:"이 함수는 Swift native class의 inline refCount를 검사하도록 설계되었습니다. ObjC 클래스는 다른 메모리 모델(NSObject 기반)을 사용하기 때문에 항상 false를 반환합니다.<br><br>그래서 커스텀 COW를 구현할 때 Storage 클래스는 반드시 <code>final class</code>(상속 불가)로 선언해야 합니다. 이래야 컴파일러가 Swift native class로 처리하고 정확한 검사가 가능합니다."},

{q:"any Protocol과 some Protocol의 성능 차이는?",level:"advanced",freq:true,
answer:"<b>any (Existential)</b>: 런타임에 타입 결정. Existential Container와 Witness Table 통한 dynamic dispatch. 함수 호출 ~5-20ns.<br><br><b>some (Opaque Type)</b>: 컴파일 타임에 구체 타입 결정. Static dispatch + 인라인 가능. 함수 호출 ~1ns.<br><br>차이가 크지 않아 보이지만 hot loop에서 누적되면 큽니다. SwiftUI body가 some View를 반환하는 이유도 이 때문입니다 — 컴파일러가 View 트리의 정확한 타입을 알아야 효율적인 diff가 가능하죠.<br><br>가이드: 모듈 경계에선 any로 유연성, 모듈 내부에선 some/generic으로 성능."},

{q:"struct 안에 class 프로퍼티가 있으면 어떻게 되나요?",level:"advanced",freq:true,
answer:"struct를 복사할 때 class 프로퍼티는 <b>참조만 복사</b>됩니다 (shallow copy). 두 struct가 같은 class 인스턴스를 공유하게 되죠.<br><br>예시:<br><pre>class Container { var value = 0 }\nstruct Wrapper { var box: Container }\n\nvar a = Wrapper(box: Container())\nvar b = a  // struct 복사\nb.box.value = 100\nprint(a.box.value)  // 100! (같은 Container 공유)</pre>이걸 방지하려면 mutating setter에서 class를 deep copy해야 합니다. Array 같은 표준 타입은 COW로 자동 처리하지만, 직접 만든 struct는 수동 처리 필요."}
],

{day:2,title:"ARC / 메모리 관리",

// ============ TOPIC 1: ARC 기초 ============
{name:"ARC (Automatic Reference Counting) 기초",icon:"blue",
detail:`
<h5>ARC가 뭔가요?</h5>
<p>ARC는 <b>Automatic Reference Counting</b>의 약자로, Swift/Objective-C에서 메모리를 자동으로 관리해주는 시스템입니다.</p>

<h5>왜 필요한가요?</h5>
<p>C/C++에서는 개발자가 <code>malloc</code>으로 할당하고 <code>free</code>로 해제해야 합니다. 이걸 잊으면 메모리 누수(memory leak)가 발생하죠. ARC는 이걸 자동으로 해줍니다.</p>

<h5>가비지 컬렉터(GC)랑 다른가요?</h5>
<p>완전히 다릅니다. 비교해볼까요:</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">ARC</th><th style="padding:10px;text-align:left">GC (Java, Go 등)</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>동작 시점</b></td><td style="padding:10px;border-top:1px solid var(--g2)">컴파일 타임에 코드 삽입</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임에 주기적 실행</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>해제 시점</b></td><td style="padding:10px;border-top:1px solid var(--g2)">참조 카운트 0 즉시</td><td style="padding:10px;border-top:1px solid var(--g2)">GC 사이클 도래 시</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>예측 가능성</b></td><td style="padding:10px;border-top:1px solid var(--g2)">결정적 (Deterministic)</td><td style="padding:10px;border-top:1px solid var(--g2)">비결정적</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>Pause</b></td><td style="padding:10px;border-top:1px solid var(--g2)">없음</td><td style="padding:10px;border-top:1px solid var(--g2)">GC pause 발생</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><b>순환 참조</b></td><td style="padding:10px;border-top:1px solid var(--g2)">자동 해결 X</td><td style="padding:10px;border-top:1px solid var(--g2)">자동 해결 O</td></tr>
</table>

<h5>ARC는 정확히 뭘 하나요?</h5>
<p>컴파일 타임에 우리 코드를 보고 <code>retain</code>(참조 카운트 증가)과 <code>release</code>(참조 카운트 감소) 호출을 자동으로 삽입합니다.</p>
<pre>// 우리가 작성한 코드:
func process() {
    let user = User(name: "철수")
    print(user.name)
}

// 컴파일러가 실제로 만드는 코드 (의사 코드):
func process() {
    let user = User(name: "철수")  // retain (count: 1)
    print(user.name)               // 사용
                                   // release (count: 0 → deinit 호출)
}</pre>

<h5>참조 카운트가 0이 되면?</h5>
<p>객체의 <code>deinit</code>이 호출되고 메모리에서 해제됩니다.</p>
<pre>class User {
    let name: String
    init(name: String) { self.name = name }
    deinit { print("\\(name) 해제됨") }
}

func test() {
    let u = User(name: "철수")
} // test() 끝나는 순간 → "철수 해제됨" 출력</pre>

<div class="highlight">
<b>💡 핵심:</b> ARC는 "참조하는 곳이 몇 개인가?"를 세는 시스템입니다. 0이 되면 즉시 해제. 단, 두 객체가 서로를 참조하면(순환 참조) 카운트가 영원히 0이 안 되어 메모리 누수가 생깁니다. 이걸 weak/unowned로 해결합니다.
</div>
`},

// ============ TOPIC 2: HeapObject 내부 구조 ============
{name:"HeapObject 내부 구조 (참조 카운트는 어디에?)",icon:"green",
detail:`
<h5>모든 클래스 인스턴스는 어디에 저장되나요?</h5>
<p>Swift에서 <b>class</b>로 만든 인스턴스는 항상 <b>힙(Heap)</b>에 저장됩니다. (struct는 보통 스택에 저장됩니다 — 이건 Day 2에서 다룹니다)</p>

<h5>그럼 힙에 어떤 모양으로 저장되나요?</h5>
<p>Swift 런타임이 정의한 <b>HeapObject</b>라는 구조로 저장됩니다:</p>
<pre>// Swift 런타임 내부 (C++로 구현됨)
struct HeapObject {
    HeapMetadata const *metadata;  // 8 bytes - 타입 정보 포인터 (isa)
    InlineRefCounts refCounts;     // 8 bytes - 참조 카운트
    // 그 다음에 실제 프로퍼티들이 옴
};</pre>

<h5>InlineRefCounts는 뭔가요?</h5>
<p>64비트(8바이트) 안에 여러 정보를 비트 단위로 욱여넣은 구조입니다:</p>
<pre>// InlineRefCounts 비트 레이아웃 (64bit 시스템)
//
//  ┌─────────────────┬───┬─────────────────┬───┐
//  │  strong count   │ D │  unowned count  │ U │
//  │   (31 bits)     │   │   (31 bits)     │   │
//  └─────────────────┴───┴─────────────────┴───┘
//   bit 0~30          31  bit 32~62          63
//
// D (1 bit): isDeinitializing 플래그 (deinit 진행 중인가)
// U (1 bit): useSlowRC 플래그 (Side Table 사용 여부)</pre>

<h5>왜 이렇게 비트로 욱여넣나요?</h5>
<p>모든 클래스 인스턴스마다 8바이트만 추가되도록 하기 위해서입니다. 인스턴스가 100만 개면 8MB 차이가 나니까요. 메모리 효율을 위한 설계입니다.</p>

<h5>실제 메모리 모습</h5>
<pre>class Person {
    var age: Int = 30
    var name: String = "철수"
}

let p = Person()

// 메모리 모습:
// 스택: [p (포인터 8B)] ──┐
//                          │
// 힙:  ┌──────────────────▼──────────────────┐
//      │ metadata (8B)                       │  ← 타입 정보
//      │ refCounts (8B): strong=1, unowned=1 │  ← ARC가 관리
//      │ age (8B)                            │  ← 우리 데이터
//      │ name (16B)                          │
//      └─────────────────────────────────────┘
//      총 ~40 bytes (실제로는 malloc overhead +α)</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Swift의 모든 class 인스턴스는 힙에 할당되며, 헤더 부분에 타입 메타데이터 8바이트와 참조 카운트 8바이트, 총 16바이트의 오버헤드가 있습니다. 이래서 작은 데이터를 많이 다룰 때는 struct가 메모리 효율이 좋습니다."
</div>
`},

// ============ TOPIC 3: Side Table ============
{name:"Side Table (weak가 동작하는 비밀)",icon:"purple",
detail:`
<h5>Side Table이 뭔가요?</h5>
<p>weak 참조를 지원하기 위해 <b>별도로 할당되는 추가 메모리 영역</b>입니다. HeapObject 옆에 따로 만들어지는 "보조 테이블"이라고 생각하시면 됩니다.</p>

<h5>왜 필요한가요?</h5>
<p>weak의 핵심 기능을 떠올려보세요: <b>"참조 대상이 해제되면 자동으로 nil이 된다"</b>. 이게 가능하려면 누군가가 "이 객체를 weak로 참조하는 변수가 어디 있는지" 알고 있어야 합니다. 그 정보를 저장하는 곳이 Side Table입니다.</p>

<h5>Side Table 구조</h5>
<pre>struct HeapObjectSideTableEntry {
    SideTableRefCounts refCounts;       // strong + unowned count
    std::atomic&lt;WeakRefCount&gt; weakBits; // weak 참조 개수
    HeapObject *object;                 // 원본 객체를 가리키는 포인터
};</pre>

<h5>언제 만들어지나요?</h5>
<p>처음에는 Side Table이 없습니다. <b>weak 참조가 처음 생길 때</b> 비로소 할당됩니다 (lazy allocation).</p>
<pre>let person = Person()
// 이 시점: HeapObject만 존재, Side Table 없음

weak var weakRef = person
// 이 시점: Side Table 생성됨
//        InlineRefCounts의 useSlowRC 플래그가 1로 변경
//        weakRef는 Side Table을 통해 person을 가리킴</pre>

<h5>weak 변수에 접근할 때 무슨 일이 일어나나요?</h5>
<pre>// weak 접근 동작 순서:
//
// 1. weak var의 Side Table 포인터 확인
// 2. Side Table에서 object 포인터 가져오기
// 3. object의 strong count 확인
//    ├─ strong count > 0: retain 후 객체 반환 (Optional이지만 값 있음)
//    └─ strong count == 0: nil 반환 (객체 이미 해제됨)

// 코드로 보면:
weak var weakRef = person
if let strongRef = weakRef {  // 이 if let에서 위 과정이 실행됨
    print(strongRef.name)
}</pre>

<h5>왜 strong/unowned보다 느린가요?</h5>
<p>strong/unowned는 HeapObject 내부의 카운트만 +1/-1 하면 됩니다. 그런데 weak는:</p>
<ol style="padding-left:20px;margin:10px 0">
<li>Side Table 포인터 따라가기 (간접 참조 1번 추가)</li>
<li>Side Table 안에서 object 포인터 따라가기 (간접 참조 1번 추가)</li>
<li>strong count 확인</li>
<li>유효하면 retain</li>
</ol>
<p>이래서 접근할 때마다 메모리 간접 참조가 더 발생합니다. 성능 민감한 코드(루프 안 등)에서는 weak를 한 번 strong으로 변환해 쓰는 게 좋습니다.</p>

<pre>// ❌ 매 반복마다 weak 접근 (Side Table 거침)
for _ in 0..&lt;1000 {
    self?.process()  // 매번 Side Table 접근
}

// ✅ 한 번 strong으로 변환 후 사용
guard let strongSelf = self else { return }
for _ in 0..&lt;1000 {
    strongSelf.process()  // 직접 접근
}</pre>

<div class="highlight">
<b>💡 정리:</b> Side Table = weak 참조를 지원하기 위한 별도 메모리 영역. weak가 처음 생길 때 lazy하게 할당되고, weak 접근 시마다 한 번 거쳐가야 해서 strong/unowned보다 약간 느립니다.
</div>
`},

// ============ TOPIC 4: weak vs unowned ============
{name:"weak vs unowned 완벽 비교",icon:"orange",
detail:`
<h5>둘 다 약한 참조 아닌가요? 뭐가 다른가요?</h5>
<p>둘 다 retain count를 올리지 않는다는 점은 같지만, <b>대상이 해제됐을 때 동작이 완전히 다릅니다</b>.</p>

<h5>weak: Optional + 자동 nil</h5>
<pre>class Owner {
    weak var pet: Pet?  // weak는 항상 Optional!
}

let owner = Owner()
do {
    let pet = Pet()
    owner.pet = pet
    print(owner.pet?.name)  // "Pet 이름"
}  // 여기서 pet이 해제됨
print(owner.pet)  // nil (자동으로 nil이 됨!)</pre>

<h5>unowned: Non-Optional + 해제 후 접근하면 크래시</h5>
<pre>class Pet {
    unowned let owner: Owner  // unowned는 Non-Optional!
    init(owner: Owner) { self.owner = owner }
}

let owner = Owner()
let pet = Pet(owner: owner)
// owner를 nil로 만든 후:
// pet.owner 접근 시 → fatalError로 크래시!</pre>

<h5>왜 unowned는 Side Table이 필요 없나요?</h5>
<p>unowned는 "대상이 해제됐는지" 추적하지 않습니다. 그냥 "여기 가서 가져와"라고 합니다. 그래서:</p>
<ul>
<li>Side Table 불필요 → 메모리 절약</li>
<li>접근 시 간접 참조 없음 → strong과 거의 같은 속도</li>
<li>대신 해제된 객체에 접근하면 크래시</li>
</ul>

<h5>그럼 unowned는 위험하니까 weak만 쓰면 되지 않나요?</h5>
<p>대상의 lifetime이 자신보다 항상 길거나 같다고 <b>확신</b>할 수 있으면 unowned가 더 좋습니다:</p>
<ul>
<li>성능: 간접 참조가 없어서 빠름</li>
<li>코드: Optional unwrap 안 해도 됨 (코드가 깔끔)</li>
<li>의도 표현: "이건 절대 nil이 될 수 없어"라고 명시</li>
</ul>

<h5>실전 선택 가이드</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th><th style="padding:10px;text-align:left">이유</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">delegate 패턴</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">delegate가 먼저 사라질 수 있음</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">closure에서 self 캡처</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">비동기 작업 동안 self가 사라질 수 있음</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">child가 parent 참조</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>unowned</b></td><td style="padding:10px;border-top:1px solid var(--g2)">parent가 child보다 항상 오래 삶</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">[unowned self] in closure (즉시 실행)</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>unowned</b></td><td style="padding:10px;border-top:1px solid var(--g2)">즉시 실행 클로저는 self가 살아있음 보장</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">확신 없을 때</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>weak</b></td><td style="padding:10px;border-top:1px solid var(--g2)">크래시보다 nil이 안전</td></tr>
</table>

<h5>unowned(unsafe)는 또 뭐예요?</h5>
<p><b>절대 사용하지 마세요.</b> 이건 unowned 체크조차 하지 않아서, 해제된 메모리에 그대로 접근합니다. 운 좋으면 동작하고, 운 나쁘면 알 수 없는 버그가 생깁니다. C 언어의 raw pointer와 같은 위험을 가집니다.</p>

<div class="highlight">
<b>💡 면접 답변 예시:</b> "weak는 Optional이고 대상 해제 시 자동으로 nil이 됩니다. Side Table을 통해 동작해서 약간의 성능 비용이 있죠. unowned는 Non-Optional이고 대상이 해제된 후 접근하면 크래시가 납니다. 대신 Side Table 없이 동작해서 더 빠릅니다. 저는 기본적으로 weak를 쓰고, parent-child 관계처럼 lifetime이 명확한 경우에만 unowned를 씁니다."
</div>
`},

// ============ TOPIC 5: Retain Cycle ============
{name:"Retain Cycle (순환 참조) 패턴과 해결",icon:"blue",
detail:`
<h5>Retain Cycle이 뭔가요?</h5>
<p>두 객체(또는 여러 객체)가 서로를 strong으로 참조해서 reference count가 영원히 0이 되지 않는 상황입니다. 결과적으로 아무도 사용하지 않는데 메모리가 해제되지 않는 <b>메모리 누수(memory leak)</b>가 발생합니다.</p>

<h5>가장 단순한 예시</h5>
<pre>class Person {
    var pet: Pet?  // strong
}
class Pet {
    var owner: Person?  // strong
}

var person: Person? = Person()
var pet: Pet? = Pet()
person?.pet = pet
pet?.owner = person

// 외부 변수를 nil로 해도:
person = nil  // person 변수는 nil이지만, pet.owner가 여전히 person 객체를 잡고 있음
pet = nil     // pet 변수는 nil이지만, person.pet이 여전히 pet 객체를 잡고 있음

// 결과: 두 객체 모두 메모리에 남아있음 (deinit 호출 안 됨!)</pre>

<h5>해결: 한쪽을 weak로</h5>
<pre>class Person {
    var pet: Pet?  // strong (Person이 Pet을 소유)
}
class Pet {
    weak var owner: Person?  // ✅ weak로 변경
}

// 이제 person = nil 하면:
// 1. pet.owner는 weak이라 person retain count에 영향 없음
// 2. person retain count = 0 → Person deinit 호출
// 3. Person deinit 시 self.pet 해제
// 4. pet retain count = 0 → Pet deinit 호출</pre>

<h5>실전 패턴 1: Closure에서 self 캡처</h5>
<pre>class ViewController: UIViewController {
    var dataLoader = DataLoader()
    
    override func viewDidLoad() {
        super.viewDidLoad()
        
        // ❌ 순환 참조 발생!
        dataLoader.onComplete = { result in
            self.handleResult(result)  // closure가 self를 strong 캡처
            // self → dataLoader → onComplete(closure) → self ... 순환!
        }
        
        // ✅ 해결: [weak self]
        dataLoader.onComplete = { [weak self] result in
            guard let self = self else { return }
            self.handleResult(result)
        }
    }
}</pre>

<h5>실전 패턴 2: Delegate</h5>
<pre>// ❌ delegate를 strong으로 (흔한 실수!)
protocol DownloadDelegate {
    func didFinish()
}
class Downloader {
    var delegate: DownloadDelegate?  // 기본 strong!
}

class ViewController: UIViewController, DownloadDelegate {
    let downloader = Downloader()
    
    override func viewDidLoad() {
        super.viewDidLoad()
        downloader.delegate = self
        // 순환: VC → downloader → delegate(VC) → ...
    }
}

// ✅ 해결: weak delegate (표준 패턴)
protocol DownloadDelegate: AnyObject {  // class 전용으로 제한
    func didFinish()
}
class Downloader {
    weak var delegate: DownloadDelegate?  // weak!
}</pre>

<p><b>왜 AnyObject가 필요한가요?</b><br>
weak는 reference type(class)에만 적용 가능합니다. struct/enum은 값 타입이라 weak가 의미 없습니다. <code>protocol XxxDelegate: AnyObject</code>로 선언하면 class만 채택할 수 있게 강제하여 weak 사용이 가능해집니다.</p>

<h5>실전 패턴 3: Timer (정말 흔한 함정)</h5>
<pre>class TimerVC: UIViewController {
    var timer: Timer?
    
    override func viewDidLoad() {
        super.viewDidLoad()
        
        // ❌ Timer는 target을 strong으로 retain!
        timer = Timer.scheduledTimer(
            timeInterval: 1.0,
            target: self,           // ← strong!
            selector: #selector(tick),
            userInfo: nil,
            repeats: true
        )
        // RunLoop → Timer → self → timer → Timer ... 순환
        // 이 VC를 pop해도 절대 deinit 안 됨!
    }
    
    @objc func tick() { print("tick") }
}

// ✅ 해결 1: 명시적으로 invalidate
override func viewWillDisappear(_ animated: Bool) {
    super.viewWillDisappear(animated)
    timer?.invalidate()
    timer = nil
}

// ✅ 해결 2: Block-based Timer (iOS 10+) + weak self
timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { [weak self] _ in
    self?.tick()
}</pre>

<h5>탐지 방법</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>deinit에 print 추가</b>: 가장 간단. 화면 dismiss했는데 deinit 안 찍히면 의심</li>
<li><b>Xcode Memory Graph Debugger</b>: 실행 중 디버그 네비게이터의 메모리 아이콘 클릭. 보라색 ! 표시가 leak</li>
<li><b>Instruments → Leaks</b>: 자동 탐지. CI에 연동 가능</li>
<li><b>객체 카운트 모니터링</b>: 같은 화면 10번 진입했는데 객체가 10개 살아있으면 누수</li>
</ol>

<div class="highlight">
<b>💡 면접 답변 예시:</b> "순환 참조는 주로 closure capture, delegate, Timer에서 발생합니다. Closure는 [weak self]로 캡처 리스트를 명시하고, delegate는 AnyObject 프로토콜 + weak로 선언합니다. Timer는 viewWillDisappear에서 invalidate를 호출하거나 block 기반 Timer + weak self를 사용합니다. 저는 Memory Graph Debugger를 CI에 연동해서 PR 단계에서 자동 탐지하도록 구성했습니다."
</div>
`},

// ============ TOPIC 6: Autorelease Pool ============
{name:"Autorelease Pool (대량 객체 메모리 제어)",icon:"green",
detail:`
<h5>Autorelease Pool이 뭔가요?</h5>
<p>Objective-C 시절부터 내려온 메모리 관리 메커니즘입니다. 이름 그대로 "자동 해제 풀"인데, 풀에 담긴 객체들이 풀이 닫히는 시점에 한꺼번에 해제됩니다.</p>

<h5>왜 필요한가요?</h5>
<p>임시 객체가 많이 생성되는 루프에서 메모리 사용량이 폭발하는 걸 막기 위해서입니다.</p>

<pre>// ❌ 메모리 폭발 예시
func processImages() {
    for i in 0..&lt;1_000_000 {
        let str = NSString(format: "image_%d.png", i)
        // NSString은 autorelease 객체 → 풀이 닫힐 때까지 살아있음
        // 함수 끝날 때까지 100만 개의 NSString이 메모리에 누적!
    }
}

// ✅ 매 반복마다 풀을 만들고 닫음
func processImages() {
    for i in 0..&lt;1_000_000 {
        autoreleasepool {
            let str = NSString(format: "image_%d.png", i)
            // ... 처리
        }  // 여기서 풀 닫힘 → str 해제됨
    }
}</pre>

<h5>중요: 순수 Swift 객체는 대상이 아님</h5>
<p>Swift native class와 struct는 autorelease pool과 무관합니다. ARC가 즉시 release하기 때문이죠. autoreleasepool이 영향을 미치는 건:</p>
<ul>
<li>NSString, NSArray, NSDictionary 등 NS- 접두사 객체</li>
<li>Objective-C 라이브러리에서 가져온 객체</li>
<li>일부 Foundation API가 내부적으로 만드는 임시 객체</li>
</ul>

<h5>실무 사례: Core Data Batch Import</h5>
<pre>func importLargeDataset(_ records: [JSONRecord]) {
    let context = persistentContainer.newBackgroundContext()
    
    context.perform {
        // 100만 건을 1000건씩 나눠서 처리
        for chunk in records.chunked(into: 1000) {
            autoreleasepool {
                for record in chunk {
                    let entity = MyEntity(context: context)
                    entity.configure(with: record)
                }
                try? context.save()
                context.reset()  // managed objects 해제
            }
        }
    }
}</pre>

<h5>이미지 처리 사례</h5>
<pre>// 대량 이미지를 썸네일로 변환
func generateThumbnails(_ urls: [URL]) {
    for url in urls {
        autoreleasepool {
            guard let image = UIImage(contentsOfFile: url.path) else { return }
            let thumbnail = image.resized(to: CGSize(width: 100, height: 100))
            saveThumbnail(thumbnail, for: url)
            // image와 thumbnail이 풀 닫힐 때 해제됨
        }
    }
}</pre>

<h5>main runloop에는 자동으로 있어요</h5>
<p>iOS 앱의 main thread에는 RunLoop이 매 사이클마다 자동으로 autorelease pool을 만들고 닫습니다. 그래서 일반적인 UI 코드에서는 명시적으로 쓸 필요가 없습니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "Swift 자체는 ARC로 즉시 해제하지만, NSObject 브릿징 객체나 Core Data, ImageIO 같은 API들은 내부적으로 autorelease 객체를 사용합니다. 대량 데이터를 루프로 처리할 때 메모리 피크를 제어하려면 autoreleasepool을 명시적으로 써야 합니다. 저는 Core Data batch import에서 1000건마다 pool을 닫는 패턴으로 메모리 사용량을 1.2GB에서 200MB로 줄인 경험이 있습니다."
</div>
`}

],

questions:[
{q:"weak self 후 guard let self 하면 retain count가 올라가나요?",level:"basic",freq:true,
answer:"맞습니다. <b>guard let self 시점에 strong count가 +1됩니다.</b> 클로저 안에서 strong 참조가 임시로 만들어지는 거죠.<br><br>중요한 건 <b>'클로저 스코프가 끝나면 즉시 release 된다'</b>는 점입니다. 그러니 deinit이 '지연'되는 것이지 '방지'되는 것은 아닙니다.<br><br>주의: 만약 클로저 안에서 또 다른 async 작업을 시작하고 거기서도 self를 캡처하면, 그 동안은 self가 살아있게 됩니다. 의도치 않은 lifetime 연장이 될 수 있어요."},

{q:"Combine에서 순환 참조를 어떻게 방지하나요?",level:"basic",freq:true,
answer:"두 가지 방법이 있습니다.<br><br><b>1. AnyCancellable + Set</b><br>모든 subscription을 <code>Set&lt;AnyCancellable&gt;</code>에 저장합니다. 소유자가 deinit될 때 Set이 해제되고, 그 안의 AnyCancellable들이 해제되면서 자동으로 cancel됩니다.<br><br><b>2. sink 클로저에서 [weak self]</b><br>일반 closure와 똑같이 [weak self]로 캡처합니다.<br><br><b>주의:</b> <code>.assign(to: \\.title, on: self)</code>는 self를 strong 캡처합니다! 대신 <code>.assign(to: &$title)</code>(@Published 프로퍼티에 직접)을 쓰는 게 안전합니다."},

{q:"unowned는 언제 쓰는 게 안전한가요?",level:"advanced",freq:true,
answer:"<b>대상 객체의 lifetime이 자신보다 항상 길거나 같다고 확신할 수 있을 때</b>만 안전합니다.<br><br>대표적인 안전한 케이스:<br>• Parent-child 관계에서 child가 parent를 참조 (parent가 항상 더 오래 삶)<br>• 즉시 실행되는 closure에서 self 캡처<br>• ViewModel이 자신을 소유하는 ViewController를 참조 (생명주기가 동기화됨)<br><br>위험한 케이스:<br>• 비동기 콜백 (네트워크, 타이머) — 콜백 시점에 객체가 사라졌을 수 있음<br>• delegate 패턴 — delegate가 먼저 dealloc될 가능성<br><br>확신이 없으면 weak가 정답입니다. 크래시보다 nil 처리가 안전합니다."},

{q:"ARC와 GC의 가장 큰 차이는 무엇인가요?",level:"basic",freq:false,
answer:"<b>해제 시점의 결정성</b>입니다.<br><br>ARC: 참조 카운트가 0이 되는 즉시 deinit 호출. 시점이 코드만 보면 정확히 예측 가능 (deterministic).<br><br>GC: 메모리가 부족하거나 GC 사이클이 도래할 때 비로소 수집. 언제 해제될지 정확히 알 수 없음.<br><br>이 차이로 인해:<br>• ARC: GC pause 없음 → UI 반응성 우수, 모바일에 적합<br>• ARC: 파일 핸들, 락 해제 같은 RAII 패턴 가능 (deinit 시점이 명확)<br>• GC: 순환 참조 자동 해결 → 개발자 부담 적음<br>• GC: 메모리 사용량이 일시적으로 더 높을 수 있음"},

{q:"closure capture list의 동작 원리는?",level:"advanced",freq:true,
answer:"capture list는 <b>클로저가 생성되는 시점에 변수를 캡처하는 방식을 명시</b>하는 문법입니다.<br><br>기본 동작:<br>• reference type: strong 캡처 (retain count +1)<br>• value type: 값 복사<br><br>capture list로 변경 가능:<br>• <code>[weak self]</code>: weak 캡처<br>• <code>[unowned self]</code>: unowned 캡처<br>• <code>[x = someValue]</code>: 클로저 생성 시점의 값으로 복사<br>• <code>[weak delegate, x = currentX]</code>: 여러 개 동시 가능<br><br>예시:<br><pre>var x = 10\nlet closure = { [x] in print(x) }  // 10 캡처\nx = 20\nclosure()  // 10 출력 (x=20이 아님!)</pre>"}
],

quizzes:[
{q:"다음 중 ARC에 대한 설명으로 <b>올바르지 않은 것</b>은?",
opts:["컴파일 타임에 retain/release 코드를 자동 삽입한다","순환 참조를 자동으로 탐지하고 해제한다","strong reference count가 0이 되면 즉시 deinit이 호출된다","atomic operation으로 thread-safe하게 카운트를 관리한다"],
answer:1,
hint:"ARC는 순환 참조를 자동으로 해결하지 못합니다. 그래서 weak/unowned를 사용해 개발자가 명시적으로 해결해야 합니다."},

{q:"weak reference에 대한 설명으로 <b>올바른 것</b>은?",
opts:["HeapObject 내부에 직접 weak count가 저장된다","Side Table 없이도 동작 가능하다","참조 대상이 해제되면 자동으로 nil이 된다 (zeroing)","unowned보다 접근 비용이 낮다"],
answer:2,
hint:"weak는 'zeroing reference'라고도 불립니다. 대상이 해제되면 자동으로 nil이 되며, 이를 위해 Side Table이 필요합니다."},

{q:"다음 코드에서 메모리 누수가 발생하는 이유는?<br><pre>class VC: UIViewController {\n  var timer: Timer?\n  override func viewDidLoad() {\n    super.viewDidLoad()\n    timer = Timer.scheduledTimer(\n      timeInterval: 1, target: self,\n      selector: #selector(tick),\n      userInfo: nil, repeats: true)\n  }\n}</pre>",
opts:["Timer가 target 파라미터(self)를 strong으로 retain하기 때문","viewDidLoad에서 Timer를 생성하면 안 되기 때문","#selector 방식은 항상 메모리 누수를 유발하기 때문","Timer는 반드시 main thread에서만 사용해야 하기 때문"],
answer:0,
hint:"Timer(target:)에서 target은 strong reference입니다. RunLoop → Timer → self → timer → Timer 순환이 발생합니다. invalidate를 호출하거나 block-based Timer를 사용해야 합니다."},

{q:"<code>[weak self]</code>를 사용할 때 다음 중 가장 권장되는 패턴은?",
opts:["self?.method() 처럼 매번 옵셔널 체이닝을 사용한다","guard let self = self else { return } 으로 strong 변환 후 사용한다","[unowned self]로 변경하여 항상 빠르게 동작하도록 한다","capture list 없이 self를 그대로 사용한다"],
answer:1,
hint:"매번 self?.를 쓰면 매번 Side Table을 통한 weak 접근이 발생합니다. guard let으로 한 번 strong 변환하면 그 이후로는 빠른 직접 접근이 가능합니다."}
]
}
,
{day:3,title:"Protocol Oriented Programming & Generics",
tags:["Protocol","Witness Table","Dispatch","Generics","Specialization","some/any"],
topics:[

{name:"Method Dispatch 4가지 종류",icon:"blue",
detail:`
<h5>Dispatch가 뭔가요?</h5>
<p>"어떤 메서드를 호출할지 결정하는 방식"입니다. <code>obj.method()</code>를 썼을 때 컴파일러나 런타임이 어떻게 실제 함수를 찾아가는지를 의미합니다.</p>

<h5>Swift의 4가지 Dispatch</h5>

<h5>1. Static Dispatch (가장 빠름)</h5>
<p>컴파일 타임에 호출할 함수가 결정됩니다. 인라인 최적화도 가능해서 거의 함수 호출 비용이 없습니다.</p>
<pre>struct Calculator {
    func add(_ a: Int, _ b: Int) -> Int { a + b }
}
let c = Calculator()
c.add(1, 2)  // 컴파일러가 어떤 add인지 100% 안다 → static dispatch</pre>
<p><b>적용 대상:</b> struct, enum 메서드, final class 메서드, 비-override 메서드</p>

<h5>2. V-Table Dispatch (class 기본)</h5>
<p>각 class가 가진 가상 함수 테이블(vtable)을 통해 간접 호출됩니다. 한 번의 포인터 추적이 추가됩니다.</p>
<pre>class Animal {
    func speak() { print("...") }       // vtable[0]
}
class Cat: Animal {
    override func speak() { print("야옹") }  // vtable[0] 오버라이드
}

let a: Animal = Cat()
a.speak()
// 1. a의 metadata 포인터 따라가기
// 2. metadata.vtable[0]에서 함수 포인터 가져오기
// 3. 그 함수 호출 → Cat.speak 실행</pre>
<p><b>적용 대상:</b> override 가능한 class 메서드</p>

<h5>3. Witness Table Dispatch (Protocol)</h5>
<p>프로토콜 타입으로 사용할 때 사용됩니다. Protocol Witness Table(PWT)을 통한 간접 호출.</p>
<pre>protocol Speakable {
    func speak()
}
struct Dog: Speakable {
    func speak() { print("멍멍") }
}

let s: Speakable = Dog()
s.speak()
// existential container의 PWT 포인터 따라가기 → Dog.speak 호출</pre>
<p><b>적용 대상:</b> 프로토콜 타입 변수의 메서드 호출</p>

<h5>4. Message Dispatch (가장 느림)</h5>
<p>Objective-C 런타임의 <code>objc_msgSend</code>를 통한 호출. 메시지 이름(selector)으로 함수를 찾습니다.</p>
<pre>class Legacy: NSObject {
    @objc dynamic func action() { }  // dynamic이라 message dispatch
}
// 호출 시 selector 테이블 검색 → 캐시 → 함수 호출
// 가장 느리지만 method swizzling 같은 런타임 조작 가능</pre>
<p><b>적용 대상:</b> @objc dynamic 메서드, KVO 적용 프로퍼티</p>

<h5>성능 비교</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">Dispatch</th><th style="padding:10px;text-align:left">속도</th><th style="padding:10px;text-align:left">유연성</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Static</td><td style="padding:10px;border-top:1px solid var(--g2)">~1ns (인라인 시 0)</td><td style="padding:10px;border-top:1px solid var(--g2)">없음</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">V-Table</td><td style="padding:10px;border-top:1px solid var(--g2)">~3-5ns</td><td style="padding:10px;border-top:1px solid var(--g2)">override</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Witness Table</td><td style="padding:10px;border-top:1px solid var(--g2)">~5-10ns</td><td style="padding:10px;border-top:1px solid var(--g2)">protocol 다형성</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Message</td><td style="padding:10px;border-top:1px solid var(--g2)">~20-50ns</td><td style="padding:10px;border-top:1px solid var(--g2)">런타임 조작</td></tr>
</table>

<div class="highlight">
<b>💡 면접 포인트:</b> "성능이 중요한 곳에서는 final class나 struct를 사용해 static dispatch를 유도합니다. 프로토콜은 유연성을 주지만 witness table dispatch 비용이 있어요. SwiftUI body가 some View를 반환하는 것도 static dispatch로 다이내믹 디스패치 비용을 피하기 위함입니다."
</div>
`},

{name:"Protocol Witness Table (PWT) 상세",icon:"green",
detail:`
<h5>PWT가 뭔가요?</h5>
<p>"이 타입이 프로토콜의 각 메서드를 어떻게 구현했는지"를 담은 함수 포인터 배열입니다. 컴파일러가 자동으로 생성합니다.</p>

<h5>예시로 이해하기</h5>
<pre>protocol Drawable {
    func draw()
    var color: String { get }
}

struct Circle: Drawable {
    func draw() { print("원 그리기") }
    var color: String { "red" }
}

// 컴파일러가 생성하는 PWT (의사 코드):
// Circle_Drawable_PWT:
//   [0] = &Circle.draw          // 함수 포인터
//   [1] = &Circle.color.getter  // getter 포인터</pre>

<h5>호출 흐름</h5>
<pre>let d: Drawable = Circle()
d.draw()

// 내부 동작:
// 1. existential container의 PWT 포인터 가져오기
// 2. PWT[0] (draw 슬롯)에서 함수 포인터 가져오기
// 3. 그 함수 호출 (구체 타입의 draw 실행)</pre>

<h5>중요한 함정: Protocol Extension 메서드</h5>
<p>이게 면접에서 자주 나오는 함정입니다.</p>

<pre>protocol Greetable {
    func greet()  // 이게 protocol requirement
}

extension Greetable {
    func greet() { print("Hello") }      // 기본 구현
    func farewell() { print("Bye") }     // ⚠️ protocol에 없는 새 메서드!
}

struct Korean: Greetable {
    func greet() { print("안녕") }
    func farewell() { print("잘가") }
}

// 케이스 1: 구체 타입 변수
let k: Korean = Korean()
k.greet()      // "안녕" (static dispatch)
k.farewell()   // "잘가" (static dispatch)

// 케이스 2: 프로토콜 타입 변수
let g: Greetable = Korean()
g.greet()      // "안녕" ← greet은 PWT에 있음 → 동적 디스패치
g.farewell()   // "Bye"  ⚠️← farewell은 PWT에 없음! 
                //          static dispatch로 extension 기본 구현 호출!</pre>

<h5>왜 이런 일이 일어나나요?</h5>
<p>핵심 규칙:</p>
<ul>
<li><b>Protocol 본문에 선언된 메서드</b>: PWT에 등록 → dynamic dispatch</li>
<li><b>Extension에서만 정의된 메서드</b>: PWT에 없음 → static dispatch</li>
</ul>
<p>즉, 프로토콜 타입으로 사용할 땐 컴파일러가 "Greetable이 가진 메서드는 뭐지?" 하고 본문만 봅니다. extension의 farewell()은 인식 못하고, 컴파일 타임에 Greetable extension의 기본 구현으로 묶어버립니다.</p>

<h5>해결법</h5>
<pre>// ✅ 진짜로 override 가능하게 하려면 protocol 본문에 명시
protocol Greetable {
    func greet()
    func farewell()  // ← 본문에 선언!
}

extension Greetable {
    func greet() { print("Hello") }
    func farewell() { print("Bye") }  // 기본 구현
}

struct Korean: Greetable {
    func greet() { print("안녕") }
    func farewell() { print("잘가") }
}

let g: Greetable = Korean()
g.farewell()  // 이제 "잘가" 호출됨 (PWT에 있으므로)</pre>

<div class="highlight">
<b>💡 면접 킬러 포인트:</b> "protocol extension의 메서드가 protocol requirement에 선언되어 있지 않으면, 그 메서드는 witness table에 등록되지 않아 dynamic dispatch가 불가능합니다. 프로토콜 타입으로 사용할 때 예상과 다른 동작을 유발하는 가장 대표적인 함정이죠."
</div>
`},

{name:"Generics와 Specialization",icon:"purple",
detail:`
<h5>Generics가 뭔가요?</h5>
<p>"여러 타입에 대해 동작하는 코드를 한 번만 작성"하는 기법입니다.</p>

<pre>// Generic이 없다면:
func swapInts(_ a: inout Int, _ b: inout Int) { ... }
func swapStrings(_ a: inout String, _ b: inout String) { ... }
func swapDoubles(_ a: inout Double, _ b: inout Double) { ... }
// 타입별로 다 만들어야 함...

// Generic으로:
func swap&lt;T&gt;(_ a: inout T, _ b: inout T) {
    let temp = a
    a = b
    b = temp
}
// 한 번 작성으로 모든 타입에 대응!</pre>

<h5>Generic은 어떻게 컴파일되나요?</h5>
<p>두 가지 경로가 있습니다.</p>

<h5>경로 1: Specialization (최적화 ON, 빠름)</h5>
<p>컴파일러가 호출 사이트의 구체 타입을 보고 <b>전용 함수</b>를 만들어냅니다.</p>
<pre>// 원본:
func process&lt;T&gt;(_ value: T) { ... }

// 사용:
process(42)        // Int로 호출
process("hello")   // String으로 호출

// 컴파일러가 생성:
func process_Int(_ value: Int) { ... }      // Int 전용 사본
func process_String(_ value: String) { ... } // String 전용 사본
// 각각 인라인 가능, 타입 메타데이터 불필요 → 빠름!</pre>

<h5>경로 2: Unspecialized (느림)</h5>
<p>컴파일러가 구체 타입을 모르거나 specialization을 못할 때(모듈 경계 등)는 Value Witness Table(VWT)을 통해 런타임에 처리합니다.</p>
<pre>// VWT를 통한 런타임 동작:
// 1. T의 size, alignment를 VWT에서 조회
// 2. 적절한 메모리 할당 (스택 or 힙)
// 3. T의 copy 함수를 VWT에서 조회하여 복사
// 4. T의 destroy 함수를 VWT에서 조회하여 해제
// 매 단계마다 VWT 간접 호출 → 성능 비용</pre>

<h5>@inlinable로 모듈 경계 넘기</h5>
<p>일반적으로 다른 모듈의 generic 함수는 specialization이 안 됩니다(컴파일러가 본문을 모르니까). <code>@inlinable</code>을 붙이면 본문이 모듈 인터페이스에 포함되어 specialization이 가능해집니다.</p>

<pre>// ModuleA의 코드:
public func processItems&lt;T&gt;(_ items: [T]) -> Int {
    return items.count  
}
// 다른 모듈에서 specialization 불가

// 해결:
@inlinable
public func processItems&lt;T&gt;(_ items: [T]) -> Int {
    return items.count
}
// 본문이 노출됨 → 호출 모듈에서 specialization 가능</pre>

<p><b>Trade-off:</b></p>
<ul>
<li>장점: 성능 향상</li>
<li>단점: 바이너리 크기 증가, ABI 안정성 제약 (구현 변경 시 클라이언트 재컴파일 필요)</li>
</ul>

<h5>Generic Constraint</h5>
<pre>// where 절로 제약 추가
func max&lt;T: Comparable&gt;(_ a: T, _ b: T) -> T {
    return a > b ? a : b  // Comparable 제약 덕분에 > 사용 가능
}

// 다중 제약
func process&lt;T: Hashable & Codable&gt;(_ item: T) { ... }

// Associated type 제약
extension Array where Element: Numeric {
    func sum() -> Element {
        return reduce(0, +)
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Generic 코드는 specialization이 핵심입니다. 같은 모듈 내부에선 -O 최적화가 자동으로 specialization을 적용하지만, 모듈 경계를 넘으면 VWT 기반 동적 처리로 떨어집니다. 라이브러리 작성 시 핫패스 함수에는 @inlinable을 고려하되, ABI 안정성과 바이너리 크기 trade-off를 따져야 합니다."
</div>
`},

{name:"some vs any (Swift 5.7+)",icon:"orange",
detail:`
<h5>some Protocol (Opaque Type)</h5>
<p>"어떤 구체 타입인지는 숨기지만, <b>컴파일 타임에 하나로 고정</b>된다"는 의미입니다.</p>

<pre>func makeShape() -> some Shape {
    return Circle(radius: 5)
}
// 호출하는 쪽에선 어떤 타입인지 모름 (Shape이라는 것만 알 수 있음)
// 하지만 컴파일러는 알고 있음 (Circle)
// → static dispatch 가능, existential 오버헤드 없음

// 제약: 항상 같은 타입을 반환해야 함
func makeShape(round: Bool) -> some Shape {
    if round {
        return Circle(radius: 5)
    } else {
        return Square(side: 3)  // ❌ 컴파일 에러! 타입이 다름
    }
}</pre>

<h5>any Protocol (Existential Type)</h5>
<p>"<b>실행 시점에 타입이 결정</b>되는 컨테이너"입니다. Existential Container를 의미합니다.</p>

<pre>func makeShape(round: Bool) -> any Shape {
    if round {
        return Circle(radius: 5)
    } else {
        return Square(side: 3)  // ✅ OK! 다른 타입도 됨
    }
}
// 유연하지만 비용이 있음:
// - Existential Container 사용 (5 words)
// - 24B 초과 시 힙 할당
// - Witness Table dispatch (간접 호출)</pre>

<h5>성능 비교</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">항목</th><th style="padding:10px;text-align:left">some Shape</th><th style="padding:10px;text-align:left">any Shape</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">메모리</td><td style="padding:10px;border-top:1px solid var(--g2)">구체 타입 크기</td><td style="padding:10px;border-top:1px solid var(--g2)">5 words + (값 크기)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">함수 호출</td><td style="padding:10px;border-top:1px solid var(--g2)">~1ns (인라인 가능)</td><td style="padding:10px;border-top:1px solid var(--g2)">~5-20ns (PWT)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">유연성</td><td style="padding:10px;border-top:1px solid var(--g2)">고정 타입</td><td style="padding:10px;border-top:1px solid var(--g2)">조건부 다른 타입</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Self/AssocType 사용</td><td style="padding:10px;border-top:1px solid var(--g2)">자유롭게</td><td style="padding:10px;border-top:1px solid var(--g2)">제약 있음</td></tr>
</table>

<h5>언제 어느 걸 써야 하나요?</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">상황</th><th style="padding:10px;text-align:left">선택</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">SwiftUI body, View modifier</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>some</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">한 번 호출에 한 종류만 반환</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>some</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">조건부로 다른 타입 반환</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>any</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">Array&lt;Shape&gt; 같은 이종 컬렉션</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>any</b> (Array&lt;any Shape&gt;)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">모듈 인터페이스, 유연성 우선</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>any</b></td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">성능 중요한 hot path</td><td style="padding:10px;border-top:1px solid var(--g2)"><b>some</b> 또는 generic</td></tr>
</table>

<h5>Primary Associated Type (Swift 5.7+)</h5>
<p>이전엔 <code>any Collection</code>처럼 type erasure가 필요했지만, 이제 꺾쇠로 명시 가능합니다.</p>
<pre>// 이전 (Swift 5.6 이전)
let nums: AnyCollection&lt;Int&gt; = [1, 2, 3]

// 현재 (Swift 5.7+)
let nums: any Collection&lt;Int&gt; = [1, 2, 3]
// Collection의 primary associated type이 Element이기 때문</pre>

<div class="highlight">
<b>💡 면접 답변 예시:</b> "저는 모듈 간 인터페이스에서는 any Protocol을 사용하고, 모듈 내부 구현에서는 some Protocol이나 구체 generic을 사용합니다. 특히 SwiftUI의 body가 some View를 반환하는 이유는, 컴파일러가 View 트리의 구체 타입을 알아야 효율적인 diff 알고리즘을 수행할 수 있기 때문입니다. 이종 데이터를 담는 컬렉션엔 any Protocol&lt;...&gt;를 활용합니다."
</div>
`}

],
questions:[
{q:"protocol extension 메서드가 override되지 않는 경우는?",level:"advanced",freq:true,
answer:"protocol requirement에 선언되지 않은 extension 전용 메서드입니다.<br><br>이런 메서드는 PWT(Protocol Witness Table)에 등록되지 않아 dynamic dispatch가 불가능합니다. 프로토콜 타입으로 사용할 때는 항상 extension의 기본 구현이 호출됩니다.<br><br>해결: protocol 본문에 메서드를 명시적으로 선언하면 PWT에 등록되어 정상적으로 동작합니다."},

{q:"some과 any의 차이를 한 줄로 설명한다면?",level:"basic",freq:true,
answer:"<b>some = 컴파일 타임에 하나의 구체 타입으로 고정</b> (static dispatch, 빠름).<br><b>any = 런타임에 어떤 타입이든 담을 수 있는 컨테이너</b> (dynamic dispatch, 유연하지만 약간 느림).<br><br>SwiftUI body는 some View를 반환합니다 — 한 View struct가 한 가지 모양만 그리니까요. 반대로 [any Drawable] 배열은 Circle, Square를 섞어 담을 수 있습니다."},

{q:"@inlinable의 trade-off는?",level:"advanced",freq:false,
answer:"<b>장점:</b> 모듈 경계를 넘어서도 specialization 가능 → 성능 향상.<br><br><b>단점:</b><br>1. 함수 본문이 모듈 인터페이스에 노출됨<br>2. 바이너리 크기 증가<br>3. ABI 안정성 제약 (구현 변경 시 클라이언트 재컴파일 필요)<br>4. 정보 은닉 약화 (라이브러리 사용자가 내부 구현을 볼 수 있음)<br><br>가이드: 라이브러리에서 정말 hot path인 작은 함수에만 선택적으로 적용. ABI를 잠그기 전에 신중히 검토."},

{q:"Witness Table과 V-Table의 차이는?",level:"advanced",freq:false,
answer:"둘 다 함수 포인터 배열이지만 사용 목적과 구조가 다릅니다.<br><br><b>V-Table (Virtual Table):</b> class 인스턴스의 metadata에 포함됨. 상속 계층의 가상 메서드들을 담음. override 시 vtable 슬롯이 새 함수로 교체됨.<br><br><b>Witness Table (Protocol Witness Table):</b> 타입과 프로토콜의 조합마다 별도 생성. struct, enum, class 모두 적용. 한 타입이 여러 프로토콜을 채택하면 여러 PWT를 가짐.<br><br>예: Dog가 Animal과 Comparable을 채택하면 Dog의 Animal_PWT, Dog의 Comparable_PWT가 각각 존재."},

{q:"final class와 struct 중 어느 게 더 빠른가요?",level:"basic",freq:false,
answer:"<b>둘 다 static dispatch라서 호출 비용은 동일합니다.</b> 차이는 다른 곳에서 옵니다:<br><br><b>final class:</b> 항상 힙 할당, retain/release 비용. 큰 데이터를 참조로 공유하면 효율적.<br><br><b>struct:</b> 인라인 저장(보통 스택), 복사 시 데이터 전체 복사. 작은 데이터면 매우 빠름. 큰 데이터면 복사 비용 발생 (단, COW로 완화 가능).<br><br>일반론: 작은 값/불변 데이터는 struct, 큰 데이터/공유 필요한 건 class. 단, 표준 컬렉션(Array, Dictionary)은 struct지만 COW로 비용을 최소화합니다."}
],

{day:4,title:"Concurrency: GCD와 Swift Concurrency",
tags:["GCD","DispatchQueue","async/await","Actor","Sendable","Thread Pool"],
topics:[

{name:"GCD (Grand Central Dispatch) 기초",icon:"blue",
detail:`
<h5>GCD가 뭔가요?</h5>
<p>Apple이 만든 저수준 동시성 API입니다. 스레드를 직접 관리하는 대신 "큐(Queue)"에 작업을 넣으면 시스템이 알아서 적절한 스레드에 분배해 실행합니다.</p>

<h5>왜 만들었나요?</h5>
<p>예전에는 <code>pthread</code>나 <code>NSThread</code>로 직접 스레드를 만들었습니다. 하지만 스레드를 너무 많이 만들면 메모리/CPU가 낭비되고, 적게 만들면 활용도가 떨어집니다. GCD는 시스템이 보유한 <b>스레드 풀</b>을 효율적으로 공유합니다.</p>

<h5>핵심 개념: Queue</h5>
<pre>// Serial Queue: 하나씩 순서대로 실행
let serial = DispatchQueue(label: "com.app.serial")
serial.async { print("A") }
serial.async { print("B") }
serial.async { print("C") }
// 출력: A, B, C (항상 이 순서)

// Concurrent Queue: 여러 개 동시 실행 가능
let concurrent = DispatchQueue(label: "com.app.concurrent", attributes: .concurrent)
concurrent.async { print("A") }
concurrent.async { print("B") }
concurrent.async { print("C") }
// 출력: 순서 보장 안 됨 (병렬 실행)</pre>

<h5>중요한 큐들</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">큐</th><th style="padding:10px;text-align:left">설명</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>DispatchQueue.main</code></td><td style="padding:10px;border-top:1px solid var(--g2)">메인 스레드. UI 업데이트는 항상 여기서</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>DispatchQueue.global()</code></td><td style="padding:10px;border-top:1px solid var(--g2)">기본 글로벌 큐 (concurrent)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>DispatchQueue(label:)</code></td><td style="padding:10px;border-top:1px solid var(--g2)">커스텀 큐 (기본 serial)</td></tr>
</table>

<h5>sync vs async</h5>
<pre>// async: 작업을 큐에 넣고 즉시 리턴 (non-blocking)
queue.async {
    longTask()  // 백그라운드에서 실행
}
print("바로 출력됨")

// sync: 작업이 끝날 때까지 기다림 (blocking)
queue.sync {
    longTask()  // 끝날 때까지 대기
}
print("longTask 완료 후 출력")</pre>

<h5>가장 흔한 패턴</h5>
<pre>// 백그라운드에서 무거운 작업 → UI는 메인에서 업데이트
DispatchQueue.global().async {
    let result = heavyComputation()
    
    DispatchQueue.main.async {
        self.label.text = result  // UI 업데이트
    }
}</pre>

<h5>⚠️ 절대 하지 말 것: main.sync</h5>
<pre>// ❌ 데드락! 영원히 멈춤
DispatchQueue.main.async {
    DispatchQueue.main.sync {  // 메인 스레드에서 메인 스레드를 기다림
        // 도달 불가능
    }
}
// 메인이 main.sync를 기다리는 중이라 그 큐를 처리 못함 → 영원히 대기</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "GCD는 스레드 풀 위에 큐 추상화를 올린 시스템입니다. async/await가 등장한 후에도 여전히 강력한 도구이지만, 새 코드에서는 Swift Concurrency가 더 안전하고 직관적입니다. GCD의 큰 함정은 thread explosion과 priority inversion인데, Swift Concurrency는 cooperative thread pool로 이걸 원천 차단합니다."
</div>
`},

{name:"QoS와 Thread Explosion",icon:"green",
detail:`
<h5>QoS (Quality of Service)</h5>
<p>작업의 우선순위를 시스템에 알려주는 힌트입니다. 시스템은 이를 보고 CPU/스레드 할당을 조정합니다.</p>

<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">QoS</th><th style="padding:10px;text-align:left">용도</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.userInteractive</code></td><td style="padding:10px;border-top:1px solid var(--g2)">UI 업데이트, 애니메이션 (가장 높음)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.userInitiated</code></td><td style="padding:10px;border-top:1px solid var(--g2)">사용자 액션 결과 (탭 후 로딩)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.default</code></td><td style="padding:10px;border-top:1px solid var(--g2)">기본값</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.utility</code></td><td style="padding:10px;border-top:1px solid var(--g2)">프로그레스 바 있는 긴 작업</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.background</code></td><td style="padding:10px;border-top:1px solid var(--g2)">백업, 인덱싱 (사용자 모름)</td></tr>
</table>

<pre>DispatchQueue.global(qos: .userInitiated).async {
    let data = fetchData()  // 사용자 대기 중이라 빠르게
    DispatchQueue.main.async {
        self.show(data)
    }
}</pre>

<h5>Priority Inversion (우선순위 역전)</h5>
<p>높은 우선순위 작업이 낮은 우선순위 작업을 기다리게 되는 현상입니다.</p>
<pre>// 시나리오:
// Low qos가 lock 보유 중
// High qos가 같은 lock 요청 → Low가 끝날 때까지 대기
// → High의 우선순위가 무력화됨

// GCD는 이를 자동으로 감지하여 Low의 우선순위를 일시적으로 올립니다
// (Priority Inheritance)
// 단, 수동 NSLock에서는 GCD가 모르는 경우도 있음</pre>

<h5>Thread Explosion (스레드 폭발)</h5>
<p>GCD의 가장 큰 함정입니다. 블로킹 코드가 있을 때 발생합니다.</p>

<pre>// ❌ Thread Explosion 유발
let semaphore = DispatchSemaphore(value: 0)
for i in 0..&lt;1000 {
    DispatchQueue.global().async {
        semaphore.wait()  // 블로킹!
        // GCD: "이 스레드가 막혔네? 새 스레드 만들자"
        // → 다음 작업도 블로킹 → 또 새 스레드
        // → 64개 스레드 한도 도달 → 시스템 불안정
        doWork()
        semaphore.signal()
    }
}</pre>

<h5>해결법</h5>
<pre>// 방법 1: concurrentPerform — 시스템이 코어 수에 맞게 분배
DispatchQueue.concurrentPerform(iterations: 1000) { i in
    doWork(i)  // 자동으로 적절한 병렬도
}

// 방법 2: OperationQueue 동시 실행 제한
let queue = OperationQueue()
queue.maxConcurrentOperationCount = 4

// 방법 3 (권장): Swift Concurrency
// thread pool이 코어 수로 고정되어 있어 thread explosion 원천 차단</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "GCD에서 semaphore.wait, NSLock, sync, DispatchGroup.wait 같은 블로킹 호출을 async 큐에서 사용하면 thread explosion이 발생할 수 있습니다. 시스템은 막힌 스레드를 보고 처리량을 유지하려 새 스레드를 만들어내거든요. 이것이 Swift Concurrency가 도입된 큰 이유 중 하나입니다."
</div>
`},

{name:"Swift Concurrency: async/await",icon:"purple",
detail:`
<h5>왜 만들었나요?</h5>
<p>GCD의 한계를 극복하기 위해서입니다.</p>
<ul>
<li>Callback hell 해결</li>
<li>Thread explosion 방지</li>
<li>구조화된 동시성 (자식 작업 자동 관리)</li>
<li>컴파일 타임 안전성 (data race 검출)</li>
</ul>

<h5>async/await 기본</h5>
<pre>// 이전: completion handler 지옥
func loadProfile(id: String, completion: @escaping (User?) -> Void) {
    fetchUser(id: id) { user in
        guard let user = user else {
            completion(nil)
            return
        }
        fetchPosts(userId: user.id) { posts in
            user.posts = posts
            fetchAvatar(url: user.avatarURL) { avatar in
                user.avatar = avatar
                completion(user)
            }
        }
    }
}

// async/await로:
func loadProfile(id: String) async throws -> User {
    var user = try await fetchUser(id: id)
    user.posts = try await fetchPosts(userId: user.id)
    user.avatar = try await fetchAvatar(url: user.avatarURL)
    return user
}</pre>

<h5>Cooperative Thread Pool</h5>
<p>GCD와 결정적인 차이점입니다.</p>
<ul>
<li><b>스레드 수 = CPU 코어 수 (고정!)</b></li>
<li>Task가 await에서 자발적으로 스레드 양보</li>
<li>스레드를 점유하지 않고 continuation만 저장</li>
<li>thread explosion 원천 차단</li>
</ul>

<pre>func fetchData() async throws -> Data {
    let url = URL(string: "https://api.com")!
    let (data, _) = try await URLSession.shared.data(from: url)
    // ↑ 여기서 스레드 반환!
    //   네트워크 완료되면 어느 스레드든 잡아서 재개
    return data
}</pre>

<h5>Structured Concurrency: async let</h5>
<p>여러 작업을 동시에 시작하고 모두 완료될 때까지 기다립니다.</p>

<pre>func loadDashboard() async throws -> Dashboard {
    // 세 개를 동시 시작!
    async let profile = fetchProfile()
    async let posts = fetchPosts()
    async let notifications = fetchNotifications()
    
    // 모두 완료될 때까지 대기
    return try await Dashboard(
        profile: profile,
        posts: posts,
        notifications: notifications
    )
    // 자동 cancellation: 하나라도 throw하면 나머지 자동 취소
}</pre>

<h5>TaskGroup: 동적 작업 모음</h5>
<pre>func fetchManyImages(urls: [URL]) async throws -> [UIImage] {
    try await withThrowingTaskGroup(of: UIImage.self) { group in
        for url in urls {
            group.addTask {
                try await fetchImage(from: url)
            }
        }
        
        var images: [UIImage] = []
        for try await image in group {
            images.append(image)
        }
        return images
    }
}</pre>

<h5>Task와 Task.detached</h5>
<pre>// Task: 부모의 priority, actor context, task-local 상속
@MainActor
func userTapped() {
    Task {
        // 자동으로 @MainActor에서 시작!
        await loadData()
    }
}

// Task.detached: 아무것도 상속 안 함
@MainActor
func userTapped() {
    Task.detached {
        // 백그라운드에서 시작!
        await loadData()
    }
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "GCD는 작업을 큐에 넣고 시스템이 스레드 풀에 분배하는 모델이지만, 블로킹 코드가 있으면 thread explosion이 발생합니다. Swift Concurrency는 cooperative thread pool로 스레드 수를 코어 수로 고정하고, await에서 작업이 자발적으로 양보합니다. 또한 structured concurrency로 자식 작업의 lifetime이 부모에 묶여 누수가 없습니다."
</div>
`},

{name:"Actor와 Sendable",icon:"orange",
detail:`
<h5>Actor가 뭔가요?</h5>
<p>"내부 상태를 동시 접근으로부터 보호하는 참조 타입"입니다. 데이터 경합(data race)을 컴파일 타임에 막아줍니다.</p>

<pre>// ❌ class에 mutable 상태 → race condition 위험
class BankAccount {
    var balance: Double = 0
    
    func deposit(_ amount: Double) {
        balance += amount  // 여러 스레드에서 동시 호출 시 데이터 손실 가능
    }
}

// ✅ actor로 해결
actor BankAccount {
    var balance: Double = 0
    
    func deposit(_ amount: Double) {
        balance += amount  // actor 내부에서는 동기적 접근 보장!
    }
}</pre>

<h5>Actor 동작 원리</h5>
<p>각 actor 인스턴스는 <b>serial executor</b>를 가집니다. 외부에서 actor의 메서드를 호출하면 메시지처럼 큐에 쌓이고, 한 번에 하나씩 실행됩니다.</p>

<pre>let account = BankAccount()

// 외부에서 actor 메서드 호출 시 await 필요
Task {
    await account.deposit(100)  // 큐에 메시지 enqueue → 처리
    let bal = await account.balance
    print(bal)
}

// 동작:
// 1. account의 mailbox에 deposit 요청 추가
// 2. account가 idle이면 즉시 실행, busy면 대기
// 3. 다음 요청은 이전 것 끝나야 시작 → 순서 보장</pre>

<h5>Global Actor: @MainActor</h5>
<p>"이 코드는 메인 스레드에서만 실행돼야 한다"고 명시합니다.</p>

<pre>@MainActor
class ViewModel: ObservableObject {
    @Published var items: [Item] = []  // UI 바인딩 → 메인 스레드 보장
    
    func load() async {
        // 백그라운드에서 실행되어도:
        let data = await fetchFromNetwork()
        items = data  // ← 자동으로 메인 스레드에서 실행됨!
    }
}

// 메서드 단위로도 가능:
class SomeClass {
    @MainActor
    func updateUI() {
        // 메인 스레드에서만 호출 가능
    }
}</pre>

<h5>Sendable: 동시성 경계 통과</h5>
<p>"이 타입은 스레드/actor 사이를 안전하게 건너갈 수 있다"는 표시입니다.</p>

<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">자동 Sendable</th><th style="padding:10px;text-align:left">아닌 것</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">struct (모든 프로퍼티가 Sendable)</td><td style="padding:10px;border-top:1px solid var(--g2)">class (mutable state)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">enum (모든 case가 Sendable)</td><td style="padding:10px;border-top:1px solid var(--g2)">function with mutable capture</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">actor (자체적으로 격리됨)</td><td style="padding:10px;border-top:1px solid var(--g2)">참조 공유되는 모든 가변 상태</td></tr>
</table>

<pre>// ❌ 컴파일 에러 (Swift 6 strict concurrency)
class UnsafeCache {
    var data: [String: Any] = [:]  // mutable + not isolated
}

func processInBackground(cache: UnsafeCache) async { ... }  // ❌

// ✅ 해결 1: actor로 변환
actor SafeCache {
    var data: [String: Any] = [:]
}

// ✅ 해결 2: @unchecked Sendable (개발자가 thread safety 보장)
final class ManuallyThreadSafeCache: @unchecked Sendable {
    private let lock = NSLock()
    private var data: [String: Any] = [:]
    
    func get(_ key: String) -> Any? {
        lock.lock()
        defer { lock.unlock() }
        return data[key]
    }
}</pre>

<h5>Actor Reentrancy (중요한 함정!)</h5>
<p>actor 메서드 안에서 await을 만나면 actor lock이 일시 해제됩니다. 그 사이에 다른 호출이 들어와 상태를 바꿀 수 있습니다.</p>

<pre>actor Counter {
    var count = 0
    
    func incrementTwice() async {
        count += 1
        await someAsyncWork()
        // ⚠️ 이 시점에서 count는 반드시 1이 아닐 수 있다!
        // await 동안 다른 호출이 count를 변경했을 수도 있음
        count += 1
    }
}

// 해결: await 전후로 상태를 다시 검증하거나,
// await 없이 동기적으로 처리할 수 있도록 분리</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "Actor는 serial executor 기반의 격리로 데이터 경합을 컴파일 타임에 막습니다. 하지만 reentrancy 함정이 있어 await 전후로 상태가 변할 수 있다는 점을 인지해야 합니다. Sendable은 동시성 경계를 안전하게 통과할 수 있는지 표시하고, Swift 6의 strict concurrency mode에서는 모든 cross-actor 데이터가 Sendable이어야 합니다."
</div>
`}

],

answer:"<b>DispatchQueue.main</b>: GCD 기반. async로 메인 큐에 작업 enqueue. 컴파일 타임 안전성 없음 — 메인이어야 하는 코드를 백그라운드에서 호출해도 컴파일은 됨.<br><br><b>@MainActor</b>: Swift Concurrency 기반. 컴파일러가 메인 스레드 격리를 강제. 백그라운드에서 @MainActor 메서드 호출 시 await 필수, 안 쓰면 컴파일 에러.<br><br>새 코드에서는 @MainActor를 권장합니다. 컴파일 타임에 실수를 잡아주니까요."},

{q:"async let과 TaskGroup의 차이는?",level:"advanced",freq:false,
answer:"<b>async let</b>: 정적인 작업 묶음. 컴파일 타임에 작업 개수가 정해져 있을 때.<br><br><b>TaskGroup</b>: 동적인 작업 묶음. 런타임에 작업 개수가 결정될 때 (예: 배열의 모든 원소에 대해 fetch).<br><br>예시:<br><pre>// 작업 3개 고정 → async let\nasync let a = fetchA()\nasync let b = fetchB()\nasync let c = fetchC()\n\n// 배열 크기에 따라 동적 → TaskGroup\nawait withTaskGroup(of: ...) { group in\n  for url in urls {\n    group.addTask { await fetch(url) }\n  }\n}</pre>"}
],

topics:[

{name:"RunLoop이 뭔가요?",icon:"blue",
detail:`
<h5>RunLoop의 정체</h5>
<p>"이벤트가 들어올 때까지 대기하다가, 들어오면 처리하고, 다시 대기"를 무한 반복하는 루프입니다. 각 스레드마다 하나씩 가질 수 있고, 메인 스레드의 RunLoop은 앱이 켜질 때 자동으로 시작됩니다.</p>

<h5>왜 필요한가요?</h5>
<p>스레드는 기본적으로 코드를 실행하고 끝나면 종료됩니다. 하지만 메인 스레드는 앱이 살아있는 동안 계속 이벤트(터치, 네트워크 응답, 타이머)를 받아야 합니다. RunLoop이 이 무한 대기-처리 사이클을 만듭니다.</p>

<pre>// 의사 코드:
while (앱이 살아있는 동안) {
    이벤트 도착 대기
    이벤트 받으면 처리:
        - 터치 이벤트
        - Timer fire
        - 네트워크 콜백
        - perform selector
        - draw 요청
    화면 갱신 필요하면 layout/draw/commit
    다시 대기
}</pre>

<h5>RunLoop의 한 사이클</h5>
<ol style="padding-left:20px;margin:10px 0">
<li><b>Source 0 처리</b>: performSelector, 터치 이벤트 등 (port-based가 아닌 것)</li>
<li><b>Source 1 처리</b>: port-based 시스템 이벤트</li>
<li><b>Timer fire 처리</b></li>
<li><b>Observer 알림</b>: beforeWaiting, afterWaiting 등 lifecycle hook</li>
<li><b>대기</b>: <code>mach_msg</code>로 커널에서 새 이벤트 대기 (CPU 사용 안 함)</li>
</ol>

<h5>RunLoop Mode</h5>
<p>RunLoop은 한 번에 하나의 mode로 동작합니다. mode마다 처리하는 source/timer가 다릅니다.</p>

<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">Mode</th><th style="padding:10px;text-align:left">언제</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.default</code></td><td style="padding:10px;border-top:1px solid var(--g2)">일반 상태</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.tracking</code></td><td style="padding:10px;border-top:1px solid var(--g2)">UIScrollView 스크롤 중 (터치 추적)</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>.common</code></td><td style="padding:10px;border-top:1px solid var(--g2)">.default + .tracking 모두 포함하는 가상 mode</td></tr>
</table>

<h5>유명한 함정: Timer가 스크롤 중에 멈춤</h5>
<pre>// ❌ 스크롤 중에 Timer가 안 동작!
let timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { _ in
    print("tick")
}
// scheduledTimer는 기본적으로 .default 모드에 등록
// 사용자가 스크롤 시작 → RunLoop이 .tracking 모드로 전환 → Timer 멈춤!

// ✅ 해결: .common 모드에 추가
RunLoop.main.add(timer, forMode: .common)
// .common은 .default + .tracking을 포함하므로 항상 동작</pre>

<h5>왜 모드를 분리했나요?</h5>
<p>스크롤은 60fps 이상의 부드러움이 필요해서 다른 작업이 끼어들면 안 됩니다. 그래서 시스템이 의도적으로 .tracking 모드에서는 일반 Timer를 멈춥니다. 단, 스크롤과 무관한 작업(예: 네트워크 진행 표시)은 .common으로 등록하면 됩니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "RunLoop은 메인 스레드의 이벤트 처리 엔진입니다. UIKit 앱에서 우리가 작성하는 거의 모든 콜백(touch, Timer, network completion, performSelector)이 RunLoop을 통해 전달됩니다. Timer + ScrollView 함정처럼 RunLoop 모드를 이해해야만 디버깅 가능한 이슈들이 있어요."
</div>
`},

{name:"CADisplayLink와 60fps",icon:"green",
detail:`
<h5>CADisplayLink가 뭔가요?</h5>
<p>"디스플레이 갱신 시점에 동기화된 콜백"입니다. Timer와 비슷하지만, 화면이 새로 그려지기 직전마다 정확히 호출됩니다.</p>

<h5>왜 필요한가요?</h5>
<p>일반 Timer는 시간 기반이라 화면 갱신과 어긋날 수 있습니다. 게임이나 부드러운 애니메이션엔 화면 갱신과 정확히 동기화되어야 자연스럽습니다.</p>

<h5>VSync와 프레임 예산</h5>
<p>화면은 일정한 주기로 갱신됩니다. iPhone 기준:</p>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">디스플레이</th><th style="padding:10px;text-align:left">주파수</th><th style="padding:10px;text-align:left">프레임 시간</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">일반 디스플레이</td><td style="padding:10px;border-top:1px solid var(--g2)">60Hz</td><td style="padding:10px;border-top:1px solid var(--g2)">16.67ms</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)">ProMotion (iPhone 13 Pro+)</td><td style="padding:10px;border-top:1px solid var(--g2)">120Hz</td><td style="padding:10px;border-top:1px solid var(--g2)">8.33ms</td></tr>
</table>

<p>이 시간 안에 모든 처리(layout, draw, commit, GPU rendering)를 끝내야 부드럽게 보입니다. 초과하면 <b>프레임 드롭</b>이 발생합니다.</p>

<h5>사용 예시</h5>
<pre>class GameView: UIView {
    var displayLink: CADisplayLink?
    
    func startAnimation() {
        displayLink = CADisplayLink(target: self, selector: #selector(update))
        
        // ProMotion 지원
        displayLink?.preferredFrameRateRange = CAFrameRateRange(
            minimum: 60, maximum: 120, preferred: 120
        )
        
        displayLink?.add(to: .main, forMode: .common)
    }
    
    @objc func update(_ link: CADisplayLink) {
        let elapsed = link.targetTimestamp - link.timestamp
        // elapsed가 16.67ms 초과 → 프레임 드롭!
        moveSprite(deltaTime: elapsed)
    }
    
    func stopAnimation() {
        displayLink?.invalidate()
        displayLink = nil
    }
}</pre>

<h5>렌더링 파이프라인</h5>
<pre>VSync 신호 → 다음 단계 진행:
1. CADisplayLink 콜백 호출
2. layoutSubviews() (레이아웃 계산)
3. draw(_:) (커스텀 드로잉)
4. CATransaction.commit (Render Server로 전송)
5. Render Server: GPU에 렌더링 명령
6. GPU 렌더링
7. 다음 VSync에 화면 표시

→ 16ms (또는 8ms) 안에 1~5 완료 필수!</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "ProMotion 지원 디바이스에서 120fps를 활용하려면 CADisplayLink의 preferredFrameRateRange를 명시해야 합니다. 미명시 시 기본값은 60fps로 제한됩니다. 또한 게임이나 애니메이션 외에는 일반 작업에 CADisplayLink를 쓰지 마세요 — 매 프레임마다 깨워서 배터리를 빨아먹습니다."
</div>
`},

{name:"UI Layout Cycle (setNeedsLayout vs layoutIfNeeded)",icon:"purple",
detail:`
<h5>UIView의 레이아웃 동작</h5>
<p>제약 조건이나 frame이 바뀌었다고 해서 즉시 다시 그려지진 않습니다. 시스템이 다음 RunLoop 사이클에 일괄 처리합니다.</p>

<h5>3가지 핵심 메서드</h5>

<h5>1. setNeedsLayout()</h5>
<p>"다음 사이클에 레이아웃 다시 계산해줘"라고 시스템에 부탁만 합니다. 즉시 실행되지 않습니다.</p>
<pre>view.snp.updateConstraints { make in
    make.top.equalToSuperview().offset(100)
}
view.setNeedsLayout()  // 플래그만 설정
// 아직 layoutSubviews는 안 불림</pre>

<h5>2. layoutIfNeeded()</h5>
<p>"지금 당장 레이아웃 해줘"라고 강제 실행합니다.</p>
<pre>view.snp.updateConstraints { make in
    make.top.equalToSuperview().offset(100)
}
view.layoutIfNeeded()  // 즉시 layoutSubviews 호출
// 이 시점에 frame이 새 값으로 업데이트됨</pre>

<h5>3. layoutSubviews()</h5>
<p>실제 레이아웃 계산이 일어나는 시스템 메서드. 직접 호출하면 안 됩니다.</p>

<h5>애니메이션에서의 정석 패턴</h5>
<pre>// 제약 변경을 부드럽게 애니메이션:

// 1. 새 제약 적용
heightConstraint.constant = 200

// 2. UIView.animate 블록 안에서 layoutIfNeeded
UIView.animate(withDuration: 0.3) {
    self.view.layoutIfNeeded()  // 변경된 제약을 보간 애니메이션
}

// ❌ 이렇게 하면 애니메이션 안 됨
heightConstraint.constant = 200
UIView.animate(withDuration: 0.3) {
    // layoutIfNeeded 없으면 즉시 적용 vs 다음 사이클 적용 모호함
}</pre>

<h5>setNeedsDisplay vs setNeedsLayout</h5>
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:10px 0">
<tr style="background:var(--g1)"><th style="padding:10px;text-align:left">메서드</th><th style="padding:10px;text-align:left">트리거</th><th style="padding:10px;text-align:left">용도</th></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>setNeedsLayout</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>layoutSubviews</code></td><td style="padding:10px;border-top:1px solid var(--g2)">서브뷰 위치/크기 재계산</td></tr>
<tr><td style="padding:10px;border-top:1px solid var(--g2)"><code>setNeedsDisplay</code></td><td style="padding:10px;border-top:1px solid var(--g2)"><code>draw(_:)</code></td><td style="padding:10px;border-top:1px solid var(--g2)">커스텀 드로잉 다시 그리기</td></tr>
</table>

<h5>왜 viewDidLoad에서 frame이 정확하지 않나요?</h5>
<pre>override func viewDidLoad() {
    super.viewDidLoad()
    print(view.bounds.width)  // ⚠️ 정확하지 않음!
    // viewDidLoad 시점엔 view가 아직 window에 추가되기 전
    // Auto Layout이 계산되지 않은 상태
}

override func viewDidLayoutSubviews() {
    super.viewDidLayoutSubviews()
    print(view.bounds.width)  // ✅ 이 시점부터 정확
    // 단, 여러 번 호출될 수 있으므로 일회성 작업은 주의
}</pre>

<div class="highlight">
<b>💡 면접 포인트:</b> "setNeedsLayout은 비동기 예약, layoutIfNeeded는 동기 강제 실행입니다. 애니메이션 블록에서 layoutIfNeeded를 호출하면 제약 변경이 보간 애니메이션으로 처리됩니다. viewDidLoad에서는 frame이 아직 확정되지 않았다는 점도 자주 묻는 함정이죠."
</div>
`},

{name:"왜 UI는 Main Thread에서만?",icon:"orange",
detail:`
<h5>"UIKit is not thread-safe" 라는 말의 의미</h5>
<p>UIKit의 거의 모든 클래스는 thread-safe하지 않습니다. 즉, 여러 스레드에서 동시에 같은 UIKit 객체를 건드리면 데이터 손상, 크래시, 알 수 없는 버그가 발생할 수 있습니다.</p>

<h5>왜 thread-safe하게 안 만들었나요?</h5>
<p><b>성능 때문입니다.</b> 모든 UI 호출에 lock을 걸면 매 작업마다 동기화 비용이 발생해서 60fps 유지가 어려워집니다. Apple은 "UI는 메인 스레드에서만 다룬다"는 규칙을 강제하는 대신 lock을 제거했습니다.</p>

<h5>구체적으로 무엇이 일어나나요?</h5>
<pre>// 백그라운드 스레드에서 UI 변경 시도
DispatchQueue.global().async {
    self.label.text = "Hello"  // ⚠️ 위험!
    // 가능한 결과:
    // - 즉시 크래시
    // - 화면이 이상하게 그려짐
    // - 운 좋으면 동작 (가장 위험! 잠재 버그)
    // - 디버그 빌드에선 Thread Sanitizer가 잡아줌
}

// ✅ 항상 메인 스레드로 dispatch
DispatchQueue.global().async {
    let data = heavyTask()
    DispatchQueue.main.async {
        self.label.text = data  // 안전
    }
}

// 또는 Swift Concurrency:
Task {
    let data = await heavyTask()
    await MainActor.run {
        self.label.text = data
    }
}</pre>

<h5>Render Server</h5>
<p>iOS의 화면 렌더링은 별도 프로세스(<code>backboardd</code>)인 Render Server가 담당합니다. 앱은 layer 트리를 만들고 IPC로 전달만 합니다.</p>

<pre>// 렌더링 파이프라인:
//
// [App Process]                [Render Server]      [GPU]
//  │                            │                    │
//  ├─ Layout                    │                    │
//  ├─ Display (draw)            │                    │
//  ├─ Prepare (이미지 디코딩)   │                    │
//  ├─ Commit (CA Transaction)   │                    │
//  │     ──IPC 전송──→         ├─ Layer tree        │
//  │                            ├─ 렌더링 명령        │
//  │                            │   ──전송──→        ├─ 합성
//  │                            │                    ├─ 표시
//
// 앱이 책임지는 부분: ~10ms 이내
// Render Server: ~5ms 이내
// 총 16ms 안에 끝나야 60fps</pre>

<h5>Thread Sanitizer로 잡기</h5>
<p>Xcode의 <b>Edit Scheme → Diagnostics → Thread Sanitizer</b> 켜면 백그라운드에서 UI 호출 시 즉시 경고가 뜹니다. 디버그 빌드에서 항상 켜두면 좋습니다.</p>

<div class="highlight">
<b>💡 면접 포인트:</b> "UIKit이 thread-safe하지 않은 건 의도적 설계입니다. 모든 UI 호출에 lock을 걸면 60fps 유지가 어렵죠. 대신 \"UI는 메인 스레드\"라는 강력한 규칙을 두어 이 비용을 피합니다. Swift Concurrency에서는 @MainActor로 컴파일 타임에 이 규칙을 강제할 수 있어 더 안전해졌습니다."
</div>
`}

],
questions:[
{q:"스크롤 중에 Timer가 멈추는 이유는?",level:"basic",freq:true,
answer:"기본 <code>Timer.scheduledTimer</code>는 RunLoop의 <code>.default</code> 모드에 등록됩니다. 사용자가 스크롤을 시작하면 RunLoop이 <code>.tracking</code> 모드로 전환되고, <code>.default</code>에 등록된 Timer는 처리되지 않습니다.<br><br><b>해결:</b><br><pre>RunLoop.main.add(timer, forMode: .common)</pre><code>.common</code>은 <code>.default</code>와 <code>.tracking</code>을 모두 포함하는 가상 모드라 항상 동작합니다."},

{q:"왜 UI는 Main Thread에서만 업데이트해야 하나요?",level:"basic",freq:true,
answer:"세 가지 이유가 있습니다:<br><br>1. <b>UIKit이 thread-safe하지 않음</b>: 성능 이유로 lock 없이 설계됨. 멀티스레드 접근 시 데이터 손상 가능.<br>2. <b>Render Server 통신</b>: CA Transaction commit이 메인 스레드에서만 동작하도록 설계됨.<br>3. <b>이벤트 처리 순서</b>: touch → hit test → responder chain 모두 메인 스레드 RunLoop에서 처리됨.<br><br>Swift Concurrency의 @MainActor를 쓰면 컴파일 타임에 이 규칙을 강제할 수 있습니다."},

{q:"setNeedsLayout과 layoutIfNeeded의 차이는?",level:"basic",freq:true,
answer:"<b>setNeedsLayout()</b>: \"다음 RunLoop 사이클에 레이아웃을 다시 해줘\"라는 비동기 예약. 즉시 실행되지 않음.<br><br><b>layoutIfNeeded()</b>: \"지금 당장 레이아웃 해줘\"라는 동기 실행. 변경된 제약이 즉시 반영됨.<br><br><b>애니메이션 활용:</b><br><pre>heightConstraint.constant = 200\nUIView.animate(withDuration: 0.3) {\n    view.layoutIfNeeded()  // 보간 애니메이션\n}</pre>제약 변경 후 layoutIfNeeded를 애니메이션 블록 안에서 호출하면 부드러운 전환 가능."},

{q:"viewDidLoad에서 view.frame이 정확하지 않은 이유는?",level:"advanced",freq:true,
answer:"<code>viewDidLoad</code>는 view 계층이 로드된 직후 호출되지만, 이때는 view가 window에 추가되기 전입니다. Auto Layout 엔진이 아직 제약을 계산하지 않은 상태죠.<br><br>정확한 frame은 다음 시점부터 사용 가능합니다:<br>- <code>viewDidLayoutSubviews</code>: 레이아웃 완료 후 호출 (단, 여러 번 호출될 수 있음)<br>- <code>viewWillAppear</code> / <code>viewDidAppear</code>: 화면 표시 직전/직후<br><br>일회성 frame 기반 초기화는 <code>viewDidLayoutSubviews</code>에서 플래그를 두고 한 번만 실행하는 패턴을 사용합니다."},

{q:"DispatchQueue.main.async와 RunLoop.main.perform의 차이는?",level:"advanced",freq:false,
answer:"<b>DispatchQueue.main.async</b>: GCD 통해 메인 큐에 enqueue. 다음 RunLoop 사이클에 처리.<br><br><b>RunLoop.main.perform</b>: RunLoop의 Source 0에 직접 등록. 모드 지정 가능 (예: scrolling 중에도 동작하게).<br><br>대부분의 경우 동일하게 동작하지만, 미묘한 차이가 있을 수 있습니다. RunLoop.main.perform은 특정 RunLoop 모드에서만 실행되도록 제어 가능하다는 장점이 있어요."}
],
